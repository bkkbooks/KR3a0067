body:
  text: 性理羣書句解儒家類提要臣等謹案性理羣書句解二十三卷宋熊節編熊剛大注節字端操建陽人官至通直郎知閩清縣事剛大亦建陽人受業於蔡淵黄幹嘉定中登進士自稱覺軒門人掌建安書院朱文公諸賢從祀祠其仕履則不可考註中稱邇年皇上親洒白鹿洞規以賜南康則理宗時人也節受業於朱子是書採摭有宋諸儒遺文分類編次首列濓溪明道伊川康節涑水諸大儒傳道支派次贊次訓次戒次箴次規次銘次詩次賦次序次記次說次錄次辨次論次圖次正䝉次皇極經世次通書次文而以七賢行實終焉其列司馬光一人與後來講學諸家持論迥異考朱子於紹熙五年冬築竹林精舎率諸生行舎菜之禮於先聖先師以周程邵張司馬延平七先生從祀集中載其祝文有曰邵曰張爰及司馬學雖殊轍道則同歸之語則朱子序列學統本自有光後來門戸日分講學者乃排而去之節親受業於朱子故猶不敢恣為高論也所錄之文亦以七賢為主而楊時羅仲素范浚吕大臨蔡元定黄幹張栻胡宏真德秀所作亦間及焉其上及范質者以朱子作小學嘗錄其詩旁及蘇軾者則以司馬光行狀之故非因軾也明永樂中詔修性理大全其錄諸儒之語皆因近思錄而廣之其録諸儒之文則本此書而廣之併其性理之名似亦因此書之舊是其文雖習見固亦作樂者之葦籥造車者之椎輪矣剛大所注蓋為訓課童䝉而設淺近之甚殊無可採以其原附此書以行姑並錄之以存其舊焉乾隆四十六年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
