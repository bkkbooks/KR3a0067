body:
  text: 性理羣書句解卷七宋熊節撰熊剛大註記記者記述其事也養魚記此篇想見伊川愛物之仁心不特於魚為然殆欲周徧天下伊川先生書齋之前書院之前有石盆池以石為池其大如盆家人買魚子食猫家中人買小魚為養猫用食音似見其喣沫也不忍吾觀其吹氣吐沫不忍其死喣虚去聲沫音末因擇可生者得百餘遂取其可活者得百餘其中大者如指其内最壯者猶指頭細者如箸最小者如箸尾支頤而觀之者竟日以手托口間視之終日始舍之洋洋然初放於池則洋然自得舍音捨魚之得其所也此魚之樂得其地也終觀之戚戚焉静觀於終戚焉不足吾之感於中也此吾之有感於心也吾讀古聖人書吾誦上古聖人之書觀古聖人之政歴觀上古聖人之治禁數罟不入洿池禁宻網不入洿濁之池數音促魚尾不盈尺魚自首至尾不滿一尺不中殺不可殺者中去聲市不得鬻市井不許鬻賣鬻音育人不得食人亦不許食此聖人之仁聖人愛物之仁養物而不傷也是生養萬物而不傷其生物獲如是物得其生若此則吾人之樂其生反而觀我之自樂其生遂其性自適其性宜如何哉又當若何思是魚之於是時想魚之於此時寜有是困耶既得其生安有是困惟是魚但此魚孰不可見耶誰弗能見魚乎魚乎是魚是魚細鉤宻網微小之鉤細宻之網吾不得禁之於彼我不能禁彼漁捕之人炮燔咀嚼炮炙食啗炮音庖燔音煩吾得免爾於此我可以免汝生於此吾知江海之大我知長江滄海之大足使爾遂其性可俾爾魚自適其性思置汝於彼欲置爾於其中而未得其路未有其道徒能以斗斛之水徒將升斗桶斛之水生汝之命活爾性命生汝誠吾心俾汝咸生是我之心汝得生已多爾之獲生不為不多萬類天地中萬物之衆在天地間吾心將奈何我之心又如何使之皆然魚乎魚乎是魚是魚感吾心之戚戚者感得我心之戚然不足豈止魚而已乎又何啻此魚而已因作養魚記於是乎為養魚之記獨樂園記此篇言己之樂非衆人之所謂樂故名其園以獨樂司馬温公迂叟迂者迂疎之謂叟者老人之稱温公自號也平日讀書平時所讀之書上師聖人上則師法於聖人下友羣賢下則尚友於衆賢窺仁義之原愛曰仁宜曰義吾必究觀仁義之本原探禮樂之緒理曰禮和曰樂吾必探求禮樂之端緒自未始有形之前自渾沌未有形之先曁四達無窮之外及天下四達无有窮極之外事物之理一事一物各具一理舉集吾前紛至我前可者學之擇其善者吾必學焉未至於可苟未至於善何求於人何所求於人何待於外哉何所取於外哉惟求諸己而已矣志倦體疲其或心志之怠肢體之勞則投竿取魚則怡然自適以求真樂或垂竿而釣魚執衽采藥或提衣而拾藥衽音忍决渠灌花或疏溝泉而沃花操斧剖竹或執斧以刳竹濯熱盥水執熱而濯則盥之以水盥音管臨髙縱目登髙而望則縱目而視逍遙相羊優㳺順適相羊與倘佯同惟意所適惟吾意之所之明月時至皓月无時而不有清風自來清風竟日以長來行無所牽時行則行而无所拘攣止無所柅時止則止而无所繫柅柅女几反耳目肺腸凡曰耳曰目曰肺曰腸卷為己有皆收蔵為吾己之用不為物欲之所使也卷上聲踽踽焉徒有威儀而无所施踽其禹反洋洋焉悠然自得不知天壤之間不知上天下地之中復有何樂外此更有何可樂之事可以代此也足以代此樂耶因合而名之曰獨樂因合是數樂之事而總名吾園曰獨樂獨之為言得非此樂乃己之所獨而非人之所同也耶克齋記此篇專言克去己欲之私以盡吾仁則仁之道春融於吾性中矣文公先生性情之德存諸中謂性發見於外謂情其德至善無所不備无不備具而一言足以盡其妙而一語足以該盡其妙曰仁而已亦惟有此仁也所以求仁者蓋亦多術但所以求仁之方亦多端而一言足以舉其要而一語足以挈其要領曰克己復禮而已亦惟克去己私復還天理也蓋仁也者蓋仁之為道天地所以生物之心其為理生生不息在天地則為生物之心而人物之所得以為心者也人物之生得天地之心以為心則為吾心之仁惟其得夫天地生物之心以為心惟其得天地之心以為吾之心是以未發之前故天理未發見之先渾然成性四德具焉四者之德咸具其中曰仁義禮智愛曰仁宜曰義理曰禮知曰智而仁無不統仁包四德无所不統已發之際故天理已發見之時為情之善四端著焉四者之端發見於外曰惻隠羞惡辭遜是非惻隠為仁發見之端羞惡為義發見之端辭遜為禮發見之端是非為智發見之端而惻隠之心而惻隠貫乎四端无所不通此仁之體用仁其體也惻隠其用所以涵育渾全仁包四德惻隠亦包四端包涵全備周流貫徹流行通貫專一心之妙專一心之妙理而為衆善之長也而為萬善之宗然人有是身但人有是形則有耳目鼻口四肢之欲則耳欲聲目欲色鼻之欲香臭口之欲味四肢之欲安佚而或不能無害夫仁蕩於所欲則適為吾仁之害人既不仁人既不能全此仁則其所以滅天理而窮人欲者則其戕滅天理窮極人欲將益無所不至又將愈無所不至此君子之學此所以君子之為學所以汲汲於求仁在於切於求仁而求仁之要而求仁之大要亦曰去其所以害仁者而已亦在夫去其害吾仁者而已蓋非禮而視視者目之所睹非禮不正人欲之害仁也是人欲之私為吾仁害非禮而聽聽者耳之所聞非禮不正人欲之害仁也是人欲之私為吾仁害非禮而言且動焉言者口之所稱動者手足之持履非禮不正人欲之害仁也是人欲之私為吾仁害知人欲之所以害仁者在是知其害吾仁者皆是數者人欲之私於是乎有以拔其本塞其源譬之去木必拔其根譬之治水必塞其原克之克之而又克之克而又克至於无人欲之累以至於一旦豁然欲盡而理純以至一日此心瞭然人欲净盡天理著明則其胷中之所存者則凡吾性内之所全者豈不粹然天地生物之心豈非天地生物之心以為心純粹至善而藹然其若陽春之温哉温温乎其如陽春之育物耶黙而㑹之方寂然不動而㑹此理於心固無一理之不具其體該萬善而何一理之不全而無一物之不該也何一物之不備感而通焉及感而遂通而達此理於事則無事之不得於理其用散百為而何一事之不當於理而無物之不被其愛矣何一物之不愛嗚呼嘆語此仁之為德此仁之德所以一言而可以盡性情之妙是以一語足以該性情之理而其所以求之之要但其求之之方則夫子所以告顔淵者知夫子告顔子四非之目亦可謂一言而舉也與可謂一語足以舉其要矣然自聖賢既逺但自去聖賢之世既逺此學不傳此學寥寥而不傳及程氏兩先生出及明道伊川二程先生出而後學者始得復聞其説而後之為學者方得聞求仁之説顧有志焉者或寡矣而有志於是者亦少若吾友㑹稽石君子重如我之友㑹稽郡石姓字子重者則聞其説而有志焉者也嘗與聞是語且復有志於此故嘗以克名齋嘗自以克之一字名其齋而屬予記之而求我為之記予惟克復之云吾思克復之言雖若各為一事雖若判然為二其實天理人欲實則理之與欲相為消長一消則一長故克己者故克去己私乃所以復禮而天理於此即復而非克己之外非曰克去己私之外别有復禮之功也而他求復還天理之工夫今子重擇於斯言今石子重審擇斯言而獨以克名其室而以克之一字名其室則其於所以求仁之要則其於求仁之方又可謂知其要者矣亦是知其要領者是尚奚以予言為哉又何待更求我之言為記耶自今以往自今而後必將因夫所知之要而盡其力必當因爾所知之要力求以致其内至於造次顛沛之頃而無或怠焉雖至頃刻顛倒之時亦不怠於用力則夫所謂仁者則仁之在己其必盎然有所不能自已於心者矣只見其生意盎然於心胷間其機不容遏也又奚以予言為哉到此何假乎吾言哉顧其所以見屬之勤觀其屬吾為記之勤有不可以終無言者又不容終無一語以發其要因備論其本末因詳述其首末而書以遺之書冩以與之遺去聲幸其朝夕見諸屋壁之間幸兾其掲諸齋壁之中朝瞻夕覽而不忘其所有事焉者而無所忘於此則亦庶乎求仁之一助云爾庶㡬亦可以為子重求仁之助也復齋記還復之義乃是此心不放蕩於人欲則本心之善即存非曰録夫已棄之善而屬之而後謂復昔者聖人作易古先聖人作為易經以擬隂陽之變蓋以參二氣之變易於陽之消於上而息於下也於六陽消盡於上一隂復生於下其卦曰復其卦名之曰復復復之為復反也反之義也言陽之既往而來反也言陽既去而復回也夫大徳敦化天地之大徳厚化而川流不窮如水之流無窮豈假夫既消之氣何待假夫陽氣之既消以為方息之資以為陽氣方生之本亦見其絶於彼而生於此只因其隂絶於彼則陽生於此而因以著其往來之象爾不過因此以明其隂陽往來之象惟人亦然其在於人亦如此太和保合天之生人乾道變化各正性命保合太和善端無窮萬善充足无有窮盡所謂復者在人之所謂復者非曰追夫已放之心而還之非是言追求放出之心而使之復還録夫已棄之善而屬之也收其已失之善使之復聨屬亦曰不肆焉以騁於外亦惟不放肆此心以馳騖於外則本心全體則此心本然渾全之體即此而存清明常在固然之善固有之理自有所不能已耳其昭著自不可遏矣嗚呼嘆語聖人於復之卦聖人推復卦之義所以贊其可見天地之心以見天地之心贊之而又以為德之本者又言其為德之根本者蓋有天地之復有在人之復天地之復隂極陽生萬物於此萌動故為天地之心在人之復惡極善根善端於此流動故為徳之本其不以此歟其意不謂是歟袁州州學三先生祠堂記此篇推原斯道濂溪發其藴明道伊川得其傳所宜並祠之由宜春太守袁州守臣廣漢張侯廣漢郡張杓既新其郡之學既新建袁郡之學舎因立濂溪河南三先生之祠遂立濂溪周子河南二程子之祠于講堂之序于講書堂之兩廊而以書來因遣書至屬熹記之屬我記其事蓋自鄒孟氏没自鄒國孟軻氏死而聖人之道不傳而往聖之道不傳於世世俗所謂儒者之學世之所言吾儒之學内則局於章句文辭之習内所習者拘於篇章句讀文藻詞華之學外則雜於老子釋氏之言外所好者夾以老氏釋氏之語其所以修己治人者所謂修身以治百姓者遂一出於私智人為之鑿皆出於私智之陋人為之鑿淺陋乖離淺近卑陋乖踈支離莫適正統莫知是道正統之所在使其君之德俾上而人君之德不得比於三代之隆不能比迹夏殷周之隆民之俗下而斯民之俗不得躋於三代之盛不能接踵夏殷周之盛若此者如是者蓋有千有餘年於今矣殆將千餘載以至今濂溪周公先生濂溪周子奮乎百世之下起於百代之下乃始深探聖賢之奥首能探索往聖昔賢之奥學疏觀造化之原疏通洞達天地造化之根原而獨心得之而獨㑹之於心立象著書圖象太極作為通書闡發幽秘發幽啟秘詞義雖約言語雖簡而天人性命之微而天所賦為命人所受為性之妙脩己治人之要脩身治民之方莫不畢舉无不盡備河南兩程先生明道伊川既親見之而得其傳既親見濂溪而得其所傳於是其學遂行於世而濂溪之學得二程闡明遂行於天下士之講於其説者士子之講其學始得以脱於俗學之陋方得脱去世俗弊陋之學異端之惑與夫老佛之惑其所以修己治人之意所以修己治人之道亦往往有能卓然世俗利害之私亦多有能自立不為世俗利害所眩惑而慨然有志堯舜其君民者慷慨立志欲使君為堯舜之君民為堯舜之民蓋三先生者是三賢者其有功於當世其有功於當時於是為不小矣蓋莫此為大也然論者既未嘗考於其學但議者不曽推究其學又拘於今昔顯晦之不同又泥是道晦於昔顯於今之異是以莫知其本末源流之若此故不復知濂溪植其本二程舉其末濂溪清其源二程䟽其流相與如此而或輕議之或敢輕議及之其有略聞之者間有略聞其因則又舍近求逺又失之忽近取逺處下窺髙居下望髙而不知即事窮理不知於事上窮其理以求其切於修己治人之實以求其切於修己之實學治人之實功嗚呼嘆語張侯所以作為此祠張守所以創立祠宇而屬其筆於熹者而屬我執筆記其事其意豈不有在於斯與其意豈不有在於我知三賢之相授受者乎與歟同抑嘗聞之吾嘗有聞紹興之初髙宗紹興年間故侍講南陽胡文定公舊侍講胡公嘗欲有請于朝曽欲請之于朝加程氏以爵列加二程子列祀之爵使得從食於先聖先師之廟俾得從孔孟之食於廟庭從去聲其後熹之亡友繼以我之已逝之友建安魏君掞之建安郡也掞之名也為太學官以白衣召為國録又以其事白宰相復以此事言之相君且請廢王荆公安石父子勿祠荆公封國安石其名子名雱又請廢其父子從祀當時皆不果行當時朝廷不行其言識者恨之有識之士以此為恨至於近嵗以至邇年天子乃特下詔聖主特頒詔㫖罷臨川伯雱者罷荆公子臨川伯爵名雱者雱音傍略如掞之之言則已略行魏國録言然則轉語公卿議臣公卿獻議之臣有能條奏前二議者茍能條具敷奏如前廢荆公父子祠二説悉施行之盡施而行焉且復推而上之且又等而上之以及於濂溪推尊濂溪列之從祀其亦無患於不從矣又何慮上之人不從也張侯名杓張其姓杓其名丞相魏忠獻公之子父丞相忠獻魏國公子也文學吏治文學政事皆有家法綽有忠獻之家法觀於此祠觀於創立此祠又可見其志之所存者足見其心之所存者在乎義理異時從容獻納他日從容殿陛獻納直言從平聲自發其端語及其事使三先生之祠徧天下俾周程三子祠宇徧滿天下而聖朝尊儒重道之意而朝廷尊顯儒宗崇重儒道之盛心垂於無窮流傳不已則其美績之可書則其扶植道學美功之可紀又不止於此祠而已也又不啻立此祠而止故熹既為之論著其事故我既為之鋪敘行已之道而又附此説焉以俟而復著此言以待其異日奏請淳熈五年冬十月辛夘記江州重建濓溪先生祠堂記此篇推原氣運真醇之㑹鍾為在人清明之質而濂溪乃出以續千載之道統道之在天下者未嘗亡吾道在天下未嘗一日冺没惟其託於人者惟寄諸人者或絶或續或斷絶或聯續故其行於世者故道之行於世有明有晦續則明絶則晦是皆天命之所為莫之為而為者天也莫之致而至者命也非人智力之所能及也非人智力所能至於是也夫天髙地下天之髙逺地之卑下而二氣五行隂陽金木水火土之用紛綸錯揉紛紜錯擾升降往來於其間上騰下降往往來來於其中其造化發育大造即此化生萬物品物散殊品物賦受各殊其形莫不各有固然之理无不皆有本然所賦之理而其最大者而其尤大者則仁義禮智之性則有五常之理君臣父子昆弟夫婦朋友之倫是已與此五等之叙是其周流充塞此其周徧流行彌滿無所虧間更无虧欠間隔夫豈以古今治亂為存亡者哉又何嘗以古往今來之或治或亂而此理亦為之或有或無哉然氣之運也但是氣之運行則有醇漓判合之不齊有真淳漓薄開合之不同人之禀也故人之禀受則有清濁昏明之或異得是氣之合而真醇則為清明之資禀遇是氣之判而漓薄則為昏濁之氣質是以道之所以托於人而行於世者此其道寄諸人以行諸世惟天所畀皆天與之乃得與焉乃可與此决非巧智果敢之私㫁非智巧果决勇敢之私心所能臆度而强探也所能忖度其理探索其義也河圖出而八卦畫圖出於河八卦以畫洛書呈而九疇敘書呈於洛九疇以敘而孔子於斯文之興䘮子言是道之作興䘮失文道也亦未嘗不推之於天亦未有不歸之天聖人於此聖人於是其不我欺也審矣不我誣明矣若濂溪先生者如周茂叔先生其天之所畀其上天所畀付而得乎斯道之傳者歟而膺是道之傳者乎不然如不然何其絶之久而續之易何道統斷絶之久而周子聯續之易晦之甚而明之亟也前日晦塞之甚今日推明之速也音急蓋自周衰自周室末孟軻氏没孟子已死而此道之傳不屬而是道之傳不相聯屬更秦及漢自秦迨漢歴晉隋唐更歴晉室及隋與唐以至於我有宋至于我宋聖祖受命太祖既受天命五星聚奎五星㑹聚于奎實開文明之運實開啓文明之休運然後氣之漓者醇而後氣之漓薄者醇厚判者合剖判者混合清明之稟至清至明之氣得以全付乎人得以全與夫人而先生出焉而濓溪生不由師傳雖非師模傳授黙契道體暗合是道之體建圖屬書建極圖著通書根極領要㑹本根之極挈裘領之要當時見而知之當時見其書知其道有程氏者有二程子遂擴大而推明之乃充廣而發明焉使夫天理之微俾天理之㣲妙人倫之著人文之昭著事物之衆萬事萬物之多鬼神之幽鬼神幽晦之迹莫不洞然无不曉然畢貫于一悉貫㑹于一理而周公孔子孟氏之傳而二三聖賢之所傳煥然復明於當世昭然復著於世有志之士有志於此者得以探討服行而不失其正藉以探索其精微服行其實理而不失於正道如出於三代之前者如生於夏商周之前嗚呼盛哉嘆嗟而盛稱之非天所畀苟非上天以斯道付之其孰能與於此又誰能悟於是理先生姓周氏周其姓名惇頤惇頤其名字茂叔茂叔其字世家舂陵道州而老於廬山之下歸老於廬山之下因取故里之號取舊邦山川之名以名其川曰濂溪以表其川為濓溪而築書堂於其上創立書院於川之上今其遺墟今遺址在九江郡治之南十里在江州去州治十里南方而其荒茀弗治而荒蕪不整頓則有年矣凡㡬年矣淳熈丙申淳熈年間丙申嵗今太守潘侯慈明守臣潘侯慈明其名與其通守吕侯勝已與通判吕侯名勝已者作堂其處重創書堂於其舊址掲以舊名扁以元名以奉先生之祀所以安奉其祀而吕侯又以書來而吕侯以書遺我屬熹記之屬某為記熹愚不肖我庸愚無所肖似不足以及此不足以當是獨幸嘗竊有聞程氏之學者獨幸曽學二程之學因得伏讀先生之書因此得誦先生之書而想見其為人而想象先生之為人比年以來近嵗以來屏居無事退居别無他事常欲一泛九江每思泛舟入江入廬阜往廬山之下濯纓此水之上㓗巾帶於江水之間以致其髙山景行之思瞻仰髙山懐思大行而病不得往患不能進誠不自意實不自料幸甚獲因文字幸得因此記文以託姓名於其間也以寄吾姓與吾名於其中於是竊原先生之道於是併推原先生之道所以得於天而傳諸人者得之上天之付與傳諸二程之伯仲以傳其事如此吾又因二程之紀載而傳先生之事傳去聲使後之君子俾後來學者有以觀考而作興焉觀先生之言考先生之行而作興其慕學之志是則庶㡬乎兩侯之志爾是乃近乎潘吕二侯之盛心也四年丁酉春二月丙子記徽州婺源縣學藏書閣記此篇言其實則原天命之性其用則見於日用之間其文則出於聖人之手同一理也道之在天下吾道之大散在天下其實原於天命之性其實理則本於天所命之性而行於君臣父子兄弟夫婦朋友之間其實用則行於人倫五者之中其文則出於聖人之手其書則出於聖人親手而筆之而存於易書詩禮樂春秋孔孟之籍著在六經論語孟子之書本末相須由本及末彼此相資人言相發由註而疏言語相發皆不可一日而廢焉者也並不可無此蓋天理民彛天所賦之理即民所秉之常自然之物則物各有當然之則而亦皆自然之理也其大倫大法之所在在人曰大倫見於君臣父子兄弟夫婦朋友之間行已曰大法是為有義有親有序有别有信之道固不依文字而立者固不藉文字而存然古之聖人但古者聖人欲明是道於天下欲使是道昭布於世而垂之萬世傳之萬代則其精㣲曲折之際則於天理精微人事次序之際非託於文學非假言語亦不能以自傳也又弗能自傳於世故自伏羲以降自羲皇而下列聖繼作衆聖人相繼而出至於孔子及至夫子然後所以垂世立教之具則傳世立訓之道粲然大備昭然無所不備天下後世之人天下之人及後世人自非生知之聖非是上聖生而知者則必由是以窮其理須必藉聖經以硏窮其理然後知有所至而後知有所極而力行以終之而又篤行以終其事固未有飽食安坐未有飽其食安其坐無所猷為無所謀無所為而忽然知之而能卒然自知此理兀然得之者也安然而自得此理也故傅説之告髙宗曰昔𫝊説言於髙宗學於古訓乃有獲學于古聖人之訓誨乃有所得而孔子之教人夫子之誨人亦曰好古敏以求之亦言好古敏速以求好去聲是則君子所以為學致道之方則君子勉力於學推致其道之所在其亦可知也已其可得而知矣然自秦漢以來自秦歴漢以降士之所求乎書者士之講求乎書類以記誦剽掠為功多以記誦其文剽切其緒餘為能剽飄去聲而不及乎窮理修身之要而不悟聖經教人窮究義理以修其身之要道其過之者過於髙者則遂絶學捐書則又廢學棄書捐音員而相與馳騖乎荒虚浮誕之域相同馳逐於荒惚虚无浮誇妄誕之所騖音務蓋二者之蔽不同此二者之昏蔽雖若有異而於古人之意而於古聖人之心則胥失之矣則皆失之嗚呼嘆語道之所以不明不行是道之不復明不復行其不以此與豈不由此之故耶婺源學宫婺源縣學之宫講堂之上講書堂上有重屋焉古者樓閣皆謂之重屋重平聲牓曰藏書扁以藏書而未有以藏未有書籍可藏莆田林侯虙興化林君名虙者虙音伏知縣事為是縣之長官始出其所寶大帝石經初出其所寶大帝石經之書今上神筆填之今皇上御筆以實之而又益廣市書又益増廣買書凡千四百餘卷凡一千四百有零卷列庋其上以板為閣也列之於上庋音椅俾肄業者得以講教而誦習焉使習學業之人可以講明訓誘誦讀傳習焉熹故邑人也我本舊邑之人而客於閩而客寓於閩中兹以事歸今以他事而歸而拜於學來拜故學則林侯已去林已秩滿而去而仕於朝矣而官於闕廷學者猶指其書以相語學者手指林侯之書相告感嘆久之懐感嘆息稍久一旦遂相率而踵門一日學子相拉接踵于門謂熹盍記其事言我當為之記且曰且言比年以来近嵗以来鄉人子弟鄉里人之為子弟者願學者衆願来學者甚多而病未知所以學也病於未知所以為學之要子誠未忘先人之國君尚未忘父母之國獨不能因是而一言以曉之哉獨不可因此出一言以喻曉之熹起對曰我作而答之曰必欲記賢大夫之績必欲記林侯儲書之助以詔後學以告後人垂方来傳之方来則有邑之先生君子在則是邑亦有先生於我而為賢徳之君子熹無所辱命我何可辱是命顧父兄子弟之言乂觀其乃父乃兄乃子乃弟之説又熹之所不忍違者又我之所不忍違拒其敢不敬而諾諸安敢不敬以允其請乎竊記所聞如此因紀所聞者若是以告鄉人之願學者以語同邑願學之人使知讀書求道之不可已俾知誦書求道之心不可暫輟而盡心焉而盡其心以善其身以美其身齊其家以治其家而及於鄉近則及於鄉人達之天下廣則達乎天下傳之後世逺則垂之萬世且以信林侯之德於無窮也然則信林侯之德及後人蓋無有窮極是為記云於是為之記其事衢州江山縣學記此篇言學宫一新學者當留意為己之學不可務為為人之學建安熊君可量建安郡熊君名可量為衢之江山尉為衢州江山縣之尉始至初到以故事見於先聖先師之廟以舊典謁於孔子先賢之廟視其屋仰觀學宫皆壊陋弗支悉弊壊不可支吾而禮殿為尤甚而夫子之宫愈甚因問其學校之政因問及學舍之政事則廢墮不修則廢失而不修舉又已數十年矣又是數十年於此於是俯仰歎息由是俯視仰觀而為之咨嗟歎息退而以告其長湯君恱退則以語其長官湯君名悦長上聲請得任其事而一新焉欲身其事而新之湯君以為然長官以其言為是予錢五萬與之錢五萬予與同曰言以是經其始即此以營其初熊君則徧以語于邑人之宦學者尉又歴告邑中之貴而好學者久之乃得錢五十萬既久又得錢五十萬遂以今年正月癸丑始事以是年月正癸丑日始興役首作大成之殿初創夫子之宫踰月訖工越月而畢工棟宇崇麗梁棟屋宇髙侈貌象顯嚴廟貌容象之顯嚴位序丹青神位廊序飾以丹青應圖合禮圖繪有所按制度合於禮熊君既以復于其長尉既以是告成于長合羣吏合衆官率諸生糾生員而釋菜焉始行菜祀之禮則又振其餘財以究厥事則又發其所餘之財以終其事列置門棘門環列棘扁以奎文扁以御書如奎星之文師生之舎師弟子之室亦葺其舊則葺理其舊屋於是熊君自是尉官乃復揖諸生而進之乃再引生員而進之學宫使程其業俾課其所居之業以相次第以分髙下官居廩食居官食于廪庾絃誦以時春誦夏絃各以其時邑人有識者邑中有見識之人皆嗟嘆之皆為尉官嘆美以為尉本以捕盜賊為官尉者所以警捕盜賊者也苟食焉而不曠其事茍食于官不廢其治則亦足矣亦有餘矣廟學興廢夫子之宫或修或否豈其課之所急哉豈是其功課之所急者而熊君乃能及是而尉官乃克及此是其知與材為如何耶是其心知與其材品為何如人熹時適以事過邑我於是時偶以他事適縣聞其言聞其説則以語熊君曰即以告于尉曰吾子之為是役則善矣子之興是役則嘉矣而子之所以為教而子之教乎人者則吾所不得而聞也則我尚未獲聞也抑先聖之言有之吾夫子嘗曰古之學者為已古之學務内故求盡吾已為去聲今之學者為人今之學務外故求知於人二者之分此為己為人之判實人材風俗盛衰厚薄之所係乃人品流俗機括之所係而為教者而為之立教者不可以不審焉者也豈可不察於此顧予不足以議此顧我不足以言此子之邑子之治邑故有儒先舊有先沒之儒曰徐公誠叟者謂徐誠叟名顯者受業程氏之門人受業河南程氏之門人學奥行髙學識之奥操行之髙行去聲講道於家推明是道於家塾弟子自逺而至者徒弟不逺而来常以百數常百餘人其及今未逺也及今尚未逺吾意大山長谷之中吾想深山大野之中隘巷窮閻之下僻巷敗屋之下隘音阨閻音炎必有獨得其傳㫁有親受其傳而深藏不市者斂藏祕宻不眩鬻於人者為我訪而問焉與我詢而求之則必有以審乎此必有能察乎此者而知所以為教之方矣則知其為設教之道矣熊君曰尉言走則敬聞命矣僕已敬謹公之命走僕也然此意也但此等意思不可使是邑之人無傳焉不可令此縣之人無所傳願卒請文以識兹役而并刻之願終請記文以紀斯事并鋟刻之識音志熹不得而辭也我不敢辭因悉記其事因盡述其曲折且書其説如此又寫其言若是俾刻焉而使鐫之既以勵熊君既以勉尉且以示其徒又以示其學徒又以告凡後之為師弟子而食于此者且又告後之為師為弟子食於此者使知所以自擇云爾俾之知此以自擇于此焉淳熈三年七月丙辰新安朱熹記江陵府曲江樓記此篇冩張曲江既去相位登臨賦詠於此翛然有塵外之想廣漢張侯敬夫廣漢郡張侯名栻字敬夫即南軒也守荆州之明年為荆州守踰年嵗豐人和嵗事豐熟人民和洽幕府無事府治僚幕並無他事顧常病其學門之外常惡州學門之外即阻髙墉以髙牆阻塞無以宣暢鬱湮不能疏通湮鬱之氣導迎清曠引挹爽塏乃直其南於是直向南方鑿門通道開其門以通其路以臨白河前近白河而取旁近廢門舊額而即邊旁已廢門之舊額以扁其土且為樓觀以表其上又為樓屋以表飾門上觀去聲一日敬夫與客一旦張侯與賓客往而登焉同往而登斯樓則大江重湖大江跨前重湖在側重平聲縈紆渺瀰縈迥渺茫一目千里一望可盡千里而西陵諸山西陵衆峯西陵地名空濛晻靄㣲雨暗靄晻音奄又皆隠見出沒於雲空煙水之外或隠或見或出或沒於雲天烟水之外敬夫於是顧而嘆曰張侯視此有感嗟嘆而言此亦曲江公所謂江陵郡城南樓者耶此亦張九齡所言江陵郡城之南有樓者乎昔公去相而守於此昔九齡去相位而守此土相去聲其平居暇日其平常閒暇之日登臨賦詠登樓臨江賦詩詠情蓋皆翛然有出塵之想自翩然有塵外之興至其傷時感事至於傷其時感其事寤嘆隠憂夢覺興嘆心切懐憂則其心未嘗一日不在於朝廷此心無一日不在國家而汲汲然惟恐其道之終不行也切切然惟恐其道之不能終行也於戲嘆語於音烏戲音希悲夫哀也已門書其扁曰乃寫其扁額曲江之樓名其樓以曲江而以書来而遣書至囑予記之令我為之記予方守南康我方作守南康疾病侵陵為疾所苦求去不獲乞免不許讀敬夫之書閲張公書而知茲樓之勝乃知此樓之壮思得一與敬夫相從游於其上思欲與張侯相同登其上瞻眺江水眺望其地之江山覽觀勝制覽㸔此樓之勝制按楚漢以来成敗興亡之效窮楚漢以降一成一敗一興一亡之迹而考其所以然者而推其所以成敗興亡之由然後舉酒相屬而後把酒相與以詠張公之詩以歌詠張曲江之詩而想見其人於千載之上想像其人音容於千載之上庶有以慰夙心者庶㡬可以慰惬其素心顧乃千里相望而又相去各一千里邈不可得逺不能相及邈鳥入聲則又未嘗不矯首西悲則又未嘗不昻顧西望傷悲而喟然發嘆也太息而又興嘆也抑嘗思之蓋嘗思之張公逺矣張曲江逺矣其一時之事事之見於一時者雖唐之治亂所以分者雖是於唐室一治一亂之判顧亦何預於後之人初無預於後代之人而讀其書者而讀張曲冮之書未嘗不為之掩卷太息也不能不為之掩其畫而嘆息是則是非邪正之實是則是是非非或邪或正之迹乃天理之固然乃天理之本然而人心之不可已者人心之天不容己者是以雖曠百世而相感故雖百代之逺猶能感發使人憂悲愉怢俾人且憂傷且愉怢勃然於胸中心中勃然為之作興恍若親見其人恍兮如親目之怳恍而真聞其語者而親炙其誨也是豈有古今彼此之間何嘗有古與今彼與此之間隔而亦孰使之然哉又果誰使之如此詩曰毛詩云天生烝民天生衆民有物有則有此形體便有此理民之秉彛斯民秉持上天所賦之常理好是懿德惟樂此至善之德好去聲登此樓者升是樓者於此亦可以反諸身而自得之矣於此能反鍳諸已知曲江之善可慕則自得者多矣予於此樓我於是樓既未得往寓目焉既未得一登屬眼盛觀無以寫其山川風景無以述其溪山風氣景象朝暮四時之變早晚及春夏秋冬之變態如范公之書岳陽也猶范文正公之形􅃺岳陽樓也獨次第敬夫本語惟上下張侯所寄之言而附以予之所感者如此又附入予感懐之情若是後有君子俾後来英哲得以覽觀焉因文字而自得其大槩云淳熈己亥十有一月己巳日南至新安朱熹記濓溪先生畫像記此篇歴冩濓溪平生文學政事之善道學相傳之妙先生世家道州營道縣濓溪之上先生其家世居道州營道縣名濓溪之上流姓周氏周其姓也名惇實惇實其名字茂叔茂叔其字後避英宗舊名後来避夲朝英宗舊諱改惇頥遂改名惇頤用舅氏龍圖閣學士鄭公向奏以外祖鄭姓向名官為龍圖閣學士之奏授洪州分寧縣主簿銓授簿闕縣有獄分寜縣有獄囚久不决經久不斷先生至先生至官一訊立辨一訊問立可辨明衆口交稱之衆人之口交誦其政部使者薦以為南安軍司理參軍監司薦之朝辟為南安司理官移彬及桂陽令隨又移官於彬州及為桂陽縣令用薦者改大理寺丞又用人之薦任為獄官大理丞知洪州南昌縣事又為洪州南昌邑宰簽書合州判官事又為合州簽判通判處州事又為處州通判改永州繼改永州通判權發遣邵州事又權知邵州熈寧初熈寧年號也其初年用趙清獻公趙姓清獻公其謚也吕正獻公薦吕氏正獻公其謚也以此二人薦為廣南東路轉運判官遂除為廣南路漕使改提㸃刑獄公事繼改除提刑未㡬而病未及㡬時先生以疾遂得南康軍以歸遂得南康而歸趙公再尹成都趙清獻再為成都府尹復奏起先生用奏乞起先生朝命及門朝廷之命及先生門而先生卒矣而先生已下世矣熈寧六年時熈寧之六年六月七日也六月初七日年五十有七壽止五十七嵗葬江州徳化縣清泉社塟于江州徳化縣地名清泉社先生博學力行先生學問之多踐履之篤聞道甚蚤年事最少即聞大道遇事剛果遇事則剛而不屈果而有斷有古人風綽有古者之餘風為政精宻施之政事精確詳宻務盡道理各務合於其理嘗作太極圖曽著太極一圖易説周易説易通數十篇通書謂之易通凡四十篇在南安時為南安司理時年少不為守所知年事尚少而太守不知已洛人程公珦居洛之人程姓珦名即伊川父也攝通守事通守通判也權其官視其氣貌非常人視貌察色知非常人與語與之言知其為學知道也知其篤於為學知道者也因與為友因是與之為友且使二子且遣其二子程顥程頤往受學焉往其公廨就學及為郎及為郎官故事當舉代舊例當舉代者毎一遷授毎一任職授官輒以先生名聞即以先生之名聞之于朝在彬時官彬州時郡守李公初平太守李姓名初平者知其賢知先生之賢德與之語而嘆曰與之言而嗟嘆云吾欲讀書何如我尚欲讀書如何先生曰先生荅云公老無及矣公年已老為學無及某也請得為公言之請與之歴言其所以於是初平日聽先生語自是李初平日親先生之言二年果有得及二年果有所益而程公二子程珦之二子即所謂河南二先生者也即所言河南二程夫子也南安獄有囚南安軍獄有罪囚之人法不當死其法不當抵死轉運使王逵時運使姓王名逵者欲深治之甚欲寘之以法吏無敢與相可否者官吏無敢與逵議其法之可與不可先生獨力争之先生獨争之甚力不聽守不從則置手板歸則棄其笏而歸取告身委之而去取誥敕委棄而往曰云如此若是尚可仕乎猶可為官矣乎殺人以媚人殺一人命以求媚太守一人吾不為也我不為此逵亦感悟王逵因此有感而悟其過囚得不死罪囚因是得以免死在彬桂陽在彬州及桂陽縣皆有治績並著治功来南昌縣及至南昌作宰人迎喜曰人争迎之喜形于言是能辨分寜之獄者得非能辨白分寜縣獄事者乎吾屬得所訴矣吾曹得所訴直之官矣於是更相教諭自是自相告諭莫違教命莫敢一違於其政教命令蓋不惟以抵罪為憂不特以犯罪為慮實以汚善政為恥也實是以汙辱其善政為恥在合州在合州為判官時事不經先生手公事不經先生之手吏不敢决吏人不敢自决民不肯從州民亦不肯服從蜀之賢人君子蜀邦之稱為賢稱為君子者皆喜稱之悉喜談而樂道之趙公時為使者趙清獻時為監司人或讒先生人或以事謗先生趙公臨之甚威趙清獻責先生極嚴而先生處之超然先生自度在己無過所處愈髙邁然趙公疑終不釋但清獻公之疑終是未解及守䖍及趙公為䖍州太守先生適佐州事先生又佐治其州趙公熟視其所為趙公熟視先生之動作乃寤前日之疑頓然消釋執其手曰執先生之手云㡬失君矣㡬乎失賢者矣今日乃知周茂叔也吾今日方知周茂叔其人於邵州守邵州新學校以教其人又修整學宫以教生徒及使嶺表及為廣西運使提刑不憚出入之勤不畏出入之勞苦瘴毒之侵煙瘴毒氣之侵害雖荒崖絶島雖於崖島荒逺孤絶之所人跡所不至人之行跡所不到處亦必緩視徐按亦徐徐按轡細問民疾苦務以洗寃澤物為己任務在洗滌寃抑惠利及物為己之事設施措置設施仁政措置便宜未及盡其所為未能盡展胷中之謀為而病以歸矣而以疾病告歸自少信古好義自少年時篤信古學喜為義事以名節自砥礪以善名清節常自磨礪奉己甚約自奉於己甚薄俸祿盡以周宗族所得俸資悉以賙䘏宗族之貧者奉賔友以奉賔客朋友之来訪者家或無百錢之儲家至或無百金之蓄李初平卒李守初平已死子幼其子尚幼小䕶其喪歸葬之先生與之愛䕶其喪以歸終其塟事又往來經紀於其家又於往来之間皆所以維持於其家始終不懈初終無有懈怠及分司而歸及為分司而歸妻子􅊡粥或不給先生愈貧妻子或為􅊡粥以食猶至不足􅊡音旃而亦曠然不以為意也而此心放曠不復以此為意襟懐飄灑胷懐飄逸灑落雅有髙趣甚有清髙之志尤樂佳山水尤喜所在竒山竒水遇適意處或逢可人意處或倘佯終日則遊揚盡終日廬山之麓有溪焉廬山地名深林之下有溪發源於蓮華峰下其源則發於蓮華峰之下潔淸紺寒瑩而清深而寒紺甘去聲下合於湓江沿流而下合於湓江湓音盆先生濯纓而樂之先生㓗其冠之帶於是水之上以自潔因寓以濂溪之號因是而以濓溪自號而築書堂於其上而復築讀書之堂於是溪之上豫章黄太史庭堅豫章郡名也黄姓太史官名庭堅其名也詩而序之曰為詩以序其事言曰茂叔人品甚髙茂叔先生字也其人品級夐出衆人胷中灑落胷懐之間瀟洒脱落如光風霽月猶光風之清淑霽月之澄皎知徳者深於是德者亦深有取於其言云亦莫不有取於此言淳熈六年六月乙巳後學朱熹謹記龜山楊先生畫像記此篇推原王安石倡曲學以禍天下龜山首排其非其功與孟子闢楊墨同南軒先生宋興百有餘年大宋之興百餘年間四方無虞天下治平無恐風俗敦厚遺風流俗篤厚相尚民不識干戈民生斯時不見兵革有儒生出於江南時有儒者生於江南之地指王安石也髙談詩書以議論詩書自髙自擬伊傅自比於伊尹傅説而實竊佛老之似其實則竊佛氏老子之近似濟非鞅之術濟之以韓非商鞅刑名之學舉世風動舉一世之人從之猶風之能動百物雖巨徳故老雖是世稱大徳元老之人有莫能燭其姦皆不能察其奸邪其説一行自是言之一行而天下始紛紛多事而普天之下紛紛擾擾悉尊信之日益多事矣反理之評背理之言詭道之論枉道之説日以益熾日益以盛邪慝相乗邪惡並作卒召裔夷之禍終啟金虜之患中國攷其所致稽其所以致此有自來矣其来亦有所自靖康初靖康欽宗年號當其初年龜山楊公楊姓時名龜山其號也任諌議大夫為諌官國子祭酒兼學官之長始推本論奏其學術之謬初原其失且奏於上言其學術之不正請追奪王爵請追回王封之爵罷去配享撤去配食廟廷之祀雖當時餘黨猶夥雖當其時小人之殘黨尚多公之説未得盡施楊公之言未得悉付施行然大統中興但髙宗一統天下再造乾坤論議一正士夫議論一出於正到于今學者以至于今天下學士知荆舒禍本荆舒夷狄之國王安石殁始封荆公後封舒王以其變亂國家法度故以貶之皆知其為國家兆禍之原而有不屑焉而不肯屑為其學則今之息邪説則楊公之止邪慝之言距詖行距絶不正之行詖音陂行去聲放淫辭放逺播亂之言辭以承孟氏者以上繼孟軻之學其功顧不大哉其功豈不大耶是宜列之學宫宜置之學舍之宫處之從祀之列使韋布之士使佩韋布衣之士知所尊仰知尊其祀而仰其德而况公舊所臨又况是邦乃楊公舊政之地流風善俗之及流習之美遺俗之善皆德化所及祀事其可缺乎祀典可闕而不舉乎瀏陽邑名也實潭之屬邑乃潭州所屬之縣紹聖初紹聖年號也其初年公嘗辱為之宰楊公曽屈為是邑之宰嵗饑發廩以賑民值年之荒盡發公廩以貸貧民而部使者以催科不給罪公時安撫張舜民待公甚厚而胡師文惡公與張善劾公不善催科公之德及邑民也深矣公雖不能終是任而徳之及於是邑之民則不淺矣後六十有六年自後又經六十六年建安章才邵建州章姓名才邵者來為政来為政於此邑慨然念風烈慷慨追念餘風遺烈咨故老咨問舊老葺公舊所葺治公舊政之所為飛鴻閣創為一閣扁以飛鴻繪像於其上繪畫楊公遺像於閣之上以示後學以此昭示後學之士以慰邑人之思以此慰安邑民思德之心去而不忘也雖公已去而未始忘也又六年閣成又凢六載貽書俾栻記之以書來囑我為之記栻生晚識陋我生之後見之卑何足以窺公之藴安足以窺見楊公之底藴惟公師事河南二程先生惟公從河南伊川明道二先生遊而以師禮事之得中庸鳶飛魚躍之傳於言意之表得中庸一卷之傳而領㑹於鳶飛戾天魚躍于淵一章之㫖於言意之外踐履純固履行純實堅固卓然為一世儒宗卓然岀乎衆人之上而為一世儒者之祖故見於行事故見之行事之間深切著明如此親切顯著若是敢表而出之吾因敢表暴其善而出之庶㡬慕用之萬一云爾庶或可仰慕其萬分之一云爾性理羣書句解卷七
