body:
  text: 性理羣書句解十九宋熊節撰熊剛大註文文者達其辭以告於神明者也邵州遷學釋菜祝文此篇述孔子道髙如天徳厚如地教化無窮如四時卲學非其地所宜議遷濓溪先生惟夫子惟孔夫子道徳髙厚道髙如天徳厚如地教化無窮著書立言萬世所法其教化不窮正如四時實與天地參而四時同故能參天地而配四時上自國都上而帝都下及州縣下至郡邑通立廟貌皆立廟於學宫而樹立貌像州守縣令郡守縣令春秋釋奠春秋各用上丁日行奠祭之禮雖天子之尊雖以萬乗之貴入廟肅躬行禮亦入廟庭致恭行禮其重誠與天地參焉且敬重之禮與天地同儒衣冠儒其衣冠學道業者學道學之學列室於廟中列其齋舍環集廟中朝夕目瞻睟容自朝至夕仰瞻夫子温粹之容心慕至徳景慕夫子至聖之徳幾於顔氏之子者有之幾於顔囘者雖冇其人得其位有其禄位施其道推行其道澤及生民者代有之其徳澤施於百姓者代不乏人然夫子之宫可忽歟但夫子之廟置非其地其可忽而不治耶而邵置於惡地邵州之學置非其地掩於牙門閉於牙門左獄右庾左為獄囚右盡倉庾穢喧歴年穢汚喧雜幾年於兹惇頥周子名也攝守州符權守是州嘗拜堂下曽拜謁於堂下􅅥汗流背觀其非所􅅥然恐懼汗流浹背起而議遷爰謀遷徙得地東南得其基於東南陽明之方髙明協卜其地髙明卜云其吉用舊増新用其舊制増而新之不日成就歲月未久旋已落成彩章冕服彩色章施旒冕衮服儼坐有序儼然巍坐秩秩有序諸生既集生徒皆聚率僚皆成帥僚属之官告廟貌之成謹以禮幣藻齋敬以奠幣之禮蘋藻之薦式陳明薦用具以祭以兖國公顔子等配以顔子及曽子于思孟子侑食尚饗祭朱光庭二程門人文此篇言及門之士固多惟光庭信道篤而力於行伊川先生嗚呼嗟嘆道既不明此道既不明於天下世罕信者一世之人少有信者不信則不求惟其不信此道所以不求不求則何得既不知求則何所得斯道之所以久不明也此道之所以久不明於天下自予兄弟倡學之初自我兄弟二人倡嗚學道之始衆方驚異衆人方且驚怪以為異君時甚少光庭於此時年又最少獨信不疑獨能信此道而無所疑非夫豪傑特立之士若非英豪卓立之人能如是乎其能若是哉篤學力行鋭意於學勉力而行至於没齒以至於老志不渝於金石立志堅决雖金石之堅不是過行可質於神明履行嚴謹雖天地神明可以質之在家在邦或在於家或在乎國臨民臨事親民涖事造次動静頃刻之間動静之際一由至誠一本真誠上論古人上而求之古人之中豈易其比又誰可以比之蹇蹇王臣之節入為給事鯁鯁節概凛凛循吏之風出為太守凜凜循良著見事為散見事業之間皆可紀述無非可紀可述之事謂當施於時謂宜施於當時必得其壽必將得其壽考天胡難忱上天胡不可信遽止於此而君之夀乃止於此嗚呼哀哉嗟哉可哀也已不幸七八年間不幸七八載之中同志共學之人同志於道相與共學者相繼而逝如劉質夫李端伯吕與叔范巽之楊應之皆相繼淪沒今君復徃今汝又逝使予踽踽於世使吾有威儀無所施於時踽驅雨切憂道學之寡助慮道學之無其助則予之哭君則我之哭子豈特交朋而已不特是交友之情悼講道之無人也邙山之陽光庭所葬之地邙音芒歸祔先宅歸祔葬於祖先之所居思半生之深契思維半生之深相契痛音容之逺隔痛念音容之不可復見陳薄奠以將忱陳薄祭以將此誠意庶英靈兮來格庶幾可以冀英魂之來至祭劉質夫二程門人文此篇述其兄弟繼孟氏之絶學及門如劉質夫信道之篤為難得而數止於此伊川先生嗚呼嘆辭聖學不𫝊久矣聖人之學不得其𫝊已久吾生百世之後我生於百世之下志將明斯道其志將欲闡明是道興斯學於既絶興起此學於道統已絶之餘力小任重力量之小所任之重而不懼其難者而不憂其難亦有冀矣亦有所冀望也以謂茍能使知之者廣以言誠能使人知此道者博則用力者衆則用功於此道者亦多何難之不易也若是則雖難而實易遊吾門者衆矣及我之門者亦多而信之篤而信此道之篤得之多得此道之深行之果行此道之確守之固守此道之堅若子者幾希如質夫者甚少方頼子致力以相輔方資汝盡力以輔道而不幸遽亡而不幸即死使吾悲𫝊學之難使我哀道學之傳為難則所以惜子者則所以悼惜子者豈止遊從之情哉何特相從朋友之情而已兹焉歸葬今焉返葬不克臨穴不能親臨墓所姑因薄奠且因薄祭以叙其哀以述其哀情祭延平李先生文公之師文此篇言二程之道傳之龜山龜山傳之豫章豫章傳之先生而文公實受先生之傳文公先生道喪千載自孟子沒是道無人繼其𫝊已千餘年两程勃興明道伊川上繼孟子不傳之道統有的其緒的𫝊之緒龜山是承龜山楊中立號也實𫝊其道龜山之南楊龜山南劒人也既歸南劒道則與俱程先生有吾道南矣之嘆所以道與俱徃也有覺其徒龜山以所傳之道開悟其徒弟望門以趨人皆望其門而趨之惟時豫章當是之時有豫章先生羅仲素者傳得其宗傳授是道之案沠一簞一瓢一簞食一瓢飲凛然髙風雖貧自守凛凛清髙猗歟先生美哉延平早自得師早年得親豫章而師焉身世兩忘身與世俱忘唯道是資唯以道自任精義造約精於義理所造者約窮深極㣲窮其深奥極其㣲妙凍解氷釋脱然穎悟猶凍之解猶氷之釋發於天機發於天性乾端坤倪天地之本初鬼秘神彰鬼神之幽顯風霆之變風雷之變化日月之光日月之光明爰暨山川及於山川草木昆蟲動植㣲物人倫之正五倫各得其正王道之中王道之適乎中一以貫之一理貫通其間其外無餘此外更無餘者縷析毫差絲縷之析毫釐之差其分則殊其分各異體用混員體用兼該隠顯昭融顯幽明照萬變並酬應酬萬事之變浮雲太空所過者化猶浮靈之於太空仁孝友弟仁愛孝順友弟敬長灑落誠明襟懐灑落由誠而明清通和樂清明通徹和順樂易展也大成誠然集是道之大成婆娑丘林幽棲山林世莫我知世人無有知我者優哉㳺哉優㳺自得卒歲以嬉終歳以遊迨其季年及其季年徳盛道尊盛徳之至有道之尊有來摳衣或有來者摳趨其旁發其蔽昏啓發其䝉昧昏闇之性侯伯聞風守帥聞其髙風擁篲以迎掃門争迎篲音遂大本大經是道大本大經之所在是度是程以此為程度則法税駕云初卜車之始講議有端講明議論皆有端緒疾病乗之疾病相乘醫窮技殫醫不能治術止於此嗚呼先生嗟哉延平而止於斯數止如此命之不融降年不永誰實尸之誰其主之合㪚屈伸氣合而伸則生氣㪚而屈則死消息滿虚既消必息既盈則虚廓然大公洞然大公之道與化為徒大與造化為徒古今一息古今雖異一瞬息爾曷計短長短之與長初不必計物我一身物我雖殊皆具一身孰為窮通窮通又何必論嗟惟聖學獨有聖人之學不絶如綫其不絶者僅一線耳先生得之延平得此既厚以全既深厚而全備進未獲施進未及施之於時退未及傳退又未及傳之於人殉身以歿以道殉身而殁殉從也殉音徇孰云非天豈非天耶熹也小生某乃一小學生丱角趨拜總角時即進拜先生之門共惟先君惟我父韋齋實共源𣲖實與先生共其宗𣲖誾誾侃侃誾誾和悦貌侃侃温和淳厚貌歛袵推先歛襟推敬先生為先覺冰壺秋月冰壺之清秋月之明謂公則然常言先生如此施及後人施我後嗣施音易敢渝斯志敢違越先生之志從遊十年從先生遊凡十年誘掖諄至訓誘諄篤極至春山朝榮春朝山之榮美秋堂夜空秋夜一堂之空寂即事即理即其事即其理無幽不窮無幽㣲而不窮相期日深相期望日益深見勵彌切見於勉勵者尤深且切蹇歩方休蹇難之足方得休息鞭䋲已掣鞭韁已掣而他之安車暑行先生安車於暑而行過我衡門過我衡茅之下返斾相遭歸途相遇凉秋已分已中秋矣熹於此時某於是時適有命召適有君命之召問所宜言問先生以當今所宜言者反覆教詔先生反覆其語不憚其煩最後有言最末有言吾子勉之汝其勉力凡兹衆理凡理義之衆子所自知皆我所自知奉以周旋奉此道以周旋幸不失墜幸無廢失傾墜歸裝朝嚴歸􅏻晨發而整嚴訃音夕至訃音夕馳而忽至失聲長號失聲長哭淚落懸泉涕淚之落如泉之垂何意斯言豈知相見之一言而訣終天而為終生之永别病不舉扶先生病時不能舉手扶持沒不飯含先生既沒徒至於口不含飯奔赴後人奔走赴䘮又落人後死有餘憾先生之死則有餘愧儀刑永隔典刑隔逺而不可親炙卒業無期願終受業今無其時墜緒茫茫已墜之緒茫茫何求孰知我悲誰知我之悲哀伏哭柩前伏地號哭於柩之前奉奠以贄奉薄祭以為禮不亡者存先生雖亡有不亡之理存鍳此誠意其将歆我實意謁道州三先生祠文此篇言道體之傳本於羲農至孔孟而大明而周程又續孔孟不傳之學文公先生於皇道體大哉是道之本體沕穆無窮深逺無有紀極沕音勿羲農既逺伏羲神農相去已逺孔孟為宗孔子孟子實為可法秦漢以還秦漢以來名崇實否雖有尊道之名而無尊道之實文字所傳見之文字之間糟粕而已亦只糟粕之粗而已大賢起之有大賢興起於道統不傳之餘千載一逢千年一遇二程之緒明道伊川二程子之統緒自我周公實自濓溪啓其傳清瀟之源清瀟道州之地名也有嚴貌象儼然三賢廟貌神象欲覿無因欲瞻仰而無由徒有悵望徒自悵然懐望吏以毁告官吏以祠宇之毁壞來告閔然於𠂻惻然於懐出金少府出金於府徃佐其功徃助其功役爰俾諸生於是遣諸生徒敬陳一酹敬奠一觴酹音耒先生臨之先生其臨此祀有赫無昧赫然來歆無昧於此滄洲精舍告先聖文此篇述夫子集是道之大成顔曽思孟得其傳而本朝六君子又能繼絶學所宜配食文公先生恭惟道統敬此道統之傳逺自羲軒其來逺自羲黄軒轅氏黄帝姓也集厥大成集是道之大成允属元聖信属我夫子之大聖述古垂訓述徃古垂明教萬世作程可為萬世之法程三千其徒一時徒弟凡三千人化若時雨沐夫子之教如時雨之著物維顔曽氏惟有顔子曽子傳得其宗所𫝊得其宗沠逮思及輿思子思輿孟子字也及子思孟子益以光大是道愈極光大自時厥後自是而後口耳失真俗儒泥於口耳之學而是道寖失其真千有餘年自孟子而下千餘年間乃曰有繼道統湮墜日久於此而有人繼其傳周程授受乃生周濂溪發明道學授之二程二程受其傳萬理一原親傳太極㑹萬理於一原曰邵曰張繼有邵康節張横渠爰及司温於是又有司馬温公學雖殊轍所學雖異其塗轍道則同歸於道則同歸俾我後人使我後學之人如夜復旦明是理於乆晦猶既夜而旦氣發熹以凡陋某以凡平庸陋之質少蒙義方少得韋齋義方之訓中靡常師中間亦靡有定師晩逢有道最後方逢有道之君子載鑚載仰鑚之益堅仰之益髙雖未有聞雖若未有所聞頼天之靈頼上天之靈幸無失墜幸然無有失墜逮兹退老及今退而歸老田里同好鼎來同志於學之人于然而至落此一丘落成此一區羣居伊始羣來居之實自兹始探原推本尋其原究其本敢昧厥初其敢昧其初乎奠以告䖍薄脩奠禮以致䖍恭尚其昭格尚兾其顯臨陟降庭止一升一降正直無私惠我光明錫我以光明之道傳之方來以傳來世永永無斁永久而無厭斁性理羣書句解卷十九
