body:
  text: 性理羣書句解卷十宋熊節撰熊剛大註圖先天圖此圖明隂陽自然相生之象康節先生邵子曰邵堯夫言大𫝊云易係辭曰天地定位乾為天坤為地其位既定山澤通氣艮為山兊為澤其氣交通雷風相薄震為雷巽為風二者相附水火不相射坎為水離為火二者不相入射音亦八卦相錯合此八卦更相錯雜數往者順已往之卦則以順數之即圓圖左旋自震而至乾也知來者逆方來之卦則以逆數之即圓圖右轉自巽至坤也是故轉語易逆數也作易以逆推來事此一節明伏羲八卦此一段言伏羲先天八卦蓋乾南坤北乾居南坤居北離東坎西離居東坎居西震東北震居東北方兊東南兊居東南方巽西南巽居西南方艮西北艮居西北方八卦相錯者八卦相交錯者明交相錯而為六十四明其交相錯雜而成六十四卦自震至乾為順自震卦至乾卦為順數自巽至坤為逆自巽卦至坤卦則為逆數數往者順推數已往者順若順天而行猶順天道而行是左旋也是自左而旋皆己生之卦也皆是己生出之卦故云數往故曰數之於往猶自今日而追往日也知來者逆知方來者逆若逆天而行猶逆天道而行是右行也是自右而行皆未生之卦也皆是未生出之卦故云知來也故曰知之於來猶自今日而逆數來日也夫易之數先天易數由逆而成矣自逆數而六十四卦方備此一節直解圖意此一叚直解先天六十四卦圖大意固嘗推之固嘗推而明之太極既分太極之理分剖太極即圖中様白處是兩儀立矣圖中生出生第一爻左一竒數為陽右一耦數為隂此即一分而二太極生兩儀也陽上交於隂又自第一爻生第二爻左一竒數之陽進而上交右一耦數之隂隂下交於陽右一耦數之隂極而下交左一竒數之陽而四象生矣左邊第二爻一耦為隂一竒為陽右邊第二爻一竒為剛一耦為柔是即二分而四兩儀生四象也陽交於隂又自第二爻生第三爻左邊第二爻一竒之陽交一耦之隂隂交於陽一耦之隂而交一竒之陽而生天之四象第三爻左邊之竒耦者凡四乾一兊二離三震四是為太陽太隂少陽少隂天之四象也剛交於柔左邊第二爻之剛畫交於柔畫柔交於剛又以柔畫交於剛畫而生地之四象第三爻右邊之一竒一耦者凡四巽五坎六艮七坤八是為少剛少柔太剛太柔地之四象也八卦相錯乾兊離震巽坎艮坤八者交相錯雜而為六十四卦而後萬物生焉而後萬物自此生焉是即一分為二此便是太極分為兩儀二分為四兩儀分為四象四分為八四象分為八卦八分為十六八卦之上各加一竒一耦而為十六十六分為三十二十六之上各分一竒一耦而為三十二三十二分為六十四三十二之上各生一竒一耦而為六十四猶根之有幹正如木根上有幹幹之有枝幹之上又有枝愈大則愈小根本愈大枝幹愈小愈細則愈繁條幹愈細枝葉愈多此只是一生二二生四四生八八生十六十六生三十二三十二生六十四也是故轉語辭乾以分之陽到乾六陽之極又將分為隂坤以翕之隂到坤六隂已極翕合将闢為陽震以長之復為震宫初卦陽於此方長長上聲巽以消之姤乃巽宫初卦陽於此始消長則分陽長方始有必分之理消則翕也隂消方始有必翕之理迨翕盡而為純坤及到隂氣翕歛已盡而為六隂之坤又非静了便動且不是翕盡而為坤静了又便動而為陽此又有所謂太極在一静一動之間坤隂方静復陽未動中間乃本體之静為太極一動一静静而為坤動而為復天地人之至妙在天地則為隂極陽生在人則為静極復動豈不妙哉一動一静之間此正所謂非動非静在動静之間蓋於是時坤隂收歛已盡復陽包含未露坤復之中乃是本然之静不與動對而為動静之根本邵子以為坤復間太極朱子以為无極是也天地人之至妙至妙者上巳言天地人之至妙此又以至妙至妙言之所以見其妙之至極不可得而形容也故又云所以又言無極之前太極未有形象之先隂含陽也此時純隂隂静然已包得陽動在其中有象之後既有形象之後陽分隂也陽動而闢隂分兩矣隂為陽之母此言復生於坤故坤隂為復陽之母陽為隂之父此言姤生於乾故乾陽為姤生之父故母孕長男而為復坤復二卦相並於下坤六隂極而復一陽生故有母孕長男之象父生長女而為姤乾姤二卦相並於上乾六陽極而姤一隂生故有父生長女之象是以陽始於復陽生自復卦始而隂起於姤也隂生自姤卦始蓋嘗有詩曰蓋嘗即此而詠之於詩云耳目聰明男子身耳總目明又為男子一身洪鈞賦予未為貧天道賦予萬善具足不為全貧須探月窟方知物指姤卦言月隂也窟指一隂生處姤卦居於先天圖之上故言手探人物生生於天地間人陽物隂方知物猶言始知其為隂也未躡天根豈識人指復卦言天陽也根指一陽生處復居先天圖之下故言足躡豈識人猶言不知其為陽也乾遇巽時觀月窟乾與巽相值於此可觀月窟之妙地逢雷處看天根坤地也震雷也坤與震相值於此可見天根之妙天根月窟閒來往姤復二卦循環無窮皆太極之妙三十六宫都是春三十六宫即八卦之數言也乾一則二宫兊二則三宫離三則六宫震四則十宫巽五則十五宫坎六則二十二宫艮十則二十八宫坤八則三十六宫一陽既復運行於三十六宫莫非春意是以圓圖言也此詩以先天圓圖而言若夫方圖如彼中様方圖造化尤妙造化之理愈妙又嘗有詩曰曽有詩云天地定位乾居西北角對坤居東南角故云天地定位也否泰反類地天泰居東北角對天地否居西南角其道相反故云反類山澤通氣艮為山次於坤兊為澤次於乾相對而立故云通氣損咸見義山下有澤為損次於泰山上有澤為咸次於否又與艮兊相對並居四方兩交股處其義昭然可見雷風相薄震為雷巽為風居中央正交股處近而相迫恒益起意雷風為恒風雷為益對居震巽之旁以發其意水火相射坎為水次艮離為火次兊相射而立射音亦既濟未濟水火則為既濟次於咸火水則為未濟次於損與離坎二卦相對四象相交四卦象相交謂如正為乾坤變為否泰正為艮兊變為損咸正為震巽變為恒益正為坎離變為既濟未濟各各四卦成十六事合而言之則成此十六卦八卦相盪八卦更相推盪為六十四乃成六十四卦又合圓圖方圖而並論若又合方圓二圖並言圓圖其陽在南圓象天即天而論則東南陽氣之所升故陽在南其隂在北北乃隂氣嚴凝之地故隂在此方圖其陽在北方象地即地而論則東南雖陽氣之所升而輝光所照常在乎北故陽在北其隂在南推其陽在北則東南陽升之方却背乎陽故隂在南此尤造化之妙處此愈見造化之至妙至妙者也圖雖無文先天之圖雖無文字可見吾終日言我盡日所言未嘗離乎是不曽舍此蓋天地萬物之理蓋天地萬物消息盈虛之理盡在其中矣盡在此圖之中矣性理羣書句解卷十
