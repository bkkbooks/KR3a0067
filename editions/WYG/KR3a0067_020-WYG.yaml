body:
  text: 性理羣書句解卷二十宋熊節撰熊剛大註行實行實者所以述先賢行己之實行也濂溪先生行錄此篇歴述先生道徳性命之藴文學政事之善文公先生先生姓周氏先生周其姓名敦實敦實其名字茂叔茂叔其字也避厚陵藩邸名厚陵哲宗舊諱宗實先生以此引避改敦頥遂改今名世居道州營道世居道州營道縣父輔成父諱輔成嘗為賀州桂嶺令曽宰賀州桂嶺縣贈諌議大夫以先生奏贈是官母鄭氏母姓鄭封仙居縣太君亦以先生奏封為太君先生少孤少而無父養外家寄養外氏之家景祐中國朝景祐年間用舅氏龍圖閣學士鄭公向奏以外舅龍學鄭向之奏補官試將作監主簿初任是官授洪州分寧縣主簿繼任簿職先生博學力行先生學問該博而篤於行遇事剛果處事剛㫁而果决有古人風綽有古者之餘風其為政精宻嚴恕其政事精明周宻嚴肅仁恕務盡道理皆務合於道理縣有獄縣有停囚久不决久而未有分剖先生至自先生來一訊立辨一加訊問立辨曲直衆口交稱之輿論並予之部使者薦其才監司以其政才薦於朝為南安軍司理遂授是官獄有囚獄有罪囚法不當死於法不當置之死轉運使王逵王姓逵名欲深治之欲深置於法逵苛刻逵政酷虐吏無敢與相可否者官吏無敢議其是非先生獨與之辨先生獨辨其人之不當死不聽逵不聴其言則置手板歸則棄其笏取告身委之而去取其出身告敕委置於官而去曰如此尚可仕乎謂如是更可出仕乎殺人以媚人置人於死而求媚於長官吾不為也吾㫁不為之逵感悟逵感其言語囚得不死罪囚由此得生且賢先生薦之且賢先生之見薦之於朝移郴州桂陽令遷為桂邑宰皆有治績並著政聲用薦者改大理寺丞又以人奏薦改為棘寺丞知洪州南昌縣為隆興属邑宰南昌人見先生來邑民見其來喜曰皆樂而相告曰是能辨分寧獄者此乃能辨分寜縣獄事之人於是更相告語既而更相與言勿違教命無違其教化命令而以汚善政為恥也深以汚濁其徳政為羞改太子中舍人充東宫官簽書合州判官事為合州簽判轉殿中丞就任轉為臺官一郡之事一州之事不經先生手不經先生之手吏不敢决官吏不敢自决民不肯從人亦不服從趙清獻公為使者趙姓抃名清獻謚也時為使者小人或讒先生小人或毁先生趙公臨之甚威趙抃待之極嚴而先生處之超然也先生不以為意卓然所守轉國子博士尋除學官通判䖍州為䖍州通守趙公來為守趙抃適守是州熟視先生所為備見先生為政執其手曰握其手曰今日乃知周茂叔也今日乃知其為人遷尚書虞部貟外郎又權郎官通判永州復任永州倅權發遣邵州事遂知邵州新學校以教其人邵州之學左獄右庾先生遷之教養生徒熈寧元年熈寜年間用趙公及吕公正獻公薦以三公之薦為廣南東路轉運判官遂除運判先生謝吕公啓云在薄宦有四方之遊於髙賢無一日之雅三年熈寧三年轉虞部郎中遂遷正郎提㸃刑獄復任本州提刑先生不憚出入之勞不畏䟦涉之艱瘴毒之侵雖是瘴疫之氣方盛雖荒崖絶島至於荒僻山谷之地人跡所不至處無人行處亦必緩視徐按亦必按轡徐行問民疾苦務以洗寃澤物為己任專以洗滌寃抑澤潤生民自任設施措置施為舉措未及盡其所為未能究其萬一而先生病矣而以疾行因請南康軍以歸遂得南康守而歸趙公再尹成都趙抃又為成都府尹復奏起先生復上奏乞起先生朝命及門君命至其門而先生卒矣先生已死熈寧六年六月七日也所死之年也年五十有七壽止五十七歲葬江州德化縣清泉社所葬之地名也娶陸氏妻姓陸封縉雲縣君封縣君再娶蒲氏繼妻姓蒲封德清縣君封縣君子壽燾二子名也皆太廟齋郎皆為是官先生所著書其著述有太極圖作圖垂訓易説周易説易通數十篇即通書也詩十卷藏於家詩集等藏於家先生在南安時官南安軍時年甚少年最小不為守所知不為郡守見知洛人程公珦程姓珦名洛邑人也攝通守事權通判南安視其氣貌非常人觀其顔貌非尋常人與語與之談論知其為學知道也則知其為力學有道之君子因與為友遂為交友且使其子顥頥受學焉顥明道名頥伊川名遣之從學及為郎及為正郎故事當舉代舊典當舉人自代每一遷授一每選遷秩輒一薦之即薦先生程公二子程珦之二子皆唱鳴正道終至皆以道學鳴世以繼孔孟不傳之統以續孔子孟子千年無傳之道統世所謂二程先生者世稱為二程先生其原蓋自先生發之也其肇端於濂溪也在郴時官郴州時其守李公初平郴守李姓名初平知先生賢知其有道不以属吏遇之不以僚邑之官待之既薦諸朝既薦之於上又周其乏困又闔其不及嘗聞先生論學曽聞其講論為學之道嘆曰嗟嘆云吾欲讀書如何我尚欲讀書不知可否先生曰答云公老矣公年已老無及也學之無及敦實請得為公言之某請為公論其所以初平逐日聴先生語李初平日日聴其談論蓋二年而有得如此者二年恍然有得於已王荆公提㸃江東刑獄王安石封荆公為江東提刑時已號為通儒一時稱為通逹之儒先生遇之先生待之與語連日夜與之語連日至夜荆公退而精思荆公既退熟思其語至忘寝食至於不寐不食先生自少自少年信古好義崇信古道好為義事以名節自砥礪以名節自勉其奉已甚約其自奉養甚薄俸禄盡以周宗族所得官俸並以與房族奉賔友宴接賔客朋友在南昌時為南昌宰時得疾暴卒得病倐然而死更一日夜始甦經一日一夜方醒或視其家或人觀其家止一敝篋只有一破敝之篋錢不滿百其錢不滿一百李初平卒李守已死子幼不克葬其子尚幼不能辦葬先生䕶其䘮歸葬之乃扶䕶其䘮歸以葬之分司而歸為南京分司歸妻子饘粥不給其妻與子食亦不給曠然不以為意也處之泰然不以介意廬山之麓有溪焉廬山之林其下有溪築書堂其上創書齋於其上名之曰濂溪以濂溪名固語其友清逸居士潘延之曰潘姓延之名清逸居士其號也因與之語可仕可止可以仕則仕可以止則止古人無所必仕止非古人所能必束髮為學自緫髮時為學將有以設施可澤於斯人者欲有所展布可以流澤於斯民者必不得已尚不可為然後不得已止未晩也止不為遲此濓溪者此濓溪之書堂異時與子相從於其上他日與汝相與從游其上歌詠先王之道足矣吟咏古先聖王之道此其出處之本意也此乃我仕止之初心也豫章黄庭堅稱之曰豫章郡黄姓庭堅名稱之云茂叔人品甚髙先生為人資格甚髙胷中洒落心懷脱洒如光風霽月如光風之清淑霽月之明朗好讀書喜誦書雅意林壑意在山林丘壑之間不卑小官不以小官為恥職思其憂每思不稱其職為憂論法常欲與民决訟議法每欲與百姓平其獄訟得情而不喜既得其實則哀矜而不喜其為使者其出為監司進退官吏升黜衆官得罪者自以不寃為其劾者自以為不寃枉濂溪之名濓溪之得名雖不足以對其美雖然未足稱其美然茂叔短於取名但其不務於求名而樂於求志而樂求我心之所得薄於徼福薄於求福澤而厚於得民而重在得百姓之心菲於奉身薄於一己之奉而燕及惸嫠而飲宴及於憂苦孤寡之人惸音勤嫠音犁陋於希世拙於希求一世之尊顯者而尚友千古而心契上古之聖賢聞茂叔之風聞其風者猶足以律貪尚可以懲其貪饕之習則此溪之水濂溪之水配茂叔以永久與其名同流於千古所得多矣所得不其多矣識者亦或有取於其言云有識見者必能審於斯言此係雜取潘延之蒲宗孟黄庭堅所撰墓碑詩序脩纂及以程氏文集遺書吕氏童蒙訓等書參定見伊洛淵源明道先生行狀此篇歴述先生家世行業之盛歴官行事之美伊川先生先生姓程氏先生程其姓諱顥顥其名字伯淳伯淳字也父珦父名見任太中大夫致仕官任太中請老母壽安縣君侯氏母姓侯封縣君曽祖而下葬河南自曽祖以下皆葬於河南今為河南人今居於河南先生生而神氣秀爽先生始生精神氣貌俊秀清爽異於常兒與凡子不同未能言未能言語叔祖母任氏太君姓任氏封太君抱之行抱先生行不覺釵墜墜落其釵不知後數日方求之已數日方知尋先生以手指示先生能以手指其所果得釵果尋得數歲誦書強記過人稍長讀書博記逾越凡人十歲能為詩賦及十歲則自能為詩賦十二三時十二三歲羣居庠序與衆居學如老成人不為後生體態故户部侍郎彭公思永侍郎姓彭名思永妻以女見而異之妻之以女踰冠二十歲餘中進士第登第調京兆府鄠縣主簿受主簿鄠音户令以其年少未知之邑宰以其年少未深知之民有借其兄宅以居者邑民有借其兄屋舎居處發地中藏錢閒地中得所藏錢兄之子訴曰兄之子訴於官父所藏也以為此錢乃父所藏令曰宰曰此無證佐無所證驗先生曰易辨先生獨以為易辨别問兄之子曰問其兄之子云爾父藏錢幾時汝之父所藏錢今幾何時曰四十年言已四十餘年彼借宅居幾時彼人借汝屋居已幾時曰二十年矣云方得二十年即遣吏取錢視之遣公吏取其錢來觀謂借宅者曰與借人居者言今官所鑄錢今官司鑄錢不五六年五六年間即遍天下即天下皆有之此錢皆爾未藏前所鑄何也此錢皆是汝未藏之前所鑄其人遂服借居者遂服南山僧舍南山僧寺中有石佛有石刻之佛歲傳其首放光常傳佛頭有毫光男女聚觀男女羣聚而看晝夜雜處日夜混居無别為政者畏其神官於其土憚其神異莫敢禁止無有能止之者先生與僧曰先生請問其僧云石佛現光有諸石佛能現毫光果然曰然僧云如此曰俟復現候其復現光當取其首觀之當取其頭來看自是不復有光自此遂無光矣所在治役所在治工役人不勞而事集人不見其勞事無不辦再朞以避親罷逾年以避逺親嫌去再調江寧府上元縣主簿再任主簿田税不均田之税不均平皆近府美田皆由近府膏腴之田為富貴家厚價薄其税而買之並為富貴之家髙價輕産以得之小民茍一時之利小民但知一時茍於得利久則不勝其弊既久寖虧公賦先生為令畫法先生為長官具法為去聲民不知擾民不見其為擾而一邑大均一縣税法大均平㑹令罷去宰以事罷先生權邑事先生權知縣事上元劇邑上元乃煩劇之縣詞訟日不下二百民之訴訟日常一二百狀先生處之有方先生區處有其道不閲月不踰月民訟遂簡民訟遂少江南稻田江南禾田賴陂塘以溉藉陂水以灌溉盛夏堤决夏月堤潰决非千夫不可塞非千衆之力不可塞法當言於府漕法言之府又言之漕然後調役而後興工非月餘不能則又月有餘日先生曰先生云如是苖槁矣如此則苖已枯槁遂發民塞之自發工力築之歲大熟是年大稔先生常曰常言一命之士茍有一官茍存心於愛物能以仁物為心於人必有所濟必能濟人仁宗登遐仁宗崩遺制官吏成服三日遺詔百官服君䘮三日而除府尹羣官將釋服守與僚属將從吉服先生進曰先生言三日除服服三日而除遺詔不敢違也君之遺命不敢違矣一府相視一府之官相觀無敢除者遂服盡三日而除茅山有龍池茅山有龍井祥符中祥符年間嚴奉以為神物人敬事之以為神異先生捕而脯之先生屠其龍而脯之邑人持竿以黏飛鳥人持竹竿以黏雀取其竿折之先生乃折其竿邑人相共語邑之人相與語云主簿折黏竿自主簿折黏飛鳥之竿鄉民不畜禽鳥鄉民不敢畜飬飛禽再朞就移澤州晉陽令二年遷縣宰民以事至邑民以公事至縣告之以孝悌忠信教之以孝於親遜於長盡已之忠以實之信暇時閒暇之日召父老而與之語呼邑之父老與之言語兒童所讀書邑之兒童凡所讀書親為正句讀親自為之㫁句讀音豆教者不善教導茍不得其人則為易置則為之改易秩滿任滿吏夜叩門公吏夜擊門稱有殺人者且言有傷死人者先生曰先生云吾邑安有此邑民皆善寕有是耶誠有之果如此必某村某人也必彼村落彼人也問之果然既問則果如其言晉俗尚焚屍晉城縣風俗人死化以火雖孝子慈孫雖是孝順之子慈愛之孫習以為安習此而安於此先生教諭禁止先生訓以義理而禁絶之民始信邑民皆信從先生為令先生為宰視民如子視百姓如己之子欲辨事者欲辨直其事或不持牒或不待持訟牒徑至庭下直造公庭之下陳其所以歴述其所以先生從容告語先生徐告與之言諄諄不倦懇切不已百姓愛之如父母民愛先生亦如父母用薦者時有薦先生於朝者改著作佐郎遂改為著郎尋以御史中丞吕公著薦吕姓公著名為御史又薦先生授太子中允監察御史得東宫官入臺神宗素知先生名神宗聞先生之名比二三見二三次召見遂期以大用欲以大用先生前後進説甚多前後奏篇不一大要以正心窒欲大率皆以正君心窒嗜欲求賢育材為先求賢者養人材為先務不飾辭辨不文飾言語辨論獨以誠意感動人主惟以真誠實意感動人主之心神宗嘗使推擇人材神宗嘗令先生推薦而擇可用之人材所薦十人薦者凡十人而以父表弟張載暨弟頥為首而以其父之表弟張横渠名載與弟名頥為先所上章䟽所上奏章子姪不得窺其藁至親如子姪不得觀其藁嘗言人主當防未萌之欲常論人君當防遏欲心於未萌動之時神宗俯身拱手曰神宗曲其身拱其手云當為卿戒之當因鄉言而戒此及因論人才及在上前辨論人品曰乃云陛下奈何輕天下士人主如何輕視天下之士神宗曰神宗答云朕何敢如是我何敢若此王安石日益信用王姓安石名時上信用之先生為神宗言先生於是又為神宗言君道以至誠仁愛為本人君之道當以仁愛百姓為本未嘗及功利未嘗一言及於功利盖知王安石變法刻意功利必傷仁愛隂欲止之嘗極陳治道曽極論為治之道神宗曰神宗云此堯舜之事此乃帝堯帝舜之事朕何敢當我何足當此先生愀然曰先生蹙然云愀揫陛下此言人主有此言非天下之福也非是天下生靈之福荆公寖行其説安石之説既行先生意多不合先生多與之不合事出必論列荆公所奏之事一出先生必論奏之數月之間甫及數及章疏十上章䟽至十數上尤極論者其尤甚者輔臣不同心宰輔不能同心小臣與大計小臣得與預大事與音公論不行至公之議不行青苖取息放青苗錢取息為民害賣祠部牒賣僧道祠部及牒差提舉官提舉官因荆公奏方有是官多非其人多失其人荆公與先生安石與先生道雖不同道雖異而嘗謂先生忠信嘗言先生為忠信先生每與論事先生每與之議論心平氣和心既平實氣亦温和荆公多為之動安石多為之感動先生言既不行先生言既不聴用懇求外補懇切求出面請至十數不許面請至十數畨不許遂闔門待罪遂閉門俟罪除西京路提刑神宗命執政除先生提刑復上章曰又上書云臣言是臣言果合理願行之願人君行其言如其妄言如是其言之妄當賜顯責當有顯罰請罪而獲遷方請罪而却得除刑賞混矣賞罰混亂無統累請得罷屢請始罷既而神宗手批未幾神宗手批暴白同列之罪宣明同列不能容先生之罪獨於先生無責獨於先生無所責改差簽書鎮寧軍節度判官改差簽判為守者嚴刻多忌太守嚴酷多疑忌通判而下自通守以下莫敢與辯無人敢與之辯直事小未安事小有不安處必與之辯先生必與之辯論屢平反重獄數决重囚得不死者十數得不死者十數人河清卒河清兵卒於法不佗役在法不應役之程昉為外都水丞程姓昉名為外都水丞怙勢蔑視州郡恃其有勢援更無州府欲盡取諸兵治河欲悉起兵卒治河先生以法拒之先生以法拒絶之昉請於朝程昉又請之於朝廷以八百人與之起八百卒助之昉肆其虐程昉肆其酷虐㑹天寒兵潰適天時盛寒兵皆潰歸將入城将至城衆官畏昉僚属皆憚昉欲弗納欲拒其歸先生曰先生云此逃死自歸此人避死而自歸弗納必為亂拒之則必為亂昉有言程昉有言某自當之我自當之郊祀霈恩遇郊祀恩澤得監西京洛河竹木務遂得場務官改太常丞繼除太常神宗嘗語執政曰神宗嘗與執政云程某可用先生可擢用執政不對執政不復對又嘗有登對者後又有當奏對者自洛至自洛中來問曰神宗又問云程某在彼否先生在洛否連言佳士連言數聲佳士其後彗見求言後彗星見詔求直言先生應詔先生出奏對事神宗手批神宗親批與府界知縣與府界内知縣差知扶溝縣事遂為扶溝宰先生復求監當先生只求場務差遣執政諭以上意執政皆言上人之意不可改也不復可改數日右府同薦又數日因薦者除判武學有判武學之命專尚寛厚務從寛厚以教化為先以教化為先務扶溝多強盗扶溝多強賊脇取舟人物刼奪舟人之物歲必焚舟十數以立威一年常燒舡十數以張其威先生始至先生初來捕得一人捕獲一人使引其類俾引其徒黨得數十人又得數十人不復根治舊惡不復懲其罪分地以處之分其所而居之使以挽舟為業使之以牽舟為業自是邑境無焚舟之患自此邑内無有焚舟之事内侍都知王中正王姓中正名為内侍都知巡閲保甲以朝命差詣州縣巡視保伍所至陵慢縣官所在凌辱縣官諸邑供帳諸縣供具帳設競務華鮮皆欲鮮麗以悦奉之歡於奉承主吏以請主吏以請於先生先生曰先生云吾邑貧吾縣貧窘安能效他邑豈可比其他縣且取於民且取之於民法所禁也法所不許改奉議郎改奉議以親老以父母年老求近鄉監局求近洛監當得汝州酒税遂為酒官今上嗣位哲宗即位覃恩以恩沛改承議郎遂改承議召為宗正寺丞再召為宗正官未行以疾終未行以疾而死矣元豐八年是年六月十五日也夏六月望日也享年五十有四壽之年止乎是識與不識識先生者與聞先生名者皆惜先生皆為先生惜資禀既異其天資既異於人而充養有道存養以道其純粹如精金容貌純粹有如精金温潤如良玉氣象温潤有如美玉寛而有制雖寛而自有制和而不流雖和而不至於流忠誠貫乎金石至誠精忠雖金石之堅可以貫孝悌通乎神明孝悌之德上通神明視其色觀其顔色其接物也接於人也如春陽之温有如春日之和聴其言聴其言語其入人也其入於人也如時雨之潤有如時雨之潤物胷懷洞然胷襟洞逹徹視無間徹視無所間測其藴窺測其所藴則浩乎若滄溟之無際浩浩乎如滄海之無邊岸極其徳美其徳美之極言盖不足以形容言不足以形容之先生行己先生履於身者内主於敬敬立於中而行之以恕所行者以恕之道見善若出諸已見人之善如出於已不欲弗施於人己之不欲不施諸人居廣居而行大道居天下之廣居廣居仁也行天下之大道大道義也言有物而動有常言則以理動則有常先生為學先生之為學也自十五六時自十五六歲聞汝南周茂叔論道見汝南周濂溪講論大道遂厭科舉之業遂厭棄科舉之習慨然有求道之志奮然有求道之志未知其要未知其端倪泛濫於諸家泛求於諸子百家出入於老釋參考於老氏釋氏幾十年如此者近數十年返求諸六經後得之反而求之六經之書而後得其宗明於庶物明識事物之理察於人倫察於人之大倫知盡性至命知盡已之性推而至於天所賦之明命必本於孝悌盖自孝悌之徳窮神知化窮義理之精逹變化之妙由通於禮樂由通禮樂之事辯異端似是之非釋氏之學彌近理而大亂真辨明其似是之非開百代未明之惑於以開百世未明之疑惑秦漢而下自秦及漢而下未有臻此理也未有人悟此理也謂孟子沒謂孟軻氏已死而聖學不傳聖人之學無傳以興起斯文之學為己任道為一己之事其言曰故其言若曰道之不明是道之晦異端害之也佛老之學害之昔之害近而易知昔之害猶近而可以知今之害深而難辨今之為害且深而難辨别昔之惑人也向來迷惑於人乗其迷暗乗人之愚昧今之入人也今其為教入人而使之信因其髙明則因其髙明而求於領悟遂有以惑之自謂之窮神知化自言其窮心性之藴知變化之道而不足以開物成務彼之學以一超頓悟為本在於㝠心求化故不足開物而成事言為無不周遍自謂所言所為無不周逹實則外於倫理實則外於人倫之理窮深極㣲究淵深極㣲妙而不可以入堯舜之道道其道非堯舜之正道道之不明也此道之晦邪誕怪異之説競起邢妄虛誕妖怪謬異之言羣起塗生民之耳目塗塞人之耳目溺天下於卑汚䧟天下於卑下汚濁之中雖髙才明智雖是髙明之君子膠於見聞膠泥於所聞所見醉生夢死醉而生夢而死不自覺也不能有覺也是皆正路之蓁蕪此無他皆是正理之路荆棘聖門之蔽塞聖人之門暗塞闢之而後可以入道是必闢去老佛之塞是道者而後可進於道先生進將覺斯人先生逹則以道覺斯世退將明之書退則以此道垂之書不幸早世不幸死之早也先生教人先生訓人自致知至於知止自推極吾之知識以至於知其善所止誠意至於平天下自實此心之所發以至於平天下之事洒掃應對自洒掃應對之事至於窮理盡性以至窮究義理全盡其性循循有序順而行之各有其序教人易從誨人而人從怒人而人不怨怒人而人不以為怨賢愚善惡賢者愚者善者惡者咸得其心各得其心聞風者誠服聞先生之風莫不誠服覩德者心醉覩先生之德者莫不心醉雖小人以趨向之異指王安石也以新法與先生不合時見排斥時為屏斥退而省其私退而省察其己之私未有不以先生為君子也亦未有不以先生為君子安石嘗稱先生忠信先生為政先生為政事道之而從道之而民無不從動之而和動之而民無不和不求物而物應無求於物而物自應未施信而民信未施信於民而民自信之則人不可及也其為人蓋不可及以今年十月乙酉葬於伊川伊川地名謹書世家行業謹録其家世徳行事業及歴官行事之大槩及歴仕行事之大者以求諗於作者以求諗於當世之作者諗音審元豐八年八月日弟頥狀性理羣書句解卷二十
