body:
  text: 性理羣書句解卷五宋熊節撰熊剛大註賦賦者所以諷詠情性也拙賦此篇言人之巧於用智不如拙於守己者之有徳也濓溪先生或謂予曰或人語我云人謂子拙人皆言汝拙予曰我云巧竊所恥也巧者乃私竊自愧也且患世多巧也又且患一世人多為巧累喜而賦之喜我之拙而形諸賦詠巧者言巧者求工於言語故言拙者默拙者其言不出諸口故默巧者勞巧者役於智慮故勞拙者逸拙者澹然無為故逸巧者賊巧者汨於人慾圖以害人故賊拙者徳拙者安於天理惟知守已故徳巧者凶巧者計窮智屈終乃取凶之道拙者吉拙者去智任真終乃獲福之道嗚呼歎語天下拙使天下之人皆拙刑政徹則各安其理不麗於法刑以糾其為非政以正其不及皆可徹去上安下順君安其治民順其化風清弊絶風俗肅清百弊盡絶白鹿洞賦此篇歴冩書院廢興之由本朝尊顯表章之盛也文公先生白鹿洞賦者白鹿洞中之賦詠洞主晦翁之所作也洞之主朱氏字晦翁者所製也翁既復作書院洞中翁既復創立書院於洞中又賦其事以示學者又詠興廢之迹以曉學者其詞曰其言曰承后皇之嘉惠䝉皇帝之恩澤宅廬阜之南疆廬阜南康軍也守南康之疆土閔原田之告病適天時亢旱髙仰之田告病予甚閔焉惕農扈之非良傷無良農以墾治之扈亦農也扈音户粤冬孟之既望於十月十五已後夙余駕乎山之塘早駕我車行視陂塘徑北原以東騖直由北原而東横往觀之騖音務陟李氏之崇岡升陟李渤隠居之髙岡阜揆厥號之所繇揆度其名之所自得頽址於榛荒得頽敗基地於草莽中清江記云晦菴尋訪之初得樵者指言其處曰昔山人之隠處謂往日山人李渤隠居於此至今永久而流芳今經隔已久猶流傳芳名自昇元之有土自南唐李主昇元間立洞於此土始變塾而為庠方始改家塾而為黨庠盖舊為一家私淑之地今為鄉閭共學之所矣儼衣冠而弦誦儼然士子之衣冠琅然士子之弦誦紛濟濟而洋洋紛雜其中濟濟其儀洋洋其聲濟濟整肅貌言衣冠洋洋聲響貌言絃誦在叔季之且然於南唐叔末之世且如此矧休明之景運况天開國家光明之運皇穆穆以當天太宗皇帝尊臨大位穆然深逺一軌文而來混天下車軌文書方混合於一念敦篤於化原他務未遑首以敦厚教化之原為念乃搜剔乎遺遯遂搜羅剔刮前代遺逸之遯跡剔音惕朌黄卷以置郵因江州守臣周述之請賜九經於鹿洞就逓郵發下朌與頒同廣青衿之疑問使學士誦讀以質疑問難樂菁莪之長育樂得英才而教有如在沚之莪菁菁其盛拔雋髦而登進拔擢其俊秀者登而用之逮繼照於咸平及真宗繼離之明咸平年間又増修而罔倦又増葺之崇化之意罔有所遺旋錫冕以華其歸未㡬賜孫冕以榮其歸琛以肯堂而詒孫其子琛亦能繼父志肯堂宇於前詒孫謀於後皇祐五年冕子郎中即學之故址為庠榜曰書堂俾子弟居而學四方來者亦給其食琛丑林反孫去聲悵茂草於熈寧傷悼神宗時又荒廢不治廬山記云熈寧中已鞠為茂草矣尚茲今其奚論及今尚何言哉天既啓予以堂壇然因行視陂塘樵者指教若天開示我以舊日書堂之壇友又訂予以册書朋友又訂證我以故迹清江記云公建立鹿洞之初劉子澄亦裒集故實來寄訂丁定反謂此前修之逸迹言此乃前哲隠逸之遺迹也復闗我聖之宏橅亦闗係前朝所創之規橅橅亦作模亦既震于余衷亦既震動於吾之心乃謀度而咨諏於是更與寮屬商度度入聲諏子須反尹悉心以綱紀令尹盡心以經畫白鹿洞書院記初建之日屬星子縣令王仲傑董其事吏竭蹙而奔趨公吏竭力奔走效役士釋經而敦事士子暫輟經籍來相工役工殫巧而獻圖匠人盡智以獻其所創屋圖曾日月之㡬何曾歴日月之未久屹夏屋之渠渠屹然大屋之落成山葱蘢而遶舍山青環而遶屋水汨㶁而循除水流緩慢循庭除間㶁方伯反諒昔人之樂此想李渤之所喜者亦此羌異世而同符吾雖與之異世同此心若合符節也羌音匡偉章甫之峩峩一時儒冠聞者作興章甫冠也抱遺經而來集争抱遺書雲集此洞豈顓眺聽之為娛豈在乎眺望觀聽為樂哉實覬宫牆之可入實望道學之門徑可自此入耳覬音冀愧余修之不敏自愧吾脩學之不能敏何子望之能給何以使汝之望於我者能足乎矧道體之亡窮况是道之體散在天地無有窮極亡音無又豈一言之可緝豈是一言之間而便可緝續請姑誦其昔聞請目誦其舊聞庶有開於時習庶㡬有以開悟初學時習者曰明誠其兩進明無不知誠無不實無者並進則物慾不能惑而實理不全矣抑敬義其偕立敬是收斂一心義是裁制萬事内外夹持二者偕立允莘摯之所懷允信莘郊伊摯之所懷堯舜君民是所懷也當志伊尹之志謹巷顔之攸執謹守陋巷顔回之所執克己復禮是所執也當學顔子之所學彼青紫之勢榮彼被青紫之人其勢固榮亦何心於俛拾但志於道義則功名不足重又何意俛首而取之哉亂曰舉其辭以終之澗水觸石言鹿洞之澗水激觸其石鏘鳴璆兮璆玉磬也鏘鏘其聲如玉磬然璆音求山木苯䔿山木叢生苯音本䔿音樽枝相樛兮枝垂而曲樛居蚪反彼蔵以脩彼李氏子隠迹於此脩學於此息且游兮既亦休息又且游泳徳崇業茂道徳之隆學業之盛聖澤流兮聖朝崇奬之仁澤流衍無盡往者弗及往時偶廢置而不及為余心憂兮我心憂之來者有繼兮今方來者能繼其志我將焉求兮吾又將何所求興言及此盖亦隂喜繼之有人遂初堂賦此篇言上天賦予萬善充足人當去慾存理以遂其初心南軒先生皇降衷于下民兮惟皇上帝降其善於下土之民粤惟其常於惟五常之理猗歟穆而難名兮嗟深逺而難名狀維生之良是為有生仁義之良心翕衆美而具存兮合萬善而俱存於中不顯其光其光明莫此為顯也彼孩提而知愛親兮提孩之童皆知愛其父母豈外鑠繄中蔵此理非是由外耀我本具此良心於中年􅁮􅁮而寖長兮年華盛而漸長大紛事物之相交紛紛事物交接吾前非元聖之生知兮茍非是大聖生知之資懼日逺而日忘將恐習日相逺而性日益亡縁氣禀之所偏兮盖自氣禀偏而不全横流始夫濫觴如横流之不可遏始於一盃水之泛溢感以動兮不止外感物欲揺動不息乃厥初之或戕本然初心戕賊無餘既志帥之莫御志猶將帥既是把握之不力氣決驟以翺翔氣乃卒徒故決裂馳驟肆為吾擾六情放而曷禦喜怒哀樂好惡六情放而不收出荀子百骸弛而莫强百骸放弛不能自立自青陽而逆旅自少年以一身客於天地間暨黄髮以茫茫及年髮黄茫茫莫知歸宿之鄉倘矍然於中道或能急於半塗以求詣其極盍反求於厥初盍亦反而求之於初心厥初伊何其功如何夫豈逺歟近而非逺彼匍匐以向井見赤子匍匐而入井匍音蒲匐音白我惻隠之拳如我心惻然為之軫憂驗端倪之所發究此端緒之所發見識大體之權輿便知人道之大體根萌于是如寐而聰猶夢而得人喚醒如迷而塗如迷路而得人指示知睨視之匪遐乃知睥睨而視其道不逺乃本心之不渝不越乎本心而已嗚呼嘆辭予既知其然兮吾既審其如此子惟以遂之汝惟有以遂其初心若火始然而泉始達兮是理發見之初猶火之初然泉之始達惟不息以終之惟在運行不息以勉於終焉予視兮毋流又必予之所視毋流其目予聴兮毋從予之所聽毋順其耳予言兮毋易予之所言毋失之輕予動兮以躬予之所動必反之身惟日反兮于理惟日日以天理自反兹日新兮不窮此徳與之俱新其進不已逮充實而輝光及到是徳充實於中輝光發見於外信天資而本同則知天性本一極神存而過化極而所存者神無非至妙之理所過者化而無私慾之累亘萬世以常通此理雖至萬世常可通行嗚呼歎辭此羲文之所謂復此伏羲畫易文王彖易以復名卦盖取其不善之動去仁不逺即復其初而顔氏之所以為萬世道學之宗歟顔氏三月不違仁三月之後雖少離去即復其初所以為百世道學之師序序者叙述其事也春秋傳序此篇專言春秋一書實天道人道之所自出伊川先生天之生民上天之生斯民必有出類之才必有超出倫類之才能起而君長之興起為君而居天下之上治之而争奪息治之以政而相争相奪之風以息道之而生養遂道之以徳而相生相養之道以遂教之而倫理明教之以義禮而人倫天理之分以明然後人道立三者既全而後人之道頼此以立天道成人道既有所立推之綱維天地之道天之道由此以成地道平地之道咸得其平二帝而上堯舜而上聖賢世出聖賢之君世有其人隨時有作因時而興順乎風氣之宜各遂風土氣類之所冝不先天以開人道本於天未嘗先天以示乎人不因時而立政治出於一未嘗因時之所尚而為政暨乎三王迭興及禹湯文武相繼而作子丑寅之建正夏用寅月商用丑月周用子月以為正月忠質文之更尚夏之治尚忠殷之治尚質周之治尚文人道備矣人之道至此而全盡天道周矣天之道至此而周備聖人既不復作聖人既不再出有天下者君天下者雖欲倣古之迹縱欲傚古人之遺迹亦私意妄為而已不過以己私意妄有作為安能逮古人耶事之繆亊繆亂而不合乎古秦至以建亥為正嬴秦至以建亥為正月非復建子丑寅之道道之悖道乖悖而有戾於古漢專以智力持世炎漢之智力脅持一世非復尚忠質文之治豈復知先王之道也又安能知三代之道耶夫子當周之末夫子生於周之末世以聖人之不復作也悼古先聖王之不作興也順天應時之治順天道以建正因時尚而立治不復有也不再見也於是作春秋是以作為春秋一書為百王不易之大法為後世人君不可變之定法所謂考諸三王而不謬是謂證諸三代之王而不謬亂建諸天地而不悖建立於天地而不違悖質諸鬼神而無疑質正於鬼神而無所疑惑百世以俟聖人而不惑者矣雖百世之下復有聖人亦不疑惑於是矣先儒之論曰儒先有言游夏不能贊一辭夫子作春秋子游子夏二弟子不能助一語辭不待贅也非不贊也盖有所不敢也言不能與於斯耳實非游夏所能與於此斯道也是道之大惟顔子嘗聞之矣惟有顔子嘗聞夫子之語矣行夏之時謂行夏之時以寅月為嵗首乗殷之輅輅大車也乗殷之木輅得質之中服周之冕服周之冠冕得文之中也樂則韶舞作樂則用舜之韶舞此其凖的也此其凖則之所在故學春秋者學者之學春秋必優游涵泳必當從容玩味默識心通黙㑹於心通達此理然後能造其微而後能造其精㣲之極後王知春秋之義後有王者作能知春秋之大義則雖非禹湯縱其君非禹湯之君尚可以法三代之治猶可以仰法三王之治自秦而下由秦以降其學不傳春秋之學無傳予悼夫聖人之志我哀夫夫子之心不明於後世也不能暴白於後世也故作傳以明之故作此傳以明夫子之心俾後之人使後來者通其文而求其義通春秋之文以求春秋之義得其意而法其用得春秋之㫖而究春秋之用則三代可復也則三代之治可復還矣河南程頥正叔序易傳序易卦辭周文王所作爻辭周公所作此謂之經猶春秋之正經也彖傳大象小象夫子所作演繹卦辭爻辭之義此謂之傳猶春秋左氏公穀之傳也此篇乃伊川先生注易而自為之序推原先儒失易之意故於傳猶未精後人誦易之言而昩其㫖之所在此傳之所以不可不作也伊川先生易易之為義變易也因隂陽變易而得名隨時變易以從道也隨其時而變易以合乎道其為書也故其為此書也廣大悉備至廣至大無不該備將以順性命之理在天為命在人為性此順其理通幽明之故幽則鬼神明則人為此達其事盡事物之情事事物物皆盡其藴而示開物成務之道也無非示人先物而啓其㡬而成其事之理也聖人之憂患後世古先聖人之慮後世可謂至矣用心可謂詳且盡矣去古雖逺去往古之世雖遼逺遺經尚存而聖人之易猶在然而轉語前儒失意以傳言已前諸儒失易之意而妄形諸言後學誦言而忘味後來學者雖誦讀易之言而不知玩味自秦以下自亡秦而後盖無傳矣此學遂無所傳矣予生千餘載之後我生去周之世已千餘年悼斯文之湮晦傷易之文久矣泯没將俾後人欲使後我而生者沿流而求源譬之水然自流以究其源此傳之所以作也此吾傳易之書不可不作易有聖人之道四焉易之書具聖人之道者有四以言者尚其辭形之於言一本乎易書之辭以動者尚其變形之於動一本於易爻之變以制器者尚其象用之於制作器具一取象於是易也以卜筮者尚其占用之於灼龜以卜揲蓍以筮一占驗於是易也占平聲吉凶消長之理一吉一凶一消一長之理進退存亡之道一進一退一存一亡之道備於辭皆具於卦爻彖象之辭推辭考卦推究其辭稽考其卦可以知變可因其理之常知其事之變象與占在其中矣象以像告占以知來皆在其中矣君子居則觀其象而玩其辭君子之人静而察易之象味易之言動則觀其變而玩其占動則察易之變而玩其所占之事得於辭得之於言不達其意者有矣而不通其意者有之矣未有不得於辭安有未知其言而通其意者也而能達其㫖意者乎至微者理也易之理則至微而難見至著者象也易之象則至顯而易知體用一源㣲者其體著者其用同出一源顯微無間故體隠而㣲用著而顯本相融貫間去聲觀㑹通以行其典禮觀其㑹聚變通之際以推行其典章禮文則辭無所不備易書言辭之間無有不備者故善學者故能學易之人求言必自近探其言辭之奥當求之平易從容中易於近者有忽於此易去聲非知言者也非知易之言者予所傳者辭也我所作為易傳者盖將達其言也傳去聲由辭以得意因其辭而達其㫖則在乎人焉則存乎其人河南程頤正叔謹序易序此篇論易道至廣至大所以定天下之吉凶成天下之大業玩易者不可以淺近求之文公先生易之為書易經之書卦爻彖象之義備曰卦曰爻曰彖曰象其義著明而天地萬物之情見大而天地小而萬物其情無不具見於此聖人之憂天下來世其至矣古先聖人之為天下後世慮何其至也先天下而開其物先乎天下而啓乎物之機後天下而成其務後乎天下而成其民之用是故轉語極其數以定天下之象窮其數則可以定天下之象著其象以定天下之吉凶明其象則足以定天下之吉凶六十四卦其為卦凡六十有四三百八十四爻其為爻凡三百八十有四皆所以順性命之理無非順人性命之理盡變化之道也達隂陽變化之道散之在理散之性命之理則有萬殊人物禀受則有萬不同統之在道統之變化之道則無二致同出一原初無二致所以易有太極是以隂陽變易之中有至定極之理是生兩儀則生一竒一耦而為兩儀太極者太極云者道也即道之謂也兩儀者兩儀云者隂陽也竒為陽耦為隂即隂陽之謂也隂陽一道也隂陽雖是氣但所以使隂陽之運轉有理為之主道也太極無極也至極之理本無形萬物之生物之生於天地間雖不一負隂而抱陽皆負是隂而抱是陽莫不冇太極太極理也無不具此理莫不有兩儀兩儀氣也無不禀此氣絪緼交感理與氣融合交相為感變化不窮生人若物變化無盡形一受其生形體之具一有此生神一發其知精神之發而為此知情偽出焉人情之偽由此而出萬緒起焉萬事之端自此而起易所以定吉凶而生大業聖人憂之故作為此書以定天下之吉凶成天下之大事也故易者隂陽之道也故易之為言乃隂陽變易之道卦者隂陽之物也卦之為畫有竒有耦乃隂陽之物也爻者隂陽之動也爻之為義有貞有悔乃隂陽之變也卦雖不同其為卦雖不同所同者竒耦竒陽耦隂不能不同爻雖不同其為爻雖不同所同者九六九為陽六為隂不能不同是以六十四卦為其體所以卦六十四乃其體也三百八十四爻爻三百八十有四互為其用交互分布皆其用也逺在六合之外其至逺在天地四方之外近在一身之中其至近只在一身之内暫於瞬息其暫見於一瞬一息之間㣲於動静其㣲寓於一動一静之際莫不有卦之象焉無不有六十四卦之象莫不有爻之義焉無不有三百八十四爻之義至哉易乎易之書可謂至矣其道至大而無不包其道極其大而無所不包其用至神而無不存其用至妙而無不著時固未始有一時雖未始有一定之時而卦未始有定象於卦亦未嘗有一定之象事固未始有窮事固未始有窮盡之時而爻亦未始有定位於爻亦未嘗有一定之位以一時而索卦以一時而求卦則拘於無變是拘於不能變非易也不足以知易之理以一事而明爻指一事而求爻則窒而不通則窒塞而不通非易也不足以知易之理知所謂卦爻彖象之理知有卦爻彖象四者之義而不知有卦爻彖象之用而不知有卦爻彖象四者之用亦非易也亦不足以知易之理故得之於精神之運故必得於精神之運用心術之動心術之流動與天地合其徳至於與天地合徳與日月合其明與日月合明與四時合其序與四時合序與鬼神合其吉凶與鬼神合吉凶然後可以謂之知易也而後方可謂之知易盖易之道至廣至大不可以淺近求也雖然轉語辭易之有卦易之有六十四卦易之己形者也乃易己形之理卦之有爻卦之有三百八十四爻卦之己見者也乃卦己見之象己形而見者己形之理己見之象可以言知可因卦辭爻辭而知未形未見者未形之理未見之象不可以名求不可以名義求則所謂易者否則易之為書果何如哉果何為而作此學者所當知也此皆為學者所當審察也禮序此篇論禮者人倫風教之自始有禮則家國天下與之俱存無禮則家國天下與之俱亡其闗係不重哉禮經三百禮經之有三百威儀三千威儀之有三千三百三千言其經禮曲禮之多也皆出於性皆本於天性固存之理非偽貌飾情也非偽為之貌而文飾其情也鄙夫野人鄙俗之夫村野之人卒然加敬忽然致敬於彼逡巡遜卻而不敢受雍容謙退而不敢受禮三尺童子三尺言其小也三尺之童拱而趨市拱手而行於市暴夫悍卒强暴之人悍戾之卒莫敢狎焉無敢近之也彼非素有於教若此之人皆非素閑習於禮教與邀譽於人而然也及求名聲於人也盖其所有於性皆其所得於天性者有此禮物感而出者如此觸物感動發見如是故天尊地卑故天道尊地道卑尊卑之位一定禮固立矣禮固藉此有立類聚羣分以類聚以羣分大小之分各正禮固行矣禮固由此而行人者位乎天地之間人生而處天地之中立乎萬物之上超乎庶物之上天地與吾同體天地雖大吾與之同體萬物與吾同氣萬物雖異吾與之同氣尊卑分類尊卑之别分類之殊不設而彰不待設施而以彰明聖人循此聖人由之制為冠昏喪祭朝聘射饗之禮制為冠禮昏禮喪禮祭禮朝禮聘禮射禮饗禮之八者以行君臣父子兄弟夫婦朋友之義以行於人倫五者之間其形而下者形於下則謂之器具於飲食器服之用見於一飲一食器物服飾之間此理也其形而上者形而上則謂之道極於無聲無臭之微至於無聲可聞無臭可接之妙此理也衆人勉之凡人則勉而知之賢人行之賢者則力而行之聖人由之聖人則安而行之故所以行其身故行於其身與其家及其家與其國及其國與其天下以至於天下禮治則治以禮而治則家國天下無不治禮亂則亂此禮既亂則家國天下無不亂禮存則存禮存則家國天下與之俱存禮亡則亡禮亡則家國天下與之俱亡上自古始上自太古下逮五季下及五代之末質文不同治之尚質尚文雖若不同㒺不由是無不由此禮也然而轉語世有損益世代相承或損或益惟周為備惟有周室禮極其備是以夫子有曰所以夫子有云郁郁乎文哉郁郁言其文之盛也吾從周我惟從周之制逮夫弊也及其流弊之末忠義之薄忠義日薄情文之繁情文益繁林放有禮本之問故林放問禮之本於孔子而孔子欲先進之從孔子有從先進禮樂之言盖亦厭周末之弊盖所以矯正反弊也所以反其弊而歸諸正也然豈禮之過哉是豈禮之弊耶為禮者之過也亦為禮者之失於過也秦氏焚滅經典秦始皇燔書三代禮文大壞夏商周之禮文具於經者已磨滅無有漢興求書炎漢興購求秦之亡書禮記四十九篇禮經凡四十有九篇雜出諸儒之手所傳所記雜出於諸儒之手不能悉得聖人之㫖不能皆合聖人之遺意考其文義攷其文理意義時有抵捂時有不合捂音五然而轉語其文繁其文字之多其義博其義理之博學者觀之使為學者視之如適大通之衢如往四通五達之衢珠珍器帛珠玉珍寶器用幣帛隨其所取惟吾所欲如游阿房之宫阿房秦宫名如游秦室阿房之宫千門萬户千萬言其多也隨其所入惟吾所入博而約之自博而約亦可以弗畔亦可以弗違於此盖其説也盖其為言粗在應對進退之間其粗者在於應對進退之頃而精在道徳性命之要其精者在於道徳性命之妙始於童幼之習初則自童幼之所習而終於聖人之歸而終則可以造於聖人之閫奥惟達於道者惟通達於此理者然後能知其言而後能達其辭能知其言能達其辭然後能得於禮而後能得於禮然則轉語禮之所以為禮禮之謂禮其則不逺矣其凖則不外於是昔者顔子之所從事古昔顔子之從事於此禮不出乎視聽言動之間不外乎非禮勿視聽言動四者之内而鄉黨之記而論語鄉黨之所記孔子多在於動容周旋之際孔子類多謹於舉動容貌進退周旋之間此學者所當致疑以思此為學者當因疑以致思致思以達也因思以致其通也詩集傳序此篇論詩者人心感物而形諸言古者人心所感正發言亦正列國之詩則異於是矣文公先生或有問於余曰或人問於我云詩何為而作也詩之作何為而然也余應之曰答云人生而静人生之初本真凝寂天之性也乃天所賦之性也感於物而動外感於物不能無動性之欲也是為此性之欲夫既有欲矣既有所欲則不能無思則不能無所思既有思矣既有所思則不能無言則不能不形諸言既有言矣既形諸言則言之所不能盡則有非言語之所能盡者而發於咨嗟詠歎之餘者而形於咨嗟嘆息歌詠之餘必有自然之音響節奏而不能已焉其聲音節奏自然而然乃天機之不容自己者此詩之所以作也此詩之所以不能無也曰然則轉語其所以教者何也其所以為教者何如曰詩者人心之感物詩之作乃原於人心之感物而動而形於言之餘也形之於發言之際心之所感有邪正人心之感於物有邪有正故言之所形有是非故言語之發有是有非惟聖人在上惟上有聖哲之君則其所感者無不正則其心之所感無不一出於正而其言皆足以為教形之於言皆可以正風俗而為教其或感之之雜其或感於物不能出於正而流於雜而所發不能無可擇者其發於言不能皆善則上之人則在上之人必思所以自反必思自反諸已而因有以勸懲之因有以勸其是懲其非是亦所以為教也即此亦為教之道昔周盛時昔有周隆盛之時上自郊廟朝廷上自郊神廟饗朝廷之間而下達於鄉黨閭巷下至於鄉里閭閻巷陌之人其言粹然其言語純粹無不出於正者莫不出於正聖人固已協之聲律聖人即此合於聲律之間而用之鄉人行諸鄉閭用之邦國施諸邦國以化天下以風化天下至於列國之詩至於侯國之詩則天子巡狩則天子每嵗巡行封守之時亦必陳而觀之亦必陳其聲詩而觀其國風以行其黜陟之典以行其升降之法降自昭穆而後下至文昭武穆之後寖以陵夷此典漸至廢失至於東遷及平王遷於東周而遂廢不講矣此詩遂廢棄而不復講矣孔子生於其時夫子生於此時既不得位既無君師之位無以行帝王勸懲黜陟之政不可以行人君賞罰升陟之典於是特舉其籍而討論之故特求此詩之篇帙而討論其文義去其重複删去重複之言正其紛亂翦截煩亂之語而其善之不足以為法名為善而不足為法於後世惡之不足為戒者言其惡不足以示戒於方來則亦刊而去之則皆删去以從簡約務從其簡示久逺以傳之逺使夫學者俾為學之人即是而有以考其得失即此可以考究其得失善者師之有善則從而師法之而惡者改焉其不善者從而改之是以其政雖不足行於一時雖不得時以行其政而其教可及於萬世而其為教自可及於萬世是則詩之所以為教也此詩之為教者也曰然則轉語國風雅頌之體列國之詩大小二雅殷周二頌之體其不同若是何也其不同如此何耶曰吾聞之我聞此凡詩之所謂風者凡詩之所言國風云者多出於里巷歌謡之作大率出於閭里歌詠之所播所謂男女相與詠歌曰男曰女皆有詠歌各言其情者也各各叙其情意如此惟周南召南惟周公召公所主南方之國親被文王之化以成徳親沐文王之化以成其徳而人皆有以得其情性之正發於性見乎情人人各得其正故其發於言者故凡形諸言樂而不過於淫雖樂而不流於淫哀而不極於傷雖哀而不至於傷是以二篇是以周南召南二詩獨為風詩之正經獨為國風諸詩之正經自邶而下自邶國變風而降邶音背則其國之治亂不同諸侯之國其或治或亂不同人之賢否亦異人之或賢或否亦不一其所感而發者其有所感發於言者有邪正是非之不齊有邪者正者是者非者之不齊一而所謂先王之風者求其如先王之正風於此焉變矣自此而變若夫雅頌之篇若夫二雅二頌之篇則皆成周之世無非成王之時朝廷郊廟樂歌之詞朝㑹郊祀廟享樂歌之語其語和而莊其言辭若和平而實莊肅其義寛而密其義若寛易而實詳密其作者往往聖人之徒其作為此詩皆聖人之徒固所以為萬世法程而不可易者也可為法於萬世而不容變易也至於雅之變者至於二雅之變亦皆一時賢人君子亦無非一時稱為賢人稱為君子者閔時病俗之所為傷時世之亂憂風俗之弊而為此也而聖人取之而夫子取之其忠厚惻怛之心其拳拳忠愛之心陳善閉邪之意與開陳其善閉塞其邪之意猶非後世能言之士亦非後来能言之士所能及之可以及此此詩之為經此詩之一經所以人事浹於下下而人事無不該貫天道備於上上而天道無不全備而無一理之不具初無一理之未盡曰然則轉語其學之也當奈何學此詩者當何先曰本之二南以求其端本之周南召南以啓其端㕘之列國以盡其變㕘攷列國之詩以窮其變正之於雅以大其規正之於二雅以廣其規模和之於頌以要其止和之於雅頌以求其所止此學詩之大㫖也此乃學詩者之大㫖要也於是乎章句以綱之於此分其章句以為之綱訓詁以紀之訓釋以明其義諷詠以昌之歌頌以颺諸言涵濡以體之涵泳以體於心察之情性隠微之間察於情性之微審之言行樞機之始審於言行之發則修身及家則修此身以至于家平均天下之道平治天下之道其亦不待他求而得之於此矣不必求之於他求之此足矣問者唯唯而退發問者唯諾而退余時方輯詩傳我方采輯詩集因悉次是語因盡次序其語以冠其篇云以寘之篇首性理羣書句解卷五
