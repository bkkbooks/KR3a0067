body:
  text: 性理羣書句解卷一宋熊節編熊剛大註𫝊道支派圗賛贊者讃誦之意六先生賛皆文公親筆而文公未有贊曩先生書畫像自警載諸大全集至今讀之使人凛然起敬濂溪先生遺像賛此篇賛詠濓溪上續千載不傳之道統文公先生道䘮千載道者日用常行之理由尭舜禹湯文武周公而傳之孔子由孔子而傳之顔曽思孟同此道也孟子歿不得其𫝊至扵我朝盖千餘載矣聖逺言湮聖人之世既遼逺而不相接聖人之言益湮沒而不可見湮音因不有先覺于此之時不有周子先知此理孰開我人将何所頼以啟我後人乎書不盡言書者易通之書周子所作也而書不足以盡周子之言圗不盡意圗者太極之圗亦周子所作也而圗不足以盡周子之意風月無邊其胸懐洒落猶光風霽月浩無邊岸庭草交翠生意無息猶庭前之草翠色交加如此等氣象豈圗書所能盡哉明道先生遺像賛此篇賛詠明道道徳温粹之容揚休山立揚讀為陽休與嘘同言氣之充實如陽氣之休物也貌之端嚴如山之屹立也見禮記休合音喣玉色金聲言其色之温柔如玉色之不變也聲之洪暢如金聲之不絶也元氣之㑹是皆天地真元之氣㑹合于此渾然天成間生明道徳性渾全出扵天成不假人力之為也瑞日祥雲人之仰其徳者如瑞日祥雲之間見和風甘雨人之被其徳者如和風甘雨之著物龍徳正中龍乃乾之象九二中正之位聖人具陽剛中正之徳大而化之猶龍之變化莫測言明道實具聖人之徳而在下位者也厥施斯普使得其位以行其道則此徳所施斯極天下莫之能外矣施去聲伊川先生遺像賛此篇賛詠伊川氣象端嚴之態規圎矩方規所以為圎之器矩所以為方之器言其周旋中規折旋中矩也繩直凖平繩所以取直之器凖所以取平之器言其至直如繩全平如凖也允矣君子信矣此君子之人展也大成誠然集大成之美布帛之文文章見扵世猶布帛然雖無文繡之施實民生之不可闕菽粟之味意味之根于理猶菽粟然雖無膏梁之珍實民食之不可無知徳者希知此徳者少有孰識其貴孰知其為可貴耶康節先生遺像賛此篇賛詠康節胸襟豪逸之態天挺人豪天所挺生豪傑之人英邁盖世英雄超邁之氣盖乎一世駕風鞭霆御風氣而上㳺叱雷霆而在下歴覧無際遍覧宇宙之間浩無邊方之限手探月窟一隂生于姤是為月窟言邵子能探陰長陽消之理而姤卦實居先天圗之上故曰手探足躡天根一陽生于復是為天根言邵子獨㑹陽長隂消之理而復卦實居先天圗之下故曰足躡閒中今古閒中静觀古今之變而萬期須㬰也醉裏乾坤醉裏玩視乾坤之大而兩間蘧廬也横渠先生遺像賛此篇賛詠横渠力學精思之功蚤恱孫呉先生初喜孫臏呉起用兵之法蚤音早晚逃佛老後來盡奔佛氏老子虚寂之教勇撤臯比臯比虎皮也嘗在京師坐虎皮說周易及聞二程論易遂撤去臯比之席比音皮一變至道由是一變而至聖人之道精思力踐精而思之以通其㣲力而踐之以造其極妙契疾書中夜妙合于此心取燭速記其所得訂頑之訓西銘之書初名訂頑先生所作以誨學者訂正也丁定切示我廣居無非示我以仁道之大廣居所以状仁體之大而可以安居也涑水先生遺像賛此篇賛詠温公清修苦節之美篤學力行專志于學勉力而行清修苦節清介自修堅苦節約有徳有言藴于内為徳發于外為言有功有烈著扵國曰功及扵民曰烈深衣大帶身服以深衣束以大帶張拱徐趨張手而拱徐歩而趨遺像凛然一見遺像凛然難犯可肅薄夫澆倖之夫莫不起敬晦庵先生畫像賛此篇自述其行已養心之道從容乎禮法之場動而此身優㳺于天理凖則之地沈潜乎仁義之府静而此心存養夫實理渾涵之天是予盖将有意焉皆吾之意所欲為而力莫能與也而吾之力恐未及佩先師之格言佩服儒先當理之言奉前烈之餘矩奉承前人正巳之道惟闇然而日修惟知幽隐之中日不忘自修之實或庻幾乎斯語庻動遵禮法静守仁義扵斯言得之先生自少而老恪守父師之訓韋齋父也劉屏山師也既冠屏山祝詞云木晦於根春華曄敷既長題桃符曰佩韋遵考訓晦木謹師𫝊皆致意于此故賛亦及之警學賛此篇教人卜易之法讀易之法誦周易法先正其心當前正此心肅容端席敬爾容正爾席有翼其臨拱手而前有如兩翼即語所謂趨進翼如于卦于爻于一卦于一爻如筮斯得如有所卜必得其應假彼象辭借此易象之言為我儀則作我應事之凖則字從其訓一字之間必循易之誨句逆其情一句之内必探易之情事因其理所占之事必因其當然之理意適其平所卜之意當使其平不可先有所主曰否曰臧言凶言吉否音鄙如目斯見猶目親見曰止曰行言止言行如足斯踐猶足親履毋寛以畧毋求之以寛則失之畧毋宻以窮毋察之以宻則失之窮毋固而可毋堅周以為可毋必而通毋期必以為通平易從容平易以求從容不廹自表而裏由外而内及其貫之至于融貫萬事一理萬事雖多無越一理理定既實理一定而有實事來尚虛事之未來者尚虚用應始有及應諸用方有其事體該本無體之所該本無一事稽實待虚考其理之實以待其事之虚存體應用存是理之體以應其事之用執古御今執古之理御今之事由静制動以理之静制事之動潔静精㣲其體潔静其理精㣲是之謂易此之云易體之在我惟法之于巳動有常吉動則永吉在昔程氏往昔伊川繼周紹孔繼紹周孔之易奥㫖宏綱奥妙之㫖宏大之綱星陳極拱舉宏綱而奥㫖明猶北極居中而衆星拱惟斯未啟惟此未有開發以俟後人以待後來君子小子狂簡小子狂斐小子文公自稱也敢述而申述此而重申之原象賛此篇指原八卦竒耦之數如三陽畫為乾三隂畫為坤之類太一肇判太極分判陰降陽升陰降而下陽升而上陽一以施陽竒而主發散隂兩而承隂耦以順承于乾惟皇昊羲三皇中太昊氏伏羲仰觀俯察仰觀天文俯察地理竒耦既陳竒畫耦畫燎然昭陳竒音幾下同兩儀斯設隂陽兩儀由此而立既幹乃支既有其幹復生其枝一各生兩一竒之上又生一竒一耦一耦之上又生一竒一耦陰陽交錯隂陽交互錯雜以立四象是為太少隂陽四象竒加以竒竒而又竒曰陽之陽陽而又陽竒而加耦竒上又加一耦隂陽以章陽與隂燦然而章耦而加竒耦上又畫一竒陰内陽外隂在下為内陽在上為外耦復加耦耦上復加以耦隂與隂㑹二隂交㑹兩一既分陽一隂二既分而為太陽少隂少陽太隂四象一復生兩一象之上又各生一竒一耦合四象而觀之凡四竒四耦三才在目天地人之分皆在目前八卦指掌八卦之畫如指斯掌竒竒而竒三畫而陽初一曰乾是為乾卦位居第一竒竒而耦二陽上畫一隂兊次二焉見為兊卦位居第二竒耦而竒下畫一陽上畫一隂一陽次三曰離是為離卦位居第三竒耦而耦下畫一陽上畫二隂四震以隨是為震卦位居第四耦竒而竒下畫一隂上畫二陽巽居次五是為巽卦位居第五耦竒而耦下畫一隂上畫一陽一隂坎六斯暏是為坎卦位居第六耦耦而竒下連畫二陰上畫一陽艮居次七是為艮卦位居第七耦耦而耦三畫盡隂八坤以畢是為坤卦位居第八盖先天之卦乾一兑二離三震四巽五坎六艮七坤八位序之布如此初畫為儀初畫是兩儀中畫為象中畫是四象上畫卦成上畫則八卦成矣人文斯朗竒耦分剛柔位尊卑序貴賤别人文著見昭然因而重之因以八卦又演而重之一貞八悔一本卦為正八變卦為悔如乾變為八以乾宫内八卦觀之乾卦為正其七卦為悔正是正固之體悔有變易之義六十四卦變為六十四卦由内達外貞者正卦為内悔者變卦為外交易為體一隂一陽迭相交易而為體往此來彼陽自此往隂自彼來變易為用一隂一陽迭相變易而為用時静而動動極復静静極復動也此已上言伏羲先天易降帝而王自皇降而帝帝降而王傳夏歴商𫝊之有夏又歴有商有占無文雖有占卜未有文字民用弗彰前民之用不顯文王繫彖于是文王係之以彖辭周公繫爻周公又係之以爻辭視此八卦看此八卦二純六交乾坤二卦純陽純隂他六卦則隂陽交錯乃乾斯父乾純陽為父乃坤斯母坤純隂為母震坎艮男震初畫得乾陽為長男坎中畫得乾陽為中男艮上畫得乾陽為少男巽離兊女巽初畫得坤隂為長女離中畫得坤隂為中女兊上畫得坤隂為少女離南坎北此以後天易言離在南方屬火主夏坎居北方屬水主冬震東兊西震在東方屬木主春兊在西方屬金主秋乾坤艮巽乾東南坤西北艮東北巽東南位以四維位于四方之隅建官立師建官以掌之立師以誨之命曰周易三易夏曰連山商曰歸藏至有周乃名之曰易此已上皆文王後天易孔聖𫝊之夫子作𫝊以發明之是為十翼十翼者彖辭大象小象乾文言坤文言繫辭上篇繫辭下篇説卦序卦雜卦遭秦弗燼遭秦焚書獨免灰燼及宋而明及我宋朝而大明邵𫝊羲畫邵尭夫𫝊伏羲先天之卦書程演周經程伊川演周文王後天之書象陳數列卦象昭陳卦數並列言盡理得言之詳盡道理由此而得彌億萬年過百萬載永著常式永作常法稽類賛此篇稽考八卦類分之象如乾為天坤為地之義八卦之象八卦象說卦已全夫子説卦已自全備考之於經復窮究之于經其用弗專其發用弗專彖以情言彖即易之情言象以像告象即易之像言惟是之求惟以此探索斯得其要乃得其大要乾健天行乾主乎健故曰天行不息坤順地從坤主乎順屬地而順從乎天震動為雷震主震動有雷之象巽入木風巽主柔入為木為風坎險水泉坎主險陷為水為泉亦雲亦雨又為雲雨之象離麗文明離主著麗文章光明電日而火為日為月為電為火之象艮止為山艮主乎止有山之象兑說為澤兑主乎説有澤之象以是舉之即此求之其要斯得其大要可得凡卦六虚凡一卦六畫之虚竒耦殊位竒耦異處竒陽耦隂竒為陽耦為隂各以其類各從其類得位為正得其位則正二五為中二為下爻三畫之中五為上爻三畫之中二臣五君二乃臣位五乃君位初始上終初爻為始上爻為終貞悔體分内卦為貞外卦為悔其體既分爻以位應所占之爻又觀變卦所應之位陰陽相求陰與陽相交乃得其正斯謂之正凡陽斯淑陽則皆善君子居之君子當此凡隂斯慝隂則皆惡慝音忒小人是為小人當此常可類求卦之有常者可以類求變非例測卦之有變者非定例可測度非常曷變不有其常何有其變謹此為則當謹此為法則復卦賛此篇推明隂消陽長之義萬物職職萬物之衆職職動貌其生不窮生生本無窮盡孰其尸之誰其主之造化為工天地為之主宰也隂闔陽開隂氣閉陽氣開一静一動隂闔則静陽開則動於穆無疆嘆其深逺無窮於音烏全體妙用由此全體達于妙用奚獨扵斯何獨于此時潜陽壮陰藏此陽氣于老隂之下而曰昭哉而謂昭然此天地心是為天地生物之心盖翕無餘盖閉藏翕歛已盡斯闢之始此乃陽氣方動之初生意闖然馬之出門曰闖喻生物之意方始萌蘖闖音趂具此全美有此渾全之美其在于人在人得天地生物之心以為心曰性之仁則為性中之仁歛藏方寸渾涵于性之中包括無垠包括衆義無垠有茁其萌萌動之初如草木始生有惻其隐惻怛隐動于以充之自此充達四海其凖散之天下無非此理如凖則然曰惟兹今惟當此方復之時眇綿之間一脉之陽至微不絶是用齋戒必也齋戒謹慎掩身閑闗掩身止色閉闗息旅此盖安静休養以助方長之陽也仰止羲圗仰彼㐲羲先天之圗稽經協𫝊考易經合易𫝊敢賛一辭敢助一言以詔無倦以告後之君子無怠扵此心經賛此篇推明舜禹𫝊授心法之妙舜禹授受舜授是道于禹禹受此道于舜十有六言只有十六字人心惟危道心惟㣲惟精惟一允執厥中萬世心學萬世之下𫝊心之學此其源淵此其源本也人心伊何謂人心者何如生扵形氣生于形體氣質之私有好有樂好樂喜也心一于喜而不察好樂並去聲有忿有懥忿懥怒也心一于怒而不察懥音帝惟慾易流是偏于喜怒而不得其正從欲易至于流易去聲是之謂危是曰人心則危殆而難安須㬰或放頃刻放縱衆慝從之衆惡隨之道心伊何謂道心者如何根于性命本于天命謂性之正曰義曰仁宜之理為義愛之理為仁曰中曰正中之理為禮正之理為智惟理無形理則無形可指是之謂㣲是曰道心則㣲眇而難見毫芒或失毫髮之間或有所失其存幾希其能存此心者甚少二者之間故人心道心幾㣲之間曽弗容隙曽弗容間隙曾平聲察之必精察之則精一而不雜如辨白黒使人心道心判然猶黒白之易辨知及仁守以知察之以仁守之相為始終察之于始守之于終更相為用惟精故一惟能精以察于危㣲而不雜故能一以純于渾融而無間惟一故中惟能一以純于渾融而無間故能操執此中而不失聖賢迭興從古聖賢更迭興起體姚法姒姚舜姓姒禹姓上體姚虞下法姒氏持綱挈維振其綱舉其維昭示來世顯示後世戒懼謹獨戒謹恐懼于人所不知己所獨知之地閑邪存誠防閑百邪操存一誠曰忿曰慾凡曰忿怒嗜慾之私必窒必懲必窒塞必懲治上帝實臨有如上天之鍳臨其敢或貳凛乎不敢二其心屋漏雖隐暗室屋漏雖然隐幽寜使有愧寜可使有愧恥者四非當克非禮勿視聽言動此四者皆當克治如敵斯攻猶遇仇敵必期攻退四端既發惻隐仁之端羞惡義之端辭遜禮之端是非智之端四者既皆發見皆擴而充皆當達而充之以全此徳意必之萌意度期必一萌于心雲卷席撤當先去之如雲之卷却席之撤去子諒之生子讀為慈諒讀為良慈良之心油然而生春嘘物茁猶春氣吹嘘萬物皆萌芽鷄犬之放人之放其雞犬欲知其求尚知往而求之而収拾放心可不然乎牛羊之牧人之牧其牛羊濯濯是憂猶以其山之萌蘖為憂而保養善心獨不然乎一指肩背一指之養與肩背之養孰貴孰賤何者為貴何者為賤簞食萬鍾竹器之飯萬鍾之禄食去聲辭受必辨辭受之間亦當辨明克治存養克治人欲存養天理交致其功兩用其功舜何人哉彼虞舜果何如哉期與之同豈不可思與之同耶維此道心維兹道心萬善之主乃萬善之宗主天之與我上天賦與于我此其大者莫此為大斂之方寸方寸心也収斂于此心之中太極在躬太極渾全之理皆在吾身散之萬事散之事事物物之間其用弗窮其妙用有不窮者若寳靈龜是必如寳愛靈龜若奉拱璧如持奉貴璧奉上聲念兹在兹心念于此理念于此其可弗力其可不篤所念相古先民相惟古之先聖相去聲以敬相𫝊以敬之一字相與𫝊授操約施博所執者甚約所施者甚博孰此為先當熟行此敬為先我來作州吾來此領州事茅塞是懼胸襟茅塞是憂言不通也爰輯格言于是來輯至言以滌肺腑以滌蕩肺腑明忩棐几明忩之前几案之上清晝爐熏于清晝熏一爐之香開卷肅然展開書卷肅然起敬事我天君以嚴事我天君天心也君主宰之謂也性理羣書句解卷一
