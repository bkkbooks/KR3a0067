body:
  text: 性理羣書句解卷十八宋熊節撰熊剛大注通書公明第二十一此篇言已私既克自能明察而無所疑公於已者公於人無所私於已而後能無所私於人未有不公於已未有不能勝已之私而能公於人者而能無私於人不至任法以裁物也明不至則疑生此心之知覺有所未盡則遇事必易生疑心明此心之知覺了然無疑也則何疑之有謂能疑為明若言此心遇事能致其疑是為能明何啻千里明則無疑疑則不明明與疑正相南北何啻千里之逺不相及此言不能先覺而欲以逆詐億不信為明者發也理性命第二十二此篇言理乃人心之太極性本則氣禀之不齊命則萬殊一厥彰厥微厥彰者陽之明也厥微者隂之晦也匪靈弗瑩陽明隂晦非人心太極之至靈不能明此瑩明也此以理言也剛善剛惡禀陽氣之中則為剛之善如直如義之類是也稟陽氣之過則為剛之惡如猛如暴之類是也柔亦如之稟隂氣之中則為柔之善如慈祥之類是也稟隂氣之過則為柔之惡如懦弱之類是也柔亦如此中焉止矣中則得性之正無過無不及而已此以性言也二氣五行隂陽二氣金木水火土之五行化生萬物天之所以賦授萬物而生之者五殊二實由末而求其本則五行之殊木二氣之實二本則一二氣之實又本一理之極是萬為一是合萬物而言為一太極一實萬分由本而之末則一理之實萬物分之以為體萬一各正萬物之中各有一太極之正理小大有定物之小者大者莫不各有一定之分此以命言也顔子第二十三此篇言顔子亞聖只是所樂者道富貴貧賤不足動其心顔子一簞食顔子一竹器之飯食音似一瓢飲一匏勺之飲瓢平聲在陋巷居於弊陋之巷人不堪其憂在他人不禁其憂而不改其樂而顔回獨不改其樂夫富貴富之與貴人所愛者也乃人之所好者顔子不愛不求顔子不好乎此而亦無所求乎此而樂乎貧者所樂只在乎貧獨何心哉是果何所用心設問以發其端天地間有至貴至愛可求天地之間有至貴至富可好可求文公言恐至愛兩字之中更當著富可二字而異乎彼者而異乎人之所謂富貴者見其大而忘其小焉爾見其大則仁義天爵何貴如之萬理充足何富如之忘其小則金璧之富爵位之貴是特其小者不足為吾纍見其大則心泰見其大者則此心泰然自安心泰則無不足此心泰然自安則自無不足無不足則富貴貧賤無不足則此心惟知道義可樂不以富貴貧賤動其心處之一也故處貴富之時如此處貧賤之時亦如此處之一處貴富貧賤既能一致則能化而齊斯能至於聖人而化之地位而齊於聖故顔子亞聖故顔子次于聖人師友上第二十四此篇言君子隆師親友正以其道德之可尊可貴天地間至尊者道天地中間至大者道至貴者德而已矣至可貴者德至難得者人至難得者其人人而至難得者人之所以至難得者道德有於身而已矣以至尊之道至貴之德兼而有之於其身也求人至難得者有於身求人之全難得者兼有此道德於身非師友則不可得也已非隆師親友則不能得此理於身也師友下第二十五此篇言道義由師友有之人無師友則愚道義者道之與義身有之則貴且尊人能身全此理則至貴至尊人生而䝉人生而䝉昧長無師友則愚既長而不隆師親友則愚暗而無所見是道義由師友有之是道之與義必須自隆師親友方能有之於身而得貴且尊而得至貴且尊其義不亦重乎師友之義不其重乎其聚不亦樂乎師友之聚不其樂乎過第二十六此篇言仲由喜聞過則垂令名人而諱過必至臧身仲由喜聞已過子路喜聞已過令名無窮焉其善名傳之無有窮己今人有過今世之人有過不喜人規不喜人規警如護疾而忌醫正猶諱護其疾而忌人之醫寧滅其身而無悟也寧至於滅亡其身而不之覺悟噫是可嗟也勢第二十七此篇論勢之所趨極重而不可反也則歸之天可反而不用力人之尤天下勢而已矣天下之人惟觀勢之所趍如何也勢勢之云者輕重也一輕一重則勢必趍於重而輕愈輕重愈重矣極重不可反勢之極重不可得而反識其重而亟反之知其重未極而急急反之可也則猶可也反之力也故反之則在於人力識不早知之不早力不易也雖用力之多亦不易也力而不競用力而不能勝天也則歸之天無可如何不識不識則不知用力不力不用力則雖識無補人也是皆人也天乎夫勢之不可反者果天之所為乎人也若非天而出於人之所為何尤則亦何所歸咎矣惟當歸咎於已之不用力可也文辭第二十八此篇言文載道今乃行文而不以道是猶虛車而不濟於用文所以載道也文所以載是道猶車所以載是物也輪轅飾而人弗庸故為革必飾其輪轅為文者必以道兩說皆欲人愛而用之然我飾而人不用飾也輪轅車橫木縛軛以駕牛者轅音袁徒飾也則猶為虛飾而無益於實况虛車乎况不載物之車不載道之文雖美其飾亦何為乎文辭文章藝也特技藝也道德道之與德實也實理也篤其實而藝者書之勉盡道德之實又書之文辭以載之美則愛猶輪轅既飾人皆愛之愛則傳焉愛則可以久𫝊賢者得以學而至之賢者可以學而至是是為教是為立教故曰故言言之無文言而無文猶車無輪轅行而不逺雖行亦不甚逺此猶車載物而輪轅飾人用之也然不賢者但不賢之人雖父母臨之雖其父其母日日臨之也師保勉之曰師曰保日日勉之不學也非知學也強之又強之為學不從也不能從也此猶車已飾而人弗用不知務道德不知崇道德以立其根本而第以文辭為能者但工文辭而從事於技葉以為能藝焉而已此特游藝而已噫嗟乎弊也久矣其流弊蓋已久矣此猶虛車不載物而徒美其飾也聖藴第二十九此篇言聖人之藴貴乎宏深彼世人不聞知於人薄亦甚矣不憤不啓不因夫人心求通而未得不能開其意憤心求通而未得也啓開其意也不悱不發不因其口欲言而未能不能逹其辭悱口欲言而未能也發逹其辭也舉一隅而不以三隅反物有四隅舉其一則知其三舉其一不能推類及其三雖一隅亦不識矣則不復也則不再告蓋欲待其自得則告之也子曰夫子云豫欲無言吾欲無事於言語告詔之煩天何言哉試觀之天寂然無聲四時行焉春夏秋冬之運行百物生焉動植百物各以生遂然則轉語聖人之藴聖人不言其胸中之所蓄藴中所蓄之名微顔子殆不可見無顔淵則不可得而見發聖人之藴蓋夫子之教不輕發又未嘗自言其道之藴因其進修之迹發出夫子之藴教萬世無窮者著於言以教千萬世傳之不窮顔子也惟顔子為得其全故仲尼無迹顔子微有迹聖同天此夫子無言其藴自見於萬世亦猶天道不言而四時行百物生焉常人有一聞知尋常之人有一聞一知恐人不速知其有也惟患人之不急急知其有也人知而名也求急於人知而得其名薄亦甚矣其淺薄亦甚聖凡異品髙下懸絶有不待教而明其言此者正欲以深厚之極警夫淺薄之尤精藴第三十此篇言聖人之精藴寄之易為文字之祖義理之宗天地鬼神之藴畢萃於此聖人之精精者精微之意盡前之易至約之理也畫卦以示伏羲畫卦專以明此聖人之藴聖人之藴者謂凡卦中所有如吉凶消長之理進退存亡之道因卦以發有卦則因以形見矣卦不畫不畫卦聖人之精聖人精微之意不可得而見弗可見微卦無卦聖人之藴聖人胸中之藴殆不可悉得而聞不可盡聞易何止五經之源此易之一書文字之祖禮義之宗何止為詩書周禮禮記春秋五經之源其天地鬼神之奧乎雖天地之大鬼神之幽莫不見於卦之也畫之中此聖人之精藴必於此而寄乾損益動第三十一此篇以乾卦爻辭損益大象發明思誠之方此即聖人之藴君子乾乾君子體天剛揵不息於誠力行不己求以充此誠然必懲忿窒欲亦必懲治忿心室塞欲心遷善改過而後至有善則遷有過則改而後能至於誠乾之用其善是乾乾不惠者其體去惡進善者其用故懲塞遷改皆乾之用莫善於此損益之大莫是過損之象在於懲忿窒欲益之象在於遷善改過故損益之大不過於是聖人之㫖深哉聖人作易其意深矣此以乾卦爻辭損益大象發明思誠之方蓋乾之爻其體損益大象皆用也無體則用無以行無用則體無所措故以三卦合而言之吉凶悔吝生乎動吉凶悔吝四者皆起於動噫嗟哉吉一而已四者之中只有吉之一善凶悔吝之惡居其三故人之所值福常少而禍常多動可不謹乎動其可不謹乎此章論聖人之藴家人睽復無妄第三十二此篇言睽次家人離則必睽無妄次復復其善則無妄動此亦聖人之藴治天下有本治天下必有其本身之謂也自修身始治天下有則治天下亦有法則家之謂也自齊家始本必端立本必須正端本正其源本誠心而已矣在乎誠其心心不誠則身不可正則必善立則必須善善則善其法則和親而已矣在乎和其親親不和則家不可齊家難而天下易齊家為難治天下為易家親而天下疏也所以然者家親故親者難處天下疏故疏者易裁也家人離家人之情睽離必起於婦人皆自婦人始故睽次家人故睽卦次家人卦以二女同居二女以睽卦兊上睢下言兊少女離中女隂柔之性外和悅而內猜嫌外和恱有同居之象而志不同行也內猜疑故異其志堯所以釐降二女于媯汭堯所以理治下降二女於媯水之北釐治也降下也媯水名汭水北舜所居也釐音厘溈音撝汭音蚋舜可禪乎以觀舜之可以𫝊位與否吾兹試矣吾以此試其處家如何家齊則可授之以天下也是治天下觀於家是治天下當觀其齊家治家治家之道觀身而已矣觀其正身身端身正心誠之謂也由此心無不實誠心實此心復其不善之動而已矣在於不善之動息於外則善心之生於內者無不實不善之動故不以理而動妄也動皆邪妄妄復則無妄矣邪妄而動知自反則無邪妄矣無妄則誠焉無邪妄則此心純是實理故程子曰無妄之謂誠故無妄次復此無妄之卦次於復卦而曰而言先王以茂對時先王以茂對其時育萬物發育萬物深哉蓋無妄即誠矣正所以明至誠者能此而贊其㫖之湥也冨貴第三十三此篇言君子之富貴以道德而不在乎世俗之富貴君子以道充為貴君子之人以是道兖於己為良貴身安為富身安於義理無善不修是為富故常泰無不足故常常泰然無有不足而銖視軒冕苟惟至足則軒車衮冕之貴如視之如錙銖銖音塵視珠玉珠璣寶玉之冨視之如塵土其重無加焉耳其重無加於道彼外物之冨貴特其小者陋第三十四此篇言聖人真知道德之重不溺於文辭之陋聖人之道聖人之所謂道入乎耳入乎其耳存乎心存乎其心藴之為德行藴蓄於內則為德行行去聲行之為事業發見於外則為事業彼以文辭而已者彼不知有道德之重而專以文辭為事者陋矣其卑陋可知矣擬議第三十五此篇言至誠者實理之白然擬議者誠之者之事至誠則動至誠者真實無妄之謂天理之總名而形諸動動則變動則變而不居變則化變動不居以至於化此至誠之事實理之自然故曰故言擬之而後言此擬而後言則言無妄言議之而後動論議而後動則動無妄動擬議以成其變化旡妄則誠故自比擬論議以成其變化之道此誠之者之事由修為以盡其實理也刑第三十六此篇言天以春生萬物止之以秋聖人法天以政養萬民肅之以刑天以春生萬物天道於春而生長萬物止之以秋於秋則收斂生道於此而止物之生也春生萬物既成矣於秋已成結不止則過焉故不止之則失之過故得秋以成故得秋氣之疑肅而萬物皆有成聖人之法天聖人法天治政以政養萬民以善政養育萬民猶天道生萬物也肅之以刑嚴肅之以刑臧猶天道之止之以秋也民之盛也斯民生長之極欲動情勝私欲所動私情所勝利害相攻貪利忘害交相攻舉不止則賊滅無倫焉茍不止之以刑則必至於戕賊天理賊君棄父蕩無人倫矣故得刑以治必得此刑則能治情僞微曖故斯民之情欲詐僞幽微曖昧曖音愛其變千狀變易千態茍非中正明逹果斷去聲者自非中正其心明逹其見果斷於事不能治也非能治之訟卦曰訟卦有云利見大人利於見大人大人即主乎刑者也以剛得中也剛即果斷中即中正謂果斷而得夫中正者也噬嗑曰噬嗑之卦有云利用獄利用於獄訟之事以動而明也動即果斷明即明逹謂果斷而本乎明逹者也中正本也明斷用也然非明則斷無以施非斷則明無所用二者又自有先後訟之中兼乎正噬嗑之明兼乎逹嗚呼嗟嘆天下之廣天下如此其廣主刑者主乎刑威者民之司命也生民之命實其主之任用可不愼乎任法用刑可不謹哉公第三十七此篇言聖人天地同一至公之道聖人之道聖人之所謂道至公而已矣至公而無所私或曰或人云何謂也此言若何曰答云天地至公而已矣天地之道亦只至公而無私以此見聖人與天地參者也孔子上第三十八此篇言孔子春秋之書正王道明大法萬世綱常之自出春秋經以春秋名者録善如春之生物記惡如秋之殺物正王道正王者之大道明大法也明國家之大法孔子為後世王者而修也孔子春秋專以書善惡當時善惡己形故無及為後世王者作欲其取法也亂臣賊子凡逆亂之賊惡之子臣誅死者於前必書其過惡於經而誅其已死者於前所以懼生者於後也正所以使後此而生者知所懼也宜乎萬世無窮宜其傳之萬世無已王祀夫子爵之以王尊之以祀報德報功之意無盡焉録善誅惡使後世皆知所戒而為善是有德及人也為後世植立綱常是有功於世教也則報其德報其功此意安有窮己耶孔子下第三十九北篇言孔子一太極道髙如天德厚如地教化無窮信如四時道德髙厚道髙而明德博而厚教化無窮教以教之化以化之無有窮己實與天地參而四時同髙明則配天陽也博厚則配地隂也教化無窮猶四時運轉春而夏夏而秋秋而冬冬而復春五行也其惟孔子乎孔子其太極乎䝉艮第四十此篇引三卦以明主靜之義此亦聖人之藴童䝉求我童稚䝉昧之人來求於我以發其䝉童稚也䝉暗也我師也我正果行我以正道果決彼之所行行行也如筮焉正猶卜筮揲蓍以决吉凶筮音誓筮卜筮云者叩神也問神以决疑也再三則瀆矣初筮則神告之吉凶至於再至於三則煩瀆矣瀆則不告也煩瀆則惑神不復告之以吉凶亦猶師之道亦不可煩瀆煩瀆則不决其所行矣山下出泉山之下出泉䝉卦大象文靜而清也山靜則泉清有以全其未發之善故行可果汨則亂汨則不靜而至於亂而不淆汨再三也亂即瀆也亂不决也亂而不清既不保其未發之善告之不足以果其所行而反滋其惑不如不告之為愈也不决不告也愼哉謹之其唯時中乎其只在於時中乎時中者當其可之謂初則告瀆則不告靜而清則决之汨而亂則不决皆時中也艮其背艮止也背不見之地也止於其背背非有見也蓋以背非可見之地非耳目口鼻之所能動故靜靜則止靜則能止止非為也止則無所為為不止矣一有有為之心則非止之道其道也深乎其道不其深乎此章發明二卦皆所謂聖人之藴而主靜也性理羣書句解卷十八
