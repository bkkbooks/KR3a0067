body:
  text: 性理羣書句解卷二宋熊節編熊剛大注訓訓有誨之義管氏弟子職三篇教人遜弟之方文公取以為幼學訓字訓一篇乃文公門人程端蒙所作文公見之謂之大爾雅學則此篇述弟子為學之法文公先生先生施教先我而生謂父兄施其教誨弟子是則為弟為子即此取法溫恭自虛溫顔恭己謙虛其心所受是極則所聽受斯能極其本原見善從之見一善則從之惟恐其後聞義則服聞一義則服之惟恐其忘溫柔孝弟溫和柔順孝親遜長毋驕恃力毋敢驕慢恃其有力志毋虛邪心志毋虛偽邪僻行必正直所行必端正方直行去聲遊居有常出處有常時必就有德必親近有德之人顔色整齊顔色必肅毋使驕矜中心必式中心敬謹有法式夙興夜寐早起夜睡衣帶必飭雖至衣帶亦必謹飭朝益暮習朝有所益暮必溫習小心翼翼小心戒慎一此不懈常如此不怠是謂學則是謂之學法也蚤作此篇述弟子蚤起事長之儀少者之事為弟子之事夜寐蚤作在于夜睡蚤起既拚盥潄拚灑掃室堂盥手滌齒拚掃也弗運反盥音管執事有恪各順其事無不恭敬攝衣共盥褰衣供具盥器先生乃作先我而生者乃起沃盥徹盥遂沃水于盥待先生盥罷則撤去泛拚正席廣掃內外復正坐席泛廣也先生乃坐父兄就坐出入恭敬出入之間必常恭敬如見賔客雖無賔客如見賔客危坐仰師直躬而坐以敬仰授業之師顔色毋怍顔色毋有愧怍受業對客此篇述弟子受學對客之節受業之紀從師受業之綱紀必由長始必從長者教之長去聲一周則然一周則然其餘則否餘則不必然凡言與行凡言出于口行履于身行去聲思中為紀只欲以無過不及為法之常古之將興古人興家必由此始斷自此始後至就席後來者就坐席狹坐則起密坐者則當先起若有賔客或有賔來弟子駿作為弟為子是必急起對客無讓對賔客供給使令不敢亢禮應且遂行既應則當便行趨進受命行進受先生使令所求不得凡求待客之物有不得者必以反命又必反告先生反坐復業于是歸坐復理學業若有所疑如或有疑未釋捧手問之以手奉書問于其師師出皆起逮師出則皆起至于食時至于食罷之時復聚字訓此篇推明一字一理之義程端蒙天理流行天以元亨利貞四德運行于上賦豫萬物畀付萬物豫與同是之謂命所謂命也人所稟受人心稟受此理而為仁義禮智莫匪至善莫非純粹至善是之謂性所謂性也主于吾身為吾一身之主宰統乎性情未發為性已發為情心介乎中而兼統之是之謂心所謂心也感物而動感于事物而不能不動斯性之欲性之所發則有欲是之謂情所謂情也為性之質本性聽受之本質剛柔強弱或剛或柔或強或弱善惡分焉剛之善者為果毅惡者為強柔善者為慈祥惡者為弱二者以分是之謂才所謂才也心之所之此心所適趨向期必趨向者定期其所到必不可回皆由是焉皆自此始是之謂志所謂志也為木之神稟得木之神氣在人則愛之理具在人心則是為愛之道理其發則惻隱之情發見于外則為惻怛之情是之謂仁所謂仁也為金之神稟得金之神氣在人則宜之理具在人心則是宜之道理其發則羞惡之情發見于外則為羞惡之情惡音污是之謂義所謂義也為火之神稟得火之神氣在人則恭之理具在人心則為恭之道理其發則辭遜之情發見于外則為辭遜之情是之謂禮所謂禮也為水之神稟得水之神氣在人則别之理具在人心則為分别之道理别音鱉其發則是非之情發見于外則為是非之情是之謂智所謂智也人倫事物君臣父子夫婦長幼朋友之倫事事物物酬應之際當然之理理有當然而然是之謂道所謂道也行此之道踐履是道有得于心有所得于吾心是之謂德所謂德也真實無妄確然真實無有欺妄是之謂誠所謂誠也循物無違靠事之實無所違背是之謂信所謂信也發已自盡發諸己者無一毫不盡是之謂忠所謂忠也推己及物推己之心以及乎人是之謂恕所謂恕也無所偏倚此心未發無所偏斜無所倚著是之謂中所謂中也發必中節此心已發無一乖戾皆其中節是之謂和所謂和也主一無適心主此一更不走作是之謂敬所謂敬也始終不二自初及末一而不二是之謂一所謂一也善事父母能順承父母是之謂孝所謂孝也善事兄長能敬兄及年齒長我者是之謂悌所謂悌也天命流行天道運行自然之理自然而然之道理不待假借作為人所稟受人皆得以稟受于天五性具焉仁義禮智信之性以具是曰天理是謂天理人性感物人性感觸于物而動不能無欲豈能無所欲耳目鼻口耳之于聲目之于色鼻之于臭口之于味斯欲之動四者皆是有欲之動是曰人欲是謂人欲無為而為無為之為音謂無所求而為天理所宜合于是理之宜是之謂誼所謂誼也有為而為有為之為音謂有所求而為人欲之私動于欲心之私是之謂利所謂利也純粹無妄純美精粹真實無妄天理之名合于天理之名是之謂善所謂善也凶暴無道凶狠暴戾所為悖道不善之名得不良善之名是之謂惡所謂惡也物我兼照已之與物相視如一曠然無私洞然八荒照無所私是之謂公所謂公也蔽于有我蔽塞人欲惟知有已不能大公不能達乎大公之道是謂之私所謂私也凡此字訓凡是為此誨搜輯舊聞無非採録往訓以編類之搜音搜輯音七嗟爾小子嗟彼后學敬之戒之敬其當為戒其不當為克循其名能隨其字之名深惟其義深思其字之義以達于長上以問于師長長上聲以會于學下以詢于同學審問明辨審其問明其辨精思篤行精于思力于行孜孜勉焉勸汝惟以此自勉聖可賢致則聖人地位可以由賢而致戒戒者警戒之義子弟戒此篇戒子弟躁求利祿之心文公載之小學書中范魯公質戒爾學立身戒爾當學立身之道莫不先孝悌無如孝順悌遜之德怡怡奉親長和其顔色以奉其親事其長怡和也長上聲不敢生驕易不敢萌一驕貴慢易之心戰戰復兢兢恐懼又復凌兢造次必於是雖頃刻之間亦必于是戒爾學千祿戒爾學為求祿之人莫若勤道藝無如盡力道德文藝嘗聞諸格言曾聞聖賢之至言學而優則仕學而無不足則可入仕不患人不知不憂人不已之知惟患學不至惟憂學力之未至無以見知于人耳戒爾逺恥辱戒爾當逺去恥辱之事恭則近乎禮惟恭敬則可近于禮自卑而尊人每自卑下而尊敬乎人先彼而後己先乎人而後乎我相鼠與茅鴟相鼠譏無禮茅鴟刺惡言宜鑑詩人刺宜明詩人興諷之由戒爾勿放曠戒爾勿放蕩放曠非端士放曠則非端直之士周孔垂名教周公孔子垂世立教齊梁尚清議齊國梁國崇尚清虛之議南朝稱八達東晉稱為八達之士千載穢青史千年之下穢汚史册戒爾勿嗜酒戒爾勿貪于酒狂藥非佳味狂惡之藥釀造而成不是好味能移謹厚性能移人謹敬厚重之性化為凶險類變為凶強傾險之人古今傾敗者自古及今由此傾敗者歷歷皆可紀歷歷皆可紀録戒爾勿多言戒爾勿多言語多言衆所忌多言語之人衆人所忌茍不慎樞機茍不能謹其言之所發樞户楯機弩牙皆以所發處言災厄從此始災禍自是而起是非毁譽間或是或非或譽人或毁人適足為身纍適足為吾身之纍舉世重交遊舉世之人重其交遊擬結金蘭契擬結為金蘭之契類之同如蘭之臭志之堅如金可斷忿怨從是生忿怒怨惡自此而生風波當時起激為風波當時而起所以古人疾是以古人所疾惡籧篨與戚施籧篨不能俯者戚施不能仰者籧音渠篨音除舉世重遊俠舉世重遊談輕俠之士俗呼為氣義世俗名為氣義之人為人赴急難人有危急險難之事則往而趨之難去聲往往陷囚繫易至犯法往往自入囹圄自取械繫所以馬援書所以馬援之書辭殷勤戒諸子勤拳懇欵戒其諸子舉世賤清潔舉世賤清修雅潔之人奉身好華侈自奉尚榮華侈靡好去聲肥馬衣輕裘乘肥馬衣輕裘揚揚過閭里揚揚自得過其鄉里雖得市童憐雖得市井之童憐惜還為識者鄙又為有識之人鄙薄我本羇旅臣質事周世宗後方事太祖故言羇旅之臣遭逢堯舜理遭逢堯舜之治位重才不充位為相則已重才則不足充此戚戚懷憂畏戚戚然常懷憂畏之心深淵與薄氷如在深淵之中如履薄氷之上蹈之惟恐墜蹈之于間惟恐墜落爾曹當憫我爾輩當憫念我勿使增罪戾毋使我添得罪咎閉門斂蹤迹關門收斂其迹勿輕出縮首避名勢縮頭以避聲名勢位之隆勢位難久居丞相之勢位雖尊實難久處畢竟何足恃畢竟是何足倚恃物盛則必衰物之盛者其終必衰有隆還有替有興隆則必有衰廢速成不堅牢天下事欲急就則不堅固速走多顛躓急速而走則必遭躓躓音至灼灼園中花灼灼其盛者園中之花早發還先萎雖是開發之早又先零落鬱鬱澗畔松鬱鬱而生者澗邊之松遲遲含晚翠雖是秀發之晚經雪經霜不改蒼色賦命有疾徐賦命于天有早者有遲者青雲難力致事業青雲之上不可以力而致寄語謝諸郎寄言以謝諸郎之進奏者躁進徒為耳躁求而進徒耳言戒此篇戒人言語躁妄之失司馬溫公迂叟曰迂叟公自稱也言不可不重也言之發不可不謹重子不見鐘鼓乎汝不見夫鐘之與鼓夫鐘鼓扣之鳴鏗訇擊之則其聲洪大訇音宏鞈人不以為異也鞈人不以為怪以擊之使然鞈鐘鼓之聲鞈人司鐘鼓之人鞈音榻若不扣而自鳴如是不曽扣擊而自有聲人孰不以為之妖邪人誰不指為妖怪可以言而不言當可言之時而不言猶扣之而不鳴也正如鐘鼓扣而無聲亦為廢鐘鼓也是特無用之物而已事神戒此篇戒人事神之神不若事心之神或問迂叟事神乎迂叟公自稱或問曰汝事神明乎曰應之曰事神吾事神明或曰或人又問何神之事所事何神曰應之曰事其心神吾事心之神明或曰或人又問其事之何其奉事之當如何如曰若謂至簡矣至簡至要不黍稷不以黍稷祀不犧牲不以牲牛祭惟不欺之為用惟以正直不欺為用君子上戴天君子為人上順乎天下履地下足乎地中函心中天地立而有此心雖欲欺之雖欲欺其心其可得乎其能得耶針針者針戒之義四針伊川先生程子曰伊川言顔淵問克己復禮之目姓顔名回字子淵孔門髙弟也問仁夫子答以克己復禮克己是克去己私復禮是復還天理又問其條目子曰夫子言非禮勿視視者目之所睹非禮不正則禁止而勿視非禮勿聽聽者耳之所聞非禮不正則禁止而勿聽非禮勿言言者口之所稱非禮不正則禁止而勿言非禮勿動動者手足之所持履非禮不正則禁止而勿動四者身之用也視聽言動四者皆身之用而不能無者由乎中而應乎外四者皆此心之形見而應酬乎外制乎外所以養其中也就形見處用功禁制于外所以養此心也顔淵事斯語顔淵從事此言所以進于聖人所以能庶幾聖人地位後之學聖人者後之有志學為聖人者宜服膺而勿失也當以此語服著于胸膺之間而罔敢失墜也因針以自警因作為針訓以自警戒視針此篇專言非禮勿視心兮本虛人之一心本自虛靈應物無迹感應出入無迹可執操之有要操存必有其要視為之則莫先謹視則猶節也蔽交于前物欲之蔽交接于其前其中則遷惑于所見中必移矣制之于外禁制于外目不妄視以安其內則神識泰定內斯以安克己復禮克去己私復還天理久而誠矣久則實理流行周旋中禮矣誠實理也故克己復禮則猶待于用力至于誠則無所用其力聽針此篇專言非禮勿聽人有秉彛人有此生便秉執得此彛常之性本乎天性本原于天無不善也知誘物化知識誘于外而忘返物欲化其內而莫覺知去聲遂亡其正由是所稟之正日以喪亡卓彼先覺卓然天民之先覺知止有定知止者知其所當止有定者得其所當止間邪存誠間邪妄于外存實理于中非禮勿聽非禮不聽之矣言針此篇專言非禮勿言人心之動心活物也故動因言以宣動則因言語而宣達發禁躁妄躁輕肆者也妄虛繆也言語之發禁止其輕肆虛繆內斯靜專禁其輕肆則內斯靜定禁其虛繆則內斯專一矧是樞機樞户楯也機弩牙也户之闔闢射之中否皆由之發言乃吾身之樞機興戎出好一言之惡或至于興師一言之善或至于合好好去聲吉凶榮辱得則有吉有榮失則有凶有辱惟其所召發于口者甚輕召于彼者甚捷傷易則誕躁而傷于易則誕肆而不審易去聲傷煩則支妄而傷于煩則支離而逺實已肆物忤肆縱情也肆己者必忤物躁之致也出悖來違悖乖理也悖而出者必悖而反妄之致也非法不道非法度之言不敢稱道欽哉訓辭敬此聖賢教訓言辭動針此篇專言非禮勿動哲人知幾明哲之人知其幾微誠之于思于所思而誠之一念之動不敢妄也志士勵行立志之士勉勵其行守之于為于所為而守之一事之動不敢忽也合而言之思是動之微為是微之著思是動于內為是動于外順理則裕順天理而動則安而裕從欲惟危從人欲而動則殆而危造次克念頃刻之間常思以順乎理造去聲戰兢自持恐懼自守惟恐或陷于欲習與性成習謂修于己性謂得于天習與性合則全其本然之善聖賢同歸與聖賢一矣心針此篇專言心不可為物所役文公載之于孟子集注中蘭陵范先生茫茫堪輿堪天道輿地道茫茫廣大貌俯仰無垠仰觀俯察無窮盡人於其間人處于天地間眇然有身一身眇然而微是身之微此身細微太倉稊米如太倉中之小米稊稗也參為三才然人與天地相參而為三才曰惟心耳惟曰有此虛靈之心耳往古來今已往之古方來之今孰無此心誰無此心心為形役茍心無定主從耳目之欲乃獸乃禽則悖理傷道與禽獸無異惟口耳目形也手足動靜亦形也投間抵隙從間缺鏬隙而入為厥心病為此心病痛一心之微一心之小衆欲攻之聲色臭味之欲羣而攻之其與存者其能操之存者嗚呼幾希嗟嘆少有君子存誠君子之人存此誠意克念克敬能念能敬天君泰然心為君主泰然而安百體從令四肢百骸無不聽命敬齋針此篇言動靜皆不可無此敬文公先生正其衣冠衣冠嚴整也尊其瞻視目容端也潛心以居潛存此心以自處也對越上帝越于也可對于上天也此四句主靜而敬言足容必重規行矩步而無躩遽之態躩遽急行貌手容必恭束臂拱手而無弛下之狀弛下垂手貌擇地而蹈一舉步必擇地而行折旋蟻封猶曲折回旋于蟻垤中蹜蹜如有循也此四句主動而敬言也已上兩條皆言處己之敬出門如賔行出門便如見賔而不敢易承事如祭承一事如主祭而不敢忽戰戰兢兢畏謹也罔敢或易無敢慢易也易去聲也此四句亦動而敬守口如瓶謹言語如瓶之貯水而不泄防意如城杜私意如城之防寇而甚周洞洞屬屬質慤專一毋敢或輕毋敢輕忽也條此四句亦靜而敬也已上兩皆言接物之敬不東以西不于東而轉以西不南以北不于南而轉以北當事而存當此一事則心存于此事靡他其適更不走作程子曰主一無適之謂敬主一是主此一件無適是無所往而非敬釋無適也主動而言勿二以二此心主此一事更不參插第二事勿參以三非惟不參插第二事亦不參插第三事惟精惟一此心惟主此萬變是監事有萬變此為監臨釋主一也主靜而言監平聲從事于斯從而事乎此是曰持敬是謂持守此敬動靜弗違一動一靜皆不違此敬表裏交正外貌內心俱得其正須臾有間頃刻才有間斷間去聲私欲萬端物欲之私千條萬緒不火而熱無火而自熱煩而躁也不氷而寒無氷而自寒憚而栗也毫釐有差敬忽之差毫釐耳天壤易處天地為之易位三綱既淪君臣父子夫婦之大綱既淪喪九法亦斁洪範九疇之法亦斁壞於乎小子嗟爾後生念哉敬哉此念所存當持此敬墨卿司戒墨卿墨之號也寫為此戒語敢告靈臺敢告之靈臺敬忽在心也勿齋針此篇言視聽言動當于勿字用功西山真先生天命之性天所賦是為性得之者人稟得者惟人耳人之有心人生而有此心其孰不仁又誰不有此仁人而不仁人而不有此仁曰為物役亦為外物所役耳蕩于聲耳為聲所搖蕩目眩于色目為色所眩惑以言則肆言則放肆以動則輕動則輕易人欲放紛欲心放恣紛擾天理晦冥天理不明於焉有道于此而有要道禮以為凖禮為凖則惟禮是由惟禮則行匪禮勿徇非禮勿從曰禮伊何所謂禮者如何理之當然理之當如此耳不雜以人不問雜以人欲一循乎天一率由乎天理勿之為言勿之一語如防止水猶防止水孰其尸之誰其主此曰心而已謂心而已聖言十六夫子非禮勿視十六字一字其機勿之一字是其機括機牙既幹機牙弩關利也關利既動鈞石必隨三十斤為鈞百三十斤為石弩之最重者必隨之而發我乘我車吾載吾車駟馬交驟乘馬交馳孰範其驅誰範法其馳驅維轡在手惟韁轡常在手中是以君子所以君子其人必正其心必先正其一心翼翼兢兢敬謹也不顯亦臨雖處不顯中亦如上帝監臨萬夫之屯萬人屯聚一將之令皆聼一將之令霆鍧飈馳猶雷之震猶風之馳鍧音宏孰敢干命誰敢犯其威命衆形役之耳目口鼻衆形之役統于心官心為之官實統治之外止弗流外能禁止便不流蕩內守愈安內之所守愈得其安其道伊何止之守之其道如何所主者敬主乎一心惟有此敬表裏相維內外交養故曰相維動靜俱正或動或靜俱得其正莠盡苖長欲去如莠之盡理明如苗之長醅化醴醇如糟醨渾化酒醴醇醲醅音坯方寸盎然此心沖融盎音暗無物不春物物生意惟勿一言惟勿之一語萬善自出萬善皆從此出念兹在兹念此常存在此其永無斁雖久而不厭思誠齋針此篇論誠與思誠存天道人道之分誠者天道真實無妄謂誠乃天之道也本乎自然自然而然無事作為誠之者人求盡此誠者人為也以人合天由誠之以至乎誠由人之道以合乎天道曰天與人凡天與人其本則一其初則一云胡差殊如何等差有殊蓋纍于物蓋為物欲所纍耳心為物誘此心為外物誘去性遂情移此性為私情所移天理之真天理之真實無妄者其存幾希所存者亦甚少豈惟與天豈止與天邈不相似相去之逺絶不相似形雖人斯雖具人形實則物只實則何異于物斯只皆助語皇皇上帝大哉上天命我以人與我以人之形我顧物之我乃自儕于物抑何弗仁何其不仁之甚維子思子維此子思深憫斯世重憫一世指其本源指出實理之本源祛俗之蔽以開世俗之惑祛音驅學問辨行即博學審問明辨篤行統之以思以上四者總而歸之謹思擇善固執必擇其善而堅執之惟日孜孜惟日不足狂聖本同狂者聖者其初亦同其忍自棄何忍自棄其天人十己千人十能之己必求千能之弗至弗已不至此亦不止雲披霧卷一旦思之而通猶雲開霧收太虛湛然蒼蒼之天湛然在上塵掃鏡空垢去鏡空清光自全清光瞭然無蔽曰人與天人之與天既判復合其始既判今復合矣渾然一真渾全一心之理諸妄弗作一等邪妄無有萌作孟氏繼之孟子繼乎子思命曰思誠乃名之曰思誠更兩巨賢更子思孟子二大賢其指益明其指意愈分曉大哉思乎大哉思之一字作聖之本此乃為聖之本根歸而求之茍能反而求之于心實近非逺實至近而未嘗逺也規規乃規矩之規邇年皇上親灑白鹿洞規以賜南康白鹿洞規此篇論明倫為學修身處事接物五者之道文公先生洞在南康軍唐李渤之隱居學徒常數百人本朝興國初嘗賜九經又官其洞主明道後廢不治淳熙間文公守南康請于朝而重創焉故為此規以示學者父子有親父子有相親之恩君臣有義君臣有相與之義夫婦有别夫婦有分别而不可褻長幼有序長幼有次序而不可紊朋友有信同門曰朋同志曰友交處有信而不可欺右五教之目以上五者乃教化之條目堯舜使契為司徒堯帝舜帝命契為司徒之官敬敷五教敬布五者之教即此是也只此是也學者學此而已學者學習此而止其所以學之之序所以為學次序亦有五焉又有五件其别如左别具于左方别入聲博學之廣學于文審問之審問其疑謹思之謹思其道理明辨之明辨其是非篤行之專篤而踐行之右為學之序此為學之次序學問思辨博學審問謹思明辨四者所以窮理也此四者皆所以窮究道理若夫篤行之事如篤行一事則自修身以至于處事接物則自修吾身以至酬酢萬事應接萬物亦各有要亦自各有其要其别如左别具于左言忠信言語貴于誠實行篤敬行已貴篤厚而恭敬行去聲懲忿窒欲懲治忿怒窒塞嗜欲窒音的遷善改過遷徙于善更改其過右修身之要此四句于身最切故云修身之要正其誼是正于合宜之誼不謀其利不謀慮便安之利明其道闡明道理不計其功不計較功效右處事之要此四句于事上最切故云處事之要己所不欲我所不願欲勿施於人不以施于它人行有不得行于人而不從反求諸己反歸自身求其盡善右接物之要此四句于物上最切故云接物之要熹竊觀古昔聖賢私竊看往古聖人賢士所以教人為學之意所以誨人為學本意莫非講明義理以修其身皆是講究推明義理修治其身然後推以及人而后推闡以教人非徒欲其務記覽為詞章不徒欲專務廣記博覽作為文章以釣聲名取利祿而已以釣取名譽爵祿而止今之為學者今世為學之人既反是矣既與此相反矣然聖賢所以教人之法但聖賢所為教人之成法具存于經具載于經書中有志之士立志君子固當熟讀深思而問辨之自當精詳于學思問辨四者茍知理之當然誠知理當如此而責其身以必然責諸身斷斷如此行則夫規矩禁防之具則夫設規矩為禁制防間之器具豈待它人設之何待别人設此而後有所持循哉而後能提撕循守乎近世于學有規近來于學舍有規矩其待學者為已淺矣其待學者之意已甚淺薄而其為法所立學規又未必古人之意也未必合古聖賢本意故今不復施于此堂故今不再頒示鹿洞之堂而特取凡聖賢所以教人為學之大端只取聖賢所以誨人為學之大端緒條列于右逐條陳列如前而揭之楣間開揭于楣梁中諸君相與講明遵守而責之于身焉衆學者同講明義理遵守條目責任于身而力行則夫思慮云為之際則夫心身之間其所以戒謹恐懼者所以敬畏者必有嚴于彼者矣當更嚴于世之學規其有不然有不此之從而或出于禁防之外而反蕩跌于禁制防間之外則彼所謂規者則世所言學規必將取之只得取而用之固不得而略也有不容略而不用也諸君其念之哉衆學者深思之性理羣書句解卷二
