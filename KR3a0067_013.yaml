body:
  text: 性理羣書句解卷十三宋熊節撰熊剛大註書正蒙横渠先生中正篇第八此篇論人當植立大中至正之道可欲之謂善天下之理善者必可欲惡者必可惡其為人也可欲而不可惡則可謂善人矣志仁則無惡也仁該萬善志在於仁則必無為惡之事矣誠善於心之謂信誠實也實有此善於心謂之信充内形外之謂美充滿於中著形於外謂之美塞乎天地之謂大塞乎上天下地之間方見其大大能成性之謂聖茍大矣則全其性之本然聖之事也天地同流茍聖人則與天地流通而無間隔隂陽不測之謂神隂陽不可測度其神之所謂乎無所雜者清之極無所混雜是為清之極者也無所異者和之極無所乖異者和之極者也勉而清有所勉而後能清非聖人之清非伯夷聖之清者比也勉而和有所勉而後能和非聖人之和非柳下恵聖之和者比也所謂聖者所以為聖人者不勉不思而至焉者也不待勉強不待思索而求至也仲尼絶四意必固我蓋私意見於應事接物之間此四者皆夫子之所禁止也自始學至成德自初學以至成德皆不外此竭兩端之教也所謂我竭盡兩端而教者也兩端猶言兩頭也意有思也意者萌心之始故曰有思必有待也必者期望於終故云有待固不化也固者滯於己往故云不化我有方也我者成於己私故曰有方四者有一焉此四者或有一焉則與天地不相似矣不能至於大而化與天地全不相似惡不仁人能惡其不仁則察己也精惡去聲故不善未嘗不知有不善知之矣徒好仁茍徒知仁之可好好去聲而不惡不仁而不知不仁之可惡則習不察則所習者或未之察行不著所行者或未之明雖有好仁之心而卒陷於不仁而莫之覺矣是故轉語徒善未必盡義徒好仁而不惡不仁則雖有向善之意而無㫁制之明故曰未必盡義徒是未必盡仁徒惡不仁而不好仁則雖有去非之意而無樂善之誠故曰未必盡仁責已者處世有乖違豈在人者皆非在我者皆是責已反躬者知天下國家當知天下之廣國家之大無皆非之理無人人皆非之理故學至於不尤人為學至於但務盡己未嘗咎人學之至也此問學之極功也以責人之心責己則盡道知責人之不善又推此心而責乎己則能盡其道所謂君子之道四如中庸所言君子之道有四所求乎子以事父至先施之類丘未能一焉者也夫子以自為不能知責己者也以愛己之心愛人則盡仁知自愛乎已又以此心而愛乎人則能盡其仁所謂施諸己而不願又有如中庸所言施之於我而不欲者亦勿施於人亦勿以此施於他人是愛人者也以衆人望人則易從故以衆人所當能之事而望乎人則人人說而從所謂以人治人中庸所言以人之道還治乎人之身改而止者也能改焉則止矣不厚望之也此君子所以責己責人愛人之三術也此責己責人愛人之三術惟君子為能盡之有受教之心人君有心於受教雖蠻貊可教雖是夷狄頑冥不靈未有不可訓誘者為道既異若其道不相同雖黨類難為相謀雖是黨與儔類亦不相謀大人所存此大德之人胸中所存蓋必以天下為度常以天下為度量人之可教未嘗絶之以為不可教也此即有教無類之意至當篇第九此篇言天理求至當之歸當去聲至當之謂德凡皆當理是所謂德百順之謂福百無乖逆是所謂福德者福之基德乃福之所本福者德之致福乃德之所能致無入而非百順無所獲而非此福故君子樂得其道君子之所樂者亦在得獲福之道指德而言也浩然無害胸中浩然之氣充塞乎天地能養之無所損害則天地合德則能與天地合其德照無偏倚明照洞融無偏私無倚著則日月合明則能與日月合其明天地同流所存者神所過者化與天地同運而不息則四時合序則能與四時合其序酬酢不倚泛應酬酢不倚不偏則鬼神合吉凶則能與鬼神妙用合其吉凶禮器則藏諸其身禮之成藴諸吾身用無不利用之於外無不順禮運云者禮以運言語其達也運則有通達之意禮器云者禮以器言語其成也器則其已成之體逹與成曰達曰成體與用之道達者其用成者其體合體與用能合體用而為一大人之事備矣大人之人能事備矣未能如玉玉者至純至粹之物人之修行未能如玉之純粹不足以成德不足以言成己之德未能成德既未能成己之德不足以孚天下不能感孚於天下之人修己以安人能修己則能成德推以安人則亦能感孚於天下修己而不安人己修已而人未安則是修己之道未盡德有所未成故人有所未孚不行於妻子則是修己之德且不行於閨門之内况可愾於天下愾怒也况可怒天下之不感孚乎愾音戲仁道有仁為仁之道亦有其本近譬諸身近反諸己推以及人推此以及乎人乃其方也是乃求仁之方恕之謂也必欲博施濟衆如欲廣其所施以濟衆施去聲擴之天下充而廣之以達天下擴音廓施之無窮利澤愈施而愈宏源源無盡必有聖人之才必須有聖人之大力量能𢎞其道方能𢎞大此道義仁之動也仁包四德義形於外乃是仁之流動流於義者過於義則㫁制太甚於仁或傷而惻怛之道不足故傷仁仁體之常也仁有常生生而不息故其體為有常過於仁者過於仁則惻怛太甚於義或害而㫁制之道不足故傷義君子於仁聖君子之人於仁聖之道為不厭為之在己未始有厭誨不倦誨之於人未嘗或倦然且自謂不能如此用功方且自謂不能能不過人茍其能不過夫人故與人争能必至與人争其能以能病人是以己之能病夫人之不能大則天地合其德豈如大公無我與天地合其德自不見其能也忘其能者之為至恭敬撙節退讓以明禮撙猶趍也謂趍就乎節約也文恭敬者禮之本退讓者禮之君子從事乎此以明此理仁之至也則視聽言動之間天理流行人欲消盡而心德至矣是仁之至也愛道之極也恭敬則無忽慢撙節則無驕溢退讓則無怨争是皆所以盡仁愛之道者也已不勉明明謂明禮也已不知勉力以明此禮則人無從倡人以禮而倡率不明禮則人無從而倡率道無從𢎞道以禮而𢎞大不明禮則道無由而𢎞大教無從成矣教以禮而成就不明禮則教又無因而成就矣知崇天也知之崇所以效天也知去聲形而上也乃形而上之道理也通晝夜而知然所以能崇此知由通晝夜隂陽之變其知崇矣其知始崇矣知及之茍有此知以及之而不以禮不能守品節事物之理卑以法夫地性之非己有也所性皆非我有故知禮成性而道義出知禮相資而成其性道義之所従出作者第十此篇論聖人有為之迹作者七人古之制作之君凡七人伏羲神農黃帝堯舜禹湯三皇則有伏羲神農黃帝二帝則有堯舜王則有夏禹商湯制法興王之道三皇五帝之制法禹湯之興王非有述於人者也皆以身為天下先非有所繼述於他人也好問大舜樂詢問乎人好去聲下同好察邇言喜察淺近之言論隠惡揚善見人有惡則隠之見人有善則揚之與人為善使天下之人勤於為善猶己助之使為也象憂亦憂象舜弟名也傲慢不恭舜能諧和之象之憂舜亦與之同憂象喜亦喜象之喜舜亦與之同喜皆行其所無事也不以象德累其心惟行其所無事過化也所以然者過而能化無留跡也不蔵怒也惟見弟之可愛未嘗蔵匿其怒於心不宿怨也惟知弟之可念未嘗留宿其怨於内此仁之至也三十篇第十一此篇論為學之序三十器於禮夫子年三十成於禮而有所立非强立之謂也乃自然而然非勉強而有立也四十精義致用四十則研精義理妙於致用時措而不疑時而出之自無所惑五十窮理盡性至天之命五十則窮究事物之理不異己之理而能盡己之性盡得己之性又不外上天之命於我者故可至於天之命三事一時並了非有次序然不可自謂之至故曰知但夫子不自言其至故但曰知天命六十盡人物之性六十則人之性物之性無不全盡聲入心通聲入於耳心通其理故曰耳順七十與天同德七十則德與天同運不思不勉不待思索不待勉強從心所欲皆不踰正從容中道優㳺順適身與理俱故曰從心不踰矩從平聲困之進人也為德辨辨明也人處患難之時則操心危懼而無馳縱之能故其見理也明為感速置身窮危而有反本之思故其從善也敏孟子謂人有德慧術知者德慧謂德之慧術知謂術之知人有此則於事理無不達矣常存乎疢疾以此然常在於疢疾災患之時蓋有疢疾則動心忍性増益其所不能也疢音趂自古困於内無如舜古昔之人如舜之父頑母嚚象傲是困於内者也困於外無如孔子如孔子之絶糧於陳畏於匡是困於外者也以孔子之聖以夫子之大聖而下學於困但知下學於處困之時則其䝉難正志雖䝉患難益正其心之所向難去聲聖德日躋既聖而愈極其聖日進其德必有人所不及知蓋有人不能知而天獨知之者而天實知之故曰故言莫我知也夫人皆莫己之知夫音扶知我者其天乎知我者惟天而已蓋下學工夫自然上達天德此豈人所能知耶仲尼生於周仲尼夫子字也生於周之未也從周禮禮則從周之禮故公旦法壊周公名旦制禮作樂𫝊及數代其法寖壊夢寐不忘為東周之意夫子形諸夢想不忘為東周之意東周謂興周道於東方也使其繼周而王若使夫子得時行道繼周室而王則其損益可知矣則損其太過益其不及必可得而知也不待備而勉於禮樂不必候禮樂之文既備而先能勉於禮樂是先進於禮樂者也是所謂先進於禮樂者備而後至於禮樂必俟禮樂之文既偹而後勉於禮樂後進於禮樂者也是所謂後進於禮樂者仲尼以貧賤者必待文備而後進夫子無其時無其位乃一貧一賤之人如必待禮樂之文偹而後進則於禮樂則其於禮與樂終不可得而行矣終無可行之日矣故自謂野人而必為故夫子自言如用之則吾從先進自處於野人之列而必為之所謂不願乎其外也若此者皆是不願乎外蓋必待禮樂之文備而後進則必須富貴而後能是願乎其外也聖人於物無畔援聖人於人無有界限無有拒絶雖佛肸南子佛肸魯之邑大夫南子衛靈公妻雖一為叛臣一為淫婦佛音弼肸音翕茍以是心至然茍有召見於我是以慕道之心来也教之在我爾在我亦因所問而誨之耳不為已甚也如是不為拒絶之過甚蓋如此也即孟子所謂仲尼不為已甚之意愛人以德夫子愛人以大德不為姑息之愛喻於義者常多故曉之以義理者常加多故罕及利少有一言及於利盡性者方能至命能盡人物之性理可知天所賦予之命未達之人昏蔽而未能有覺者告之無益雖與之言無益於事故不以亟言故未嘗亟以此告人待其有意則言也仁大難名仁道至大不可名狀人未易及人未易知故言之亦鮮故形諸言亦少待其可以進於是則與之言也鮮上聲法立而能守正法既立又能固守不變則德可乆業可大則德性可乆而存事可𢎞而大鄭聲佞人鄭聲者鄭國淫邪之聲佞人者口給面䛕之人二者皆蕩心之原敗法亂紀之具能使為邦者能俾為邦之人喪所以守喪失其中心之所守喪去聲故放逺之故當放斥鄭聲逺棄佞人此是顔淵問為邦夫子所告之二事乃大節也仲由樂善子路樂與善人交故車馬衣衾車馬衣服衾被等物衾音輕喜與賢者共敝喜與賢者共之雖被敝而無憾敝音弊顔子樂進顔淵樂於進道故願無伐善無施勞故願無矜誇其能於己無施其勞苦於人矜善憚勞則不能進也聖人樂天聖人與天為一所樂者天理故合内外而誠其仁故自内及外一仁道之流行蓋仁者生生不息之理誠其仁則仁道流行無非實也有德篇第十二此篇論人有德之實有德者必有言藴諸中為德發於外為言能為有也有諸中必形諸外是能為有者也志於仁而無惡仁者善心之全德心之所向在乎仁則為善而不為惡能為無也善必欲有惡必欲無是能為無也言有教非先王之法言不敢言是也動有法非先王之德行不敢行是也晝有為終日乾乾是也宵有得夜氣所息是也息有養氣之出入為息一息而必有所養也瞬有存目之開闔為瞬一瞬而必有所存也此言君子無往無時而無學也天下有道當大道為公之世道隨身出則推此道以制天下故身行而道亦行天下無道當大道湮汨之世身隨道屈遯世不見知而不悔故道與身而俱屈困辱非憂君子偶居於困辱之中非所憂也取困辱惟憂非其道而得困辱此可憂也已榮利非樂君子利禄之極非所樂也忘榮利為樂忘情於利禄此為樂也已有司篇第十三此篇論有司為政之道子之不欲子指有司而言謂子若無貪欲之心雖賞之不竊則雖明示以賞使民為盜民亦知恥而不為欲生於不足則民盜凡人有貪欲皆生於不足因不足而求足此民所以為盜能使無欲能使夫人無不足之欲則民不為盜則民自不為盜矣假設以子不欲之物假使以子所不喜之物賞子使竊賞子使竊此其所不欲既非所好子必不竊子必不竊矣此二節上言已無貪欲雖賞民使竊而不竊下言已所不欲雖賞己使竊而不竊此君子為政必以無欲為本故為政者故為政之人在乎足民其要只在使民至足使無所不足使民菽粟如水火至足矣不見可欲而盜必息矣則不見有可欲之物而竊盜之風自息道千乗之國道治也千乗諸侯之國其賦可出兵車千乗者乘去聲不及禮樂刑政夫子言治諸侯之國而不及禮樂刑政四者而云節用愛人而言節已裕民使民以時役民必以其時如不妨農作之事言能如是則法行謂能如此則其法可行不能如是則法不徒行不能如此則徒法不能自行法指禮樂刑政言也禮樂刑政若夫禮樂以導民刑政以齊民亦制數而已耳亦不過法制度數而止耳蓋禮樂刑政乃治之具節用愛人使民以時乃治之本此夫子言治所以未暇及也大易篇第十四此篇論大易精㣲之藴大易不言有無易曰一隂一陽之謂道蓋隂陽之運其所以然者即道也體用相因精粗罔間不可以有無分言有無後世異端見道不明始以道為無以器為有有者為幻妄為土苴無者為𤣥妙為真空析有無而二之諸子之陋也皆諸子淺陋之見也易一物而三才易只一理而天地人三才之道具隂陽氣也而謂天氣運於天者有隂有陽故曰天道剛柔質也而謂之地質具於地者有剛有柔故曰地道仁義德也而謂之人德具於人心愛之理為仁宜之理為義故曰人道乾至健而無體乾天下之至健不居其體為感速其感通之速有不可禦故易知故其道易知坤至順而不煩坤至柔順簡而不煩其施普其所施甚廣施去聲故簡能故其道簡能物因雷動萬物之衆必因雷以鼓動如驚蟄藏振萌芽之類雷動不妄雷之動也未嘗差妄則物亦不妄則物之發生亦未嘗差妄故曰物與无妄故云物與无妄與之一字指雷而言也樂器篇第十五此章論樂章之大意象武象武樂名武王初有天下是武王得天下之始象文王武功之舞象法文王之武功以見於舞歌維清以奏之歌維清之詩以奏樂成童舞焉大武大武樂名武王没是武王已死嗣王象武之功之舞成王象法武王之功以寓於舞歌武以奏之歌武詩以奏樂冠者舞焉勺酌之四篇周公沒是周公已死嗣王以武功之成由周公成王以武功之有成本於周公告其成於宗廟之歌也乃歌此詩以告成功於宗廟也十三嵗者舞焉蓼蕭裳華二詩篇名蓼音六有譽處兮詩中言也譽名也皆謂君接己温厚此是言人君接待臣下禮意温和而寛厚則下情得伸則在下之情可以上達讒毁不入而讒謗者無自而入而美名可保也善名可保此所以有譽處也唐棣枝類棘枝唐棣花名其枝與棘枝相似隨節屈曲隨其枝節屈屈曲曲則其華一偏一反是以其花有偏者有反者左右相矯必左右兩畔相矯而夾正之因得全體均正方得其體均一端正偏喻管蔡失道偏喻管叔蔡叔流言失其中正之道反喻周公誅殛反喻周公誅其不正之辠撥亂反正之功九疇次序洪範九疇之次序民資以生百姓賴之以相生莫先天材莫始於天生之五材故首曰五行故初一為五行金木水火土也君天下者為天下之君必先正已必須先正其身故次五事故次二為五事視聽言貌思也已正然後邦得而治身既正則天下可得而治故次八政故次三曰八政食貨祀司空司徒司冦賔師也政不時舉必昏政不能以時而舉則必昏昧故次五紀故次四曰五紀嵗月日星辰厯數也五紀明然後時措得中五紀既明則時而措之無不得中故次建皇極故次五曰建用皇極大中不可不知權既已得時措之中又不可不知權故次三德故次六曰三德正直剛柔也因時世之異而以三德治之也權必有疑聖人因天下而用權必有所疑故次稽疑故次六曰明用稽疑顯而參之人謀隠而參之鬼謀皆所以决疑而使明也可證然後疑决有所証而後疑可决故次庶證故次八曰庶證雨𤾉燠寒風時也福極證然後可不勞而治證之以嚮用五福威用六極則可不勞餘力而治故九以嚮勸終焉故以嚮勸人用五福終焉夀富康寧攸好德考終命也王禘篇第十六此篇論禮遜之實庶子不祭祖衆子不祭其祖非不祭也言不主祭也明其宗也宗長子也明宗子當祭也不祭禰禰父也非不祭也言不主祭也明其宗也亦明長子當祭也庶子不祭殤與無後者衆子不祭未成人而死者及其死而無子者注不祭殤者此禮之言也注云不祭殤父之庶乃父之庶子蓋以殤未足語世數蓋以殤死者未足與語傳世之數特以己不祭禰己非宗子尚不得祭禰故不祭之故不應祭之不祭無後者不祭死而無子者祖之庶也以其為祖之庶子雖無後雖是無子以其成人備世數以其既冠成人已備𫝊世之數當祔祖以祭當祔之祖以致其祭不得而祭之也亦不得舉其祭也小事則専達事之小者得以自達蓋得自達於其君蓋得自達其事於君之前不俟聞於長者不待禀聞於其長者長上聲下同禮所以達官也此禮之謂達官所謂達官之長者又有謂達官之長者得自達之長也得自達其事於長官也所謂官師者又所言官師云者次其長者也其位又下於長者也然則轉語達官之長謂之達官之長者必三命以上命有八命至八命則是公侯以上達官之長是三命以上官上士為之官師則中士而再命官師則是再命以上官中士為之庶士則一命為可知庶士則是一命者也下而飲者此言射也射之為法揖讓而升堂射畢則揖而下舉行飲酒之禮者不勝者自下堂而受飲也乃是揖不勝者使之升堂取觶自下堂而立飲也其争也其所謂争非以力而争也争為謙讓而已不過争習謙恭退讓之實而已乾稱篇第十七此篇論佛法之虚寂不如吾道之不滯於一偏浮圖明鬼浮圖佛氏也其推明鬼之一字謂有識之死言人之死也神識不散受生循環復寓形而受生如環之轉遂厭苦求免遂厭人世之苦恐其有識復生以術求免於死豈知精氣聚則為人散則澌滅就盡而為鬼是未知鬼之理也以人生為妄見人生日用無非天理之當然佛氏指為浮生幻設可謂知人乎是不知有人之理也天人一物天與人同一理輙生取舍今乃棄人事以求天性是不知有天之理舍上聲孔孟所謂天孔子孟子所言天者彼所謂道佛氏以為此即是道淪於空寂惑者指逰魂為變為輪迴昧者又指人之已死精魄逰散是之謂變以為如輪迴轉尚可復生未之思也是殆不思也已大學當先知天德吾儒大學當先明天德知天德則知聖人明得天德則知聖人之道知鬼神知鬼神之事今浮圖劇論要歸今佛氏極談是道體要歸宿之地必謂死生流轉㫁㫁然以為死者可以復生迴轉無窮非得道者不免必須識心見性得道而後免於死謂之悟道可乎指此為覺悟乎道悟道者果若是乎蓋當生而生當死而死是則有義有命生死均安何所厭苦天人一致何所取舍知晝夜通隂陽則知死生之說何所謂輪迴自其說熾𫝊中國自佛氏此言盛播中土儒者未容窺聖學門牆吾儒未能淺逰聖人之閫閾藩籬已為引取淪胥其間已為之引去陷溺其說指為大道以為真是大道之所在乃其俗達之天下皆其俗習𫝊播於天下致善惡愚智以致善者悪者愚者智者男女臧獲臧僕人也獲婢妾也人人著信人人皆為可信使英才間氣遂使英偉間生之才間去聲生則溺耳目恬習之事自有生以来則淪溺於耳目習熟之言長則師世儒崇尚之言既長則得於世之儒者尊信之語長上聲遂㝠然被驅遂𡨕然無覺被其驅率因謂聖人可不修而至以為聖人可無所修為而自能至大道可不學而知大道可無所學習而自能知故未識聖人心未曽知得聖人之精藴已謂不必求其迹已言不必求其既往之迹未見君子志未曽看得君子之志向已謂不必事其文已言不必從事於文字之間此人倫所以不察人之倫序所以不能究察庶物所以不明事物之理所以不明辨治所以忽治以故隳廢德所以亂德以故敗亂異言滿耳異端之說盈耳上無禮以防其偽詭服異行上之人不能修先王之禮以防其偽下無學以稽其弊邪說異教下之人又不能通先王之學以考其弊自古詖淫邪遁之辭自古及今凡是偏詖淫放邪僻逃遁之言翕然並興羣然而起一出於佛氏之門者同出於浮圖之門千五百年已千有五百年矣向非獨立不懼茍非獨立於頽波風靡之餘而無所恐懼精一自信精以别其學之非一以守乎理之正而毅然自信有大過人之才而有出人之才力何以正立其間又何以正立於異學之中與之較是非計得失哉與之辨論其是非計度其得失邪體不偏滯其體周流不息而不偏滯於一方乃可言無方無體乃可謂之無方所無體質偏滯於晝夜隂陽者物也偏滯於晝夜隂陽特物而已若道則兼體而不累也如道則兼其體而不累於偏滯也以其兼體惟其道能兼體乎是故曰一隂一陽故云一隂一陽隂消則陽長體無窮也又曰隂陽不測又云隂陽不可測度又曰一闔一闢又云一闔一闢闔者静之極闢者動之始不拘於動静也又曰通乎晝夜又云通乎晝夜謂之通則不偏於晝夜也語其推行故曰道論其推行於外則總名之曰道語其不測則謂之神論其不可測度則謂之神語其生生故曰易易者變易無窮論其生生則謂之易其實一物實則同一理而已指事而異名爾特指其事則有異名此乃見其體不偏滯所以無方無體也性理羣書句解卷十三
