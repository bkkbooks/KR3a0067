body:
  text: 性理羣書句解卷十二宋熊節撰熊剛大注書正蒙蒙者蒙昧未明之謂正者司正之也此書係依文公採入近思録者及聘君覺軒蔡府教編入傳道精語者合而為一橫渠先生太和篇第一此篇推明太和之氣隂陽運化人物賦受皆是物也太和所謂道太和即隂陽之氣也一隂一陽所以運行者謂之道中涵浮沈升降動靜相感之性其中涵具二氣陽浮而隂沈陽升而隂降陽動而隂靜交相感應之性是生絪緼相蕩絪緼隂陽合氣也由是而生一往一來交相摩蕩勝負屈伸之始陽升則隂負陽伸則隂屈自此始也其來也幾微易簡其初則生於眇綿之間未形未著故曰易簡其究也廣大堅固究其極也則流動充滿堅實凝固起知於易者乾乎知主也乾健而動即其所知便能始物自無所難故易易去聲效法於簡者坤乎坤順而靜凡其所能皆法乎乾成物不勞餘力故簡散殊而可象者為氣二氣發生散為萬殊有形象而可見者氣之生育者也清通而不可象者為神其清明正通運行於上無象可見神妙不測氣之精粹者也不如野馬絪緼野馬逰氣也自非如逰氣之紛擾朱子曰隂陽循環如磨逰氣紛擾如磨中出者不足謂之太和不可言太和之絪緼語道者知此謂之知道論道者知乎是則可識隂陽之謂道學易者見此謂之見易學易者見乎是則為見隂陽之謂易不如是不若此雖有周公才美雖有周公之才之美其智不足稱也已不能知此見此安得謂之聰明聖智者乎太虛無形空虛之中初無形體氣之本體乃氣化本然之體段其聚其散或凝聚或消散變化之客形爾變者化之漸化者變之成客形言此形質後來方有一氣之初本無是也至靜無感寂然不動性之淵源乃是性禀之本原有識有知有識慮有知覺物交之客感爾與物交接其感生焉客感言此感動後來方有一性之初本無是也客感客形變化而為客形物交而為客感與無感無形與初然無所感無所形惟盡性者能一之惟聖人全盡此心之理則能合天人而為一也太虛不能無氣空虛亭毒之表惟有此氣氣不能不聚而為萬物此氣不能不凝聚而生萬物此自無而有也萬物不能不散而為太虛萬物不能常聚又復消散於無何有之鄉而為太虛此自有而復歸於無也循是出入者從此氣之出而發生者從此氣之入而消亡者皆不得已而然也皆氣使之然不得不然者也然則轉語辭聖人盡道其間聖人全盡其道位天地之中兼體而不纍兼有無二體而不纍於一偏者存神其至矣必其所存者神妙詣極其至而後能也彼語寂滅者彼談說空寂絶滅如佛老之徒者往而不返則知往而無不知返於有徇生執有者以生為生執滯有迹如世人之為者物而不化則泥物之有而不知化於無二者雖有間矣徇生執有者猶人道之不能無視寂滅者雖有異矣間去聲以言乎失道則均焉斷之以不知理氣之大本大原其實一而已氣坱然太虛隂陽二氣氤氲於太空之中坱暗上聲升降飛揚上騰下降運轉流動未嘗止息無時不然虛實動靜之機陽動而生故虛隂靜而成故實妙用由是而形故曰機隂陽剛柔之始陽主健故剛隂主順故柔定體由是而立故曰始浮而上者陽之清陽氣輕清而上浮指天而言降而下者隂之濁隂氣重濁而下降指地而言其感遇聚結感者氣之通遇者氣之合聚結氣之凝聚而成形也為風雨為風為雨為霜雪為霜為雪皆二氣感遇而成山川之融結以至山峙川流皆此氣之融結糟粕煨燼渣滓微細亦此氣之成就無非教也此句總結上文自風雨以下煨燼以上言隂陽二氣無大無小無精無粗皆至理之所寓也由太虛有天之名自輕清而上浮極空極逺者而言於是有天之稱由氣化有道之名自二氣變化生生不息者而言於是有道之稱合虛與氣有性之名合太虛與氣化付豫於人者而言於是有性之稱合性與知覺有心之名性者心之理知覺心之靈合而言之於是有心之稱鬼神者二氣之良能也氣之至而伸者為神氣之反而屈者為鬼良能自然而然莫之為而為也兩不立兩指隂陽兩之用不立則一不可見則一之體不可得而見一指太極不可見言太極隱於無也一不可見太極之體既不可見則兩之用息則隂陽之用亦止息矣兩體者隂陽之二體虛實也陽生故虛隂成故實動靜也陽虛故動隂翕故靜聚散也陽發散隂凝聚清濁也陽輕清隂重濁其究一而已究其極二氣之運只二氣之往來氣之長則為陽氣之消則為隂也遊氣紛擾氣遊行於天地間紛擾不齊合而成質者合聚而凝成形質生人物之萬殊則人物萬殊所以生也其隂陽兩端隂陽二氣循環不已者推移不窮如環之轉立天地之大義天地大經所以立也遊氣紛擾緯也隂陽循環經也朱子曰隂陽循環如磨遊氣紛擾如磨中出者晝夜者天之一息乎日之出為晝日之沒為夜一晝一夜乃天運之一小周息也寒暑者天之晝夜乎春而夏為暑秋而冬為寒一寒一暑乃天運之一大晝夜也天地春秋分而氣易天道之運春陽秋隂氣於此而變易猶人一寤寐而魂交如人醒睡之間魂與魄交魂交成夢魂交於魄遂成夢寐百感紛紜夢寐之中百般感遇紛擾不定對寤而言對覺而言一身之晝夜也睡則為夜覺則為晝是即一身之晝夜氣交為春氣之交感於時為春萬物揉錯萬物流形生生化化揉雜不齊對秋而言至秋則斂華就實天之晝夜也春而生則是天之晝也秋而成則是天之夜也氣本之虛隂陽二氣其初皆本於太虛湛本無形湛然寂然未有形體感而生則聚而有象交感而生物則凝聚成形而有象有象斯有對既有形象必有對待對必反其為有對待必相反雌之與雄其類不同如晝之於夜也有反必有仇相反必為仇敵仇必和而解仇必以和諧而解故愛惡之情以是知在人為愛惡之情惡去聲同出於太虛皆出於太虛之氣卒歸於物欲其終也歸於物欲倐而生倐然而生長忽然而成就忽然而成就不容有毫髮之間不容有毫髮之間斷間去聲其神矣夫感應之速其神妙有如此夫造物所成人物並生皆大造變化之所成就無一物相肖者一物各具一體無有相肖似者以是知萬物雖多以此知物雖萬殊其實一物其實一本無無隂陽者無一物無隂陽者以是知天地變化二端而已以此知得天地中間變變化化只是隂陽不過二者而已萬物形色萬殊之類自形自色神之糟粕不過上天神化之粗迹性與天道云者人所禀受為性所從禀受為大道易而已矣皆一隂一陽變易而為繼善成性之妙心所以萬殊者人心之大靈應萬事感外物為不一也皆感物而動所以有百千變之不一也天大無外天大而無不包其為感者其所以感應者絪緼二端而已皆太和渾合自然而然也參兩篇第二此篇論天地隂陽常變之道隂陽之精隂陽之氣互藏其宅隂根陽陽根隂互居其所各得其所安各有定位日月之形日陽月隂麗於有形萬古不變萬古如此若隂陽之氣至如隂陽之氣則循環迭至如環之運此來彼往此往彼來聚散相蕩或聚或散交相摩蕩升降相求或升或降交相感應絪緼相揉絪緼天地合氣也交相揉雜蓋相兼相制相並而行相克而成欲一之而不能欲齊之而不可得此其所以屈伸無方此其或屈或伸了無方所運行不息運行天地無有止息莫或使之初非有以使之然也不曰性命之理氣非理不行有理以為之主謂之何哉又安能周流而不窮耶隂性凝聚隂之性主於凝結而翕聚陽性發散陽之性主於發達而散布隂聚之然隂聚之極陽必散之陽氣必有以發散之其勢均散其勢同歸於散陽為隂纍陽方發散隂又凝合以纍之則相持為雨而降則二氣相挾為雨而下隂為陽得隂方凝聚陽得以鼓動之則飄揚為雲而升則飄飛奮揚為雲氣而起故雲物班布太虛者此所以雲氣分列於空中者隂為風驅斂而未散者也風屬陽皆隂氣為風所驅逐不能散故如此也凡隂氣凝聚故凡隂氣之凝結陽在內者不得出陽在隂中不能出則奮擊而為雷霆則擊裂而為雷之聲陽在外者不得入陽在隂外不能入則周旋不舍而為風則運轉不已為風之飄舍上聲其聚有逺近虛實是氣之聚或逺或近或虛或實故雷風有小大暴緩氣之聚逺而實故雷風大且暴氣之聚近而虛故雷風小且緩和而散則為霜雪雨露隂陽和合而解散則為霜為雪為雨為露不和而散則為戾氣曀霾隂陽不和合而解散則為乖戾之氣為昏曀為隂霾隂常散緩隂氣常弛散而舒緩受交於陽受陽氣之交合則風雨調風雨調順寒暑正當寒而寒當暑而暑得其正矣天道篇第三此篇論天道感通自然之理天道四時行百物生天道不言四時自行百物自生無非至教不以言為教故為至教聖人之動聖人與天為一致故於舉動之間無非至德無非至德之所形夫何言哉又何事於聲色之末哉天體物而不遺體物言為物之體也蓋物物有個天理體之而無所遺猶仁體事而無不在也正猶事事是仁做出來體之而無不在禮儀三百禮儀經禮也三百言其多也威儀三千威儀曲禮也三千言其多也無一物而非仁也禮丈大小無非愛敬懇惻之所發見者故無一物而非仁昊天曰明天道昭明及爾出王及爾出而有所往之方王音往昊天曰旦旦亦明也及爾遊衍衍寬縱之意及爾遊而寬縱之地無一物之不體也凡人往來遊息之所此理無往而不在因是以證體物不遺之義上天之載上天之道有感必通初無安排布置有所感則必能通聖人之為聖人所為之事得為而為之也初無勉強矯揉可以為則為天不言而四時行天本無言四時順布聖人神道設教而天下服聖人之道神妙無迹故推以化民無為而民自化誠於此此惟正心修身於上動於彼彼自感動變化於下神之道歟此聖人神化之道也天不言而信天本無言四時運行確然不易信也神不怒而威神妙不惻赫赫在上匪怒而威誠故信天令推移真實無妄故能信無私故威天道生殺至公無私故威運於無形者謂之道運行於上者本無形體是之謂道形而下者不足以言之形而下者未免麗於形體則器而已矣不可以道言也鼓萬物而不與聖人同憂天道運行於上鼓動萬物聖人雖擬天地而參諸身則有憂民之心天何憂焉天道也惟其不與聖人同憂此天道之自然也聖不可知也聖則不可測度無心之妙至於聖則博萬物而無心非有心所及也是豈容心計較者所可得而企及哉天視聽以民天之視聽皆因民之視聽明威以民天之顯顯可畏因民之顯顯可畏故詩書所謂帝天之命詩言帝命書言天命其實一也主於民心而已焉皆本於民情而止耳世人知道之自然衆人雖皆知道非可以勉強為未始識自然之為體爾而所以不待勉強自然之本體則衆人由之而不知也神化篇第四此篇論聖人神化不測之妙神天德神妙不測者天之德也化天道變化不窮者天之道德其體神妙者不可窺故為體道其用變化者尚可測故為用一於氣而已然天之為天皆一氣運行而已虛明昭鑒清明洞徹昭晰鑒照神之明也此至神之明者也無逺近幽深無逺無近無幽無深利用出入順於致用或出或入神之充塞無間也此神之無方充塞上下無間隔也間去聲大可為也德之大者猶顔子具聖人之體尚可為也大而化大而至於化則造於不可知之域不可為也非至於聖者不能為也在熟而已亦在乎工夫純熟則自能從容而中矣易謂窮神知化神者妙萬物而無方化者著萬物而有迹易言窮神知化是窮理盡性以至於命乃德盛仁熟之致非聖人德盛仁熟不能至也非智力可強也又豈専尚智力所可勉強而得哉如顔子既竭吾才所立卓爾雖欲從之末由也已正此是也大而化之德大而化聖也不勉而大也是無所勉強其德自大不已而天積而不已則與天一則不測而神矣聖人不可知之謂神先後天而不違先天後天皆不違此理順至理以推行順天理而行知無不合也自無不合於天雖然轉語辭得聖人之任者任者能負荷聖人所當為之事伊尹是已有其德而當其事皆可勉而至亦可勉力以求至聖人之地猶不害於未化爾雖未至於化不害其為聖大哉聖矣德之大者近乎聖人化則位乎天德矣大而至於化則上達天德而為聖人矣無我而後大我己私也能克夫己私則其德自大大成性而後聖德既大矣性焉安焉是謂聖也聖位天德聖人地位達天德不可致知謂神不可測度而知是之謂神故神也者故神之為言聖而不可知即聖而不可測度之謂也精義入神研精義理微妙入神事豫吾內事理素定於內求利吾外也則施於外者無不順知之功也利用安身順於致用以安其身行之功也素利吾外所用既順於外致養吾內也則養於內者益以厚內外交養則知行並進窮神知化神者妙萬物而無方化者著萬物而有迹窮神知化蓋窮理盡性以至於命乃養盛自至是則知行交養德盛所致非思勉之能強非思之所能得非勉之所能至強上聲故崇德而外故精義以致其用利用以崇其德自崇德之外君子未或致知也則有所不容致其力故曰過此以往未之或知也徇物喪心逐乎外物失其本心喪去聲人化物而滅天理者乎是人心為物欲所變移而天理滅亡存神過化所存者神妙不測所過化者去不留滯忘物纍而順性命者乎不為物欲所纍則能安性命之正者也敦厚而不化篤厚固守而不能變化有體而無用也能敦厚是有體不能變化是無用化而自失焉化而失其化之道徇物而喪己也乃化於物而失其己之善大德敦化德之大者所化者厚然後仁知一而聖人之事備仁為四端之首始條理事也知居四端之末終條理事也惟聖人集大成始終條理仁知之道盡聖人能事畢矣性性為能存神性性猶言盡性也能盡性而不失其性則胸中所存者皆神妙物物為能過化物物猶言物各付物也能物物而不滯於物則所過者與之俱化無我然後得正已之盡克去己私則修身之道盡矣存神然後妙應物之感所存者神然後能應事接物而妙於無迹範圍天地之化而不過範為鑄金之模範圍匡廓也天地之化無窮聖人範圍天地之化使不過於中道過則溺於空過於中道則溺於空虛淪於靜淪於寂滅既不能有夫神既不能窮理以致其知又不能知夫化矣則不能盡性以知天命矣動物篇第五此篇說人物化生之妙物之初生凡物之生自少以至壯氣日至而滋息氣日至而進故滋長生息滋息言生而就滿也物生既盈凡物之生自壯而至老氣日反而遊散氣日反而退故遊往而消散遊散言消而就盡也至之謂神日至而伸則謂之神以其伸也以其生意之方達也反之為鬼日反而歸則謂之鬼以其歸也以其生意之將盡也氣於人生而不離是氣在人於其生也不離其體死而遊散者魂於其死也遊散於外是曰魂屬陽聚成形質凝聚成形雖死而不散者謂魄以至於死定體不易是曰魄屬隂有息者根於天指動物也動物屬陽賦命於天故云根於天動者亦有止息之時故云有息鳥獸之類是也不息者根於地指植物也植物屬隂質具於地故云根於地植者常常如此故云不息草木之類是也根於天者不滯於用本乎天者惟其動而不居所以不滯其用根於地者滯於方本乎地者惟其靜而植也所以每滯於一方此動植之分也此動物植物之所以分也生有先後人之生也先者為長後者為幼所以為天序此所謂得於天者自然之倫序小大髙下有小大則有髙下相並而相形焉相與並立粲然有文以著見是謂天秩此其秩然不可紊之禮無非天也天之生物也有序上天生物皆有不可易之序物之既形也有秩物之既生則當有不可紊之禮知序然後經正知有長幼之序則大經以正知秩然後禮行知有此禮而後遜以行之寤形開而志交諸外也人之睡既覺則形神開爽而心與物接寤音悟夢形閉而氣専乎內也夢則形神昏閉而氣守其宅寤所以知新於耳目覺則所見所聞得於耳目者而一新夢所以緣舊於習心夢則多緣舊事得於此心之習熟者誠明篇第六此篇論性有差等之殊誠明所知實理存於內則明見洞於外自誠而明生而知之者也乃天德良知皆天德清明曰良知非聞見小知而己非若常人有所聞有所見而後知茍以聞見而知則亦淺近而已矣義命合一存乎理當為而為之謂義天付一定之謂命義命雖二者其實一理也仁智合一存乎聖善無不包之謂仁明無不通之謂智智仁兼盡則可以為聖動靜合一存乎神靜則寂然不動動則感而遂通動靜相倚感應不測可以言神矣隂陽合一存乎道一隂一陽運行不息則謂之道性與天道合一存乎誠性實理也天道亦實理也合而言之則為誠自明誠自明以至於誠由窮理而盡性也是自窮究事物之理以全盡吾性之實理者也自誠明自誠而及於明由盡性而窮理也是全盡吾心之理則於事事物物之理自無不照也性者萬物之一原性者人物所同得於天之理故云一原非有我之得私也非天獨付於我也惟大人為能盡其道惟大德之人能盡己之性以盡人之性是故轉語立必俱立己有所立必欲夫人以俱立禮之幹也知必周知己有所知必使夫人以周知智之用也愛必兼愛使人皆得所愛仁之施也成不獨成使人皆有所成義之遂也彼自蔽塞彼或蔽塞而不通而不知順吾理者不知所以順乎理則亦末如之何矣則亦無如之何上達反天理君子上達反天理則所趍日以髙逺下達徇人欲小人下達徇人欲則所趍日以沈溺湛一氣之本湛而不濁一而不雜者氣之本體也攻取氣之欲飲食臭味之需而營求攻取於外者氣之動於欲者也口腹於飲食口與腹之欲飲食鼻口於臭味鼻之於臭口之於味皆攻取之性也皆氣質之性營求攻取於外也知德者屬饜而已屬饜飫足也君子知德之本故凡飲食臭味才取足而已不以嗜欲纍其心不以嗜好之末而纍此心之本不以小害大末喪本焉爾如孟子所謂毋以小害大賤害貴是也盡其性全盡在己所禀受之性能盡人物之性則亦能全盡人物所禀受之性蓋人物之性與已一也至於命者推而上之又窮至在己所從禀受之天命亦至人物之命則亦窮至人物所從禀受之天命蓋人物之命亦與己一也莫不性諸道無不性具此道命諸天命之於天我體物未嘗遺我有此理萬物亦有此理理具於萬物之中未嘗有一之或遺物體我知其不遺也萬物之理即我之理理具於也吾身之中知其皆偹而不遺此體字與天體物仁體事之體一般至於命推而極於天命所在然後能成己成物而後能始於成己終於成物不失其道皆不失此道也性於人無不善是性在人無有不善是為天地之性繫於善反與不善反而已若有氣質之性則關繫夫人能反與不能反而已反者克而治之以復其初也過天地之化天地之化初無過差或不能復其本然之性則為過天地之化矣不善反者也此不善反其性之正也命於人無不正天之命於人者無不各得其正繫其順與不順而已亦關係夫人能順受其正與不能順受而巳順者素其位而行之不敢有所拂違也行險以僥幸若小人専行險以冀僥幸於萬一不順命者也是不能順受其正者也形而後有氣質之性天命流行賦豫萬物本無非善所謂天地之性也氣聚成形性為氣質所拘則有純駁偏正之異所謂氣質之性也善反之則天地之性存焉然人能加克治之功則天地之性復全矣故氣質之性故氣質之為性君子有弗性者焉君子不以為性蓋不徇乎氣質之偏必欲復其本然之善朱子曰天地之性専指理而言氣質之性則兼理氣而言又曰性譬之水本皆清也以净器盛之則清者愈清以汚器盛之則濁者愈濁澄治之則本然之清未嘗不在也德不勝氣義理與氣質相為消長德不能勝夫氣性命於氣則氣為之主理為之賔而性反聽命於氣德勝其氣德足以勝夫氣性命於德則德為之主氣為之賔而性乃聽命於德窮理盡性窮萬物之理而盡一已之性此學問之極功則性天德則杳𡨕渾化義理昭融所性者即天之德命天理所命者即天之理尚何氣禀之為纍氣之不可變者夫氣有定數而不可移者獨死生修夭而已獨有死與生夀與不夀而已矣纎惡必除惡雖小而必去善斯成性矣則無有不善斯全其本然之天察惡未盡惡雖已察而未能盡去雖善必粗矣雖已為善然未至於全本然之天猶為粗疏也莫非天也人之氣質不齊要皆禀於天也陽明勝則德性用陽明而隂暗陽清而隂濁禀陽之多者則明而不暗故德性用隂濁勝則物欲行禀隂之多者濁而不清故物欲行領惡而全好者若夫領物欲之惡而不得行全德性之好而盡其用者其必由學乎必須由學所謂雖愚必明柔必強也大心篇第七此篇論心大則可體天下之物理大其心則能體天下之物體猶察也認也開廣其心則能心潜於事物之中而究見其理物有未體於事物之理未能體察則心為有外是此心猶未能大而無外世人之心世俗衆人之心止於見聞之狹拘於所見所聞之偏狹故不能體天下之物聖人盡性聖人盡己之性以盡人物之性不以見聞梏其心不以所見所聞者纍於其心故其心大而無外其視天下無一物而非我泛觀天下之中無一物之理不具足於吾心孟子謂盡心則知性知天以此孟子云盡得此心之理則可知性而知天正是此意天大無外蓋無一物而非天故天大而無外故有外之心人之心茍猶有外不足以合天心則與天心不相似矣此言萬物一體性本無外人惟拘於耳目之褊狹則私意蔽固藩籬爾汝莫能體物而不遺惟聖人能盡此性而心之大也無不包故其視物與己本無間然所以能與天合其心也見聞之知得於所見所聞而知者乃物交而知乃因與物交接而後知知之小也德性所知性藴是德則光明透達其所謂知不萌於見聞初不根於所見所聞而或以見聞為知知之狹者耳釋氏妄意天性佛氏妄指天性而不知範圍天用範圍猶裁成也聖人盡性故能裁成天地之道佛氏不知裁成之用則是未嘗知性也反以六根之微且謂眼耳鼻舌身意為六根用緣天地悉本天地明不能盡言六根起滅無有實相則誣天地日月為幻妄則誣罔天地日月等為幻妄蔽其用於一身之小拘此身之小則蔽其用而不能推溺其志於虛空之大樂虛空之大則溺其志而不能反此所以語大語小故其語大語小流遁失中展轉流遁皆失其中其過於大也其言空虛過於大塵芥六合則曰六合在虛空中微塵芥子耳六合上下四方其蔽於小也其言人世過於小夢幻人世則曰一切有為法如夢幻泡影謂之窮理可乎謂其能窮究事物之理乎不知窮理事物之理不能窮究而謂之盡性可乎謂其能全盡天命之性可乎謂之無不知可乎既不能全盡天命之性謂其於性天無所不知可乎塵芥六合視六合為微塵芥子謂天地為有窮也是以天地猶且有窮夢幻人世視人世為夢幻泡影明不能究其所從也是以人世有起滅皆為幻妄莫知所從來也性理羣書句解卷十二
