body:
  text: 性理羣書句解卷十四宋熊節撰熊剛大注書皇極經世書邵伯溫曰至大之謂皇至中之謂極至正之謂經至變之謂世大中至正應變無方之謂道此依文公所取見於文集語録者類而集之觀物篇言太極動靜生隂陽在天以氣言故以隂陽太少分四象在地以質言故以剛柔太少分四象康節先生天生乎動者也未有天地先有太極天陽也生於太極之動地生乎靜者也地隂也生於太極之靜一動一靜交而天地之道盡之矣動與靜交靜與動交天地之道盡在此矣動之始則陽生焉動者為陽故動之初則陽生動之極則隂生焉然動不能常動動之極則必靜靜者為隂故隂生一隂一陽交而天之用盡之矣隂陽相交而天之用盡在是矣在天為氣故以隂陽言靜之始則柔生焉靜者為隂柔亦屬隂故靜之初則柔生靜之極則剛生焉然靜不能常靜靜之極則必動動者為剛故則生一柔一剛交而地之用盡之矣柔剛相交而地之用盡在是矣在地成形故以柔剛言動之大者謂之太陽動之盛則為太陽動之小者謂之少陽動之微則為少陽靜之大者謂之太隂靜之盛則為太隂靜之小者謂之少隂靜之微則為少隂而天之體盡之矣立天之道曰隂與陽因動靜之小大而分隂陽太少天之體盡於此矣靜之大者謂之太柔靜之盛則為太柔靜之小者謂之少柔靜之微則為少柔動之大者謂之太剛動之盛則為太剛動之小者謂之少剛動之微則為少剛而地之體盡之矣立地之道曰柔與剛因動靜之小大而分剛柔太少地之體盡於此矣體即道之謂也觀物篇此篇言人為衆物之宗聖為衆人之宗故統理羣倫代天行事人亦物也人雖與萬物不同然亦天地一物也聖亦人也聖人雖與人異亦人而已矣有一物之物物止一物物之小者有十物之物能兼十物過於一物矣有百物之物能兼百物過於十物矣有千物之物能兼千物過於百物矣有萬物之物能兼萬物過於千物矣有億物之物十萬為億能兼億物過於萬物矣有兆物之物十億為兆能兼兆物過於億物矣為兆物之物茍其能兼乎兆物豈非人乎是必人之一身萬物皆備於我者也有一人之人一人之人人之小者有十人之人能兼十人優於一人矣有百人之人能兼百人優於十人矣有千人之人能兼千人優於百人矣有萬人之人能兼萬人優於千人矣有億人之人能兼億人過於萬人矣有兆人之人能兼兆人過於億人矣為兆人之人茍其能兼乎兆人豈非聖乎是必聖人一身冠羣倫首出庶物者也是知人也者乃知生而為人物之至者也靈於萬物故為物之至聖也者所謂聖人者人之至者也異於衆人又為人之至物之至者必為物之至始得謂之物之物也方可言衆物之中出乎物者人之至者必為人之至始得謂之人之人也方可言衆人之中優於人者夫物之物者夫處衆物之中而出乎物至物之謂也非常物之可言人之人者處衆人之中而髙乎人至人之謂也非常人之可言以一至物以此人也而當一至人得此聖也則非聖人而何非所謂聖人乎人謂之不聖人或曰未聖則吾不信也吾不信之矣何哉是如何謂其能以一心觀萬心蓋其天德清明觸處洞照能以一人之心而觀萬人之心一身觀萬身以一人之身而觀萬人之身一物觀萬物由一物之微以究萬物之理一世觀萬世焉於一世之間洞察萬世之事又謂其能以心代天意又言其實天生德代天行化天無聲臭可聞聖心所發即天意之所形口代天言聖語所宣即天言之下布手代天工舉措之間隂陽寒暑自其手出蓋代天而治天工也身代天事者焉宰制之下生殺豫奪自其身出蓋代天而行天事也又謂其能以上順天時又言其上律天時下盡地理下襲水土中盡物情中則遂萬物之情通照人事者焉至於人事無不洞燭又謂其能以彌綸天地彌縫經綸天地之化出入造化出入造化之神進退今古酌今之宜行古之道進退不失其正表裏人物者焉成已成物合內外之道噫嗟嘆聖人吾不得而目見之也聖人不世出吾不得而見之矣雖然轉語吾不得而目見之吾雖不可得而目見察其心察聖人之心觀其迹觀聖人之迹探其體探聖人之體潛其用藏聖人之用雖億萬年亦可以理知之也雖歷年時之久以理推尋則可知也觀物篇此篇論上天盡物以春夏秋冬為四府聖人盡民以易書詩春秋為四府易曰周易云窮理盡性以至於命窮究事物之理則能全盡此心之理能全盡此心之理則至於與天命而無間所以謂之理者凡所言理者物之理也是以事物之理言也所以謂之性者凡所言性者天之性也是以上天所賦性言也所以謂之命者凡所言命者處理性者也區處理性而付於人物也所以能處理性者所以能區處理性而付於人物者非道而何又只是一隂一陽之謂道流行付與之也是知道為天地之本乃知天地以道為本天地為萬物之本萬物以天地為本以天地觀萬物即天地觀萬物則萬物為萬物萬物乃天地之所生只見其為數以道觀天地若以道視天地則天地亦為萬物則天地亦在道之中亦為道中之萬物道之道道之為道盡之於天矣天以之化生萬物故盡之於天天之道天之所謂道盡之於地矣地順天而行故盡之於地天地之道合天地之所謂道盡之於物矣萬物於此資生資始故盡之于物合天地萬物之道天地萬物之道合而為一盡之於人矣盡人物之性以全天地之性人之一身兼而有之人能知其天地萬物之道人能察天地萬物之所謂道所以盡於人者所以全盡於人之性然後能盡民也由是推而闡之使民各盡其性謂之盡民天之能盡物天之道能盡之于物則謂之曰昊天昊大也則名之為昊天人之能盡民人之道能盡之于民則謂之曰聖人是為聖人謂昊天能異乎萬物天之道與萬物一謂昊天與萬物異則非所以謂之昊天也則不得為昊天矣謂聖人能異乎萬民聖人之道與民一言聖人與萬民異則非所以謂之聖人也則不得為聖人萬民與萬物同民與物聖人固不異乎昊天者矣聖與天一然則轉語聖人與昊天為一道聖人與天同為一道聖人與昊天為一道聖人與天既同一道則萬民與萬物則民與萬物亦可以為一道也亦不外乎此一道一世之萬民一世之衆民與一世之萬物及一世衆物亦可以為一道既不外乎此一道則萬世之萬民則萬世衆民與萬世之萬物及萬世衆物亦可以為一道也明矣亦不外乎此一道也曉然矣夫昊天之盡物昊天之道盡之于物聖人之盡民聖人之道盡之于民皆有四府焉府者歸藏之地皆有四者焉昊天之四府上天所謂四府者春夏秋冬之謂也指四時言也聖人之四府聖人所謂四府者易書詩春秋之謂也指四經言也春為生物之府春主生故為萬物滋生之府夏為長物之府夏主長故為萬物長茂之府秋為收物之府秋主斂故為萬物收斂之府冬為藏物之府冬主殺故為萬物歸藏之府號物之庶謂之萬言物之衆則曰萬雖曰萬之雖曰萬殊又萬其庶又有萬其衆能出此昊天之四府者乎萬物生長收藏能外昊天之四府耶易為生民之府易三皇事業皇之時如春故為生民之府書為長民之府書五帝事業帝之時如夏故為長民之府詩為收民之府詩三王事業王之時如秋故為收民之府春秋為藏民之府春秋五伯事業伯之時如冬故為藏民之府號民之庶謂之萬言民之衆則曰萬雖曰萬之雖有萬不同又萬其庶又有萬其衆能出此聖人之四府者乎萬民之生長收藏能外聖人之四府邪昊天之四府時也天之所謂四府者以時聖人之四府經也聖人之所謂四府以經昊天以時授人天則以時而授乎人聖人以經法天聖人則以經法乎天天人之事曰天與人之事當如何哉其當何如耶觀物篇此篇論皇化民以道帝教民以德王勸民以功伯率民以力四者不同三皇同意而異化三皇伏羲神農黃帝也其治則同其意而異其化同意而異化者必以道雖是同意異化然皆不出此道以道化民者夫惟以道而化天下之民民亦以道歸之而天下之民亦以是道之名歸之皇故尚自然故所尚者自然之化夫自然者夫所謂自然者無為無有之謂也不待制作無所為無所有之稱也無為者非不為也無所為者非是不為也不固為者也無必為之心也故能廣故道極其廣無有者非不有也無所有者非是不求有也不固有者也不必然以為有也故能大故道極其大廣大悉備廣大之道兼該而不固為固有者既不容心於有為又不必然以為有其唯三皇乎其三皇之治乎是故轉語能以道化天下者知以此道化天下之民天下亦以道歸焉天下之人亦以道之名歸於皇所以聖人有言曰是以聖人有云我無事而民自冨我無所事而民自殷阜我好靜而民自正我崇清靜而民無不正我無欲而民自朴我無所欲而民自淳朴其斯之謂歟此之謂也五帝同禮而異教五帝少昊顓頊髙辛堯舜也同其禮文而其教則異同禮而異教者必以德雖是同禮異教然皆不外此德以德教民者夫惟以德而教天下之民民亦以德歸之而天下之民亦以是德之名歸於帝故尚遜故所尚者禮遜夫遜也者夫所謂禮遜者先人後已之謂也先乎人後乎己也以天下授人而不為輕以天下之大傳之他人不以為輕若素無之也如非己所素有者受人之天下而不以為重受天下之大於人不見其重若素有之也如己所素有者二者指堯舜言若素無素有者授於人則若素無受於己則若素有謂不已無不己有之也言若素無則是不以為己有若素有則是不以為己無若己無己有一若己之無一若己之有則舉一毛以取與於人凡舉一毛之輕以授受於人猶有貪鄙之心生焉與之者猶有吝心得之者猶有貪心而况天下者乎况於天下之大授之者無吝心得之者無貪心真難得也能知天下之天下蓋亦知夫天下者乃天下之天下非已之天下非一己之得私其唯五帝乎必五帝方能至是是故轉語能以德教天下者知以德教天下之民天下亦以德歸焉而天下之民亦以是德之名而歸之於帝所以聖人有言曰所以聖人有云垂衣裳而天下治垂衣垂裳天下自治蓋取諸乾坤法諸乾坤蓋取諸上下之義也其斯之謂歟斯之謂也三王同形而異勸三王禹湯文武也治象同其形著而異其勸民之方同形異勸者必以功雖是同形異勸然皆不出此功以功勸民者夫惟以功而勸天下之民民亦以功歸之而天下之民亦以是功之名歸之王故尚政故所尚者政夫政也者夫所謂政者正也正之理也以正正夫不正之謂也以吾之正正其不正者也天下之正天下之所謂正者莫如利民焉無若利天下之民天下之不正天下之所謂不正者莫如害民焉無若害天下之民能利民者正能利其民者則正則謂之曰王矣保民而王矣能害民者不正害其民則不正則謂之曰賊矣殘民財賊矣以利除害成湯放桀武王伐紂皆是以利民之心而除其害民者安有去王邪豈是無王乎以王去賊以興王之師去其害民之賊安有弒君耶豈是弒君乎是故轉語王者正也王之為言正也能以功正天下之不正者能以征伐大功正天下之不能正者天下亦以功歸焉天下之人亦以是功之名而歸之於王所以聖人有言曰所以聖人有云天地革而四時成天地變革而四時之序以成湯武革命湯革夏命武革商命順乎天而應乎人上順乎天心下應乎人心其斯之謂歟此之謂也五伯同術而異率五伯宋襄秦穆楚莊齊桓晉文也同其智而所以率民之道異同術異率者必以力雖是同術異率然皆不外乎力以力率民者夫惟以力而率天下之民而民亦以力歸之而天下之民亦以力之名歸之伯故尚爭故所尚者爭奪夫爭也者夫所謂爭者爭夫利者也專以利為爭也取與利不以義一取一豫惟冕利而不見義然後謂之爭而後方謂之爭小爭交以言爭之小者則交形言語大爭交以兵爭之大者則交動兵戈爭夫強弱者也爭強爭弱也猶借夫名焉者猶且假夫虛名謂之曲直謂己為直謂人為曲夫名也者所謂名者命物正事之稱也命於物正其事之稱利也者所謂利者養人成務之具也養乎人成其事之用名不以仁名非出於仁無以守業何以守己成之業利不以義利不出於義無以居功何以居已成之功民所以必爭之也此民鳥得不爭奪五伯者五伯之人借虛名以取實利者也不過欲借帝王之虛名以取天下之實利帝不足則王為帝不足則王王不足則伯為王不足則伯伯又不足為伯又不足則庸主矣則不過庸主而已若然則五伯不謂無功於中國如此則五伯亦不可謂無功於中國語其王則未也但語以王道則未也過庸主則逺矣若比之庸主則過之逺矣周之東遷周自平王東遷文武之功德文王武王之休功美德于是乎盡矣至此已竭盡無餘猶能維持二十四君尚能維持周家王室不絶猶線一脈綿綿不絶如縷四裔不敢屠害中原者四裔之人不敢侵害中國五伯借名之力也皆五伯假王室之名而有功也是故轉語能以力率天下者能以力而率天下之民天下亦以力歸焉天下之人亦以力之名歸之伯所以聖人有言曰所以聖人有云眇能視眇目之小者而尚能視跛能履跛足不正者而尚能履履虎尾履其危不嘻人凶而不至於傷人武人為于大君武勇之人能宣力於其君此蓋喻伯者雖是率民以力然尚足以維持王室於不墜伯之力居多其斯之謂歟此之謂也觀物篇此篇論皇帝王伯道德功力之異及今古事業皆可以世數論夫子事業不可以世數論善化天下者善於化天下之民者止於盡道而已不過盡其道而已善教天下者善於教天下之民者止於盡德而已不過盡其德而已善勸天下者善於勸天下之民者止於盡功而已不過盡其功而已善率天下者善於率天下之民者止於盡力而已不過盡其力而已以道德功力為化者合是四者而為自然之化乃謂之皇矣乃三皇之事也以道德功力為教者合是四者而為當然之教乃謂之帝矣乃五帝之事也以道德功力為勸者合是四者而為使然之勸乃謂之王矣乃三王之事也以道德功力為率者合是四者而為必然之率乃謂之伯矣乃五伯之事也以化教勸率為道者以此四者總歸於道乃謂之易矣易者三皇之事業也以化教勸率為德者以此四者總歸於德乃謂之書矣書者五帝之事業也以化教勸率為功者以此四者總歸於功乃謂之詩矣詩者三王之事業也以化教勸率為力者以此四者總歸於力乃謂之春秋矣春秋者五伯之事業也天地始則始焉滅地之始此同其始天地終則終焉天地之終此同其終始終隨乎天地者也或始或終惟隨乎天地而已夫古今在天地之間古往今來於天地之中猶旦暮也如旦則必暮暮復為旦以今觀今由今時以視今則謂之今矣則以今言可也以後觀今由後世而觀今則今亦謂之古矣則今亦為古矣以今觀古由今日而觀往古則謂之古矣則以古言可也以古自觀以往古而自視則古亦謂之今矣當古之時亦自謂之今是知古亦未必為古是知不特古之時可謂之古今亦未必為今不特今之世可謂之今皆自我而觀之也此皆自我而觀而謂之古今也安知千古之前又焉知千古之前萬古之後萬古已後其人不自我觀之也其人獨不由我觀之耶自古當世之君天下者自古出而為一世之君者其命有四其為命者凡四一曰正命第一則為正命謂得天命之正皇之事也二曰受命第二則為受命謂受傳襲之命帝之事也三曰改命第三則為改命謂易代而為君王之事也四曰攝命第四則為攝命謂已有正君攝行其命令伯之事也正命者謂之正命因而因者也因天命之屬我因以為君也受命者謂之受命因而革者也因傳襲之命革於我者也改命者謂之改命革而因者也改前代之命因而為君也攝命者謂之攝命革而革者也則又改而又改者也因而因者因其可因長而長者也正是陽長之時又長者也長上聲下同因而革者因之中有所改長而消者也則是長而又消之時也革而因者改而后有所因消而長者也則是既消而復長之時革而革者改而又改消而消者也則是既消之后又消之時也革而革者改而又改一世之事業也不過一時之事業革而因者改而后因十世之事業可為十世之事業因而革者因之中有所改百世之事業也又是百世之事業因而因者因其可因千世之事業也乃千世之事業可以因則因可因則因可以革則革可改則改其因革以道不以命萬世之事業其事業可著於萬世一世之事業事業僅止於一世非五伯之道而何此五伯以力逞者也十世之事業者事業可傳於十世非三王而何此三王以功勸者也百世之事業者事業可及於百世非五帝之道而何此五帝以德教者也千世之事業者事業著於千世非三皇之道而何此三皇以道化者也萬世之事業者至於事業及於萬世之逺非仲尼之道而何自非夫子天生聰明聖知道統之傳綿綿不已蓋未易以盡此是知皇帝王伯者是知曰皇曰帝曰王曰伯命世之謂也隨世而得名者也仲尼者如夫子者不世之謂也不世有者也人皆知仲尼之為仲尼人孰不知夫子之為夫子不知仲尼之所以為仲尼夫子之所以為夫子人不知也不欲知仲尼之所以為仲尼則己不欲知夫子之所以為夫子則可如其必欲知仲尼之所以為仲尼如欲知夫子之所以為夫子則捨天地將奚之焉非天地之大不足以名之人皆知天地之為天地人孰不知天地之為天地不知天地之所以為天地天地之所以為天地人不知也不欲知天地之所以為天地則已不欲知天之所以為天地之所以為地則可如其必欲知天地之所以為天地如必欲知其所以為天地則捨動靜將奚之焉則自動靜之外不足以觀之夫一動一靜者動為陽靜為隂一動一靜周流不滯天地至妙者歟乃天地之至妙處一動一靜之間指坤復言也坤隂方靜復陽未動於此一動一靜之間乃太極也天地人至妙至妙者歟天地本此以運化人心本此以復善豈非三才之至妙至妙者乎是故轉語知仲尼能盡三才之道者夫子盡此三才之道則夫子一太極也謂其行無轍迹也乃語其道運行無迹也猶太極之周流不滯也故有言曰故有云豫欲無言吾欲無所言又曰又云天何言哉天本無言四時行焉四時自行百物生焉百物自生此即太極主靜之意其斯之謂歟此之謂也性理羣書句解卷十四
