body:
  text: 性理羣書句解卷六宋熊節撰熊剛大注序論孟集義序此篇專言論語之書無非示人以操存涵養之要孟子之書無非訓人以體驗充擴之端文公先生論孟之書論語孟子二書學者所以求道之至要乃學者探討是道之要領古今為之說者自古及今為之訓解蓋已百有餘家不止百家然自秦漢以來由秦而漢儒者類皆不足以與聞斯道之𫝊以儒名者皆不足與語是道之𫝊授與音預其溺於卑近者陷溺於卑汙淺近之人既得其言而不得其意所知論孟紀載之言不得論孟紀載之意其騖於高逺者馳逐虛高曠逺之人則又支離踳駁又失之離散駁雜踳春上聲或乃并其言而失之或并論孟之言有所不知學者益以病焉學者愈以此為病宋興百年逮我宋興已及百年河洛之間河南伊洛之中有二程先生者出有明道伊川二程先生出然後斯道之𫝊有繼濂溪續孔孟不傳之緒二程能繼濂溪是道之𫝊其於孔子孟氏之心其於孔孟之心蓋異世而同符也世之相去雖異心之同若合符節故其所以發明二書之說故其推闡論孟之言言雖近而索之無窮言雖切近探索無盡指雖逺而操之有要指雖曠逺操亦有要使夫讀者俾誦讀是書者非徒可以得其言不徒然可知其言之近而又可得其意而又可窮其指之逺非徒可以得其意不徒然可窮其指之逺而又可以并其所以進於此者而得之又可因此而窮聖賢之所以由此而進於道者亦得之矣其所以興起斯文其興起是道開悟後學開明後進為學之方可謂至矣其言至矣極矣間嘗搜輯條流間或搜求采輯講論是書之條派以附於本章之次以附入逐章之下既又取夫學之有同於先生者又復取學於二程而說同於二程者與其有得於先生者與夫有得二程之說者若橫渠張公姓張名載字子厚橫渠其號也若范氏姓范名祖禹字淳夫二吕氏帝哲字原明大臨字與叔謝氏良佐字顯道游氏酢字定夫楊氏時字中立侯氏仲良字師聖尹氏焞字彥明凡九家之說凡其門人九家之言以附益之以此附入增而多焉名曰論孟精義名為論孟精義取其義理最精以備觀省以擬披閲而同志之士與我同志之人有欲從事於此者凡欲有事此書亦不隱焉亦罔所隱抑嘗論之抑嘗言此論語之書論語一書無所不包無不包貫而其所以示人者而所以昭示乎人者莫非操存涵養之要無非操存此念涵養其心之要道七篇之指孟子七篇之指意無所不究無不究極而其所以示人者而所以昭示乎人者類多體驗充擴之端率皆體驗於心充廣善端之道擴音廓夫聖賢之分夫孔子之聖孟子之賢其為分量其不同固如此其不等蓋若是然而轉語辭體用一源也體為用之藏用乃體之著同出一源顯微無間也顯乃微之達微乃顯之自本無間斷間去聲是則非夫先生之學之至苟非二程先生問學之極其孰能知之誰能知此嗚呼嗟哉茲其所以奮乎百世絶學之後此其所以出乎百代學絶之後而獨得夫千載不傳之傳也歟而得孔孟千年不傳之統而繼其傳也若張公之於先生如橫渠之於二程論其所至言其學力之至竊意其猶伯夷伊尹之於孔子吾意其如伯夷伊尹之於孔子其淺深雖有異均有得聖之名而一時及門之士一時及二程之門者考其言行論其言語德行則又未知其孰可以為孔氏之顔曽則又未敢決其誰可為孔子之弟子顔回曽參今録其言今采録其言語非敢以為無少異於先生不敢言不能不小異於二程而悉合乎聖賢之意而盡合乎孔孟之遺意亦曰大者既同亦推言大者既能同則其淺深疏密則淺之與深疏之與密毫釐之間小而一毫一釐之中正學者所宜盡心耳正為學之士當盡心推究至於近歲以來至於邇年以來學於先生之門人者學於二程之徒弟者又或出其書焉又或出示此書則意其源逺竊料其源派既逺未分醇醨異味而不敢載矣不分醇醲醨薄之異其味不復敢紀録或曰或人言然則轉語凡說之行於世而不列於此者凡講說之行於一世不復紀於是者皆無取已乎盡無所取而止乎曰不然也言不如此漢魏諸儒由漢至魏以儒名者正音讀正字音及句讀讀音豆通訓詁通訓繹語詁音户考制度考文物之制度辨名物及辨名數與方物其功博矣其功大矣學者苟不先涉其流為學者不能先涉歷其流則亦何以用力於此則又何以用功於是而近世一二名家近世一二大儒以學名其家與夫所謂學於先生之門人者及學於二程之徒弟者其考證推說其考驗證據推究師說亦或時有補於文義之間亦間有補於是書之文理意義學者有得於此而後觀焉為學者有得於是書而後覽其說則亦何適而無得哉又何往而無所得特所以求夫聖賢之意者但所以探求孔孟之意則在此而不在彼爾則在乎是不在乎考證推說也若夫外自託於程氏如外則自附於程氏而竊其近似之言而竊其相近相似之語以文其異端之說者以此文飾其異端之言則誠不可以入於學者之心則不可使為學者之入於心然以其荒幻浮誇但以其荒惑幻妄浮虛夸誕足以欺世也可以欺謾世人而流俗頗已歸鄉之矣而風俗浮靡略歸向心鄉從之矣鄉音其為害豈淺淺哉其流害豈不大耶顧其語言氣象之間看其言語氣象之中則實有不難辨者蓋有不難知者學者誠用力於此書而有得焉為學者能用功於是書至於有得則於其言則於異端之論雖欲讀之雖是欲誦讀之亦且有所不暇矣自有所不及矣然則轉語是書之作此論孟精義之作其率爾之誚其强率之譏雖不敢辭固不容避至於明聖傳之統至明聖人相傳之統緒采衆說之長采衆人講論之長折流俗之謬折倒流俗之謬說則竊亦妄意其庶幾焉竊謂妄謬之意其庶近得之矣乾道壬辰新安朱熹序程氏遺書後序言程氏遺書雜出門弟之手散亂無統多失其真此集二十五篇並録其實者右程氏遺書二十五篇明道伊川遺書凡二十有五篇二先生門人乃二程門弟子記其所見聞答問之書也記其親見親聞二先生師弟子相啓問之辭始諸公各自為書初門弟諸人各自為書以記其師之語先生沒而其傳寖廣逮二先生死而愈傳愈廣然散出並行但散亂而出並行於世無所統一竟無有統而一之者傳者頗以己意私竊竄易傳之者又以一己之私意改而易之歷時既久開歷日久殆無全編竟無全書熹家有先人舊藏數篇熹文公名文公父諱松官至吏部家有其舊所藏程子書數卷皆述當時記録主名皆述一時記録者之姓名語意相承言意相襲首尾通貫本末相貫蓋未更後人之手蓋未更歷後人之手故其書最為精善故其為書義精而辭善後益以類訪求後愈以其類搜求凡二十五篇得二十五篇因稍以所聞歲月先後因以其得於所聞年月先後第為此書次第而為此書篇目皆因其舊篇章綱目悉仍其舊而又别為之録如此又復别為之録以見分别次序之所以然者以見分别篇章前後次序之所以如此者然嘗竊聞之又嘗竊有聞於此伊川先生無恙時伊川先生當其無疾病時門人尹焞其門弟尹姓焞名得朱光庭所抄先生語録得先生門人朱姓字光庭者所録先生言語奉而質諸先生奉侍而質正於先生先生曰伊川云某在我尚在何必讀此書何須讀此若不得某之心如不得我之心所記者徒意耳所記者只是大意尹公自是不敢復讀尹焞自此不復敢讀夫以二先生夫以明道伊川二程先生唱明道學於孔孟既沒千載不傳之後倡道學於孔子孟子既死道統無所傳繼之後可謂盛矣亦云盛矣而當時從遊之士一時從二先生之遊者亦莫非天下之英材乂無非天下所稱英俊之才其於先生之嘉言善行其於二先生言論之美履行之善又皆耳聞目見而手記之又莫不得於親聞親見之頃而以手抄記其語冝其親切不差是冝體認親切於理不差可以行逺可以行諸逺而先生之戒而程先生之戒其門弟猶且丁寧若是尚且諄復如此豈不以學者未知心傳之要豈非以為學之人未知傳心之妙而滯於言語之間而泥於言辭之中或者失之毫釐或者失之雖特毫毛則其謬將有不可勝言者乎而其謬妄不止丈尋殆有不可盡言又况後此且數十年况乂後於此又是十數年區區掇拾於殘編斷簡之餘我乃收拾遺言於編殘簡斷之際傳誦道說傳誦其門人所載有道者之言玉石不分而不加訂正使玉與石有所分别而謂真足以盡得其精微嚴密之㫖謂即此可盡得二先生至精至微至嚴至密之意其亦誤矣其誤可知也已雖然轉語先生之學二程先生之為學其大要亦可知己大要所在亦有可知讀是書者讀此書之人誠能主敬以立其本茍能存主此敬以為之根本窮理以進其知窮究道理以廣其知識使本立而知益明使敬存而所知益精知精而本益固所知愈精其本愈立則日用之間見於日用常行之際且將有以得乎先生之心自有以得二程夫子之心而於疑信之傳而於傳聞疑信之間可坐判矣可以坐而辨别矣此外諸家外此又有數家所抄尚衆抄録尚多率皆割裂補綴類皆分裂補葺非復本篇非是此書之本篇異時得其所自來他日若識其所自傳處當復出之當重出焉以附今録以附今日之所録無則亦將去其重復否則又就其中去其文之重出者别為外書别作一集以為程氏外書以待後之君子云爾以俟後來之君子參考之耳戊午讜議序此篇專指秦檜和虜誤國之罪君臣父子之大倫君君臣臣父父子子之倫理天之經在天為經常而不可廢地之義在地為分義而不可踰而所謂民彞也是即降衷秉彝之初所謂仁於父子義於君臣是也故臣之於君臣之事君子之於父即子之事於父生則敬養之存則盡其敬以致其養沒則哀送之死則盡其哀以送其終所以致其忠孝之誠者孝於親忠可移於君其理則一當曲致其誠無所不用其極無所不致其極而非虛加之也非是虛加其禮以為不如是以為不若是則無以盡乎吾心云爾則不能盡我忠孝之心然則如此其有君父不幸君猶父也脫有不幸而罹於橫逆之故而遭悖逆不以理之事罹音離則夫為臣子者則夫身為臣子所以痛憤怨疾所以痛哭憤發怨恨疾惡而求為之必報其讐者求為君父必報讐敵者其志豈有窮哉其心安有窮已故記禮曰禮記有言君父之讐君之讎不與共戴天誓不與之共戴乎天寢苫枕干卧草枕盾如居喪之時示不忘也苫音覘枕去聲不與共天下也不與之同處於天下而為之說者曰而言者乃謂復讐者可盡五世報君之讎當期五代則又以明夫雖不當其臣子之身吾之世未及報生於吾世後者其身雖不為臣子而茍未及五世之外茍未出五世之外則猶在必報之域也尚在必報之地雖然此特庶民之事耳此不過衆百姓之事若夫有天下者如人君奄有天下之大承萬世無疆之統繼萬代無窮之統緒則亦有萬世必報之讎則亦有萬代必報之讎非若庶民五世不如衆百姓止於五代自髙祖至𤣥孫髙曽祖父已身親盡服窮而遂已也親絶服無而止國家靖康之禍國朝靖康年間之變二帝北狩而不還二君北出而不返臣子之痛憤怨疾臣子痛哭憤發怨詈疾惡仇敵雖萬世而必報其讎者雖是萬代必當報之蓋有在矣蓋有所在太上皇帝髙宗受命中興受天命為中興之主誓雪父兄之辱誓洗二帝之恥雖其間亦或為姦謀之所前卻雖其中亦有為奸佞之謀怨沮而或進或退而聖志益堅而君志愈堅決至于紹興之初至于紹興初年賢才並用賢人盡拔綱紀復張紀綱重振諸將之兵諸將所訓之兵屢以捷告常以克敵聞恢復之勢恢復疆宇之勢蓋已十八九成矣十分已有八九分成矣虜人於是始露和親之議以沮吾計虜人見其勢不可乃為和親之說以沮吾謀而宰相秦檜秦丞相歸自虜庭自虜還朝力主其事堅主和親之事當此之時於是之時人倫尚明君臣之倫猶明人心尚正人心之天猶在天下之人天下之衆無賢愚無賢者與愚者無貴賤無貴者與賤者交口合辭並口合言以為不可以為和議斷不可行獨士大夫之頑鈍嗜利無恥者獨有士夫頑愚魯鈍貪利無恥辱之人數輩起而和之數人起而主和親之說如孫近之徒清議不容清議不許詬罵唾斥罵詈斥辱詬音姤欲食其肉欲食附和議者之肉而寢處其皮而寢附和議者之皮則其於檜可知矣則其於主和議之賊檜可知而檜乃獨以梓宫長樂藉口梓宫君之喪長樂后宫以此二事藉口攘卻衆謀排斥衆人非和議之謀熒惑主聽變亂人主之聽然後所謂和議者於是和親之議翕然以定而不可破翕合一言牢不可破自是以來自此以來二十餘年又二十年國家忘仇敵之虜國家已忘仇虜之當報而懷宴安之樂而日享安平之樂檜亦因是藉外權以專寵利賊檜因此恃在外之權以專其寵祿竊主柄以遂其奸謀盜竊人主之柄以成其奸邪之計而向者冒犯清議向來不顧清議希意迎合之人承順檜意迎其機而與之投合者無不夤緣無不旁緣驟至通顯遽進顯官或乃踵檜用事或又躡檜之蹤行事而君臣父子之大倫君君臣臣父父子子之倫天之經天之經常地之義地之分義所謂民彝者所謂斯民彝常之理不復聞於搢紳之間矣不復能存於士夫之中搢笏紳帶士大夫狃於積衰之後士夫安於國勢積弱之後狃音紐徒見當時國家無事徒然見邦國無虞而檜與其徒而賊檜與附檜者皆享成功無後之思皆謂功已成而不為逺慮顧以忘讎忍辱遂以忘仇虜忍恥辱為事理之當然以為事理所當如此主議者慕為檜主和議者望為賊檜遊談者慕其徒遊士夫間聚議者望為賊檜之徒黨一雄唱之譬之禽獸一雄鳴之於先雄陽物也百雌和之羣雌和而起雌隂物也癸未之議癸未年間之論發言盈庭言者滿天子庭其曰虜世讎不可和者其謂虜人與國家世結讎隙不可與之和尚書張公闡張尚書謂四州不可割左史胡公銓而止耳胡左史謂和好不可成僅有此二人而已自餘蓋亦有謂不可和者外此亦有言不可與和者而其所以為說而其為言不出乎利害之間不能出乎和議利害之中又其餘又外此則雖平時號賢士大夫雖是平日衆稱為好士夫慨然有六千里為讎人役之嘆者慷慨發嘆欲直造虜庭六千里為邦家報讎一旦進而立乎廟堂之上一日顯擢朝廷之上此指周葵參政而言顧乃惘然而乃失志惘忙去聲如醉如幻猶昏醉夢幻幻音緩而忘其疇昔之言不復記前日之言語厥或告之其或有人言者則曰則云此處士之大言耳此閒處之士大言無當者也嗚呼歎語秦檜之罪賊檜之罪所以上通於天至於上達乎天萬死不足以贖者雖死萬遍不足以贖正以其始則唱邪謀以誤國正以其初則唱為不正之謀以誤二帝中則挾虜勢以要君中則通虜妄挾其勢以要人主之和要音邀使人倫不明俾君臣之倫理不明人心不正人心之正理泯滅而末流之弊而流弊之末遺君後親棄其君後其父至於如此之極也未有至是之極夫惟三綱不立惟其君臣父子夫婦之三綱不存是以衆志無所統繫是以衆心無以管攝而上之人上而人主亦無所慿藉以為安亦何所恃而能安此身斯乃有識之士此乃有識之人所為長慮却顧為之深思退省而凛然以寒心者凜凛然於心者而說者猶曰而言者猶謂姑以衆論之從違且以衆說之從與違而卜事理之可否而占事理之可與不可則今日士大夫是和者之多則今之士夫足和議者多蓋不下前日非和者之衆也蓋不減前時非和議者衆矣獨安得以前日之不可又安能以向者之不可和而害今日之可哉而壞今日可和之說哉嗚呼歎語是未知前日人倫之明是不知前日非和議者衆是前日君臣之倫明也而今日之不明今日附和議者衆是今日君臣之倫不明也前日人心之正前日非和議者衆是前日人心之正也而今日之不正也今日附和議者衆是今日人心之不正也且若必以人之衆寡為勝負且又欲以人之多少較輸嬴則夫所謂士大夫是和之多者則彼士夫是和議之衆又孰若六軍萬姓之為多耶又寧如六軍之衆萬姓之多今六軍萬姓之言今之六軍萬姓之言則是二公之言而已則以張尚書胡左史之言為是蓋君臣父子之大倫蓋君君臣臣父父子子之倫理天之經天之經常地之義地之分義而所謂民彝者所謂斯民秉彝之理其於世也有明晦世道雖有明有晦其在人也無存亡此理在人無存無亡是以雖當頽壞廢弛之餘雖是三綱陵夷國事廢弛之日邪議四起邪說四方而起無復忌憚不復有所顧忌畏憚而亦不能斬伐銷鑠使之無也然此理亦不為之戕賊晦蝕而無馬鑠音綽奈何不聽於此如何謀國者不此之從顧反決得失於前日所謂頑鈍嗜利無恥者之餘謀而乃問得失於頑愚遲鈍貪利無恥辱者之餘䇿此已墜之三綱此君臣已失之綱所以未能復振固不能復張已隳之萬事國家已廢之事所以未能復理又未能復治而上之人上而人主亦未能有所慿藉未能有所恃以成安彊之勢也以成治安强大之勢也今南北再歡今南朝與北地再歡洽中外無事內外無虞迂愚左見迂疏愚昧之僻見所謂萬世必報之讐者所言萬世當報之仇虜固已無所復發於口矣固不復出於口竊伏田間跧伏田里不勝憤歎不勝發憤歎息因讀魏元履所叙次戊午讜議因誦魏國録叙次讜議為之慨然流涕為之慨惜墮淚蓋傷其禍殃蓋傷其罹禍自此始也自此而發懷不能已所懷無盡姑論其始終梗槩如此且言其首末節概如是梗更上聲以發明元履所為叙次之意以發揮魏國録所以叙述之㫖并以致草野孤臣畢義獻忠之誠又以致草野之臣盡義獻忠之實謀國者儻有取焉謀國人臣有取於是則猶足以禆廟謀之萬一尚可以補人主深算萬分之一而非區區所敢望也又非我所敢覬望也通書序此篇叙濓溪傳道著書之由五峯胡先生通書四十章通書凡四十篇周子之所述也乃周氏子之所著作周子名惇頥周姓子者男子之通稱惇頤其名字茂叔茂叔其字舂陵人舂陵道州先生乃其郡之人也推其道學所自推究其傳道為學之所自或曰或人云傳太極圖於穆修也穆姓修名周子太極一圖得之穆修修傳先天圖於种放种姓放名先天一圖穆修又傳授於种放放傳於陳摶陳姓摶名种放又傳授於陳摶此殆其學之一師也歟學法無窮此特周子得於人者一事之師非其至者也非其極至之妙希夷先生即陳摶也有天下之願其始志在天下而卒與鳯歌荷蓧鳯歌即論語楚狂接輿歌鳯兮之歌荷蓧即子路遇丈人荷蓧之事蓧竹器二人皆古之隱者也借此喻陳摶終與歌鳯荷蓧之徒長往不來者伍求遁不出者並於聖人無可無不可之道其於聖人無所可無所不可之道亦似有未至者亦若有所未到處程明道先生程明道名皓字伯淳嘗謂門弟子曰嘗謂其徒曰昔受學於周子昔年從學於周濓溪令尋仲尼顔子所樂者何事使求孔子顔回平日所樂在何事而明道先生程先生自再見周子由再見周濓溪吟風弄月以歸見其胸襟灑落怡然自得吟詠光風飽揖霽月而歸道學之士學道之人皆謂程皓氏盡言程先生續孟子不傳之學繼孟軻氏不傳之絶學則周子豈特為种穆之學而止者哉則濓溪乃程先生之師又豈特傳种放穆修二人之學而已粵若稽古嘗順考之古孔子述三五之道夫子繼三皇五帝之大道立百王經世之法植百代經國之定法孟軻氏闢楊墨孟子闢去楊氏無君墨氏無父之教推明孔子之澤推演夫子垂世之澤以為萬世不斬以此為萬斯世相傳不可斬絶者人謂孟氏功不在禹下於是人推尊之以謂孟子闢楊墨之功不減於神禹治水之功今周子啓程氏兄弟以不傳之妙今濓溪開二程以太極不傳之藴一回萬古之光明回光明於萬古既蝕之餘如日麗天有如皎日之在天將為百世之利澤漙利澤為百世無窮之儒宗如水行地有如水行之在地中其功蓋在孔門之間矣濓溪之功蓋居於孔門之間人見其書之約也人觀通書四十章之簡而不知其道之大也而不知是道之大無不寓此見其文之質也人見通書四十章文之古而不知其義之精也而不知義理之精粹無不在此見其言之淡也人見通書四十章言語之淡而不知其味之長也而不知意味之深長無不具此顧愚何足以知之如我之愚昧何足以知此然服膺有年矣但佩服於胸次有年于兹試舉其一二語試舉書中之一二言為同志者啓豫之益乎為同有志於學者開我所得之益可乎患人以發策決科慮世之人以對策決收科第榮身肥家掇取髙官以榮其己以潤其屋希世取寵為事也希望於權勢取寵祿以為第一事也則曰則云志伊尹之所志伊姓尹名伊尹之心不在寵祿在於堯舜其君民患人以知識聞見為得而自畫也恐人以知識之明聞見之卓以謂道止於此而自止不待價而自沽也如美玉不待善價而沽賣則曰則云學顔回之所學顔姓回名學顔之學不以貧窶動其心而不改其樂人有真能立伊尹之志人茍能真是卓立伊尹之所志修顔回之學者修顔子之所學然後知通書之言而後知通書四十章之語包括至大包羅衆理實為至大而聖門之事業無窮矣而孔門事業施之無盡故此一卷書故此一卷四十章書皆發端以示人者盡發其端倪以昭示後人冝度越諸子冝超邁其他諸子直與易書詩春秋語孟同流行乎天下其功用實與周易尚書毛詩春秋論語孟子六經之書同行於萬世而不泯是以叙而藏之用叙其篇首珍而藏焉遇天下之善士常待天下之稱為善士者又尚論前修又能考論前哲而欲讀其書者則傳焉而思得其書而讀者則以是傳之無名公傳序此篇康節自序其樂天知命不為虛名所撓康節先生夫無名者夫所謂無名者不可得而名也雖欲以名名之不可得也凡物有形則可器大凡天下之物有一形必具一用可器斯可名既具一用斯得一名然則如此斯人無體乎此人獨無形體乎有形體則亦可名矣曰有體云亦有形體有體而無迹也但雖有形體而無迹可指何名之為斯人無用乎此人其無所用乎曰有用云亦有所用有用而無心者也但雖有用而無心於用何名之為夫有迹有心者夫有迹可指有心可窺斯可得而知也人皆得而知之此即可名無心無迹者無心可窺無迹可指雖鬼神亦不可得而知幽而鬼神亦不知之不可得而名既不可知則亦不可名况於人乎何况於人故其詩曰康節自言也故其詩云思慮未發此心之念慮未發即上文無心也鬼神莫知雖鬼神莫得而知不由乎我不在於己更由乎誰更屬於何人能造萬物者天地也造化萬物者天地天地有形可得而名也能造天地者太極也造化天地者是道之為也是道無形不得而名故統言之曰太極太極即至極之義也太極者太極之為太極其可得而名乎雖冇至極之義而無形可見何自而名可得而知乎名且不可得而知故强名之曰太極不得已强名之謂太極太極者太極云者其無名之謂乎其殆不可名而名者雖謂之無名可也故嘗自為之贊曰康節言自為己之贊云借爾面貌借爾以面貌之形假爾形骸假爾以肢體之身弄丸餘暇丸指先天圓圖也循環一圖無非隂陽消長之數康節一身㑹隂陽消長之理故云玩弄是圖雍容無事閒往閒來以心㑹隂陽之理而閒來往於是圖之中人告之以修福或人語之以修福之道對曰答曰未嘗為不善我不曽為不善之事何必修人告之以禳灾或人語之以禳謝之道對曰答云未嘗妄祭未嘗非鬼而祭何必禳故其詩曰故我又有詩云禍如許免人須諂人之禍可以覬免則皆諂媚於神爾福若待求天可量福若可得而求則天道亦可量度又曰又有詩云中孚起信寧須禱中孚易卦名也中心誠信自足以感孚何事乎禱無妄生災未易禳無妄亦易卦名也無自妄動天生災禍則未易禳性喜飲酒自言其性最好嗜酒嘗命之曰太和湯自名之謂太和湯以能使人滿懷春也所飲不多飲之亦不至多微醺而罷微微之醉即止醺音熏不喜過醉不喜過飲則失之醉故其詩曰故又為詩云性喜飲酒天性喜酒飲酒喜微酡飲酒之時只喜微醉酡音沱飲未微酡飲酒未至於微醉口先吟哦口先吟哦詩篇吟哦不足遂浩歌吟詠之不足遂至浩然長歌浩歌不足可奈何浩然長歌之不足其奈此情何所寢之室睡卧之房謂之安樂窩窩藏也以其宿藏於安樂之地窩音渦不求過美不求過於華飾惟求冬燠夏涼惟欲於冬則暖於夏則涼遇有睡思則就枕遇睡興來則就枕而睡故其詩曰故自為詩云牆髙于肩築牆其髙過于肩室大于斗一室之大差勝于斗布被暖餘以布為被暖體之餘藜羮飽後以藜為羮一飽之後氣吐胸中吐出胸中之氣充塞宇宙浩然充滿天地間其與人交其與人交接雖賤必洽雖至賤之人亦與之歡洽終身無甘㫖終一身無美味之奉未嘗作皺眉事然亦未嘗浪皺雙眉故人皆得其歡心故人人皆有歡愛之心見貴人見貴而有祿位者未嘗興奉未嘗起敬奉之心見不善人見不有善行之人未嘗急去未嘗便趨而避之見善人見有善行之人未之知也已未知之未嘗急合未嘗急與之合故其詩曰又為詩云風月情懷情懷軒豁猶風月然浩無邊岸江湖性氣性氣超逸如江湖然不可涯涘色斯其舉人不知己見其色則舉而逺之翔而後至人之即已則回飛審視而後集無賤無貧無賤者無貧者無富無貴無富者無貴者無將無迎不將順不逢迎無拘無忌不拘執不忌克聞人之謗未嘗怒聞他人之毁我未嘗加怒聞人之譽未嘗喜間他人之譽已未嘗加喜聞人言人之惡未嘗和聞人言他人之惡處未嘗和其言聞人言人之善聞人言他人之有善則就而和之則從而和其言又從而喜之又從而樂談之故其詩曰故為詩云樂見善人喜見為善之人樂聞善事喜聽為善之事樂道善言喜言為善之言樂行善意喜行為善之意聞人之惡聞他人之有惡如負芒刺如背負芒刃刺棘聞人之善聞他人之有善如佩蘭蕙如佩帶蘭蕙之二香草家貧未嘗饋于人家素貧未嘗有饋獻于人人饋之或他人有饋于己雖寡必受雖是不多亦必受之故其詩曰故為詩云窘未嘗憂雖窘乏未嘗致憂窘音謹飲不至醉雖飲酒不使至醉收天下春收天下春和之氣歸之肝肺盡歸吾肝肺之中朝廷授之官朝廷與之以官亦不强免不强求免亦不强起不强求起晚有二子晚年方有二子教之以仁義訓之以仁義之道授之以六經傳之以六經之學舉世尚虛談舉一世之間皆尚清議未嘗掛一言而吾獨無一清虛之語舉世尚竒事舉一世之間皆尚怪事未嘗立異行而吾獨無非僻之行故其詩曰故為詩云不佞禪伯不為美言以稱禪師不諛方士不為美言以頌方術之士不出户庭雖身常不出於户庭之間直游天地而此心直游於天地之外家素業儒家素來以儒為業口未嘗不道儒言口未嘗不稱道儒者之言身未嘗不行儒者之行身未嘗不行儒者之行故其詩曰故為詩云心無妄思此心無妄所思足無妄走此足無輕所動人無妄交於人不妄其交物無妄受於物不妄其受炎炎論之以一世炎炎之勢而論甘處其陋而我獨甘處於卑陋似若可愧綽綽言之以胸襟義理綽綽然有餘裕言之無出其右無人出於我之右羲軒之書伏羲黃帝之書軒轅氏黃帝也未嘗去手未嘗停披於手堯舜之談堯舜相授危微精一之語未嘗虛口未嘗絶吟於口當中和天當天氣中和之時同樂易友同樂道平易之友吟自在詩詩吟自在無所作為飲歡喜酒酒飲歡喜陶陶自樂百年升平自歷四朝不見兵革百年之內晏然太平不為不偶不為不遇其時七十康彊將及七十而筋力康壯不為不夀不為不得其夀此其無名公之行乎此皆無名公之行如此故自號曰無名公故以自號習鄉飲酒儀序此篇論鄉飲酒之禮教民相親相睦之道勉齊黃先生請賓介介賓之輔也主人請賓及其介陳器饌陳其器皿食饌獻賓介主人酌酒以獻賓及其介獻僎僎主之輔也又酌酒獻其僎僎音遵旅酬燕旅序也以次序相酬酢而燕六者禮之大節也此為禮之大節目者有六登降辭受一升一降一辭一受禮之文也此為禮之節文也鼎俎籩豆四者皆所以盛肉果等物禮之器也乃燕禮所取以為器也脯醢脊脅脯臘也醢肉醬也脊脅肉之有骨者禮之用也乃燕禮所資以為用也此觀禮者所共知也觀此禮者見而知也其數易知其節自為易知其義難知也其義則深而難知鄉飲鄉飲酒之禮教親睦也教人相親而和睦鄉閭親睦鄉里之人相親而和睦陵犯爭訟之風息矣則爭陵卑下犯上爭競之習自然消弭夫禮主於敬禮以敬為本敬勝則乖過於敬則乖異乖則離乖異則離而不合聖人制禮古先聖人制為典禮必濟之以和以和而濟其敬之太過和勝則瀆過於和則必至䙝瀆瀆則慢䙝瀆則慢而不恭聖人制禮古先聖人制為典禮必濟之以敬以敬而濟其和之太過始之以禮教敬也首示之以禮典是教民以此敬也終之以樂教和也終示之以樂歌是教民以此和也拜至賓至而主拜之拜洗主洗爵而賓拜之拜既飲盡而賓又拜之敬之至也此為至敬之極請安請安燕請坐請升坐爵樂無算修爵與舉樂無算數和之至也此為和樂之極敬而和教敬而和樂禮之大義也此為禮之大者此所以親睦鄉閭所以能使鄉閭相親而和睦而息陵犯爭訟之風也而相陵犯相爭訟之習由是止息降洗降盥降而浣器降管而浣手盥音潔也取其潔也辭盥辭洗辭其浣器浣手之禮遜也致其謙也父坐子立父坐於上子則侍立於旁孝也此教人以孝之事老者坐上年髙者坐於上少者立於下年少者則侍立於下弟也此教人以弟之事飲食必祭一飲一食必祭乎祖不忘本也不敢忘其先也酬賞不舉酬賞之禮唯賓主為備至於介僎則省不盡人之忠也不盡人勸酬之忠也序賓以賢次序於賓必推其賢貴德也重其有德者也序坐以齒次序其坐必尊其年貴長也重其長上者也序僎以爵次序於僎必尊其爵貴貴也重其貴者也工歌必獻下而樂工笙歌之人亦酌酒而獻不忘功也不忘其勞也美及沃洗乂降而滌濯之人亦酌酒以宴之不忘賤也不遺其賤者也歌關雎葛覃卷耳三詩皆頌后妃之德樂歌此詩齊家之義著矣則齊家之道於此昭著一飲一食飲食之頃一拜一坐拜坐之間一揖一降揖降之際無非教也莫非禮之教通於義者若因此而通曉其義又非但可以親睦鄉閭而已也不止使鄉閭之人相親相睦而已天理得禮者天理之節文通此禮即全此天理也人心正天理有諸身則人心自無不正無所施而不可也殆將無所施設而不可聖人著為禮以教人古先聖人著為禮典以教後世之人凡為鄉人者凡為鄉里之人皆知此義焉無不知此義此成周之世此周成王之時所以人人皆有士君子之行也無人不有賢人君子之德也禮廢樂墜禮既廢缺樂又墜失鄉人之羣飲者未嘗廢鄉之羣聚而飲者則未嘗亡豐飲食厚其食饋侈供帳華其帳飾悅聲伎喜淫哇之聲事俳優之伎恣嚾嗷縱其歡譁教侈也是教之以奢侈也誨淫也是訓之以淫亂也恣欲也是恣騁其欲心也無非所以敗人心者也皆是敗壞人之心術此後世之士大夫此後世之為士大夫者曽古之服勤於畎畝之不若也曽不如古之農民服力田畝者雖不講明是禮遇親孝遇長弟而反不失於是禮也然則如此是禮也此鄉飲酒之禮雖不行於今之世雖未能即行於今之時學士大夫之存志於古者茍有為學之士大夫有志於古之禮其可不思所以講明而肄習之歟獨可不講明此禮而學習此禮耶送許太博入幕序此篇論宇宙中間只一隂陽老少分而為四象天地之造化人之情性無不由此也天地之間天地中間一隂一陽靜隂動陽兩儀立焉是生兩儀隂陽有老少太陽太隂少陽少隂四象生焉是生四象形而上者謂之道形而上者乃隂陽之理故謂之道形而下者謂之器形而下者乃隂陽之用故謂之器語大言其廣大之體天下莫能載舉天下之大莫之能載語小言其精微之妙天下莫能破雖天下至微之物莫之能破皆不出是四者而已皆不外乎隂陽之理人之一身人之有此一身仁禮為陽仁配元禮配亨皆冇發達之象故為陽義智為隂義配利智配貞皆有凝肅之象故為隂兩儀也是即兩儀也仁為木仁主春故為木禮為火禮主夏故為火義為金金主秋故為金智為水水主冬故為水四象也是即四象也形而上者也則皆形而上之理也肝心為陽心與肝屬陽腎肺為隂腎與肺屬隂兩儀也亦兩儀也肝為木肝屬於木心為火心屬於火肺為金肺屬於金腎為水腎屬於水四象也亦四象也形而下者也皆形於下之用也耳目口鼻之分一身耳目口鼻四者之分少長老死之變曰少曰長曰老曰死之變喜怒哀樂之感喜怒哀樂四者之相感惻隱羞惡辭遜是非之情四端發見之情與夫五常百行五常之理百行之懿未有出四者之外也皆不能出是四者之外語大言其大則天地日月四時鬼神則天地之大日月之明四時之運行鬼神之吉凶不能違也不能外乎此理語小言其小則一草一木則一草之細一木之微無不具也莫不畢備四者之妙此四者之妙其淵深廣大如此幽而深浩而博若此人之所以與天地並立而無間者人之一身中天地並立而為三才無所間者於此器之中於此身之中具此道也全得此理格物致知窮物理之極以極吾心之知窮此道也所以窮究此道存誠居敬存此實理守之以敬守此道也所以固守此道無以窮之茍不能窮此道則罔然無所見則昧昧而無所覺無以守之苟不能守此道則茫然無所得則茫茫而無所有雖具人之形形雖人之形無以自别其與草木禽獸不逺矣其與頑冥不靈之草木有生無知之禽獸不相逺矣世教不明世之教學不明學者知之而未必求學者雖知此而不能求此求而未必熟雖知求之亦未至於熟不至於熟茍其不熟猶無見無得也亦猶罔然無所見茫然無所得者也至於熟茍至於熟則動容周旋舉動容貌周旋之頃無適而非四者之用也無往而非此四者之妙用古之君子古之人所以自彊不息所以奮然自强無有止息亦將求以熟之也亦將以精熟乎此許君一日許姓也君稱之也其一日相與語康節先生之學相同講論堯夫數學有感於數之起於四者因論其數之起於四而有感豫因極言之豫於是乎極論其理以諗許君以告許君諗音審且以自警云因以此自警省焉性理羣書句解卷六
