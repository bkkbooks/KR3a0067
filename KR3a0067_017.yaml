body:
  text: 性理羣書句解卷十七宋熊節撰熊剛大注通書誠上第一誠即實理此篇論天以此實理賦豫於人而為性命之本原誠者聖人之本誠者真實無妄之謂天所賦人所受之正理聖之所以聖以其㑹得此理故為聖人之本大哉乾元然是實理有天道之自然元者乾之德運行不息若是其大萬物資始萬物所取以為始資取也誠之源也是即實理之根源乾道變化乾之道變化不窮各正性命天所賦為命物所受為性各出於正誠斯立焉實理於是乎有立純粹至善者也純而不雜粹而無疵渾然至善故曰故云一隂一陽之謂道隂陽氣也然氣非理不行所以使隂陽之運轉蓋有理以為之主所謂道也繼之者善繼則氣之方出善則理之方行乃誠之源成之者性成則物之己成性則理之己具乃誠之立元亨誠之通故元亨利貞無非誠也元者生物之始亨者生物之通為誠之通通即實理方出而賦於物善之繼也即上文所謂萬物資始是也利貞誠之復利者生物之遂貞者生物之成為誠之復復即實理各得而藏諸己性之成也即上文之所謂各正性命是也大哉易也故易者隂陽變易之名大哉此易性命之源乎其為天賦為命物受為性之根源者乎誠下第二此篇論聖人全此實理而為五常百行之本源聖聖人之所以聖誠而已矣不過全此實理即所謂太極者也誠是理之實五常之本乃仁義禮智信所謂五常之根本全此實則五常不虧矣百行之源孝悌忠順之屬所謂百行之根本全此實則百行修矣靜無而動有方其靜也誠未嘗無以其未形故謂之無及其動也誠非至此而後有以其可見而謂之有至正而明逹也靜而無則至正而已動而有則昭明通逹可見也五常百行故五常之道百行之至非誠非也茍無此誠皆無其實所謂不誠無物也邪暗塞也靜而不正則邪妄動而不明不逹則暗昧幽塞故誠則無事矣惟誠則衆理自然無一不偹無事思勉而從容中道矣至易而行難故實理自然則充之為至易人僞奪之則行惟見其難果而確無難焉人僞不能奪故無難故曰故云一日克已復禮克去己私復還天理天下之至難然其機可一日而决天下歸仁焉而其效至於天下盡歸吾仁果確之無難如此誠幾德第三此篇論誠為實理之自然幾乃善惡之所由分德乃道之得於身者誠實理自然無為何為之有即太極也幾幾者動之微善惡善惡之所由分蓋勭於人心之微則天理固能發見而人欲亦萌乎中即隂陽之象德愛曰仁道之有得於身謂之德於愛則謂之仁宜曰義處事得其宜謂之義理曰禮萬物各得其理謂之禮通曰智周乎萬事而通逹則謂之智守曰信凡事固守而不易則謂之信即五行之性也性焉安焉之謂聖性成於天安行於己不思而得不勉而中則為聖人是誠無不立幾無不明德無不偹者也復焉執焉之謂賢復者反而至之執者得而持之則為賢人降聖人一等是思誠研幾以成其德者也發微不可見發之微妙而不見其迹充周不可窮之謂神充之周遍而不窮其用此則聖人之神妙不可知者也聖第四此篇論誠精而明誠應而妙幾微而燭其幽此乃性焉安焉之謂聖者寂然不動者性真而靜凝然未發者誠也實理之本體也感而遂通者隨感隨應酬酢不窮者神也實理之妙用也動而未形動而未見有無之問者介乎有動無動之中幾也人心之幾微也誠精故明誠至於精一則自然明照如清明在躬志氣如神是也神應故妙神至於能應則自然造妙如不疾而速不行而至是也幾微故幽幾至於微則自然入幽如理雖己萌事則未著是也誠神幾情明應妙而洞其幽微曰聖人此則性焉安焉之謂聖愼動第五此篇言君子動必以正則和在其中動而正曰道動之所以正以其合衆所共由之道用而和曰德用之所以道和以其得於身而無所待於外也匪仁用不以仁匪義用不以義匪禮用不以禮匪智用不以智匪信用不以信悉邪也用其動也皆邪矣邪動以邪而動辱也必辱其身甚焉又其甚者害也必害於心曰辱曰害是皆無得於道則其用不和矣故君子愼動故君子之人動而致謹必以正焉則和在其中矣道第六此篇言聖人之道只在仁義禮智守之固行之宜廣之可配合天地之全禮聖人之道聖人之所謂道仁義中正而已矣亦只仁義禮智而已中即禮正即智守之貴守之在我則仁義禮智為天之爵何貴如之行之利行之在我則仁義禮智皆順適者也何往不利廓之配天地充而廣之仁義禮智可與元亨利貞相配合豈不易簡道體本然至易且簡豈為難知人所固有豈不易知不守不能守此不行不能行此不廓耳則亦不能充而廣之師第七此篇言人氣質之性有五剛柔善惡中師者所以正人之惡正人之不中或問曰或人問云曷為天下善若何而使天下皆善曰答云師必須有師曰或人云何謂也是何所言曰答云性也謂性之云者剛柔善惡中而已矣曰剛曰柔曰善曰惡曰中有此五者而止此所謂性是人生以後氣質之性也不逹或人猶未通徹曰答云剛善為義人之禀性得陽氣之中則為剛之好者是為裁决之義為直為正直為斷為處事有果斷為嚴毅為威嚴為剛毅為幹固為幹而有所立為固而有所守惡為猛禀得陽氣之過則為剛之不好者是為猛暴為隘為隘峻為强梁為強惡陸梁柔善為慈人之禀性得隂氣之中則為柔之好者為慈祥為順為利順為巽為禮遜惡為懦弱禀得隂氣之過則為柔之不好者為懦而不立弱而不振為無斷為是非不能斷决為邪佞為回邪柔佞惡者固為非正善者亦未必皆得乎中惟中也者惟所謂中者以得性之正而言和也逮其已發無過無不及是和也中節也和則事事皆中其莭天下之逹道也天下通行之道是所謂允執其中者故聖人立教聖人立教以教人俾人自易其惡使人自改其惡改其惡則剛柔皆善有嚴毅慈順之德而無強梁惴弱之病自至於中而止矣自至於中至於中則或為嚴毅或為慈順又皆中節而無太過不及之偏故先覺故先有知覺者覺後覺以開悟後未知覺之人暗者求於明天資暗昧者必當求夫開明之人而師道立矣師者所以攻人之惡正人之不中能如是則其道有立矣師道立則善人多師道既立則人皆知矯其氣質之偏而善者自多善人多善人之多則朝廷正而天下治矣則朝廷一正而天下自治此所以為天下善也幸第八此篇言人不幸不聞過大不幸無恥人之生人有此生不幸不聞過不幸不聞己之過不聞過是人不告也大不幸無恥大不幸無愧恥心無恥己不仁也必有恥則可教必須有恥則能發憤而受教故可教聞過則可賢必須聞過則知改而為賢故可賢此雖二事然不可教則雖聞過而未必能改矣以此見無恥之不幸為尤大也思第九此篇言思之一字乃聖功之本洪範曰書洪範篇言思曰睿思謂之通睿作聖通則可為聖人無思不思而中乃誠者之事本也此其本也思通由思而通神也用也此其用也幾動於彼人心之微方動於彼誠動於此人心之實理已動於此無思而無不通為聖人不思而得而無不通誠神幾曰聖人此釋誠也不思則不能通微不思則不能通乎微烏能睿不睿則不能無不通不能睿則不能無所不通烏能聖是則無不通生於通微是則聖無不通質由睿而能通乎微通微生於思睿而通微實由於思通故思者聖功之本故思之至可以作聖而無不通而吉凶之機也其次亦可以見幾通微趨吉而不陷於凶咎此釋思通用也神也易曰易不云乎君子見幾而作君子之人見其幾微而求通睿之事也又曰知幾其神乎知其幾而至於神應而妙聖之事也此釋幾也志學第十此篇言人之為學不可不立志士當志於為賢賢當志於為聖聖當志于希天聖希天聖者全德之名所望為大道之自然賢希聖賢者秀出於民者降聖人一等所望為聖人之全德士希賢士則志於學者降賢人一等所望為賢人之秀出於民伊尹顔淵商臣伊川孔門顔子天賢也可謂世之大賢伊尹恥其君不為堯舜伊尹愧不能使其君為堯舜之君一夫不得其所一民或失其所若撻於市如撻諸市朝顔淵不遷怒顔子怒不移怒於甲者不移於乙不二過過於前者不復於後三月不違仁雖三月之久此心猶不去仁伊尹聖之任顔子亞聖是皆賢希聖者志伊尹之所志為士而未到賢者地位且當希賢立志必當如伊尹欲其君為堯舜恐一夫不被其澤之志學顔子之所學為學必當如顔子之不遷怒不二過不違仁之學過則聖過此則可為聖及則賢及此則可為賢不及其或不及則亦不失於令名則亦不失其為善之名令善也胡氏曰周子患人以發䇿决科榮身肥家希世取寵為事故曰志伊尹之所志患人以廣聞見工文詞矜智謀慕空寂為事故曰學顔子之所學順化第十一此篇言天以陽生萬物以隂成萬物聖人順人以仁育萬物以義正萬民與天地為一天以陽生萬物陽主發生陽一噓而萬物生故以生物言以隂成萬物隂主收斂隂一翕而萬物成故以成物言生生物者仁也是為仁即春氣之發生成成物者義也是為義即秋氣之凝結隂陽以氣言仁義以道言故聖人在上聖人位九重之上以仁育萬物法天治政以仁撫衆民使之各遂其生即陽之生物也以義正萬民以義正衆民使之各安於理即隂之成物也即所謂定之以仁義者天道行而萬物順所行只此隂陽之道而萬物皆順其道聖德修而萬民化聖人修此仁義之德而萬民皆化其德大順大化萬物順而至於大順萬民化而極於大化不見其迹無迹可暏莫知其然之謂神莫知其所以如此是謂神妙不可測天地聖人其道一也故天下之衆是以天下萬民之衆本在一人其本只在乎君道豈逺乎哉君之道亦不逺只在此心術豈多乎哉心之術豈多乎哉只在此仁義而已治第十二此篇言聖人之心順乎理則不雜不雜則賢才輔而天下可治十室之邑十家為邑人人提耳而教且不及人人挈其耳而誨之猶且不及况天下之廣况天下如此其廣兆民之衆哉兆民如此其衆乎曰言純其心而已矣亦在人君之心純而不雜耳仁義禮智四者所以純此心者曰仁曰義曰禮曰智四者之德動靜言貌視聽若動若靜若言若貌若視若聽無違之謂純無所違於此理方謂之純心純則賢才輔君心純乎理則賢才以道合而來輔賢才輔則天下治衆賢以道合而來輔則天下自治不待人人提耳而教矣純心要矣心不純則不能用賢所以為要用賢急焉賢不用則無以宣化所以為急禮樂第十三此篇言敬則自然和樂故禮先樂後禮禮之為言理也在於物物各得其理屬乎隂也樂樂之為言和也在於物物致其和屬乎陽也隂陽理而後和隂陽之類各得其倫理然後自然和君君臣臣君臣之道父父子子父子之彜兄兄弟弟兄弟之倫夫夫婦婦夫婦之經萬物各得其理然後和萬物各得其倫理而後和各得其倫理處此便是禮隂也至於和處便是樂陽也故先禮而後樂故禮樂二字禮居先樂居後程子曰敬則自然和樂敬便是禮先和樂便是樂後學者不知先持敬而務為和樂鮮不流於慢矣務實第十四此篇言君子當使實勝名不可使名勝於實實勝實勝於名善也旡非天理名勝名勝於實恥也大可愧恥故君子進德修業故君子之人進其德修其業孳孳不息續之不已務實勝也求以實理勝也德業有未著其或德行事業尚未昭著則恐恐然畏人知則恐懼為心惟患人知逺耻也慮為名勝則當逺去此耻辱逺去聲小人則僞而已小人則專作僞求為名勝者故君子日休故君子實修而無名勝之耻故善小人日憂小人名勝而無實修之善故憂愛敬第十五此篇言君子見善則學欲兼有衆善見不善則勸不業一人於惡無所不用其愛敬有善人或有善不及而我不能及則如之何曰答曰不及則學焉不及則當學其善問曰又問云有不善人有不善則何以處之曰答云不善則告之不善人有不善恐其不知此事之為不善則當告之以不善且勸曰恐其不知不善之可改為善又且勸之云庶幾有改乎庶幾亦可改而為善乎有善一答云有善者一不善二不善者二則學其一而勸其二是夫人善惡之雜則學其一善者而勸其二不善者之當改有語曰有曰言斯人有是之不善此人有此之不善非大惡也必不是大惡則曰則言孰無過無心背理謂之過孰能無過焉知其不能改安知其不能改過焉音煙下同改則為君子矣能改則能為君子不改為惡不能改則是有心悖理謂之惡惡者天惡去聲之為惡之人天亦怒之彼豈無畏邪彼人也豈無畏天之心耶焉知其不能改安知其終不能改北乃答聞人有過雖不得見而告勸之亦當答之以此兾其或聞而自改也故君子悉有衆善故君子善無不學兼有衆人之善惡無不勸不棄一人於惡無弗愛且敬焉則無所不用其愛敬之道動靜第十六此篇言動一於動靜一於靜則為物之不通必動復靜靜復動斯為聖人之神妙萬物動而無靜一於動而不能靜靜而無動一於靜而不能動物也是物囿於有形滯於一偏者也動而無動既動而又無動靜而無靜既靜而又無靜神也是神不囿於形無方無體者也動而無動動又無動靜而無靜靜又無靜非不動不靜也無動非不動也蓋動中有靜也無靜非不靜也蓋靜中有動也物則不通故物滯於一偏故不能通神妙萬物神妙於萬物而無不適此結上文起下意水隂根陽水隂也而生於天一之數則本乎陽也火陽根隂火陽也而生於地二之數則本乎隂也所謂神妙萬物者如此五行隂陽五行之殊實本乎隂陽二氣隂陽太極隂陽二氣實本於太極之理此以神妙萬物之體而言四時運行五行之氣順布而四時運行萬物終始萬物所資以終復資以始此以神妙萬物之用而言混兮闢兮混者體合而一闢者用散而殊其無窮兮一動一靜如循環之無端此兼舉體用而言樂上第十七此篇論古者教化修明故樂聲淡且和後世政刑苛紊故樂聲妖淫愁怨古者聖王古之聖王制禮法制為禮之法則修教化修明教化三綱正綱綱上大繩三綱者君為臣綱父為子綱夫為婦綱各得其正九疇叙疇類也洪範之九疇咸得其叙此即萬物成得其理所謂禮先也百姓太和而後百姓翕然太和萬物咸若萬物莫不皆順此即理而後自然和所謂樂後也乃作樂自是作樂之音以宣八方之風以宣東西南北四角八方之風氣以平天下之情以節天下之情使之和而不乖故樂聲淡而不傷樂聲之平淡則不至於傷和而不淫和樂則不至於過入其耳入人之耳感其心感人之心莫不淡且和焉樂音淡則其心無不平淡樂聲和則其心無不和樂淡則欲心平平淡則嗜欲之心自然平貼和則躁心釋和樂則躁急之心自然滴釋優柔平中躁心釋則優柔不迫欲心平則其中和平德之盛也德至此亦可謂盛天下化中天下化之淡而不傷和而不淫而各得其中治之至也治至此可謂至矣是謂道配天地禮居先則屬隂樂居後則屬陽故其道可合天地古之極也古聖人作樂功化之極如此後世禮法不修後世禮之典法不修政刑苛紊政事刑罰苛虐紊亂縱欲敗度縱其欲心敗亂法度下民困苦在下衆民窮困愁苦是萬物不得其理禮先之道既缺謂古樂不足聽故云古之樂不足聞代變新聲一代變一新聲不和亦甚妖淫愁怨由廢禮敗度故其聲不和而妖淫政苛民困故其聲不和而愁怨導欲增悲妖淫故𨗳吾之欲愁怨故增吾之悲不能自止於此弗能禁止故有賊君棄父增悲遂至賊弒其君棄逐其父輕生敗倫𨗳欲遂至於輕視其生敗壞人倫不可禁者矣故有不可禁止者矣於樂後何有哉嗚呼嗟哉樂者樂之云者古以平心古人即樂音之平淡以此平其心今以助欲今人為妖淫之音反助其欲古以宣化古人即和樂之音以宣其教化今以長上聲怨今人為愁怨之音適長其怨古今之異淡與不淡和與不和而已不復古禮敬則自然和樂不能復古人之禮使萬物各得其理不變今樂則不能變今人之樂助欲長怨之音則亦不能各得其和而欲至治者而欲如古人作樂功化之盛逺矣相去亦已逺矣蓋復古禮然後可以變今樂所以禮先而樂後樂中第十八此篇論樂本於政政善則作樂物順以宣暢其和心故天地和而萬樂者樂之云者本乎政也根本人君之政事政善政事休美民安百姓阜安則天下之心和則天下之人心翕然和樂故聖人作樂故聖人作為樂音以宣暢其和心以宣暢天下和樂之心逹於天地逹于上天下地之間天地之氣感而太和焉俾天地之氣交相感動散為太和天地和則萬物順天地之氣既和則萬物咸若故神祗格故天神地祗莫不來至鳥獸馴鳯凰來儀百獸率舞無不和順樂下第十九此篇論樂聲之淡樂辭之善自可移風而易俗樂聲淡則聽公平樂音之淡則不妖不淫人之聽者心亦平順樂辭善則歌者慕樂辭之善則發乎情性止乎禮義故令歌者有所啓發而效慕故風移而俗易矣可以化民風而移習俗矣妖聲豔辭之化也亦然妖淫之音艷麗之亦言其感動夫人雖如此但喪其所守變其所習豈如聲之淡辭之善聽者歌者可以和平而感慕耳聖學第二十此篇論學聖者在乎此心聖可學乎或問聖之道可習而至乎曰答云可可習而至有要乎亦有要術乎曰答云有有要術請聞焉或人又言請聞其要曰答云一為要敬為要蓋敬者主一無適之義一者無欲也主一則無物欲昏雜其中無欲則靜虛動直無物欲昏雜則此心之靜虛具象理此心之動直而不屈靜虛則明靜而虛則本體清明明則通本體明則無不透徹動直則公動而直則大公至正公則溥大公至正則無不周遍明通公溥庶矣乎明而通公而溥於道不其庶乎性理羣書句解卷十七
