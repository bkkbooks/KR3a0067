body:
  text: 性理羣書句解卷十六宋熊節撰熊剛大注皇極經世書觀物外篇上此篇論太極生生之理隂陽消長之禨天地髙下之别天數五天數有五一三五七九也地數五地數有五二四六八十也見易繫辭合而為十數之全也合天五地五之數則為十矣天以一而變四天以一而變為四一即太極四即四象太隂太陽少隂少陽也地以一而變四地以一而變為四象一即太極四即四太剛太柔少剛少柔也四者有體也隂陽剛柔各有定體而其一者無體也太極周流不滯故無定體是謂有無之極也是所謂無極而太極也天之體數四而用者三體數以其數之有體者也天之體數四太陽太隂少陽少隂也而用之者三天地人也不用者一也而其不用者有一道也地之體數四而用者三地之體數亦四太剛太柔少剛少柔也而用之者亦三天地人也不用者一也而其不用者有一道也是故轉語辭無體之一上文所謂一者無體者也以况自然也是太極為生隂陽之本運行無迹自然而然也不用之一上文所謂不用者一以况道也是隂陽運行剛柔摩蕩是道立乎其中而為之主也用之者三上文所謂用者三以况天地人也是上天下地中兩間而為人皆不外乎此理也陽爻晝數也晝屬陽故易之陽爻為晝數隂爻夜數也夜為隂故易之隂爻為夜數天地相銜天包乎地地載乎天隂陽相交隂交於陽陽交於隂故晝夜相雜晝而夜夜復晝交相雜揉剛柔相錯剛而柔柔而剛交相錯綜春夏陽多也春乃陽之始夏乃陽之極陽之分數多故晝數多夜數少故晝刻長而夜刻短秋冬隂多也秋乃隂之始冬乃隂之極隂之分數多故晝數少夜數多故晝刻短夜刻長乾四十八而四分之乾至否共八卦二卦六畫四分之則八六四十八也一分為隂所尅自乾而泰陽三十六畫隂十二畫此所謂一分為隂所尅坤四十八而四分之坤至否共八卦一卦六畫四分之則八六四十八也一分為所尅之陽也自坤至否隂三十六畫陽十二畫此所謂一分為所尅之陽太極既分當以經世八卦圗看自太極而生出去兩儀立矣兩儀即一陽一隂二畫由是而立陽下交於隂陽位乎上故下交隂隂上交於陽隂位乎下故上交陽四象生矣隂陽相交而為隂陽之畫者凡四是生四象陽交於隂然四象有二有天之四象有地之四象在天以氣言故曰隂陽在地以質言故曰柔剛故陽下而交於隂隂交於陽隂上而交於陽而生一陽一隂者凡四居於右之上而生天之四象是為太陽太隂少陽少隂而為天之四象剛交於柔剛下而交於柔柔交於剛柔上而交於剛而生一剛一柔者凡四居於左之上而生地之四象是為太剛太柔少剛少柔而為地之四象於是八卦成矣隂陽相交剛柔相錯而八卦之畫以成八卦相錯八卦交相錯綜然後萬物生焉而後萬物生生不息一分為二一為太極生一竒一耦者二是為兩儀二分為四二之上各生一竒一耦者二則為四象四分為八四之上各生一竒耦者四則為八卦八分為十六八之上各生一竒一耦者八則為十六十六而為三十二十六之上各生一竒一耦者十六則為三十二三十二而為六十四三十二之上各生一竒一耦者三十二則為六十四矣此即文公易學啓蒙觀之可知故曰分隂分陽故言隂陽分别迭用柔剛柔剛雜揉易六位而成章也卦各六位粲然有文也十分為百以十分百百分為千以百分千千分為萬以千分萬猶根之有幹譬之木然自本根而幹幹之有枝自幹而枝枝之有葉自枝而葉愈大則愈小越大則越小愈細而愈繁越細則越繁合之斯為一合而觀之同一根本是即六十四卦之斂為太極也衍之斯為萬敷而衍之有萬枝節是即太極之分為六十四卦也是故轉語乾以分之乾者陽之極分而為隂坤以翕之坤者隂之極主於翕聚震以長之震乃陽之始生長上聲巽以消之巽乃隂之始消始長以復卦為震宫之卦一陽初生也始消以姤卦為巽宫之卦一隂始生也長則分由一陽之長至六陽則分分則消陽分為隂則陽始消消則翕也自一隂之消至於六隂則翕矣震始交隂而陽生震宫一坤下生接巽始消陽而隂生巽宫一隂下生接乾兊陽長也兊二陽生於下故曰長長上聲艮隂消也艮二隂生於下故曰消隂消陽也震兊在天之隂也震二隂兊一隂在陽左一邉陽為天故曰在天之隂巽艮在地之陽也巽二陽艮一陽在隂右二邉故曰在地之陽故震兊上隂而下陽此二卦隂居上陽居下巽艮上陽而下隂此二卦陽居上隂居下天以始生言之一氣循環自復至乾為陽生物之始故隂上而陽下故震兊二卦隂居上陽居下交泰之義也有隂陽交泰之道主動而言太極之用所以行地以既成言之自姤至坤為隂成物之終也故陽上而隂下故巽艮二卦陽居上隂居下尊卑之位也為尊卑一定之位主靜而言太極之體所以立此即先天八卦圗看最分曉無極之前言自巽消以至坤翕隂含陽也靜之妙也有象之後言自震長以至乾分陽分隂也動之妙也隂為陽之母坤母道坤隂極而一陽生故曰為母陽為隂之父乾父道乾陽極而一隂生故曰為父故母孕長男而為復坤盡為復故有母孕長男之象父生長女而為姤也乾盡為姤故有父生長女之象是以陽起於復所以陽萌於復而隂起於姤也隂萌於姤也天圓而地方天體圓而動地體方而靜天南髙而北下天之形南髙北垂是以望之如倚蓋焉故望之如傘之斜倚地東南下而西北髙地之勢東南低下而西北最髙是以東南多水惟其下衆水所聚故多水西北多山也惟其髙土石融結故多山天覆地天蓋乎地地載天地承乎天天地相函天之氣函結於地下而地不陷地之氣上騰於天而天道以成天與地相包函故天上有地地在天之中故云天上有地地上有天天下覆於地故云地上有天天奇而地耦天數奇地數耦是以占天文者所以古天者觀星而已但求諸星察地理者察地者觀山水而已但求之山水觀星而天體見矣觀星則天之本體可見觀山水而地體見矣觀山水則地之大體可見天體容物天之體在乎容物故星辰之類皆在焉地體負物地之體在乎載物故草木蟲魚之類皆在焉是故轉語體幾于道也體即道之謂也極南大暑極南陽明之地故大暑極北大寒極北隂凝之地故大寒故南融而北結故南方陽氣之融明而北方隂氣之凝結萬物之死地也隂氣凝結則為萬物肅殺之所夏則日隨斗而北夏則斗運在北而柄指南故言隨斗而北其晷長冬則日隨斗而南冬則斗運在南而柄指北故隨斗而南其晷短故天地交而寒暑和天地之氣既交則當寒而寒當暑而暑各得其和而物乃生也寒暑和則四時不失其序萬物各遂其生理矣陽得隂而為雨陽氣得夫隂則為雨而降隂得陽而為風隂氣得夫陽則為風而飄噓而為風蒸而為雨皆在天之氣故以隂陽言剛得柔而為雲剛與柔遇則為雲而升柔得剛而為雷柔與剛遇則為雷而震山川出雲雷出地奮皆在地者也故以柔剛言無隂則不能為雨陽而非隂則不能為雨無陽則不能為雷隂而非陽則不能為雷雨柔也而屬隂雨柔類也則屬乎隂隂不能獨立獨隂不成故待陽而後興故必得陽則發達蒸為雨而降雷剛也而屬陽雷剛物也則屬乎陽陽不能自用獨陽不倡必待隂而後發也故必得隂閉塞則奮擊為雷而震天之陽在南陽在天則盛於南方故日處之也故日臨其方也地之剛在北剛在地則極於北方故山處之故山居其方也所以地髙西北此所以地之勢西北最髙天髙東南也天之形東南最髙觀物外篇下此篇係統論性理形氣之妙易書諸處之疑心為太極心指人得是理以為一身之主而言又曰道為太極道指天地萬物自然之理而言先天之學心也先天之學非可言傳當以心意而領會後天之學迹也後天之學文字可考故有形迹可見出入有無死生者道也出而有為生入而無則死此皆隂陽屈伸之所為故曰一隂一陽之謂道以天地生萬物萬物本於天地之所生則以萬物為萬物萬物直萬物耳以道生天地天地本於是道之所生則天地亦萬物也則天地亦不過道中之萬物耳凡人之善惡人之為善為惡形於言不特見之言語之間發於行著之躬行之際行去聲人始得而知之皆在人目前故人方知其善惡但萌諸心只是心之所萌發於慮念之所發鬼神已得而知之鬼神先已窺其藴此君子所以謹獨也獨者人所不知己所獨知之處此君子所以必致謹也氣形盛則魂魄盛氣屬陽形屬隂魂屬陽魄屬隂氣盛則魂盛形盛則魄盛氣形衰則魂魄亦從而衰矣氣衰則魂亦衰形衰則魄亦衰魂隨氣而變故魂每隨其氣以運動魄隨形而止魄每隨其形以有無故形在則魄存此形存則此魄與之俱存形化則魄散此形散則此魄與之俱散人之畏鬼已死為鬼人之畏乎鬼亦猶鬼之畏人亦如鬼之畏乎人人積善而陽多善陽之類人茍積善則陽明用事鬼益畏之矣鬼隂類也安敢與陽敵宜其畏之也積惡而隂多惡隂之類人茍積惡則隂獨用事鬼弗畏之矣鬼亦隂類安得不與隂敵宜其弗畏也大人者與鬼神合其吉凶大德之人順理而行禍福將至必先知之自與鬼神合吉凶夫何畏之有果何所憚哉夫音扶物理之學人之為學窮事物之理或有所不通如或心未能透徹不可以強通不可強求其透徹強上聲強通則有我我私也強通則必有私意有我則失理而入於術矣才有私意必不合理而流於不正矣夫易根於乾坤易之卦皆自乾坤推出故始於乾坤而生於姤復姤為隂之始復為陽之始易不過因隂陽變易而得名故生於此蓋剛交柔而為復復以一陽之剛交於坤六隂之柔而為復柔交剛而為姤姤以一隂之柔交於乾六陽之剛而為姤自兹而無窮矣一隂生至於六隂一陽生至於六陽交易為體變易為用六十四卦生生無窮矣夫聖人之經夫子作經渾然無迹渾涵無迹之可指如天道焉正猶天道之生殺不見其生殺之迹故春秋録實事故春秋一經紀録其實褒善如春之生物貶惡如秋之殺物而善惡形於中矣善善惡惡皆在其中即天道也凡處失在得之先凡處事先失後得則得亦不善則雖得之亦不為善若處得在失之先若先得後失則失難處矣則得之有素驟然失之誠難處矣必至於隕穫必至於困迫失志矣隕獲二字出禮記儒行人必內重則外輕為人必須知在內天理之可重則視在外利祿之事較輕茍內輕而外重茍或不知在內天理之可重而以在外利祿之事為重好利好名則殖利崇名好去聲無所不至將無所不為也天下言讀書者不少天下也人言讀書者甚多能讀書者少真能讀書而求其樂者甚少若得天理真樂若能於中窮究道理之真趣何書不可讀無一書不可讀何堅不可破無堅硬之不可破何理不可精亦無義理之不可精矣資性得之天也性資乃天所賦學問得之人也學問則在人加勉資性由內出者也天資之好實根於內學問由外入者也學力之加由用力於外自誠明性也誠實也理無不實則明無不照自然之成性也自明誠學也明以窮其理而後能實以充其性由學問而後至也顔子不遷怒顔淵怒於甲者不移於乙不二過過於前者不萌於再皆情也皆治其情者乃學知之功非性也非性之事也復次剝復卦繼剝卦明治生於亂乎所以别其為治萌於亂蓋復乃治之初剝乃亂之極姤次夬姤卦繼夬卦明亂生於治乎所以别其為亂萌於治蓋姤乃亂之始夬乃治之盛時哉時哉一治一亂皆係乎時未有剝而不復者未有亂而不治未有夬而不姤者未有治而不亂防乎其始惟其將亂之始而豫防之邦家其長邦國之祚可長子孫之昌子孫之福未艾是以聖人所以古之聖人貴未然之防重於防患於未然是謂易之大綱此乃易書之大綱領處蓋古今治亂只在君子小人剝是小人道消之時復是君子陽長之時夬是五陽決一隂君子道盛之時姤是一隂生於下小人根萌之始是必絶其方萌之惡以固其已長之陽則亂可反而治矣知易者不必引用講解得易之趣者不必引用其語講解其義是為知易乃真得易之趣者也孟子著書孟軻氏著書七篇未嘗及易初無一語及易其間易道存焉其中易道無不具在但人見之者鮮耳但人之見之則少鮮上聲人能用易人能以易之理而推諸用而不引用其語是為知易方為得易之趣如孟子可謂善用易者也若孟子未嘗用易其間易之道無不具是善於用易者也為學養心人之為學以養其心患在不由直道去利欲所患者不能循天理以去人欲蓋人心生生之理本直特為物欲所屈耳由直道茍能循此直道任至誠而又真實無妄則無所不通則徹上徹下無所不通天地之道直而已蓋天地之道亦直而已矣當以直求之是必以直之理求之若用智數苟用私智術數由徑而求之但求小徑之便捷而不由大公至正之道是屈天理而徇人欲也是天理本直而自屈之以曲徇於人欲不亦難乎是罔之生也幸而免難矣哉事無巨細凡事無大無小皆有天人之理天人之理在焉修身人也修身者人之事遇不遇天也時之遇與不遇者有天焉非人也得失不動心得之與失知有定分吾不為之動心所以順天也順天道也行險僥幸專行險徑以饒幸其事於萬一是逆天也是不知有定分逆天道也求之者人也求之在我人也得之與否天也得與不得天也得失不動心得失知有定分而不足動吾心所以順天也順天道也強取必得強而取之務在必得不安其分強上聲是逆天理也逆天道也逆天理者逆悖理道患禍必至此災禍之所以至也鬼神者無形而有用氣伸則神氣屈則鬼雖無形迹自有妙用其情狀可得而知也而其情狀可得而知於用則可見之矣於其妙用見之也若人之耳目鼻口手足人之一身有是數者噓為神吸為鬼動為神靜為鬼草木之枝葉華實顔色革之與木有是數者榮為神枯為鬼皆鬼神之所為也無非鬼神之所為福善禍淫但善者必福淫者必禍主之者誰邪誰實主之聰明正直聰明不可欺正直無所私有之者誰邪誰實有之不疾而速不急而自爾速不行而至不行而自爾至任之者誰邪誰實任之皆鬼神之情狀也此又其情狀如此也自乾坤至坎離上經自乾至離以天道也無非天之道自咸恆至既濟未濟下經自咸至既濟以人事也無非人之事復至乾由復至乾三十二卦凡百有十二陽陽爻一百十二姤至坤由姤至坤三十二卦凡八十陽陽爻八十姤至坤由姤至坤凡百有十二隂隂爻一百十二復至乾由復至乾凡八十隂隂爻八十即先天圓圗觀之可見天下之事事在天下始過於重初極其重猶卒於輕其終尚失之輕始過於厚初極其厚猶卒於薄其終過失之薄况始以輕始以薄者乎况於初以輕以薄乎故鮮失之重故少有過於重者鮮上聲下同多失之輕失之輕者甚多鮮失之厚少有過於厚者多失之薄失之薄者甚多是故君子不患過乎重所以君子之人不憂過於重常患過於輕所憂者輕之過也不患過乎厚不憂過於厚常患過乎薄也所憂者薄之過也秦繆公伐鄭秦繆公出師襲鄭敗而有悔過自誓之言敗於崤陵歸而自悔作秦誓一篇此非止霸者之事此非特是作霸之規模幾於王道可謂近於王道能悔則無過矣蓋悔過能改則無過矣此聖人所以録於書末也此夫子序書所以録之以終尚書之篇人得中和之氣則剛柔均人稟得天地中和之氣則剛不過則柔不過柔而得乎剛柔之中陽多則偏剛稟陽氣之多則偏於剛隂多則偏柔稟隂氣之多偏於柔毋意毋必毋固毋我意者萌心之始必者期望於終固者滯於已往我者成於己私毋者禁止之辭夫子所言也合而言之則一合而論之則意必固我皆是一私意見於應事接物之間分而言之則二若分而論是二事始於意成於我也合而言之則二又合而論亦只是意固二者生出必我也分而言之則四但分而論則為意必固我四者之分矣始於有意始於萌心成於有我成於己私有意然後有必始於萌心而後有所期望必生於意是期望起於萌心也有固然後有我滯於已往而後成於己私我生於固是己私起於有所固滯也朔易書言平在朔易朔北也易變也以陽氣自北方而生以隂窮於北陽又自北生也至北方而盡陽氣至冬則生於北及春則盛於東及夏則長於南至秋則斂於西至冬則又於北而盡謂變易循環也言變易不窮如環之轉也性理羣書句解卷十六
