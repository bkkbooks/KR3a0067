body:
  text: 性理羣書句解卷十五宋熊節撰熊剛大註皇極經世書觀物篇此篇論皇帝王伯之治有窮仲尼之道无窮及漢唐秦楚好生好殺之異孔子贊易自羲農而下夫子賛述周易自伏羲神農以降序書自堯舜而下序尚書自堯帝舜帝而降刪詩自文武而下刪毛詩自文王武王而降修春秋自桓文而下修春秋自齊桓晉文而降自羲農而下祖三皇也以皇為祖自堯舜而下宗五帝也以帝為宗自文武而下子三王也以王為子自桓文而下孫五伯也以伯為孫非真有祖宗子孫之别但言其等第耳祖三皇以皇為祖尚賢也以其能推尚賢者也宗五帝以帝為宗亦尚賢也亦以其能推尚賢者也三皇尚賢以道三皇之尚賢尚其道也五帝尚賢以德五帝之尚賢尚其德也子三王以王為子尚親也以其能尚其親也孫五伯以伯為孫亦尚親也亦以其能尚乎親也三王尚親以功三王之尚親尚其功也五伯尚親以力五伯之尚親尚其力也嗚呼嗟嘆時之旣徃時之已邁億萬千年綿綿不窮時之未來時之未至亦億萬千年綿綿不窮仲尼中間夫子於時旣徃未來之中生而為人生其時而為人何祖宗之寡祖宗之少為羲農堯舜也而子孫之多也子孫之多為三王五伯也此所以重贊堯舜至禹是以深賛羙二帝以至大禹曰禹吾無間然矣間罅隙也无間言吾於禹旡罅隙之可議也間去聲仲尼後禹千五百年夫子之生後大禹千五百年今之後仲尼此康節自言也今我後夫子而生又千五百餘年又是千五百餘年雖不敢比德仲尼雖不敢自儕夫子而比其德上贊堯舜禹上賛美二帝三王之聖德豈不敢如孟子上贊仲尼乎又豈不能學孟軻氏上賛美夫子耶人謂仲尼人皆以為夫子素王惜乎無土惜其不得君師之位奄有土地以施其教吾獨以為不然我獨以為不如此匹夫以百畆為土匹夫以百畆之地為其土大夫以百里為土大夫則以百里之地為其土諸侯以四境為土諸侯則大於大夫者以四境之地為其土天子以四海為土至如天子則以天下為其土仲尼以萬世為土夫子雖無土地然其道可行於萬世則萬世皆其土也若然則孟子言自生民以來如此則孟軻謂自天地生萬民以至於今未有如夫子也未有若夫子之道之乆斯亦不為之過矣大哉斯言亦未為過夫人不能自富富非人之所能也必待天之與之富然後能富必須天命之富則富矣人不能自貴貴非人之所能也必待天之與其貴然後貴必須天命之貴則貴矣若然則富貴在天也富與貴皆本於天非在人也非人之所能也有求而得者固有求而遂其欲者有求而不得者矣又有求而不遂其欲者矣是繫乎天者也皆天之所為也功德在人也功與德則在乎人不在天也不係乎天可修而得之修則有功有徳不修則不得不修則安有功德耶是非繫乎天也此非本諸天者也繫乎人者也人實為之也夫人之能求而得富貴者人有求而可得富貴求其可得者也夫可得者固易求非其可得者其不可得者非所以能求之也雖求之亦未必可得此非有天命者在乎昧者不知昏昧者不察求而得之見可求而得者則謂其己之能得也則曰吾之所能得故矜之遂誇其得於人焉求而不得見有求而不得則謂其人之不與也則曰彼人之吝於己故怨之遂咎其不得於人如知其己之所以能得若果知我之所可得人之所以能與人之所必與則天下安有不知量之人耶則亦必有所止矣又安至不量耶量去聲天下至富也富有天下非至富乎天子至貴也貴為天子非至貴乎豈可妄意求而得也此非妄思者可以求而得也雖曰天命雖是天命所為亦未始不由積功累行亦未有不有世積其功世累其行而致行去聲聖主艱難以成之聖主艱苦以成其業庸君暴虐以壞之庸主酷虐以墜其業是天歟此是天為之耶是人歟抑人為之耶是知人作之咎乃知人自作孽固難逃己固不可避天降之災天降其殃禳之奚益乃欲禳去何益哉積功累行積其功累其行君子常分此君子之常事分去聲非有求而然者非有所為而為之也有求而然者有所為而為所以謂利乎仁也者是知其求可得而為之則為利仁之事利仁者知仁之為善而行之也君子安有餘事於其間哉君子之人行所當然何所用力於其中哉然而轉語辭有幸不幸者又有不幸而被禍又有幸而得福者始可以語命也已此乃可歸之於命也中原之地中原之土地方九千里四方凡九千里古不加多古不能増多而今不加少今不能少然而轉語辭有祚長祚短前後人主所享國祚有長有短地大地小者所得土地有小有大攻守異故也所以然者或攻或守其勢異也自三代以降自夏商周而下漢唐為盛至於漢唐為極秦界於周漢之間矣秦則界處於周漢之中秦始於穆公秦自穆公始伯中於孝公繼則有孝公終於始皇極于始皇起於西夷本起自西方之戎遷於岐山遷居於岐山之地徙於咸陽又徙都于咸陽兵瀆於内用兵瀆亂海宇血流天下血流於天下并吞四海吞并六合更革古今取古今之法制革而新之雖不能比德三代雖不可比三代之徳非晉隋可同年而語也亦非晉隋代可與並論其祚之不永運祚不長止於二世得非用法太酷皆因嚴於任刑殺人之多乎殺人猶刈草菅也所以仲尼序書是以夫子序書終於秦誓一事卒於秦誓盖取其崤函之悔其㫖不亦逺乎其意豈不深且逺哉夫好生者生之徒也夫人有好生之心是即生之類夫平聲好去聲下同好殺者死之徒也人有好殺之心即死之類周之好生以義紂為炮烙之刑以毒天下武王不忍人之心遂仗義而兵之是好生以義漢之好生也亦以義秦視民命如刈草菅漢高帝不忍人之心仗義而誅之是好生亦以義秦之好殺也以利秦尚殺戮務境土日廣是好殺以利楚之好殺也亦以利項羽事誅伐欲覇天下是好殺亦以利周之好生也以義周室好生出於義而漢且不及漢亦以義但不及周秦之好殺也以利秦皇好殺出於利而楚又過之楚好殺又甚於秦天之道上天之命人之情衆人之心又奚擇於周秦漢楚哉何擇於周漢則歸之秦楚則去之擇乎善惡而已所擇者周漢好生則為善秦楚好殺則為惡也是知善也者乃知善之一字無敵於天下天下莫與之爭而天下共善之天下之人共以善名歸之惡也者惡之一字亦無敵於天下天下亦莫與爭而天下亦共惡之天下之人亦共以惡名歸之天之道上天之命人之情衆人之心又奚擇於周秦漢楚哉何擇於周漢之君而惡夫秦楚之君擇乎善惡而已亦擇其孰善孰惡而已耳觀物篇此篇論帝王受禪興創之迹君子小人實雜處之難人情利害之眞風化操修之昔者孔子思昔夫子語堯舜則曰垂衣裳而天下治論堯舜之揖遜為治則云上衣下裳垂拱而天下治語湯武則曰順乎天而應乎人論湯武之征伐革命則云順天之心應人之心斯言可以該古今帝王受命之理也自古及今凡帝王受命之道斯言盡之矣堯禪舜以德堯授舜以天下以其有重華之徳舜禪禹以功舜授禹以天下以其有平水之功以德帝也以德而授帝者之事以功亦帝也以功而授亦帝者之事然而德下一等下於徳一等則入於功矣則歸於功矣湯伐桀以放湯征夏桀但言放逐武伐紂以殺武誅殷紂明言曰殺以放王也放逐者雖王者之事以殺亦王也殺戮者亦王者之事然而轉語辭放下一等下於放一等則入於殺矣則歸於殺是知時有消長乃知時則有消而有長長去聲事有因革事則有因而有改前聖後聖堯舜禹湯武王非出於一途哉豈非共一途轍者耶天與人相與表裏天道人道二者相因天有隂陽天之有隂有陽為陽則正隂則邪人有邪正即人之有邪有正也邪正之由人之所以邪正者繫乎上之所好也上君也在於上之人之所好好去聲下同上好德則民用正上之人好徳則民罔不正上好佞則民用邪上之人好佞則民罔不邪邪正之由有來矣邪正无不有所自來雖聖君在上雖以聖人在位不能無小人豈能盡无小人是難其為小人但為小人者難肆其志雖庸君在上雖以庸主在位不能無君子豈能盡无君子是難其為君子但為君子者難行其道自古聖君之盛自古人君聖哲之極未有如堯舜之世未有過於堯舜者君子何其多耶君子之人甚多時非無小人也一時豈能盡无小人是難其為小人但小人則難肆其志故君子多也故君子之多所以雖有四凶是以雖有共工驩兠三苗伯縣四者之凶惡不能肆其惡放流竄殛不使之得以逞其為惡之心自古庸君之盛自古人君庸暗之甚未有如商紂之世未有過於商紂小人何其多耶小人之衆甚多時非無君子也一時豈能盡无君子是難其為君子但君子則難行其道故小人多也故小人之多所以雖有三仁是以雖有箕子比干㣲子三數仁賢不能遂其善遁身剖心不使之得以遂其為善之志是知君擇臣乃知為君而擇乎臣臣擇君者為臣而擇乎君是繫乎人也此皆在乎人者也君得臣為君而得乎臣臣得君為臣而得乎君是非繫乎人也此則非人之所能為繫乎天者也皆天開遇合之㑹也賢愚人之本性或賢或愚禀性一定利害人之常情趋利背害人情皆然虞舜陶于河濱陶冶鑄也舜陶於河濱之所傅說築于巖下築版築也説築于傳岩之野天下皆知其賢天下之人皆知其有賢德也而百執事不為之舉者在朝百官皆莫之薦者利害使之然也一利害之心使然耳吁嘆語利害叢于中利害之心荆棘其中而矛㦸森于外矛㦸皆兵器鋒稜之物鋒稜遂見於外又安知有虞舜之聖又豈知舜為聖人而傅說之賢哉𫝊説為賢人河濱非禪位之所河濱非𫝊祚之地也巖下非求相之方傅岩非産相之所也昔在億萬人之下向則屈於衆人之下今在億萬人之上今則伸於衆人之上相去一何逺之甚也其相去何其逺如此也然而轉語辭必此云者必如此言者貴有名者也人亦貴其有善名也天下將治世道將泰則人必尚行則人人皆崇尚行檢行去聲天下將亂世道將否則人必尚言也則人人崇尚言語尚行則篤實之風行焉崇尚行檢則篤厚朴實之俗成尚言則詭譎之風行焉崇尚語言則詭遇譎詐之俗勝天下將治世之欲治則人必尚義也則人人皆崇尚禮義天下將亂世之欲亂則人必尚利也則人人皆崇尚利欲尚義則謙遜之風行焉崇尚禮義則謙卑恭遜之俗成尚利則攘奪之風行焉崇尚利欲則攘取爭奪之風扇三王尚行者也三王所尚者行而已五伯尚言者也五伯所尚者言而已尚行者必入于義也尚行則必歸夫義尚言者必入于利也尚言則必歸夫利義利之相去二者相去一何逺之如是耶一何其逺哉言之於口口以言之不若行之於身不如以身行之行之於身以身行之不若盡之於心不如以心全之言之於口口以言之人得而聞之有耳者皆可聞也行之於身身以行之人得而見之有目者皆可見也盡之於心全之于心神得而知之惟神明得而知也人之聦明人性之聰明猶不可欺尚不可欺况神之聦明乎况於神之聦明者耶是知無愧于口乃知言於口者無愧不若無愧於身不如行於身者無愧無愧于身行於身者無愧不若無愧于心不如存於中心者無愧無口過易故口無過言為易無身過難身無過動為難無身過易身无過動為易無心過難心无過思為難心旣無過心旣无過則人欲凈盡天理流行何難之有凡皆无所難也吁嘆語安得無心過之人又安得於心无過之人而與之語心哉而與之同論心學哉是知聖人所以能立無過之地者乃知聖人純乎天理無有己過謂其善事乎心者也不過能從事乎盡心之道耳觀物篇此篇論帝王伯狄有等第之分死生正與不正之别仲尼曰夫子云韶盡美矣韶舜樂名旣盡其美又盡善也又盡其善武盡美矣武武王樂名旣盡其美未盡善也未能盡善又曰又云管仲相桓公管仲相齊桓公相去聲覇諸侯為諸侯伯一正天下一定天下民到于今受其賜民至于今皆受管仲之賜微管仲若无管仲吾其被髪左祍矣民皆被髪衣祍尚左而為夷狄之俗是知武王雖不逮舜之盡善盡美乃知武王雖不及舜旣盡羙乂盡善以其解天下之倒垂但天下苦於紂之虐而武王撥亂反正猶倒垂之勢得其解之則下于舜一等耳雖下於舜亦只是一等桓公雖不逮武之應天順人齊桓公雖不及武王之上應乎天下順乎人以其覇諸侯但以其能覇服諸侯一正天下一定天下則髙于狄逺矣則勝於夷狄亦甚逺矣以武比舜以武王與帝舜比則不能無過一是揖讓而得天下一是征伐而有天下則武不及舜比桓則不能無功若比齊桓則功實過之以桓比狄以齊桓與狄人比則不能無功若非齊桓一正天下則民胥為夷固為有功比武則不能無過若比武王應天順人則其威覇天下桓公不及武漢氏則宜立乎其武桓之間矣漢興則在於武王齊桓之中是時也於此之時非㑹天下民非遇天下百姓厭秦之暴且甚厭秦室暴亂之極雖十劉季百子房雖十漢髙祖之為君百張良之為輔其如人心之未易何其奈人心之未去秦何且古今之時則異也自古及今之時雖有異民好生惡死之心則不異也斯民喜生惡死未嘗不同好惡並去聲自古殺人之多自古殺戮之衆未有如秦之甚莫若秦之極甚天下安有不厭之乎天下之人安得而弗厭之夫殺人之多殺戮之衆不必以刃不以利刄謂天下之人以謂人民之衆無生路可趨也無可趨生之路而又况以刄多殺天下之人乎况於以利刄而屠戮生民者邪秦二世萬乘也以秦之二世皇帝以天子萬乘之尊乘去聲下同求為黔首而不能得欲為百姓而不可得史趙髙使閻樂弑二世二世願為黔首閻樂弗許黔首百姓也漢劉季匹夫也漢髙祖起於泗上特一匹夫免為元首而不能已元首君也取在人上之義欲免為天下君而不能得萬乘匹夫天子與一夫相去有間矣其相去有等夷矣間去聲而有時而代之者而或有以匹夫而代萬乘者謂其天下之利害以天下之大利大害有所係之耳有所關係之也天之道上天之命非禍萬乘而福匹夫也非是禍於萬乘之君而福於一夫也謂其禍無道而福有道也盖無道者降殃有道者則獲福也人之情衆人之心非去萬乘而就匹夫也非是舍天子而就一夫也謂其去無道而就有道也盖無道則去之冇道則歸之也萬乘與匹夫天子與一夫相去有間矣其相去有等夷矣然而轉語辭有時而代之者或有以一夫而代萬乘者謂其直以天下之利害亦以天下之大利大害有所係之耳有所關係之也任天下事易以天下事自任人所易也死天下事難因天下事致死人所難也死天下事易死天下事猶易成天下事難死而能成天下之事為難也茍能成之誠能成天下事又何計乎死與生也何必計較此身之生死如其不成如不能成天下事雖死奚益縱死亦何所補况其有正不正者乎况有得其正而死與不得其正而死乎與其死於不正與其死於不得其正孰若生於正又豈如得其正而生與其生於不正與其生而不得其正孰若死於正又豈如得其正而死在乎智者之一擇焉在乎有識者決擇於斯死固可惜一死固可惜貴乎成天下之事茍能成天下之事雖死何憾如其敗天下之事其或不能成天下之事一死奚以塞責雖死何足以稱塞其責生固可愛人之生固可樂貴乎成天下之事也茍能成天下之事其生亦樂如其敗天下之事其或不能成天下之事一生何以収功雖生何足以成就其功噫嘆辭能成天下之事旣能成其事於天下又能不失其正而生者生而又得其正非漢之絳侯豈非漢室之周勃吕后顓制諸吕作難勃起而誅之唐之梁公而何又豈非唐之狄仁傑武后專制外戚擅私仁傑起而誅之微斯二人無此二人則漢唐之祚劉氏李唐之運祚或幾乎移矣将移而属之他人矣豈若虛生虛死者焉豈如世人生死俱不能成事如堯夫詩所謂還知虚過死萬遍恰似不曽生一般也夫虛生虛死者夫虛生虛死之人譬之蕭艾正如蕭艾惡草倐生倐死忠於智者誠有智識之人不遊於其間矣不處身於虛生虛死之中也觀物篇此篇言人道所行有邪正之不同行之正則正所行旣正斯无不正行之邪則邪所行旣邪自无不邪邪正之間介乎邪正二者之中有道在焉正則為正道邪則為邪道何以知正道邪道之然乎奚以知其然邪君行君事君主於仁臣行臣事臣主於敬父行父事父止於慈子行子事子止於孝夫行夫事夫主於和妻行妻事妻主於柔君子行君子事君子則篤君子之行小人行小人事小人則循小人之習中國行中國事中國有中國之道外裔行外裔事外裔安外裔之俗謂之正道不相侵奪各行所安此謂之正也君行臣事君為臣之事臣行君事臣為君之事父行子事父為子之事子行父事子為父之事夫行妻事夫為妻之事妻行夫事妻為夫之事君子行小人事君子為小人之事小人行君子事小人為君子之事中國行外裔事中國為外裔之事外裔行中國事外裔為中國之事謂之邪道倒行逆施實亂其常此謂之邪至於三代之世治及夏商周之世皆治未有不治人倫之為道也皆由正人倫以為道也三代之世亂至於末世皆亂未有不亂人倫之為道也皆由亂人倫以為道也後世慕三代之治世者後世慨慕夏商周之治未有不正人倫者也則人倫未有不正後世慕三代之亂世者後世興慕末世之亂離未有不亂人倫者也人倫未有不亂自三代而下自夏商周而降漢唐為盛漢唐之世為盛未有不由治而興其興則以治人倫而興亂而亡其亡則以亂人倫而亡其興也當其興隆未有不由君道盛盖以君道常盛父道盛父道常盛夫道盛夫道常盛君子之道盛君子盛中國之道盛中國盛是皆正道故興其亡也當其亡㓕又未始不由臣道盛盖以臣道盛於君子道盛子道盛於父妻道盛妻道盛於夫小人之道盛小人盛於君子外裔之道盛外裔盛於中國是皆邪道故亡噫嘆語二道對行邪正並行何故治世少而亂世多耶何為治之日少亂之日多君子少而小人多邪君子之人少小人之類多曰豈不知陽一而隂二乎陽止一畫而為善者常少隂有二畫而為惡者常多天地尚由是道而生天地尚因是道以生况其人與物乎何况於人物人者物之至靈者也人有識有知為萬物之最靈物之靈未若人之靈物雖有知未若人之至靈尚由是道而生物且尚因道以生又况人靈於物者乎况人又靈於物者邢是知人亦物也乃知人亦天地中之一物也以其至靈但以其為最靈故物謂之人也所以别於庻物之中而謂之人觀物篇此篇言聖人以天下之耳目心口為耳目心口故至神至聖夫所以謂之觀物者是書以觀物名篇者非以目觀之也非實有假於日以觀之非觀之以目旣不以目觀而觀之以心也則所觀者以此心非觀之以心旣非以心觀而觀之以理也則所觀者理而已天下之物天下之萬物莫不有理焉皆有其理莫不有性焉其理皆具於性莫不有命焉而性皆出於命所以謂之理者曰理云者窮之而後可知也必窮究其極而後能知之也所以謂之性者曰性云者盡之而後可知也必全盡其妙而后能知之所以謂之命者曰命云者至之而後可知也必推而至之而後能知之葢理即性之所具性即天之所命纔窮得理便盡得性纔盡得性便知天之所以予我者三事一時並了初無次第也此三知者理性命三者之知天下之眞知也是為眞知雖聖人無以過之也雖是聖人亦不過如是而過之者而有越於此非所以謂之聖人也非聖人事也夫鑑之所以能為明者鏡之所以光明不昧者謂其能不隠萬物之形也言其能燭萬物之形雖然轉語辭鑑之能不隠萬物之形鏡之照物之形未若水之能一萬物之形不如水之鑑物又能合天下之物形雖然轉語辭水之能一萬物之形水之照形又未若聖人能一萬物之情也又不如聖人能合萬物之情而一之也聖人所以能一萬物之情者聖人所以能合萬物而一其情者謂其能反觀也言其能反而觀之也所以謂之反觀者夫所以反觀者不以我觀物也不以已而觀萬物不以我觀者萬物旣不以已觀之以物觀物之謂也是即物察物也旣能以物觀物旣即物而察物又安有我於其間邪則其理則一不見其有我之分是知我亦人也乃知己即是人人亦我也人即是己我與人皆物也已與人皆未離於物也此所以能用天下之目為己之目人已理一則因天下之見為見其目無所不觀目自無所不見用天下之耳為己之耳合天下之聞為聞其耳無所不聽耳自无所不聽用天下之口為己之口以天下之口為口其口無不言矣口無所不言用天下之心為己之心以天下之心為心其心無所不謀矣心無所不慮夫天下之觀合天下以為觀其於見也見无不見不亦廣乎豈不甚廣天下之聽合天下以為聼其於聞也聞無不聞不亦逺乎豈不甚逺天下之言合天下以為言其於論也言無不言不亦髙乎豈不甚髙天下之謀合天下以為謀其於樂也樂其所樂不亦大乎豈不甚大其見至廣見廣矣其聞至逺聞逺矣其論至髙論髙矣其樂至大樂大矣能為至廣至逺至髙至大之事能為此四者之事而中無一為焉而此心一無所為豈不謂至神至聖者乎豈不神之至聖之至乎性理羣書句解卷十五
