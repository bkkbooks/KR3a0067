body:
  text: 性理羣書句解卷二十三宋熊節撰熊剛大注行實晦菴朱先生行狀此篇言先生立身行己之方著書傳道之實勉齋黃先生先生姓朱氏姓朱諱熹熹其名也字仲晦仲晦其字世居徽之婺源世居徽州婺源縣父松父諱松仕於建仕於建寧遂家於建陽縣之考亭因徙居建陽縣之考亭先生年十八舉進士十八歲鄉舉登第登科自少厲志聖賢之學自少時即刻志自厲聖賢之學自韋齋得中原文獻之傳其父韋齋得中原正學之傳聞河洛之學得聞洛中二程之學推明聖賢遺意推究古者聖賢之餘旨日誦大學中庸日日誦讀大學中庸二書以用力於致知誠意之地盡其力於推極其知誠實其心所發之地先生蚤歲先生自蚤年已知其説已得備聞其言而心好之而此心甚喜之韋齋病且亟韋齋病革屬曰且亟屬先生云籍溪胡原仲姓胡名仲字原仲籍溪其號白水劉致中劉姓致中其字白水其號屏山劉彥沖姓劉字彥沖屏山其號三人吾友也此三人者皆我之友學有淵源問學有源吾所敬畏皆我所敬所畏之人吾即死我若死汝往事之汝往其家敬事之而唯其言之是聽唯三先生之言是聽則吾死不恨矣我雖死亦無所恨先生既孤先生既失父則奉以告三君子而稟學焉則奉此語以言三先生稟命而學時年十有四時年已十四慨然有求道之志奮然有志於道博求之經傳廣求於聖經賢傳遍交當世有識之士凡當世有見識之人無不納交雖釋老之學雖是釋氏老氏之學亦必訂其是非亦必考論其為是為非延平李先生延平南劒也李姓名侗字願中學於豫章羅先生豫章龍興也姓羅名仲素延平又師之羅先生學於龜山楊先生揚姓時名字中立龜山其號也豫章師之延平於韋齋為同門友延平韋齋皆共學之友也先生歸自同安先生初官泉州同安簿既歸徒步往從之徒行從延平遊延平稱之曰延平稱先生曰樂善好義樂親善人好行義事鮮與倫比無人可與之比倫鮮去聲又曰又言頴悟絶人秀頴超越過人力行可畏篤行可敬其所論難其所辨論問難體認切至體認是理切當自是經遊幾年自此從學幾年學之所造益深矣學之所詣愈極其逺其為學也其為學之道窮理以致其知窮究義理推極其知反躬以踐其實反之吾身求踐實行居敬者所以成始終也自守以敬終始不違謂致知不以敬言推極吾之知識茍不以此敬為本則昏惑紛擾則昏亂迷惑紛紛擾擾無以察義理之歸則不能究義理之所歸宿躬行不以敬行己茍不以此敬為本則怠惰放肆則怠惰肢體放肆私欲無以致義理之實不能得義理之真持敬之方所以持守是敬莫先主一則在乎主此一主一云者心主一事更不參插第二第三事既為之針以自警既為敬齋針以自警飭又筆之書又載之大學或問之中以為小學大學以為人自八歲入小學十五歲入大學皆本於此莫不皆出於敬終日儼然正其容貌端坐一室獨處一室討論典訓搜閲書籍未嘗少輟無少止息自吾一心一身自我一心一身之中以至萬事萬物至於萬事之多萬物之衆莫不有理莫不有此理存此心於齋莊靜一之中操存此心以敬為本齋莊靜一敬也窮此理於學問思辨之際而復能窮究此理於博學審問謹思明辨之頃皆有以見所當然而不容已有以見其所當然之理而不容自己與其所以然而不可易與其所以然之故而不容易者然充其知而見於行者充其所知而見於所行未嘗不反之於身也未有不反面求諸已也不睹不聞之前未有所睹未有所聞所以戒謹者所以戒謹於身者愈嚴愈敬益嚴敬隱微幽獨之際暗室屋漏之中所以省察者所以省察於心者愈精愈密益加精密思慮未萌念慮未起而知覺不昧心知不昧事物既接事物交接而品節不差而裁度不差無所容乎人欲之私一私不容有以全乎天理之正萬善皆備其為道也道其所道有太極而隂陽分既有太極是分隂陽有隂陽而五行具自隂陽分則生金木水火土而為五行稟隂陽五行之氣以生稟得此隂陽五行之氣而有此生人則太極之理則至極之理各具於其中各具於隂陽五行之中天所賦為命天以隂陽五行之理賦於人則謂之命人所受為性人稟得此隂陽五行之理於心則謂之性感於物為情感物而動則為情統性情為心統乎性情而為性情之主則為心根於性則為仁義禮智之德藴於性則為四者之德發於情則為惻隱羞惡辭讓是非之端見於情則有是四端之用形於身則為手足耳目口鼻之用形之於身則為六者之用見於事則為君臣父子夫婦兄弟朋友之常逹於事則為此五倫之道求諸人求之於人則人之理不異於己則人之理與己一參諸物博參諸物則物之理不異於人則物之理與人一莫不析之極其精而不亂析之則極其精微而不至於錯亂然後合之盡其大而無餘合之極其大而無有餘先生之道先生所謂道可謂建諸天地而不悖揭諸天地而無違悖質諸聖賢而無疑質諸聖賢而契合無疑其得於己而為德也其有得於身而為此德以一心而窮造化之原以一心而探造化之藴盡性情之妙盡其性情之德達聖賢之藴窮聖賢之藴奧以一身而體天地之運以一身參天地之妙備事物之理備事事物物之理任綱常之責任三綱五常之大明足以察其微明足以燭是非之微剛足以任其重剛足以任是道之重𢎞足以致其廣𢎞足以充是道之廣毅足以極其常毅足以守是道之常至於養深積厚至於所飬之深所蓄之厚矜持者純熟始於操持終自純熟嚴厲者和平初則嚴厲終自和平心不待操而存心雖不操而自無不存義不待索而精義未嘗索而自無不精而非後學之所可擬故也而非後來學者所可比擬而論議也其間居也燕間之居間音間未明而起昧爽即興深衣幅巾衣深衣戴幅巾拜於家廟拜於廟堂以及先聖以及夫子退坐書堂退處書堂几案必正讀書几案必使之正書籍器用必整圖書器物必使之齊其飲食也其於飲食之際羮食行列有定位飯左羮右有定位也七箸舉措有定所當飯而用飯畢則收有定所也倦而休也疲倦休息瞑目端坐假寐危坐也休而起也休息復起整步徐行適意緩步也中夜而寢夜半方寐既寢而寤已寐而覺則擁衾而坐擁被端坐或至達旦以至通宵威儀容止之則威儀可法容止可則自少至老自其年少以至年老未嘗須臾離也無頃刻不如此也於家也施之於家奉親極其孝事親則盡孝撫下極其慈恤幼則有恩閨庭之間閨門之內內外斬斬中外整然恩義之篤有思有義怡怡如也何其和也其祭祀也其於祭祀事無纎巨事無大小必誠必敬盡誠盡敬小不如儀小不合禮終日不樂盡日不悅其自奉自奉於己則衣取蔽體衣不過蔽其身食取充腹食不過充其腹居止取足以障風雨所居之室不過求可以蔽風雨而已人不能堪人不堪其憂而處之裕如也先生處之泰然自足若其措諸事業若夫施諸事業之際則州縣之設施則治行州縣之間立朝之言論言出朝廷之上亦可槩見亦可見其大概雖達而行道雖出而行斯道於世不能施之一時不足以究其一時之設施然退而明道退而著是道於書足以傳之萬代可以為萬代之承繼於大學中庸於此二書則補其闕遺闕文則補之如大學補致知格物章之類别其次第分其次序如二書各分章句是也綱領條目如二書各分經傳經為綱領傳為條目粲然復明昭如日星於論語孟子於語孟二書則深原當時問答之意則推明一時師弟子問答之意使讀而味之者使讀此書而玩味之者如親見聖賢之面命猶親承孔孟之誨於易與詩於詩易二經則求其本義則深明是書本然之義深得古人遺意於數千載之上有得古人餘旨於萬代之上凡數經者凡是數經見之傳注皆為訓釋其關於天命之微大而天命之藴人心之奧近而人心之妙入德之門進德之門户造道之閾造道之閾奧閾音域發其旨趣無不發明其精藴而無所遺矣無有所遺矣於書則疑今文之艱澀於尚書則明今文之異其言語艱澀反不若古文之平易不如古文之粹語意平易故於逐篇之下有今文古文之别於春秋則疑聖心之正大春秋則疑夫子之心正大決不類傳注之穿鑿不如公穀左氏之破碎於禮則病王安石廢罷儀禮禮則深惡王荆公之滅裂禮文而傳記獨存於樂傳記之中獨載夫樂至若歷代史記古今之史則又考論西周以來則考究議論自平王以來至於五代終於梁唐晉漢周之五代取司馬公編年之書取溫公資治通鑑編年之史繩以春秋記事之法用春秋褒貶之筆周程張邵之書四君子之著書所以繼孔孟道統之傳上續孔孟千載不傳之道統歷時未久閲歷年歲未深鬱而不章文義無有為之發明者先生為之裒集發明先生乃搜集遺言發揮傳注而後得以盛行於世此書而後大行於天下太極先天圖太極周子所著先天圖邵子所述精微廣博微妙浩博不可涯涘不可窺測為之解剝條畫為之解注條具而後天地本原造化之本始聖賢藴奧聖賢之精藴不至於泯沒不至於湮沒先生教人先生誨人以大學語孟中庸即是四書為入道之序為求道之端而後及諸經然後方及他經以為不先乎大學不首先大學之書則無以提挈綱領則不能提綱挈領而盡語孟之精微而盡得語孟精徽之理不參之以語孟既會大學不使之參究語孟精微之理則無以融會貫通則不能渾融該貫而極中庸之旨趣而逹中庸奧妙之旨何以建立大本又何以植其大本經綸大經哉而立其大經耶一時摳衣而來一時摳趨先生之側逺自川蜀雖四川西蜀之逺莫不咸至文詞之傳文章之傳播流及海外以至窮海之外至於四逺彼四逺不習文教之人亦知慕其道亦莫不慕先生之道先生既沒先生已死學者傳其書為學之士傳誦其書信其道者益衆信先生之道者益衆亦足以見理義之感於人者深矣亦可見理義之入人心其深固如此夫繼往聖將墜之緒續前聖欲墜之統啓前賢未發之機開前哲所未發之言辨諸儒之得失辨論諸儒之或得或失闢異端之訛謬斥異端之訛舛害道明天理推明天理正人心一正人心事業之大功業之盛孰有加於此誰得而加之至若天文地志至如上而天文下而地理律厯兵機音律厯數兵法之書亦皆洞究淵微亦能洞察其深妙是非資稟之異若非天資之異於人學行之篤學力之加於己安能事事物物又安至於萬事萬物各當其理無一不當於理各造其極焉無一不詣其至哉秦漢以來自秦漢而下迂儒曲學儒者迂濶皆非正學既皆不足望其藩墻既皆不足以窺先生之門墻而近代諸儒面近世儒者有志於孔孟周程之學者有志一聖三賢之學亦豈能造其閫域哉又安能詣先生之閫奧哉嗚呼嘆辭是殆天所以相斯文焉是皆天佑斯文篤生哲人生我先生以大斯道之傳也以昌斯道之一脈也慶元六年庚申歲寧宗年號卒於正寢終於家年七十一夀七十一歲纍歷官終侍講終於講進之官後贈太師封徽國公贈以師垣之官封公爵諡曰文賜諡文性理羣書句解卷二十三
