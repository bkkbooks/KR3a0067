body:
  text: 性理羣書句解卷二十二宋熊節撰熊剛大注行實康節先生墓志銘此篇言先生安貧樂道悟隂陽消長之理不以富貴動其心明道先生熙寧丁巳孟秋熙寧年間丁巳歲七月堯夫先生堯夫邵子字也疾終於家以疾歿於家洛之人弔哭者相屬於塗洛之人士弔哭其家者相聨屬於道其尤親且舊者其至親且舊之甚者又聚謀其所以葬又相與同謀其葬之事先生之子先生子名伯溫泣以告曰垂涕以相告云昔先人有言昔吾父有云志吾墓者記吾之墓必以屬吾伯淳必當屬於明道伯淳其字也噫嘆辭先生知我者邵子其知豫者以是命我以此而屬於我我何敢辭我亦不得而辭焉謹按邵氏姬姓謹考邵氏出於姬姓系出召公世出召奭故世為燕人故世為燕國人父諱古父名古隱德不仕隱其德不耀先生之幼先生少時從父徙共城隨其父移居共城晚遷河南晚年方始遷居河南葬其父於伊川葬其父於伊川之地遂為河南人為河南人先生生於祥符辛亥先生生於祥符年間辛亥歲至是蓋六十七年矣至此已是六十七年雍先生之名先生諱雍而堯夫其字也堯夫先生之字也娶王氏妻姓王伯溫仲良其二子也二子長伯溫次仲良先生之官先生得官初舉遺逸仁宗嘉祐中舉遺逸試將作監簿王公拱辰以先生應授將作監簿後以為潁州團練推官後又以為潁州推官辭疾不赴以疾病辭不赴先生始學於百源百源明數學之人先生初就之學堅苦刻勵堅心若節刻志自勵冬不爐冬不向火夏不扇夏不揮扇夜不就席者數年夜不就榻如此數年衛人賢之衛之人皆賢之先生嘆曰先生方且興嘆云昔之人尚友於古昔之人尚友於古人而吾未嘗及四方而我尚未及四方之中遽可已乎而可自正耶於是走吳適楚乃走吳郡適楚邦過魯客梁晉過魯國客梁晉之地久之而歸曰既久則盡得所學浩然而歸云道其在是矣吾道其在於是蓋始有定居之意方始有定厥居之意先生少時先生年少時自雄其才雄騁其才慷慨有大志奮然有大志尚既學既奔走四方而學力慕髙逺所慕者非淺近謂先王之事謂三代之治為可必致必然可致及其學益老及為學日益老德益邵而德日益髙玩心髙明心超於造化之表觀天地之運化密察天地運化之妙隂陽之消長隂陽消息之理以達乎萬物之變以逹之萬物之變然後頽然其順而後怡然而順其理浩然而歸浩乎而歸在洛幾三十年居於洛者凡三十年始也蓬蓽環堵初則蓬室蓽門環壁不全不蔽風雨不足以蔽蓋風雨躬㸑以養其父母躬親炊㸑以致養其親養去聲居之裕如居處泰然而自安講學於家講論正學於其家未嘗強以語人未嘗強以語諸人而就問者日衆而來問之人日益衆鄉里化之鄉里之人皆化其習逺近尊之逺近之人皆尊其學士人之道洛者士大夫之趨洛有不之公府非是往見州郡而必之先生之家則是往訪先生之廬先生德器粹然先生道德氣質純粹望之可知其賢望而見者即知其為賢然不事表暴不欲表暴於世不設防畛不立限界正而不諒正直而不求信於人通而不汚明通而無所汚濁清明坦夷清潔自將平易可近洞徹中外洞照內外接人無貴賤親疏之間其接於人無貴無賤無親無踈之間隔羣居燕飲笑語羣聚飲燕笑言終日不取甚異於人盡日不與人異顧吾所樂如何耳亦觀我所自樂如何病畏寒暑以疾病畏盛寒盛暑之時常以春秋常以春暖秋涼之時行遊城中行遊於城市之中士大夫家士大夫之家聽其車音聽先生之車音倒屣迎致倒屣爭出迎致雖兒童奴𨽻雖童稚傭奴之人皆知歡喜尊奉無不喜於尊親其與人言與人言語必依於孝悌必以孝親遜長為先樂道人之善喜言人善而未嘗及其惡未嘗及人之惡故賢者悅其德賢者之人則愛其德不賢者服其化不賢之人咸服其教所以厚風俗能使風俗之歸厚成人材成人之才美也先生之功多矣先生之功可謂大矣昔七十子學於仲尼昔仲尼闡教道通者七十人其傳可見者得其親傳而可見於經者曽子子思惟曽子子思為有宗而子思之所以授孟子子思傳之於孟子其餘門人其他門弟子各以材之所宜為學各以其才之宜學者以為學雖同尊聖人雖是同尊聖人之道所因而入者因此而入道者門户亦衆矣其門户亦多矣况後乎千歲自孟子沒又千餘年師道不立師道不能有立學者莫知其從來學者不知其所自來獨先生之學為有傳也獨有先生之學為得其傳先生得之於李挺之先生得其傳於李之才挺之得於穆伯長之才得於穆修推其源流推本其論逺有端緒其來之逺亦有其源今穆李之言今穆修李之才之言及其行事槩可見及行事之迹大概可見而先生醇一不雜先生則真醇純一不流於雜汪洋髙大浩博髙逺乃其所自得者多矣又其所自得者先生有書十二卷著書凡十有二卷曰皇極經世名之曰皇極經世古詩二千篇為古製凡二千餘篇題曰擊壤集名之曰擊壤集先生之葬及葬祔於先塋祔於其先之丘壠實其終之年孟冬丁酉也乃其死年冬月也銘曰復為之銘云嗚呼先生嗟哉先生志豪力雄志氣之逸力量之大濶步長趨步地之髙趨向之廣凌髙厲空心通天地歷覽無際探幽索隱窺造化之幽微究天理之隱奧曲暢旁通由一偏而推闡復即其近以求通在古或難在古人或所難先生從容獨先生之不迫有問有觀于問于觀以厭以豐厭足而該通天不憗遺天不以此遺我後人憗魚覲切哲人之凶乃使賢者大數如此鳴臯在南葬所地名伊流在東亦地名有寧一宫沒寧之宫先生所終先生終於此矣涑水司馬先生行狀此篇述先生立朝處己之節歷官行事之美蘇軾公姓司馬姓司馬名光光其名字君實君實其字峽州夏縣人世居峽州夏縣初以父任以父蔭為將作監簿為監簿舉進士擢進士甲科登甲科簽書武成軍判官事受簽判入為國子監直講入為學官召試試館職除館閣校勘除校勘同知太常禮院兼知禮院公自成童公自幼時凛然如成人凛乎如既冠者七歲聞講左氏春秋及七歲聞講論左傳大愛之深喜之退為家人講退而與家人講説即了其大義即通曉其義自是手不釋卷自此手不停披至不知飢渴寒暑渴飲飢食與天時寒暑並不知年十五十五歲書無不通於書無不通曉文辭醇深文學醇正而深切有西漢風類西漢風至和中至和年中仁宗始不豫仁宗不豫悅國嗣未立國本未立天下寒心天下之人莫不凛凛惟諌官范鎮惟范鎮為諌官首發其議首言其事公時從龐莊敏公辟公以其奏辟通判并州為并州通判聞而繼之聞范公之請而繼其後上疏言上章奏願擇宗室願選宗室之賢者使擁儲二使暫居儲位以待皇嗣之生以俟誕生聖嗣退居藩服退守藩府亦足係天下之望可以係屬天下之心及為諌官後為諌官復上疏再上章且面言臣為并州通判面陳為并倅時所上三章凡三章言儲二事願陛下果斷力行之願得斷決而行其言時仁宗簡默不言上天性謹默雖執政奏事雖大論奏臣首肯而已頷之而已聞公言聞先生之語沉思久之默思甚久曰得非欲選宗室為繼嗣者乎豈非欲使我選宗英以為嗣續計此忠臣之言也此盡忠之論英宗即位英宗登極公論入內任守忠大姦公言內侍任守忠者大姦猾沮壞大䇿搖撼立嗣之大計離間百端百計離間交構兩宫構怨兩宫國之大賊為國之巨賊乞斬於市請戮諸市曹以謝天下以謝天下之人詔守忠蘄州安置安置守忠於蘄神宗即位神宗即位公上疏論修心之要三先生上章言正心之道有三仁明武仁主於愛明主於察武主於斷治國之要三治國之要三官人信賞必罰任官惟人有功必賞有過必罰其説甚備其言極詳臣昔為諌官臣向居諌位即以此六言獻仁宗嘗以此六者獻之仁考其後以獻英宗及其後復獻於英考今以獻陛下今又獻之神宗平生學力平生為學之力盡在是矣並在於此執政以河北災傷大臣以河北之地時有災傷國用不足國用匱乏乞今歲郊賚乞今年郊祀賜賚羣臣兩府不賜金帛政府不必賜金與帛送學士院取旨令學士院降詔與王安石王圭同對與二人同對上前公言救災節用先生言救災傷節財用宜自近始當自近而朝廷始可聽辭賜可聽其辭免賜賚安石曰王安石云常衮辭賜饌昔常衮辭賜御饌時議以衮自知不能當時人議之謂衮自知其不足當此辭位不當辭祿則當去位不當辭其賜饌且國用不足且國之用度不足非當今之急務也非是今日急切之事公曰先生云衮辭祿常衮辭其賜猶賢於持祿保位者猶勝於貪其祿固其位也國用不足國家財用之乏真急務真是急切之務安石言非是王安石之言不當安石曰安石又云不足者臣之所謂不足者以未得善理財者故也以未得其能理財之人公曰先生又云善理財者所謂以理財為能者不過會斂以盡民財不過聚斂以竭天下之財民窮為盜百姓窮斯濫則為冦盜非國之福非是吾國家之福人安石曰不然安石言非善理財者善於謀利者不加賦而上足用不必增稅而國用自足公曰先生云天下安有此理天下如何有此道理天地所生天所生地所産止有此數其數有限不在民則在官不在於百姓則在於公帑不加富而上用足不增稅而國用足不過設法隂奪民利不過别立一法如青苗之類隂實攘奪百姓之利其害甚於加賦而流害過於增賦此乃桑𢎞羊欺武帝之言不過𢎞羊之徒立法取財以欺其君至其末年至於晚年盜賊蜂起盜賊羣起幾至於亂幾於大亂若武帝不悔禍如漢武帝不悔其非昭帝未變法孝昭不能變其所為則漢幾亡則漢將亡矣及王安石執政及安石秉政始創條例司别置官謂之條例司建青苖助役水利均輸之政立此四者之法謂之新法名曰新法公上疏逆陳其害先生上章力説其弊行之十年新法之行凡十年皆如公草其言皆如先生奏藁邇英進讀蕭何曹參事邇英殿侍講一日謀蕭規曹隨事公曰先生云參不變何法曹參不改蕭何之法得守成之道得守己成之理故孝惠髙后時故惠帝與吕后之時天下晏然天下無事衣食滋殖民之衣食豐足上曰神宗云漢常守蕭何之法漢家永守蕭何之規不變可乎常不必變可耶公曰先生言何獨漢也何必漢之君使三代之君雖使夏商周之主常守禹湯文武之法常遵其祖宗之典雖至今存可也其國祚雖至今尚存亦可漢武帝用張湯言漢武信張湯酷吏之言取髙帝約束紛更之取祖宗制度盡改更之盜賊半天下以至盜賊並起元帝改宣帝之政元帝不守孝宣之政而漢始衰而漢祚自此衰由此言之以此而言祖宗法不可變也祖宗之法不可改易後數日又其後幾日吕惠卿進講惠卿安石黨也當其講説因言先王之法因論三代之法有一年一變者有一歲一改作者正月始和月吉之初布法象魏是也象魏雉門兩觀也懸其法於上此是也有五年一變者有五年一改變者巡狩考制度是也巡視諸侯而省察制度是也有三十年一變者有三十年而一變易者刑罰世輕世重是也三十年為一世世輕世重是三十年一變也有百年不變者有歷百年不可改者父慈子孝是也人倫而已前日光言非是前日光言未當其意以諷朝廷其意譏諷朝政且譏臣為條例司官耳且議臣不當為此職上問惠卿言何如神宗問惠卿所言如何公曰答云布法象魏示法於象魏間布舊法也只舊典也何名為變非變也若四孟月朔若四時孟月之朔也屬民讀法會民聽法為時變月變耶此可為時一變月一變耶諸侯有變禮易樂者諸侯凡有變其禮易其樂者王巡狩則誅之天子巡視則戮之王不自變也天子未嘗自變刑新國刑新立之國用輕典則用薄刑亂國用重典於暴亂之國則用重刑平國用中典凡國則用平典是為世輕世重此之謂世輕世重非變也不是變法先生博學無所不通學問無不通音厯天文書數音樂律厯天文書數之學皆極其妙皆造其藴尤好禮喜尚禮教不喜佛老不喜釋老之學有資治通鑑傳於世奉詔撰述通鑑一書賜名資治公嘗問康節曰先生問堯夫云我何如人某何等人康節曰堯夫云君實腳踏實地人也乃步步著實之人公深以為知言先生以其能言己事明道嘗言明道先生嘗曰君實之語先生之言如人參甘草如良藥也又曰又言君實之忠孝誠實先生忠於君孝於親真誠靠實只是天資皆其天資純粹暗與道合范太史亦以為勤禮出於天性而范公亦言天性自然先生多歷清要多歷清要之職自并州通判權起居注同知諌院除制誥除是數職辭至八九力辭授天章閣待制兼侍講繼又擢是數職神宗初擢翰林學士又入翰學力辭又辭不許上不許為御史中丞遷翰林學士又除臺官翰苑拜樞密副使除入政府不拜不受以端明殿學士出知永興軍以執政恩例出判永興移知許州不赴辭提舉崇福宫復領宫祠纍遷元祐元年拜左僕射兼門下侍郎相職也九月薨是年九月卒年六十八享年六十八贈太師溫國公贈師垣封溫國哲宗親篆碑額曰哲宗親書其墓碑清忠粹德之碑褒之以清忠粹德四字建炎二年高宗建炎年間詔配饗哲廟云侑食哲宗廟庭性理羣書句解卷二十二
