body:
  text: 性理羣書句解卷二十一宋熊節撰熊剛大注行實伊川先生年譜此篇記先生道德行業之實講導輔翼之功文公先生先生名頥賾先生名也字正叔正叔其字明道先生弟也明道之弟明道生於明道元年壬申伊川生於明道二年癸酉幼有髙識幼年識見甚髙非禮不動舉措不合於禮不妄動年十四五十四五歲與明道同受學於舂陵周茂叔先生與其兄同學於道州周濓溪皇祐二年國朝年號年十八十八歲上書闕下詣闕上書勸神宗以王道為心勉人主以行王道生靈為念恤百姓為心乞召對陳所學乞召對面陳其學間遊太學嘗遊國學胡翼之主教道即安定先生也名瑗字翼之主教學事嘗以顔子所好何學論試諸生曽以顔子論一篇試學徒得先生所試大驚得先生一篇大驚異處以學職即以學職處之吕希哲原明師焉吕榮公師事之舉進士擢進士嘉祐四年國朝年號廷試報罷罷殿試遂不復試更不應試治平熙寧間皆國朝年號近臣屢薦吕申公等數薦之朝自以為學不足先生固辭學不足不願仕也不欲出仕元豐八年亦年號哲宗嗣位哲宗踐阼司馬公吕公著韓綘是時光門下侍郎公著尚書左丞綘西京留守上其行義於朝並以先生行義薦之於朝按溫公與吕申公同薦札子竊見河南處士程頥力學好古安貧守節言必忠信動遵禮義年踰五十不求仕進伏望特加召命諌官朱光庭又言頥道德純備學問淵博若用斯人俾當勸講必能輔養聖德一正君心授汝州團練推官遂授推官西京國子監教授又除學官先生再辭先生復辭不受尋召詣闕即詔詣闕元祐元年三月是年春至京師至京當時王岩叟奏云伏見程頥早與兄皓俱以德名顯於時陛下復起頥而用之頥趨召待詔闕下四方俊乂莫不翹首向風觀朝廷所以待之如何願陛下此舉係天下之心除宣德郎祕書省校書郎遂除是官先生辭曰先生辭云祖宗時先朝盛時布衣被召以韋布之士被召命自有故事自有舊典今臣未得入見今未得瞻拜天顔未敢祗命未敢拜君之命王岩叟奏云伏聞除頥京官校書郎足見優禮髙賢願一召見之頥靜而閲天下之義理者多必有嘉言以新聖德於是召對遂召入對將以為崇政殿説書將以為講筵之官先生辭不獲困辭不獲始受西監之命於是受西京國子監命且上奏論經筵三事上書言講筵三事其一第一以上富春秋以人君年事已盛輔養為急急於得人輔導涵飬宜選賢德備講官選賢德之士為講官使陪侍宿直使日夜親近人主陳説道義講論義理所以涵養氣質務在葆育氣質薰陶德性陶成善性其二第二請內侍宫人宦官宫妾俱選老成厚重之人皆擇老成重厚者不使侈靡之物無俾奢麗玩好之具淺俗之言鄙卑淺近之語接於耳目嘗交接於耳目之間其三第三請令講官坐講請許講員賜坐講説以養人主尊儒重道之心以表一人尊敬儒道之心既而命下未幾有旨以通直郎充崇政殿説書改直充説書五月是年夏差同看詳國子監條制差同孫覺顧臨詳定學制先生所定先生詳定者大槩以為學校禮義相先之地以為學舍乃崇尚禮遜之所而月使之爭而月試使之爭得失殊非教養之道甚非教育人才之道請改試為課請改月試為供課更不定髙下不必立上下等制尊賢堂以延天下道德之士别立堂名尊賢以待天下之有道德者鐫解額以去利誘除去解額以絶利祿之心如是者十數條如此者十數事時尚書胡宗愈因是深詆先生謂不宜使在朝廷又上疏又復上言言輔養上德謂輔養聖德要使跬步不離正人半步之頃不可與正人相離離大吏切乃可以成就聖德乃可陶成君德講日宰臣史官皆入當講書日宰相與史官並進使上不得舒泰使人君不得自安請自今一月請每月再講於崇政殿兩講於殿內然後宰臣史官入侍而後宰相史官皆進餘日講於延和殿他日講於延和八月差兼判登聞鼓院後除鼓院先生言入談道德謂入説義理出領訴訟出則領受詞訟非用人之體非是用人之道再辭不受復不受楊龜山曰事道與祿仕不同常夷甫以布衣入朝時神宗欲優其祿令兼數局如鼓院梁院之類夷甫一切受之伊川為講官朝廷亦欲使兼他職先生固辭先生在經筵凡在講筵每當進講每遇講説必宿齋豫戒先期齋莊戒飭冀以感動上意求以感動人主之心一日當講顔子不改其樂章一日講論語顔子陋巷不改其樂一章門人或疑此章門弟子疑講此章非有人君事也與人主無相關何以為説將何以言及講畢講説已了復言曰再起言曰陋巷之士貧士居於陋巷之中仁義在躬但知天理有諸身忘其貧賤不知貧且賤之為可憂人主崇髙人君自貴奉養備極玉食之奉極其富貴茍不知學苟不能為學安能不為富貴所移又安不為富貴所動搖且顔子王佐之才也顔淵本有輔王者之才而簞食瓢飲所有不過一竹器之飯一勺之飲而已季氏魯國之蠧也季氏聚斂乃魯國之巨蠧而富於周公而富盛過於周公魯君用捨如此魯國之君其用人如此非後世之監乎非後世之君所當監乎聞者嘆服同朝之士皆嘆而服哲宗亦首肯之哲宗亦從其言嘗聞上在宫中曽聞哲宗在禁中潄水必避螻蟻灌潄擇地恐傷行蟻先生曰先生進言願陛下推此心以及四海願得人君以此愛物之心而仁天下之民一日講罷一日講説已畢上忽起戲折栁枝哲宗起而攀折栁條先生進曰又進言曰方春發生方春生物之時不可無故摧折不應無事損折之上不悅哲宗不喜所講書有容字書中有容字中人以黃覆之內侍以黃帛貼之曰上藩邸嫌名也言犯上嫌名傭同音講罷進言曰講畢又言人主之勢人君之分不患不尊不憂不尊大患臣下尊之過甚但恐為臣者尊大之太過而驕心生爾而驕矜之心生時神宗之喪未除時神宗之服未除而百官以冬至表賀冬至節百官皆進表賀先生言節序變遷又有時序改易時思方切思親之念方切請改賀為慰請改賀禮為慰及除喪既除服有司又將以開樂置宴有司又將舉樂置會先生請罷先生請罷此宴曰除喪而用吉禮除喪之始即用吉禮則因事用樂可矣因事而用樂猶之可也今特設宴今特舉宴是喜之也是喜喪服之除也五年丁太中公憂居父珦喪去官七年已七年服除服制已除除直祕閣判西京國子監除閣職接判西監王公繫年録程頥服除欲與館職判檢院簾中以其不靖遂有今除蓋蘇軾與程頥不合當時分二黨洛黨蜀黨恰軾弟轍執政才進稟便云但恐不肯靖簾中入其説故不得復召五月改授管勾崇福宫遂改宫祠元祐九年哲宗初視政哲宗初視朝申祕閣西監之命依舊閣職判監紹聖間以黨論放歸田里紹聖年間以黨禍罷歸四年及四年送涪州編管遂有此命謝良佐曰門人也有云是行也先生涪州之行乃邢恕等為之耳邢恕從遊先生後畔去為韓愈之藉是故如此元符二年正月易傳成是年易解成三年及三年徽宗即位徽廟登極移峽州量移峽州居住四月復宣德郎任便居住復官放還還洛歸洛中十月復通直郎權判西京國子監再復官與職建中靖國二年五月追所復官是年又追己復官依舊致仕依前致政崇寧二年言者論其姦黨是年又論先生為姦黨先生於是遷居龍門之南龍門先生晚年所居之地也止四方學者曰止四方來學之士云尊所聞行所知可矣尊其所聞行其所知足矣不必及吾門也不必來訪我五年復宣義郎致仕是年又復官致仕時易傳成書已久時易傳久已成書學者莫得傳授學者欲傳而不可得或以為請有請於先生者先生曰答云自量精力未衰自度氣力未減尚覬有少進耳尚期更有所益其後寢疾後疾病始以授尹焞張繹皆門人也尹焞曰先生作傳只是因而寫成大觀元年九月庚午卒於家是年終於其家年七十五凡七十五歲疾革疾甚門人進曰門弟進言先生平日所學先生平時為學正今日要用今日正要用先生微視曰微開眼云道著用便不是才説用便不是其人未出門而沒未及出門而先生已逝初明道先生嘗謂先生曰與先生云異日能使人尊嚴師道者吾弟也蓋以其嚴毅所以能使人尊敬之也若接引後學如引誘後進隨人材而成就之隨其材而器成之則豫不得讓焉則我所不能辭先生既沒先生既死昔之門人髙弟向來從學之徒多已先亡多先逝者無有能形容其德美者未有能述先生之盛德然先生嘗謂張繹曰先生曽與門人張繹云我昔狀明道先生之行我向來狀述明道行實我之道蓋與明道同我之學道與吾兄則一異時欲知我者他日欲知我之行事求之於此文可也而求之明道行實可也橫渠先生行狀此篇述先生精思力踐之功文學政事之美吕大臨先生諱載姓張名載字子厚子厚字也父迪仕仁宗朝父諱迪官於仁宗朝終於殿中丞終臺官知涪州事為涪州守卒諸孤幼既死諸子尚年幼僑寓鳯翔邵縣橫渠鎮之南寓居鳯翔府邵縣橫渠鎮因徙而家焉後遷而家其地先生嘉祐二年登進士第先生以是年及第始仕祁州司法初授祁州法曹遷丹州雲巖縣令再遷為邑宰又遷著作佐郎除臺郎簽書渭州軍事判官又為渭州簽判熙寧二年冬是年冬被召入對以君命入對除崇文殿校書尋擢校書明年移疾次年以疾歸十年春復召還館及十年再召就職同知太常禮院兼知禮院是年冬謁告西歸及冬又請歸田里十有二月行次臨潼臨潼地名行至其地卒於館舍終於次舍享年五十有八壽止五十八歲是月以其喪歸遂以喪歸家元豐八年八月葬於涪州後葬於涪先生始就外傅先生少年初就師學志氣不羣志氣敻異凡人知虔奉父命知敬承父命守不可奪力守不變且無所不學無有不學者與邠人焦寅遊焦姓寅名邠人也與之遊寅喜談兵寅曉兵學先生説其言先生喜其談論上書謁范文正公文正公姓范名仲淹上書謁之一見知其逺器公一見知其逺大之器責之曰因戒之曰儒者自有名教儒家自有名教之樂何事於兵何必兵耶因勸讀中庸勸之讀中庸之編先生猶以為未足先生猶未止又訪諸釋老之書又博覽佛老之書知無所得知無可取反而求之六經於是求之六經之書嘉祐初嘉祐初年見洛陽程伯淳正叔昆弟於京師見明道兄弟於帝都共語道學之要相與講論道學先生渙然先生大悟乃盡棄異學盡棄向來異學之非淳如也純然吾道方未第時先生未登第文潞公以舊相判長安潞公姓文名彥博舊為相出判長安聞先生名行之美久聞聲名德行之盛聘以束帛以禮幣聘之延之學宫以學職處之其在雲巖及宰靈巖政事大抵以敦本善俗為先見諸設施以重本善厚風俗為第一事每以月吉每月之朔具酒食召鄉人髙年置酒肴召邑里人之老者會於縣庭聚於公宇親為勸酬或勸或酬身親臨之使人知養老事長之義俾人人知養其老而敬其長因問民疾苦歷詢百姓之病患及告所以訓告子弟之意又教以告誡其子弟之方京兆王公京兆尹王氏嘗延致郡學曾招致郡學中先生多教人以德先生訓人多以德從容語學者和緩與其學徒言孰能少置意科舉誰能棄置舉子之業相從於堯舜之域相與同入堯舜之聖域學者聞法語學徒聞其言語有法多從之皆聽其言上嗣位之二年主上登極之二年登用大臣進用大臣思有變更欲行新政御史中丞吕晦叔晦叔為中丞薦先生於朝首以先生為薦曰張載學有本原先生為學有本西方之學者西蜀之學士皆宗之並皆尊其道德可以召對訪問宜召至闕廷試加訪問上即命召入見於是召對上問治道問之以為治之道皆以漸復三代為對欲漸復三代之風上悅之曰君喜其言乃云卿宜日見二府議事汝亦宜日日見二相府講論當世事朕且將大用卿吾欲大用汝先生謝曰先生起謝云臣自外官赴召臣以在外小官上赴君命之召未測朝廷新政所安未知今日所行新政便冝願徐觀旬月願得徐察旬月之間繼有所獻有所聞則當獻其忠上然之君許之他日見執政一日見政府執政與語曰政府與言云新政之更新政之變更懼不能任事慮無人以任此責求助於子何如欲求子為助先生對曰答云朝廷將大有為朝廷之上將有施為天下之士四海之士大夫願與下風皆欲趨走下風與去聲若與人為善如與天下人為善則孰敢不盡又誰敢不盡其力如教玉人追琢正猶使玉人雕琢良玉則人亦故有不能則人尚有未能者執政默然政府不應不合不相合命校書崇文遂擢校書崇文殿先生辭先生固辭復按獄浙東領浙東刑獄事或有言曰或又有云張載以道德進先生以道德擢用不宜使之治獄獄官非其所宜執政曰政府言淑問如臯陶善聽獄之吏如臯陶猶且獻囚尚在頖宫獻囚此庸何傷此又何害獄成還朝獄已成歸朝會弟天祺以言得罪適弟名天祺以言事得罪乃告歸居於橫渠故居於是請歸返舊廬遂移疾不起遂辭以疾不復起橫渠至僻陋所居之地最為隘地有田數百畝有百畝之田以供歲計以供一歲之用終日危坐一室終日之間直躬而坐一室左右簡編左右無北圖籍俯而讀俯首而誦仰而思起而思有得則識之有所得則記之或中夜起坐或至半夜起而坐取燭以書明燭以記其所得文公贊之所謂妙契疾書是也其志道精思有志於道精而思之未始須臾息未始頃刻不用力亦未始須臾忘也亦未嘗頃刻忘也學者有問為學者有問於先生多告以知禮成性多與之言求知天理習成天性之事變化氣質之道變化氣質之理學必如聖人而後已為學必欲求至聖人地位聞者莫不動心有進聞之者皆感動其心而進於善雖貧不能自給雖其居貧自養不足茍門人之無資者茍從學而無資財雖糲蔬亦共之雖藜藿必與之共糲音厲其自得者自得之學窮神化窮精神知變化一天人合天人之理立大本立是道之大本斥異學斥逐異端之學自孟子以來自孟軻而下未之有也無有其比嘗謂門人曰嘗語其門弟吾學既得於心吾之為學既得於心則修其辭則見於言辭命辭無差辭無差舛然後斷事無失至於處事皆無所失吾乃沛然精義入神我則沛然義理之精自入神妙之域豫而已矣此心自然悅豫先生氣質剛毅其氣質剛正嚴毅德盛貌嚴其德極盛其貌端嚴然與人居但與人相處久而日親至久而日益親其治家接物其治家之道與應接事物大要正己以感人大率皆是正其己以感動乎人其家童子家有童稚必使掃灑應對咸使擁帚灑掃言語應對給侍長上供給侍奉長上女子之未嫁者有女未嫁必使觀祭祀咸使觀祭祀之禮納酒漿供酒醴皆所以飬遜弟所以教其遜順之風就成德成就其盛德嘗曰事親奉祭每言事父母奉祭祀豈可使人為之豈可令他人為之聞人之善聞他人之有善喜見顔色喜見顔色之間答問學者應答問學之人雖多不倦不憚其煩有不能者有未能開悟者未嘗不開其端未嘗不啓其端緒其所至必訪人才所至之地必訪問善人有可語者有可相與言者必丁寧以誨之必再三誨誘之惟恐其成就之晚惟懼其成德之遲也歲適大歉年飢至人相食甚至人自相食家人惡米不鑿家人以米之粗將舂之欲杵之白先生亟止之曰先生急己之云飢殍滿野餓死之人盈野雖蔬食且自愧雖蔬飯亦自生愧又安忍擇乎尚何忍有所擇熙寧九年秋是年秋先生感異夢如夫子夢奠兩楹之類乃集所立言集聚其著述者謂之正蒙名之曰正蒙出示門人曰出以示其徒弟此書豫歷年致思所得此書乃平生精思以得其言殆合前聖其言語與前聖相合大要發端示人不過啓其端以示夫人其觸類廣之觸其類而充廣之則吾將有待於學者則我將有待後人正如老木一株恰如一株老樹枝别固多其枝之分固衆所少者潤澤花葉爾猶欠光華花與葉爾先生慨然有意三代之始先生奮然欲興復三代之盛嘗曰嘗言仁政必自經界始欲施仁政當自正井地之經界始貧富不均或富或貧不能均平教養無法教之養之皆無其法雖欲言治而欲論治皆茍而已不過茍且而已世之病難行者世人病其難行者未始不以亟奪富人之田為辭未有不以奪富家之田非美政然兹法之行但此法既行悅之者衆人悅之亦多期以數年以數載為期不刑一人而可復不必罪一人而井地復矣方有志未就有此志未及行會秦鳯帥吕公薦之曰時吕公為秦鳯路帥薦之云張載之學先生之學善發聖人之遺意能發明前聖之餘旨其術略可措之以復古其䇿亦可用之以復三代之治乞召還舊職乞以舊職召先生曰先生言吾不敢以疾辭吾不敢以疾病辭庶幾有遇焉或有所遇合及至都及至京公卿聞風慕之士大夫聞其風而興慕然未有深知先生者猶未有深知先生意者以所欲言以其所言嘗試於人曽試詢於人多未之信多不以為然會有疾告歸適有疾急歸不幸告終不幸即終不卒其願不能終其志沒之日死之日唯一甥在側惟一外甥在旁遂奉柩歸殯以葬及護喪歸葬其治喪禮一用古其喪禮一遵古制以終先生之志以慰先生平生之志某以先生行事之迹即先生所行之事敢次以書輒敢次序而書之性理羣書句解卷二十一
