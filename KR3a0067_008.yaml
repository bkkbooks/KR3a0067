body:
  text: 性理羣書句解卷八宋熊節撰熊剛大註說說者解說其義養心亭説此篇言養心在於寡慾寡而又寡以至於无則聖人地位濓溪先生孟子曰孟軻氏云養心莫善於寡欲欲者人所不能无但保養此心莫盡善於鮮有其欲心其為人寡欲為人茍自能鮮有欲心則不為外物轉移雖有不存焉者寡矣此心雖或有不存處亦少其為人多欲為人苟至多其欲心必為外物轉移雖有存焉者寡矣此心雖或有存時亦少予謂養心我言保養此心不止於寡而存耳不止是使欲少而後心自存蓋寡焉以至於無自始焉之少欲以至終焉之无欲無則誠立明通无欲則真實无妄而此心之誠以立誠立則本體清明无不透徹誠立賢也无欲是由寡以至於无无則真實无妄是用功於此者故方是賢者之事明通聖也至於誠立則本體清明无不透徹是又聖人地位矣是賢聖非性生如此則曰賢曰聖非由性分生出必養心而至之皆必保養此心而後能至養心之善有大焉保養此心之盡善而其大者如此存乎其人而已若是者亦惟在乎人用功於此而已張子宗範張姓宗範其字有行有文既有徳行又有文章其居背山面水所居之後則背山前則面水山之麓構亭於山之林木幽暗中創亭甚清净甚清而潔予偶至而愛之我偶來此山而甚愛此亭因題曰養心因題其扁以養心二字既謝張宗範既來相謝且求說且索予所謂養心之義故書以勉故寫此説以勉其進也愛蓮說此篇形容蓮花出於淤泥而不染其汚真可為花中之君子矣水陸草木之花生於水生於地若草若木之花可愛者甚蕃所可好者甚多晉陶淵明獨愛菊晉朝陶潛字淵明獨好菊花自李唐來自唐以來君姓李故曰李唐世人甚愛牡丹世之人皆好牡丹予獨愛蓮之出於淤泥而不染我獨好蓮花生於淤泥之中而色不緇染淤音於濯清漣而不妖浣於清水之中而花不妖冶中通外直其莖中虚而通外勁而直不蔓不枝不如草之延蔓不如木之有枝香逺益清香愈逺而愈清亭亭净植亭亭立貌潔净而植可逺觀而不可褻翫焉可以逺看不可近翫䙝音薛予謂菊我言菊花之隠逸者也花之清幽如隠逸者牡丹我言牡丹花之富貴者也花之艶麗如富貴者蓮是蓮花花之君子者也花之貞潔如君子也噫嗟嘆語菊之愛菊之好陶之後鮮有聞陶淵明之後少有聞愛也者蓮之愛蓮之好同予者何人與我同者誰牡丹之愛牡丹之好宜乎衆矣宜其皆如是也保身說此篇論明哲保身之道深責漢末諸賢危言取實禍之非司馬先生天下有道有道之世君子揚于王庭君子之人奮揚於朝廷之上以正小人之罪則能糾正小人邪惡之罪而莫敢不服即无不服天下無道濁亂之世君子嚢括不言君子之人以有言為戒猶謹結囊口而不出也以避小人之禍所以然者恐中小人簧口之害而猶或不免如此尚不能自免黨人朋黨之人指漢末李膺范滂輩言也生昏亂之世生於昏闇濁亂之世不在其位不安厥位四海横流天下汚濁之波汎濫洋溢而欲以口舌救之而膺輩不察其禍乃欲以言語而挽其末流之弊臧否人物自相褒貶議人品之善惡否音鄙激濁揚清汚濁者激而去之清潔者揚而起之撩虺蛇之頭譬之蛇虺蟲之傷人者也而撥其首踐虎狼之尾虎狼獸之傷人者也而履其尾以至身被淫刑至於身罹淫濫之刑禍及朋友其流禍貽及同志之人士類殱滅善類皆為之陷害殱漸平聲而國隨以亡而國不旋踵而滅亡不亦悲乎可哀也哉夫惟郭泰郭姓泰名諸賢中如泰者獨逺黨害既明且哲是時所謂明知之人以保其身能保全其終身者也申屠蟠申屠姓蟠名諸賢中如蟠者獨逺黨害見㡬而作是易所謂於事之未著翻然而悟不俟終日而不待終日者也卓乎其不可及已若二人者卓卓乎出於衆人之右是豈易及也哉用法說此篇言為政當使寛猛相濟則其政和漢家之法已嚴矣漢室之用法可謂極嚴而崔寔猶病其寛姓崔名寔政論一篇且病其法失於寛縱何哉何耶蓋衰世之君世衰主弱率多柔懦大率皆柔而无斷懦而不立凡愚之佐凡下愚昧之人為之輔佐唯知姑息但務姑且安息是以權幸之徒所以權貴寵幸之徒有罪不坐有罪而不能加之以罪豪猾之民豪俠姦猾之百姓犯法不誅麗於刑而不能誅之以刑仁恩所施其仁愛恩澤之所加止於目前終於眼前近幸之人奸宄得志故姦賊之徒得逞其欲紀綱不立小曰紀大曰綱國之紀綱不能振立故崔寔之論寔之為政論以矯一時之枉以矯正一時用法之枉非百世之通義也非是百世通行之義也孔子曰夫子云政寛則民慢為政失之寛縱則民敢慢侮慢則糾之以猛慢侮則必繩糾以威猛猛則民殘太威猛則將殘暴於民殘則施之以寛殘暴則又施放之以寛柔寛以濟猛寛柔而復濟之以威猛猛以濟寛威猛而復濟以寛柔政是以和剛柔相濟皆適乎中政用此得其和平斯不易之常道矣此可為百世不變常行之道矣元亨利貞説此篇言元亨利貞四者有心性情三者之分文公先生元亨利貞性也元者生物之始亨者生物之通利者生物之遂貞者生物之成天之性也生長收藏情也元主春生亨主夏長利主秋收貞主冬藏天之情也長上聲以元生以亨長以利收以貞藏者心也即此元以生物即此亨以長物即此利以遂物即此貞以成物天之心也仁義禮智性也得天德之元為性之仁得天德之亨為性之義得天德之利為性之禮得天德之貞為性之智人之性也惻隠羞惡辭遜是非情也仁發見為惻隠義發見知羞惡禮發見能辭遜智發見别是非人之情也以仁愛以義惡以禮讓以智知者心也即仁而愛即義而惡即禮而讓即智而知人之心也惡烏去聲性者心之理也性乃此心之理情者心之用也情乃此心之用心者性情之主也心統性情而為之主也程子曰伊川云其體則謂之易其體則名之曰易其理則謂之道其理則名之曰道其用則謂之神其妙用不測則謂之神正謂此也正言是也又曰又言言天之自然者出於天自然之理謂之天道名曰天道言天之付與萬物者論上天之賦予萬物者謂之天命名曰天命又曰天地以生物為心天地之德主生故以生物為心亦謂此也亦言是也盡心說此篇言性乃理之全體而其於心人惟有所蔽則不能盡必當㑹通貫徹而无所遺盡其心者能全盡此心之理知其性也是能知所受之性知其性則知天矣能知所受之性是知所賦之天矣言能盡其心云盡此心是知此性乃知此性知此性則知天也知此性便知此天蓋天者理之自然天乃自然而然之理人之所由以生者也人自此則有此生性者理之全體性乃是理所全之體而人之所得以生者也人因具是理而得生也心則人之所以主於身而具是理者也心乃具衆理而統乎一身者也天大無外故理大而无所對而性禀其全而此性獨禀其全故人之本心故在人此心其體廓然其本體廓然其大廓顆入聲亦無限量无所不包寧有窮盡惟其梏於形氣之私人惟局於形體氣質之偏滯於聞見之小拘於所聞所見之淺是以有所蔽而不盡是以此心為物欲蔽塞不能全盡其理人能即事即物茍能隨一事一物窮究其理各有以窮極其理至於一日則一日㑹通貫徹混㑹融貫明通透徹而無所遺焉而一无所遺焉則有以全其本心廓然之體則斯能全此心至大之體而五行之所以為性得五行之秀而為性與天之所以為天者與天理之自然者皆不外乎此並不越於是而一以貫之矣曰心曰性曰天自可貫而一矣孝悌說此篇言性則以仁為孝悌之本言行則以孝悌為行仁之本或曰或謂程子以孝悌為行仁之本程伊川以孝於父母悌於長上為行仁之根本又曰論性則以仁為孝悌之夲言仁則復以仁為孝弟之根本何也是如何曰仁之為性言仁為性之根愛之理也愛之道理其見於用其發於用則事親從兄始于孝於親弟於兄仁民愛物終于仁乎民愛乎物皆其為之之事也皆其行仁之事也此論性以仁為孝悌之本者然也仁是本根孝弟皆由是次第而推故曰論性以仁為孝弟之本如此但親者我之所自出但父母吾身之所由生兄者同出而先我兄者與我同出於父母而先生於我故事親而孝事親而能盡其孝從兄而弟從兄而能盡其弟乃愛之先見而尤切者又愛之所當先而愈切於己者若君子以此為務如君子能即是為先務而力行之而篤於行至於行成而徳立孝弟之行既盡而仁之德由是而立行去聲則自親親而仁民則由事親從兄而仁民仁民而愛物又自仁民而推其愛於物其愛有差等厚於親而薄於民厚於民而薄乎物固有差等之殊其施有漸次先於親而後乎民先於民而後乎物又有漸次之序而為仁之道而行仁之道生生而不窮矣生生不息此學孝弟所以為仁之本也學孝與弟又所以為行仁之本蓋由仁而論孝弟自是仁發出故言仁為孝弟之本由事親從兄仁民愛物而論則孝親弟兄仁民愛物自此而發故言孝弟乃行仁之本學者能沉潛涵泳則得之矣仁說此篇言仁包義禮智三者无所不實曰愛曰公此特仁中之一事未足名仁之全體人之性人有此生便有此性仁義禮智曰仁曰義曰禮曰智四德具焉四者之徳咸具于中其愛之理則仁也仁主於愛愛之理則為仁宜之理則義也義主於宜宜之理則為義讓之理則禮也禮主於讓讓之理則為禮知之理則知也智主於知知之理則為知上知音智是四者雖未形曰愛曰宜曰讓曰知雖未發見而其理固根於此而其理己萌于内則體實具於此矣則其本體亦在乎内性之中只有是四者一性之中只有仁義禮智萬善皆管乎是焉萬善於此而管攝焉而所謂愛之理者所言愛之理是乃天地生物之心是即天地生育萬物之心而其所由生者也人生得天地生物之心具於心而為性則愛之理也故仁為四德之長四德之序仁為其首而又所以兼包焉而其體包義禮智惟性之中惟其一性之内有是四者有此四徳故其發見於外則其形著于外於情則為惻隠羞惡辭遜是非之端是則謂之情形著之初則謂之端有惻然其隠則是仁發見之初知愧知惡則是義發見之初或辭或遜則是禮發見之初辨是辨非則是智發見之初而所謂惻隠者但所言惻隠一端亦未嘗不貫通焉又何曽弗通貫羞惡辭遜是非之三端此性情之所以為體用以性而言仁為體而義禮智其用以情而言惻隠為體而羞惡辭遜是非其用而心之道此心之道則主乎性情者也具此理則為性發此理則為情而又為性情之主人惟己私蔽之人為私欲蔽固以失其性之理而為不仁失其本性之道理故發於外者不能推此仁甚至於為忮為忍極而為狠暴為殘忍忮音至是豈人之情也哉此豈是人本然之情由仁而發者是以為仁所以求仁莫要乎克己无先乎克去己私己私既克已之私既克去則廓然大公則洞然至公廓顆入聲而其愛之理而愛之道理素具於性者常具於性之中者無所蔽矣无所蔽塞則與天地萬物則大而天地次而萬物血脉貫通生生一脉常相流通而其用亦無不周矣是仁之用无不周徧故指愛以名仁直指愛為仁則迷其體以情為性則失其體而愛之理則仁也愛之道理者則是本體之仁指公以為仁直指公為仁則失其真公未便是仁則失其仁之本而公者人之所以能仁也蓋公則此理流通而能仁夫静而仁義禮智之體具静而見諸心是四者皆性之徳動而惻隠羞惡辭遜是非之端達動而達諸用此四者皆情之初其名義位置其得名之義如愛曰仁宜曰義之類與位序布置如先仁次義次禮次智之類固不容相奪倫其次序倫理固不可奪然而轉語唯仁者為能推之而得其宜惟有此仁推之而至於得其所宜是義之所存者也即是仁中之義之所在唯仁者為能恭儉而有節惟仁人至於恭儉而有限節是禮之所存者也是即仁中之禮之所在唯仁者為能知覺而不昧惟仁人至於知覺而罔所昧是智之所存者也是即仁中之智之所在此可見其兼包而貫通者此可知其仁包義禮智惻隠貫通夫羞惡辭遜是非是以孟子於仁所以孟軻於仁統言之曰統而謂之仁人心也以仁為人之心蓋仁該四德心具衆理亦猶在易又如易經乾坤四德乾坤元亨利貞之四德而統言乾元坤元也只總言乾元坤元元即仁也亦包亨利貞三德然則轉語在學者其可不以求仁為要在後學可不推本而以求仁為先而為仁其可不以克己為道乎求仁之方可不以克去己私為務哉録録者紀録其事雍行録此篇言人之見識各有差等伊川先生元豐庚申嵗元豐年號也庚申之嵗予行雍華間我行雍華之中闗西學者闗西路為學之人相從者六七人從予之遊者凡七人予以千錢掛馬鞍吾以錢一千懸於馬鞍之上比就舍則亡矣近歸家則此錢已无僕夫曰僕輩且言非晨裝而亡之非是早間裝束行李而失之則涉水而墜之則是渡水之時墜於溪矣予不覺嘆曰吾不覺形諸嗟嘆而言曰千錢可惜失錢一千誠為可惜坐中二人應聲曰同席之中有二客應聲而言曰千錢亡去一千之錢忽至亡失甚可惜也誠是可惜次一人曰又有一客言曰千錢㣲物一千之錢其利微細何足為意何必累吾心哉後一人曰後至一客言曰水中囊中不在水之中則在囊之中可以一視皆可一觀人亡人得一人失之一人得之又何嘆乎又何必形於嘆耶予曰我云使人得之吾既失之人或得之則非亡也則不可以亡言矣而嘆夫有用之物私竊自嘆錢者物之有用者也若沉水中若落之於水則不復為用矣則不可再用矣至雍以語吕與叔曰至於雍以此與吕與叔言人之器識固不同謂器足以用世識足以察事人之器識固有不同自上聖至於下愚上自聖人下至愚人不知有㡬等聖與愚髙下不知有㡬等同行者數人耳與吾同遊凡六七人其不同者如此也一人一見其不相同有如是矣與叔曰吕與叔答云夫數子之言何如六七人之言何者為是予曰我謂最後者善其後至一人之語為至善與叔曰吕與叔云誠善矣其言誠是矣然觀先生之言但以先生有用之說㕘之後至一人之言則見其有體而無用也則見其為知大體之所在而不知其用之不可亡也予因書而誌之吾因是書而記之後十五年自是而後又十五年因閲故編因觀舊書偶見之偶見此誌思與叔語時吕與叔已死不幸早死不幸先已下世為之泣下因為之隕其淚書近思録此篇言集周程張四先生之遺言以其闗於是道之大體切於日用之間所為後學入道之方文公先生淳熈乙未之夏淳熈年號乙未嵗之夏東萊吕伯恭吕姓伯恭字東萊其號也來自東陽東陽婺州自婺州来過予寒泉精舎過於文公寒泉之書院留止旬日留之居十餘日相與讀周子程子張子之書相與共讀濓溪明道伊川横渠四君子之書嘆其廣大閎博嘆其具載是道廣大而不可究浩博而不可求若無津涯茫無涯㟁而懼夫初學不知所入也慮初學之人不知入道之方因共掇取其闗於大體因與共采輯其有闗是道之大體而切於日用者而實切於平日之受用者以為此編集為是編緫六百一十二條緫六百餘條分四十卷分為四十卷蓋凡學者所以求端用力凡志學之士求其端緒而篤於用功處己治人之要即之處己推以治人之道與夫辨異端觀聖賢之大略與辨異端似是之非究聖賢操修之實皆粗見其梗㮣皆可略見其大槩以為窮鄉晚進私竊自謂鄉閭後學有志於學有志於吾儒之學而無明師良友以先後之者雖无賢師良友相為先後而訓迪之誠得此而玩心焉苟得是一編而玩味於心焉亦足以得其門而入矣亦可以窺見道學之門户而深造之矣如此初意若是然後求諸四君子之全書而後求之周張二程先生之遺書沉潛反復深潛思索反復推究優柔厭飫以取其愽而反諸約焉徐讀飽味取之浩博撮其簡要則其宗廟之美譬之宗廟之美好百官之富百官之富盛人之不得其門而入者庶乎其有以盡得之觀此書後庶幾可以盡得之矣若憚煩勞若夫所謂畏探索之煩勞安簡便惟相安於簡便以為取足於此而可以言具足於是而不復更加窮理工夫則非今日所纂集此書之意也又豈吾今日采輯是書之本意哉五月五日朱熹謹識辯辯者辯論其非無極辯此篇力排陸象山言無極之非盖无極而太極也者是无形而有理也文公先生來書反復象山所寄之書反復其語其於無極太極之辯詳矣於无極而太極之辯論已詳備矣然以某觀之但以我觀此伏羲作易伏羲始著易之畫自一畫以下從一畫而下至於六畫文王演易至周文王推而演之為易之辭自乾元以下從乾卦大哉乾元而下至於六十四卦皆未嘗言太極也皆未嘗指言太極而孔子言之至孔子作辭繫易始言易有太極孔子贊易孔子贊述易道自太極以下從所謂易有太極一句而下未嘗言無極也未嘗指言无極而周子言之至周濓溪太極圖始言无極而太極夫先聖後聖先聖人後聖人豈不同條而共貫哉豈不同其條共其貫既蒙不鄙而教之既不相鄙薄而垂教某敢不盡其愚也可不盡攄愚見且夫大傳太極者何也且易大傳所言太極謂何即兩儀四象八卦之理即兩儀四象八卦所以然之理具於三者之先而太極則在兩儀四象八卦之先而藴於三者之内也復藴藏於兩儀四象八卦之中聖人之意夫子之意正以究竟至極正是窮究是理之至極無名可名无得而名故特謂之太極故以太極一字名之猶曰如謂舉天下之至極舉天下之言至極者無以加此云爾无可加於是初不以其中而命之也初不即中字而名之也至如北極之極至若在天北辰之極皇極之極洪範皇極之極民極之極周禮民極之極諸儒雖有解為中者諸儒注書固有訓為中者蓋以此物之極蓋謂此物之極至常在此物之中常在物之中四面到此取正非指極字不是指出此極而訓之以中也名之以中極者至極而已極者至極之理以有形者言之即有形象者言之則其四方八面四方者東西南北方八面者四方合四隅而數之合湊將來方方面面皆来都無向背无向无背一切停匀一一均平以此取正故謂之極耳至極更无去處故謂之極後人以其居中後之儒者即其居於中而能應四外而能應乎四方之外故指其處以中言之故指其所在以中言之非以其義不是以其字義為可訓中也可以訓為中至於太極至於太極二字則又初無形象方所之可言欲見而无形象欲尋而无方所不可得而名言也但以此理至極但即是理之極至而謂之極耳故名之曰極是即所謂无極而太極今乃以中名之今乃遽即中之一字以訓之則是所謂理有未明其於言太極之理有未能明而不能盡乎人言之意者一也而弗克悟乎人言之意者一通書理性命章周子通書理性命一章其首二句言理初兩句專説理次三句言性下三句專説性次八句言命下八句專言命故其章内一章之内無此三字無理性命三字而特以三字而特即理性命三字名其章以表之名此一章表而出之則章内之言其一章之言固已各有所屬矣各各皆有所主蓋其所謂靈所言匪靈弗瑩所謂一者所言二本則一乃為太極靈乃此心太極之至靈一乃是理之極所謂理化而所謂中者所謂中之一字乃氣禀之得中是形生後禀天地之氣而得乎剛柔之中與剛善剛惡所禀剛之好者為義剛之惡者為暴狠之屬柔善柔惡者為五性柔善者為慈祥柔之惡者為懦弱之類中與剛善剛惡柔善柔惡是謂五性而屬乎五行已上五者之性不同莫非五行之參差為之初未嘗以是為太極也何嘗即此中為太極且曰今象山且謂中焉止矣中焉止矣一句而又下屬於二氣五行又下係乎隂陽之二氣金木水火土之五行化生萬物之云化化生生萬物是亦復成何等文字義理乎象山此言不知何等文字義理如此今來喻乃指其中者為太極今来喻乃指此中字便為太極而屬之下文而謂之連屬下文二氣五行化生萬物則又理有未明則又太極之理有未能明而不能盡乎人言之意者二也而弗克悟乎人言之意者二若論無極二字如論周子无極二字乃是周子灼見道體乃是濓溪洞見是道之本體説出人不敢説者言人所不能言者令後之學者使後世學者曉然見得太極之妙了然見太極之妙不屬有無有非真有无非果无不拘方體无方可求无體可見若於此看得破如就此窺見得透方見得此老方知此濂溪翁真得千聖以來不傳之秘真是心㑹上聖以来不曽傳授之祕訣非但架屋上之屋非特如象山所言无極而太極是屋上架屋疊牀上之牀而已也牀上又疊牀也今必以為不然今必為不如此則是理有未明則太極之理有未能明而不能盡乎人言之意者三也而弗克悟乎人言之意者三至於大傳易之繫辭既曰既言形而上者謂之道矣著而在上名之曰道而又曰復言一隂一陽之謂道一隂一陽循環不已名之曰道此豈真以隂陽為形而上者哉豈是果以隂陽為形上之道正所以見一隂一陽於此見得隂之與陽雖属形器雖不過属形下之器然其所以一隂一陽者謂一隂一陽所以互根者是乃道體之所為也是乃太極之使然也故語道體之至極故言是道本體之至極者則謂之太極則名之為太極語太極之流行言太極之流行於一隂一陽間則謂之道則名之曰道雖有兩名太極與道雖有二名初無兩體非有二體周子所以謂之無極濂溪所以言无極而太極正以其無方所形狀无方所之可求无形狀之可見以為在無物之前謂其在於未有萬物之前而未嘗不立於有物之後則有萬物之後此理未嘗不在以為在隂陽之外謂其在於隂陽之外而未嘗不行於隂陽之中則隂陽之運行此理未嘗不在以為通貫全體謂其通前後貫外内而為全體無乎不在无所往而不在又初無聲臭影響之可言也又无聲臭之可尋无影響之可見蓋前兩節是言無非真無後一節是言有非果有今乃深詆無極之非今象山顧乃深排无極之非則是以太極則以太極為有形狀方所矣為有形有狀有方有所直以隂陽為形而上者便指一隂一陽為形而上之道則又昧於道器之分矣所謂道形而上器形而下者又分别不分曉矣又於形而上者之上又且於形而上之上復有况太極乎之語又有所謂太極者則是又以道上别有一物為太極矣又是道之上復有一物名為太極蓋太極即形上之道而隂陽即形下之器不可指隂陽為形上也此又理有未明此亦太極之理有未能明而不能盡乎人言之意者四也而弗克悟乎人言之意者四至某前書至如我前日書所謂不言無極所謂不説無極則太極同於一物則太極不過只如一物而不足為萬化根本不足為天地萬化之根本不言太極不説太極則無極淪於空寂則無極淪入空寂之鄉而不能為萬化之根本而不能為天地萬化之根本乃是推本周子之意此上六句乃是推明周子之微意以為當時若不如此兩下説破以為一時若不是將无極太極二者分别説出則讀者錯認語意則讀者誤認發言之意必有偏見之病則所見必徇於一偏聞人説有見人言有極即謂之實有便以為實有此見人説無見人言無極即謂之真無耳便以為真无此自謂如此我自謂如此數語説得周子之意道得濓溪之意已是大故分明已極分曉老兄猶以為未穏象山尚言未安是又理有未明是太極之理有未能明而不能盡乎人言之意者五也而弗克悟乎人言之意者五來書又謂大傳明言易有太極象山來書既説大傳分曉謂易有太極矣今乃言無何耶今乃説无極如何此尤非所望於髙明者此愈非所望於天資髙明之君子老兄且謂大𫝊之所謂有象山且説易繫之言有極是果如兩儀四象八卦之有定位果猶兩儀生四象四象生八卦各有定位天地五行萬物之有常形耶天地金木水火土與夫萬物各有常形耶此言有非果有本出於无也周子之所謂無濓溪之所謂无極是果空虚㫁滅是果虚無寂滅都無生物之理耶盡無隂陽化生萬物之理耶此言無非真無實肇其有也此又理有未明此亦太極之理有未能明而不能盡乎人言之意者六也而弗悟乎人言之意者六老子復歸於無極老子言此身再歸於無極無極乃無窮之義无極是乃无窮盡之意如莊生入無窮之門猶莊子言入無窮極之門以遊無極之野云耳以遊無窮極之野老莊俱是虚無之學故其言相合如此非若周子所言之意也非如濂溪所言无極之意今乃引之今象山引老莊而言而謂周子之言且云濓溪之説實出於彼實自老子出此又理有未明此亦太極之理有未能明而不能盡乎人言之意者七也而弗悟人言之意者七也髙明以為如何髙明之見將謂若何皇極辯此篇力排孔安國以皇訓大以極訓中之失蓋皇極也者君道是也洛書九數而五居中洛書有九數而五位其中洪範九疇而皇極居五洪範有九疇而皇極居次五故自孔氏𫝊註自漢孔安國𫝊註洪範𫝊去聲訓皇極為大中以大訓皇以中訓極而後之諸儒而後來諸儒一皆祖其説並皆𫝊述其言嘗以經之文義求之曽即洪範之文字意義求之有以知其必不然也蓋知其㫁不如此蓋皇者君之稱也皇乃人君之稱極者至極之義極乃至極无以復加之義標凖之名凖則可以示人之謂常在物之中央常常在物之中央而四外望之以取正焉者也四方之外皆觀望此取正者也故以極為在中之至則可以此極為在中之至極則可而直謂極為中則不可而便以極為中則不可若北辰之為天極如北斗謂天之極屋棟之為屋極屋棟謂屋之極其義皆然其理皆如此而周禮所謂民極周禮六官言民極詩所謂四方之極者毛詩商頌言四方之極於皇極之義為尤近於皇極意義更是切近顧今之説者顧今之為書者既誤於此而失之於彼既誤於以皇極訓大中而於民極四方之極又失其㫖義是以其説展轉迷謬所以其言反覆昏迷而終不能以自明也至末不能通曉即如舊説便如舊説姑亦無問其他更不復問其他處但於洪範之文只於洪範之正文易皇以大改皇字為大字易極為中而讀之改極字為中字而誦讀之則所謂大作中所言皇作極則是大作中大則受之之屬皇則受之則是大則受之為何等語乎此成何等説話故予竊獨以為皇者君也故我獨言皇者為君極者至極之標凖也極為至極標凖之義人君以一身人主即一身立乎天下之中居于四方之中央而能終其身而能終此身以為天下至極之標準以作天下至極之凖則則天下之事則天下萬事固莫不協於此自無不合於此而得其本然之正而得本然天理之正天下之人凡天下萬民亦莫不歸於此亦无不歸於是而得其固有之善焉而全其固有之理所謂皇極者也是所言皇極者如此是其見於經者是其著見之於洪範者蓋皆本於洛書之文悉出於洛書之文其得名得皇極之名則與夫天極屋極民極則與所謂北辰之極屋棟之極生民之極皆取居中而取極之意皆是取其居在於中四方取此為至極更無去處初非指中為極也即不是以中為極則又安得而訓之哉則又奚可以中訓極哉曰皇建其有極者經言皇建有極云者言人君以其一身是言人主即此身而立至極之標凖於天下也而立天下至極之凖則曰斂時五福經言合是五福斂去聲用敷錫厥庶民者用而散與百姓者言人君能建其極謂人君出而以身建至極之理而於五行焉得其性於金木水火土則得其金木水火土之性於五事焉得其理於視聽言貎思則得其視聽言貌思之理皆因五福之所聚極建而五行得性五事得理是為五福之聚而又推以化民而復施之以化於民則是布此福而與民也是即推是福以與百姓也曰惟時厥庶民經言惟是其衆民于汝極于君之極錫汝保極者與君保極言民視君以為至極之標凖而從其化謂民視君為至極之凖則而順其化則是以此還錫其君則又以是復歸於其君而使之長為天下之標凖也俾之常常作天下至極之凖則也曰凢厥庶民經言凡爾衆民無有淫朋無有淫過之朋黨人無有比徳人无有阿比之徳比去聲惟皇作極者惟君立極言民之所以能若此者謂百姓所以能如此無朋無比者皆君之徳無非人君有徳有以為至極之標凖也足以為天下至極標凖曰凡厥庶民經言凡爾衆百姓有猷有為有守有謀有為有操守汝則念之君則當念之不恊于極不合於是極不罹于咎亦不至遭於咎惡罹音離皇則受之者君亦无不受之言君既立極於上謂人君既建此極於上而民之従化而庶民従順其教化或有遲速深淺之不同或遲或速或深或淺自有不同則其有謀為操守者其謀者求盡是極之道為者修是極之道守者固執是極之道固當念之而不忘固當念念及之而不替其不盡從其有弗克盡従吾化而不底於大戾者而不至於大違戾此道亦當受之而不拒也君亦當容受而無所拒曰而康而色經言庶民安其顔色曰予攸好德謂我所好者德好去聲汝則錫之福君則與之以福時人斯其惟皇之極則是人皆趨人君之極言人有能革面謂此人有能改其為惡之面言小人化為君子也易曰小人革面而以好德自名自以好德為言雖未必出中心之實縦非其中心之實然亦當教以修身求福之道君亦當誨以修已獲福之理則是人者亦得以君為極而勉其實也則是人亦得以君為至極之凖則而勉焉以求盡其實也曰無虐㷀獨經言無侵虐㷀而無兄弟者獨而無子者㷀音羣而畏髙明而憚勢位尊貴之人人之有能有為人之有才能有謀為使羞其行俾進其徳行行去聲而邦其昌者而邦國賴以興隆者言君之於民謂君之於百姓不審問其貴賤强弱不必問其貴者賤者强者弱者而皆欲其有以進德欲其皆進於德故其有才能者故其人有才而能者必皆使之勉進其行必盡俾之勉之以進其德行而後國可賴以興也然後邦國可藉此而興隆曰凡厥正人經言凡其正直之人既富方糓既富矣而納之于善汝弗能使好于而家汝弗能俾之有所藉而顧于其家好去聲時人斯其辜是人必將取罪而去于其無好徳不復有好德心汝雖錫之福汝雖與之以福其作汝用咎者其起而報汝惟用惡道而無善矣言須正人者謂須是正直人必先有以富之當先使之富足而後納之於善繼此則可導其禸善若不能使之有所顧於其家若非有以俾之有所藉而顧其家則此人必將陷於不義則是人必流於不義不復更有好德之心矣又安有所謂好德之心哉至此而後始欲告之以修身求福之説至於是而始思喻以修己獲福之道則已緩不及事已失之緩慢不及於為矣而其起而報汝而是人起而施報于汝惟有惡而無善矣惟知有惡而不知有善蓋人之氣禀不同人之稟氣有清濁昏明之不同有不可以一律齊者是又難以一等齊之是以聖人所以聖君所以立極於上者立至極之凖則於上至嚴至正端嚴正直而所以接引於下者所以引誘在下之人至寛而廣寛洪廣大不沮其為善之心雖彼之所以趨於此者雖是百姓之趨於此極遲速真偽无朋比而化之速者不協極不罹咎者則化之遲者而康而色曰好德則未知其真偽才德髙下化之速者則才德之髙化之遲者則才德之下有萬不同有萬等不齊而吾之所以應於彼者我所以接於彼矜憐撫養矜恤撫摩懇惻周盡惻怛詳盡未嘗不一也未始不一以持之曰無偏無陂經言無不中無不正陂音賁遵王之義皆循人君所行之宜無有作好無自私自作好好去聲遵王之道一皆率由人君所由之道無有作惡無有私自作惡惡去聲遵王之路一循人君所由之路無偏無黨無偏私無黨與王道蕩蕩一循人君恢廣之道無黨無偏無黨與無偏私王道平平一循人君平便易之道平音無反無側無反復無倚側王道正直一循人君正直之道㑹其有極合其一身之極歸其有極者以歸于人君之極言民皆不溺於己之私謂百姓皆不為己私所累以従夫上之化以順從人君之教化而㑹歸於至極之標凖也㑹之歸之皆以人君為至極之凖則析而言之分而言則偏陂好惡則前面所言偏陂好惡以其生於心者言也此四者是生於心者偏黨反側上面所謂偏黨及側以其見於事者言也此四者是見於事者遵義遵道遵路解見前方㑹于極也方才㑹於此極蕩蕩平平正直解見前則已歸于極矣則是已歸極了曰皇極之敷言經言以君之道布其命于下是彛是訓不外此有常之理以為此教于帝其訓者然此有常之理亦上天之所賦於人者則此教乃天之教言人君以身為表謂人君以一身為至極之標凖而布命於下而布其教語於下則其所以為常為教者則君之是彛是訓一皆循天之理皆是循夫天之正理而不異乎上帝之降衷也而無異上天降此理於下民者曰凢厥庶民經言凡其庶民極之敷言是極之布為教語者是訓是行因此教而服行之以近天子之光者得以親近人君光明之德言民於君之所命謂庶民即君之訓命能視以為教能覩此以為教語而謹行之恭以行之則是能不自絶則能不自棄絶而有以親被其道德之光華也而此身得被人君光明之道德也曰天子作民父母經言人君作民之父母以為天下王者而為天下所歸往之王言能建其有極謂能建立是極所以作民父母是以為百姓父母而為天下之王也而天下尊之曰君不然不如是則有其位則有君之位無其德無君之德不足以建立標凖無以建立天下至極之凖則子育元元愛養衆民而履天下之極尊矣而處天下至尊之位矣天之所以錫禹天以洪範九疇與禹箕子之所以告武王者箕子以洪範九疇言之武王其大指蓋如此其大意只如是雖其雅奥深㣲雖是雅言奥義深妙精㣲或非淺聞所能究有非淺陋者所能推究然嘗試以是讀之但曽試即此誦之則亦坦然明白蓋亦平易分曉而無一字之可疑者而一字無可疑但先儒昧於訓義之寔然孔安國不明訓義之真寔音實且未嘗講於人君修身立道之本又不曽講明人主修己立道之根本既誤以皇極為大中既錯認皇為大極為中又見其辭又觀其言辭而含洪寛大之意皆是含糊鶻突因復誤認以為所謂中者又復錯指所言中者不過如此不越乎是殊不知居中之中初不知居中之義既與無過不及不同自不可與無過無不及並言而無過不及之中不失之過不失之不及此所謂中乃義理精㣲之極乃是義理之至精至㣲處有不可以毫釐差者固不容差之毫毛又非含糊苟且不分善惡之名也又不是含容糊塗善惡二者俱無分别之謂今以誤認之中今即錯指之中為誤認之極為錯認之極不謹乎至嚴至宻之體不於本體嚴宻處而務究其㣲而務為至寛至廣之量泛然欲為寛廣之度量而不察其實則漢元帝之優游如漢元優游不㫁唐代宗之姑息唐宗之姑息敗事皆是物也並是以此而失之彼其是非雜揉彼二君是是非非錯雜無别揉音蹂賢不肖混殽賢者與不肖者殽亂不分方且昏亂陵夷之不暇方自昏晦繆亂陵遲夷滅之不遑尚何斂福錫民之可望哉况望其斂極之福與民乎吾意如此吾之意若是而或者疑之而或猶有疑於此者以為經言無偏無陂謂經之無偏而不平陂而不正無有好惡無有私作好惡則所謂極者是其言極豈不實有取乎得中之義其義亦若取得中之言而所謂中者而謂之中者豈不真為無所去就憎愛之意乎豈不真是泛然包容無所去就無所憎愛乎吾應之曰吾答之云無偏無陂者無所偏無所陂不以私意而有去就爾不以吾之私意去就而已然曰遵王之義但其言循人君之義則其去惡而従善則是舍惡而就善當去當就未嘗不力也何嘗不篤於行無作好惡者無作好無作惡不以私意而自為憎愛爾不以吾之私意憎愛而已然曰遵王之道循人君所由之道遵王之路循人君所由之路則其好善惡惡則是其知善為可好知惡可惡固未嘗不明也何嘗不明知是豈但有包容是豈只務含容漫無分别之謂都無别判之言如漢唐優游姑息也又况經文矧是經言所謂王義王道王路者曰義曰道曰路三者乃為皇建有極之體乃為人君建立是極之本而所謂無所偏陂反側者曰無偏陂曰無反側自為民歸有極之事乃為庶民㑹歸是極之事其文義亦自不同也耶其文理意義亦自不一必若子言必如或者之言吾恐天之所以錫禹吾慮天之錫於禹者箕子之所以告武王者箕子之言於武王者上則流於老莊依阿無心之説上則失於老聃莊周依阿無所裁决之言下則溺於鄉原同流合汙之見下則同於鄉原謹愿人同流合汚之見雖欲深體而力行之雖欲深體此理而力行於身是乃所以幸小人而循君子無所别白以為小人之幸方欲以是而循君子之道又何以立大本又安能立是極之本領而序彛倫哉而俾常理之得其序哉作皇極辨故著為皇極辨一篇或曰或人又謂皇極之為至極何也皇極而有至極之名如何予應之曰吾又荅之人君中天下而立人君以一身中立於天下四方面内四方之人皆面其内而觀仰之者觀而仰之至此輻湊於此㑹合猶車馬之相駢湊於此而皆極焉於是而極至更無去處自東而望者由東而望乎此不能過此而西也不能過此而之西自西而望者由西而望乎此不能踰此而東也不能過此而之東以孝言之且舉孝之事言則天下之孝天下之孝於親者至此而無以加到此則無以加矣以弟言之又舉弟之事言則天下之弟天下之弟於長者至此而無以過至此無以過矣此人君之位之德此人君之位與人君之德所以為天下之至極以此為天下至極之標凖而皇極所以得名之本意也此正得以皇為君以極為至之本意故惟曰故但言聰明睿智有聰明聖智之德首出庶物出於衆人之上如所謂天下一人而已者猶言天下但有一人而止然後有以履之而不疚而後可以履天位而無所病豈曰含容寛裕一徳之偏豈謂寛容一偏之徳而足以當此哉而可以當是位哉客曰唯唯或人唯唯受命因復記於此因又記之於是以發前之未盡以發揮吾言未盡者論論者講論其義理顔子所好何學論此篇言顔子所學學以至聖人之道惜其天年不永幾於化而未至於化也伊川先生聖人之門夫子之門其徒三千徒弟三千人獨稱顔子為好學獨許顔淵以好學兩字夫詩書六藝夫詩書六藝之文三千子非不習而通也三千之徒非不習熟貫通然則轉語顔子所獨好者何學也顔子獨稱好學不知其所好何所學學以至聖人之道也學之為學将以求至聖人之道聖人可學而至歟所謂聖人可由學而至其地位耶曰然固可由學而至學之之道如何所以學為聖人之道又何如曰云天地儲精天地藴精英之氣得五行之秀者為人人稟得金木水火土之秀氣於心為最虚其本也真而静其本然之體真實而凝静其未發也無所感觸發見於外五性具焉五常之性全具於中曰仁義禮智信愛之理為仁宜之理為義讓之理為禮知之理為智信則實有此理形既生矣人之生有此形質外物觸其形而動於中矣則耳目口鼻之形外觸於物則其心不能不動其中動而七情出焉此心既動七情乃起曰喜怒哀樂愛惡欲曰喜曰怒曰哀曰樂曰愛曰惡曰欲情既熾而益蕩七情勝而愈蕩其中其性鑿矣五性鑿而非渾成之體矣是故轉語覺者約其情有知覺者則約其情之流使合於中使之不失之過正其心而後可以正吾之心養其性正其心而後可存養其性故曰性其情故言性其情蓋所發皆理也愚者則不知制下愚之人不知制其情縱其情而至於邪僻恣其所欲以至流於淫邪匪僻梏其性而亡之害其夲性至於亡滅故曰情其性故云情其性蓋所存皆欲也凡學之道凡人為學之道正其心必先正其心使不偏養其性而已以存養此性而已中正而誠則聖矣此心不偏不倚以至天理充足此聖人事也君子之學君子之為學必先明諸心必先明了此心勿為物欲昏蔽知所往審其所適然後力行以求至而後勉力而行以求至於道所謂自明而誠也蓋曰知覺以全此實理也故學必盡其心故為學當先至盡此心知識盡其心至得此心知識則知其性則明本心之理知其性明得本心之理反而誠之自反而無一理之不實聖人也此乃聖人地位故洪範曰書洪範篇云思曰睿思而至於無所不通睿作聖無所不通則為聖人誠之之道誠之者人之道學聖人者也在乎信道篤在於篤於信道信道篤信之篤則行之果則行之也必果確行之果行之果確則守之固則守之也必堅固仁義忠信四者之理不離乎心全具於中造次必於是頃刻之間亦必在此顛沛必於是顛倒之時亦必於此出處語黙必於是或出或處或語或黙亦必於此久而弗失至於久焉猶且弗失則居之安順適而安動容周旋中禮舉動容貌周旋之間無不合禮而邪辟之心淫邪非僻之念無自生矣無自而起矣故顔子所事故顔回平日所從事者則曰非禮勿視則曰非禮不正之色目不之視非禮勿聽非禮不正之聲耳不之聽非禮勿言非禮不正之言口不之道非禮勿動非禮不正之動亦不妄動仲尼稱之夫子予之則曰乃云得一善則拳拳服膺而弗失之矣得一善則切切然服守於心胷之間而不敢失也又曰又言不遷怒怒於甲者不移於乙不貳過過於前者不萌於再有不善或有不善未嘗不知未有不知知之未嘗復行也既知之不復行之此其好之篤此其好之之深學之之道也學為聖人之道也視聽言動皆禮矣四者無不中禮所異於聖人者所以與聖人微有間者蓋聖人則不思而得聖人無所思而自得不勉而中無所勉而自中從容中道雍容不迫自然造道顔子則必思而後得顔囘則必待有所思而後造道必勉而後中必待有所勉而後中道故曰故云顔子之與聖人顔子之視孔子相去一息相去一間孟子曰孟子言充實而有光輝之謂大至理充實於内而光輝發見於外謂之大大而化之之謂聖大而化則無迹可指謂之聖聖而不可知之謂神聖矣又極而至於妙不可知則謂之神顔子之德顔氏子之德可謂充實而有光輝矣可謂至理充實而光輝發見矣所未至者所以未至於聖人者守之也固執之者也非化之也未至於聖人無迹之妙以其好學之心但即其好學不倦之心假之以年若更與之夀考則不日而化矣不待嵗月之久渾然無迹矣故仲尼曰所以夫子云不幸短命死矣惜其天年不永為不幸也蓋傷其不得至聖人也蓋惜其不得至於聖人之地位所謂化之者所謂化之云者入於神而自然造於神妙之地皆自然而然不思而得不待思而自得不勉而中之謂也不待勉而自中孔子曰夫子云七十而從心所欲七十嵗從吾心之所欲不踰矩是也自不過於規矩法度之外或曰或人有云聖人生而知之者也聖人生而知此理者也今謂可學而至今言可由學而至其有稽乎其有所攷究乎曰然云如此孟子曰孟子有云堯舜性之也堯舜乃天性之自然湯武反之也湯武以修為而得性之者天性之自然生而知之者也生而知此理者也反之者修為而得學而知之者也由學而知此理者也又曰又云孔子則生而知者也夫子乃生而知此理者也孟子則學而知者也孟子則學而知此理者也後人不達後來之人不悟以謂聖本生知聖人本生而知之非學可至非由學而可至其地位而為學之道遂失而為學之道遂廢失不求諸已不反而求於身而求諸外􅪇然而求諸外以博文强記巧文麗辭為工以博學於文强記其語巧為文章飾以葩藻為能榮華其言夸耀於言語間鮮有至於道者言辭雖好神鑒已昏少有求至於聖人之道者則今之學則今之世有敏於好學者與顔子所好異矣其比顔子之學不同而所好亦異矣嗟哉性理羣書句解卷八
