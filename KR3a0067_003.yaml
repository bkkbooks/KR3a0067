body:
  text: 性理羣書句解卷三宋熊節編宋熊剛大注銘銘者誌也所以銘誌其事西銘此篇論乾坤一大父母人物皆己之兄弟儕輩人當盡事親之道以事天横渠先生乾稱父乾為天父道也故以父言坤稱母坤為地母道也故以母言予兹藐焉吾于此以藐然之身藐音眇乃混然中處混含無間而處乎中子道也故天地之塞乾陽坤隂此天地之氣充塞于兩間吾其體吾資之以為體天地之帥乾健坤順此天地之志為氣之統帥吾其性吾得之以為性民吾同胞人皆資此氣得此理以生為吾同類故視之如同胞兄弟然物吾與也物之生亦本于天故視之亦如己之黨與然大君者人君也吾父母宗子即乾父坤母之長子其大臣宰相也宗子之家相也即長子家之輔尊髙年尊敬老人所以長其長所以長我之兄弟慈孤弱慈愛孤藐㣲弱所以幼吾幼所以幼吾之卑幼聖其合徳聖人與天地合徳是兄弟之合徳于父母者賢其秀也賢者才徳過人是兄弟秀出乎等夷者凡天下疲癃殘疾凡天下疲懦癃痛宿疾之人惸獨鰥寡與惸憂獨無子鰥無妻寡無夫者皆吾兄弟之顛連而無告者也無非吾兄弟之顛倒流連無告訢者也于時保之于是時畏天以自保者子之翼也猶子之翼敬乎親也樂且不憂樂天而不憂懼純乎孝者也猶子之篤孝扵親而無愧也違曰悖徳違背乎親是為悖亂之徳害仁曰賊戕滅天理賊殺其親故謂之賊濟惡者不才長惡不悛世濟其凶故謂之不才其踐形若能盡得人道而充其形惟肖者也是與天地相肖似而不違者也知化是聖人知變化之道則善述其事則其所行皆天地之事即人子善能纉述父母之事窮神是聖人通神明之徳則善繼其志則其所存皆天地之心即人子善能繼承父母之志二者皆樂天踐形者不愧屋漏不自欺于室隅人所不見之地為無忝不忝辱于天地即人子無忝爾所生也存心養性存其心而不失養其性而不害為匪懈不懈怠于事天即人子事親而夙夜匪懈也此二者畏天而求踐夫形者惡㫖酒惡美酒而不飲惡去聲崇伯子之顧養鯀封崇國伯爵禹其子也禹惡㫖酒所以顧父母之養養去聲育英才篤于教育英俊之材潁封人之錫類潁谷掌封疆之人名考叔鄭大夫也能感動荘公思念其母是錫與儔類使之皆孝也不弛勞而底豫不敢懈弛其事親之勞而能感其父瞽瞍之底致悦豫舜其功也舜帝之功致也無所逃而待烹晉獻公太子申生為驪姬所譛或曰不如逃之太子不從姬卒譛之太子自縊新城而死此所謂無所逃而待烹也詳見左僖四年申生其恭也申生之敬恭父命也體其受而歸全者人之一身受于父母當體其所受全而歸之參乎曽参其人乎将死而啟手足是其事也勇于從而順令者子于父母東西南北唯令之從不敢後也伯竒也伯竒之履霜中野是也伯竒周厲王子富貴福澤富足貴顯福禄利澤将以厚吾之生所以大奉于我使吾之為善也輕貧賤憂戚貧薄卑賤憂苦戚嗟庸玉汝于成也所以拂亂于我使吾之為志也篤庸玊汝用以琢磨汝使成人也存吾順事孝子身存則其事親也不違其志而已沒吾寜也沒則安而無所愧于親也文公曰西銘理一分殊知其理一所以為仁知其分殊所以為義盖仁是泛然兼愛處義是截然分别處故天地化生萬物則為理一然乾稱父坤稱母其分未嘗不殊民物並生天地之間其理未嘗不一然民稱同胞物稱吾與則其分未嘗不殊與夫合天下之人皆吾兄弟之親其理未嘗不一然至于大君家相長幼聖賢殘疾皆自有等差又其後因事親之誠以明事天之道盖無適而非所謂分立而惟理一者理一處便有兼愛之仁分殊處便有截然之義不然愛無差等墨氏之仁耳豈足以論張子西銘之大㫖學者其更紬繹之東銘此篇論戯言戱動與過言過動不同戲言戲謔之言出于思也由思而出戲動戲謔之動作于謀也自謀而作發于聲戯言發于聲音見乎四支戲動見乎支體謂非己心自云不是本于吾心不明也是惑也欲人無已疑本于吾心欲人不疑不能也弗能得也過言誤于言非心也非其心之本然也過動誤于動非誠也非其心之寔然也失于聲失于聲音而為言之過繆迷其四體繆迷其四體而為動之過謂己當然吝于改過遂以為己之當然自誣也自誣㒺其心也欲他人已從既惮改而自誣又欲它人之順從乎已誣人也是誣㒺它人也或者謂或説是出扵心者出于心思而戲謔者歸咎于己戲可歸咎責以為己之戲失于思者失于心思而過誤者自誣為己誠可自誣㒺以為己之實然不知戒其出汝者不知警戒其出汝心而故為者反歸咎其不出汝者乃歸咎責其不出汝心而偶失者長敖咎己戲則増長敖誕而慢愈滋矣長上聲敖去聲且遂非誣己誠則遂從非失而過不改矣不知孰甚焉不知而愚莫此為甚顔樂亭銘為孔周翰作授此篇論聖賢相𫝊之妙明道先生天之生民上天之生斯民是為物則物者身也則者理也有是物必有是則非學非師非篤于學非親于師孰覺孰識誰明其天誰識其理聖賢之分生知為聖學知賢分量之分古難其明自古難曉有孔之遇聖有孔子得于親遇有顔之生賢有顔子生于此時聖以道化聖則覺之以道而使之化賢以學行賢則勉于為學而篤于行萬世心目使萬世之人心開目明破昏為醒破其昏䝉為此覺悟實孔顔有以示訓也周爰闕里夫子所居之地為闕里周爰即周廻也惟顔舊止乃顔子舊時所居巷汙以榛其巷既汙穢而荆棘井堙而圮其井復堙沒而圮壊圮音否鄉閭蚩蚩鄉閭之間愚暗之民蚩音癡弗視弗履不能遐想聖賢之遺迹廢其地而不視履有卓其誰有卓然任其責者誰哉師門之嗣是夫子之後嗣孔周翰也追古念今追古人之遺迹念今日之荒凉有惻其心惻然有憂于心良價善諭以良價而得復善開諭發帑出金發帑藏出金谷帑音儻巷治以闢巷之廢者治而闢之井渫而深井之圮者䟽而深之渫音泄清泉澤物于是有泉之清可以潤物佳木成隂有木之佳自然成隂載基載落載治其基載成其宇亭曰顔樂斬然有亭扁以顔樂樂音洛昔人有心思昔顔子融此樂心予忖予度維今之人于此求度度入聲千載之上由今觀昔千載而上顔惟孔學有此顔子惟孔是學百世之下由今以後百世而下顔居孔作顔樂有亭孔氏所建盛徳彌光顔子盛徳後世愈光風流日長遺風之善流𫝊日逺道之無疆是道無窮古今所常古今常行水不忍廢此井不廢水不忍也地不忍荒此地不廢地不忍也嗚呼正學嗟彼顔氏之正學其何可忘其何時可忘之哉克己銘克己是克去己私也此論仁者私視天地萬物為一體不可懐己藍田先生凡厥有生舉凡有生天地間者均氣同體皆禀此氣與吾同體胡為不仁何為而不公溥此心我則有己惟知有我一身立己與物己與物對私為町畦利自分别彼町此畦勝心横生争勝之心横恣而發横去聲擾擾不齊紛擾多事不能齊一仁者以天地萬物為一體此不仁者也大人存誠大徳之人有此寔理心見帝則心常静定洞明天理初無驕吝了無咎于人驕于己之意無我也作我蟊賊為吾仁之蟊賊蟊賊害稼蟲喻害仁也志以為帥志以為之主帥氣為卒徒氣自聽命如卒徒然奉辭于天奉行命令于天誰敢侮子外邪客氣誰敢侵侮且戰且徠且戰退之且招徠之勝私窒慾勝去其私窒塞其慾窒音的昔焉㓂讎昔為㓂讎與我相敵今則臣僕今為臣僕歸我宰制方其未克方是私之未勝窘我室廬常窘迫我室廬言心也窘音謹婦姑勃豀勃争也豀空也言婦姑反戾而闘争也出荘外物篇豀音兮安取其餘安能取其它哉亦既克之亦既去其私意皇皇四逹此心之公旁通廣逹洞然八荒洞然八方之逺皆在我闥皆在吾闥中孰曰天下誰言天下不歸吾仁不在我仁中乎痒痾疾痛人之痒痾疾痛舉切吾身皆切于吾之肌膚以天地萬物為一體者也一日至之一日克去己私至此地位莫非吾事皆我己分内事顔何人哉顔子何如人能克復如此晞之則是晞而慕之是亦顔子書字銘此篇論冩字亦當持敬文公先生握管濡毫把筆之管漬筆之毫伸紙行墨伸開其紙以墨行冩一在其中中者敬也敬存于心㸃㸃畫畫一㸃一畫各得其正放意則荒縱意則荒踈取妍則惑求其妍麗祇以迷惑必有事焉必有所事于此神明厥徳惟神明其徳而已盖指敬也藏書閣書厨銘此篇論書皆元聖所作子孫百世當永保之於穆元聖嗟嘆夫子之道深逺繼天測靈上繼天道窺測其妙出此謨訓示此典籍諸書惠我光明惠我使我光明覺悟永言保之願言乆長珍而藏之匪金匪籝非黄金滿籝含英咀華採摘書中之英咀嚼書中之華百世其承相傳百代可常至樂齋銘此篇論讀書有味甚于嗜肉有味呻吟北忩疾中呻吟于此忩之下氣鬱不舒氣欝抑而不伸我讀我書吾誦吾書如病得甦恍然覺悟如病之得甦醒客問此書客問我所讀之書中作何味其中滋味若何君乃嗜之汝乃嗜其滋味如此其至如此極至趣為子語促為子言趣音促無味乃然書中自有不滋味之滋味所以為可樂之至者是有味者凡是有滋味者乃㾞乃羶㾞乃牛之臭羶乃羊之臭如必拘拘求其滋味是乃㾞羶而已天下之樂天下至樂之事我不敢知非我所敢知至歐陽子至歐陽修乃敶斯詩詩中有至樂字敶音陳我思古人古人歐陽修也實感我心寔能使我心懐感惟曰愔愔不過安和愔音因式鈎且深自有以鈎取書中之深㫖奥義敬恕齋銘此篇論為仁之功在乎敬恕出門如賔出門如見大賔客承事如祭奉事如臨大祭祀以是存之即此存之于心敢有失墜無敢有所墜失此四句言主敬己所不欲吾身所不欲者勿施于人亦不以此施之他人以是行之即此行之于身與物皆春渾然與萬物同一春意此上四句言行恕胡世之人如何一世之人恣己窮物恣己則非敬窮物則非恕惟我所便惟求己之便則不敬謂彼奚䘏言于人何䘏則非恕孰能反是誰能反此歛然厥躬収歛其身于墻于羔坐則見之于墻食則見之于羹指下句仲尼子弓仲尼子弓仲尼孔子字也子弓仲弓字也内順于家在内以此道順其家外同于鄰在外推此道同于人無小無大無小者與大者㒺時怨恫無是怨痛恫音通為仁之功敬恕兩盡即是為仁曰此其極功至此則極矣敬哉恕哉此敬此恕永永無斁常常無厭斁音亦學古齋銘此篇論古之學者為己之是今之學者為人之非相古先民觀古聖人學以為己所學以求盡其己今也不然今之人不如此為人而己所學但求知于人為己之學所學之為己者先誠其身先于踐履之間務其誠寔君臣之義處君臣則當盡君臣之義父子之仁處父子則當盡父子之仁聚辨居行學以聚之問以辨之寛以居之仁以行之無怠無忽無有怠惰無有慢忽至足之餘天理充足于身已極其至澤及萬物而後推其餘澤以及萬物為人之學學為人者燦然春華燦然光彩如陽春一布百物華麗誦數是力勤於誦書復逐句而數以求其義纂組是誇求工文章猶織衽鮮美誇耀于人結駟懐金子貢結駟過原憲之家顔子不以紆朱懐金為樂結駟懐金矜富貴也煌煌煒煒彰灼光輝世俗之榮俗人以是為榮貴君子之鄙君子則鄙薄之維是二者惟此為己為人二者其端則微其肇端則甚㣲眇綿不察于幾微間不之致察胡越其歸末流如此胡與南越相逺卓哉周侯髙哉周君此齋之主人也克承先志繼承其先人之志日新此齋重新是齋以迪來裔以啟廸其方來之子孫此齋何有此齋中何所有有圗有書有圗軸又有書籍厥裔伊何其周侯之子孫又如何衣冠進趨皆明著衣冠儼然進趨夜思晝行夜以思之日以行之諮詢謀度咨問揆度不恃己能也度音鐸絶今不為遏絶今人為人之學而不為惟古是學惟以古人為己之學先難後獲先用工于難而以有得為後匪亟匪徐不敢欲速亦不敢緩我則銘之吾今為銘其齋以警厥初以警戒其為學之初求放心齋銘此篇論操執此心之道天地變化天地變化無窮其心孔仁以生物為心故天地之心為甚仁成之在我人得天地生物之心為心則主于身則為一身之主宰其主伊何其所主宰如何神明不測神妙明通不可測度發揮萬變發施萬事之變立此人極以立人道晷刻放之頃刻放蕩千里其奔則奔逸千里之外非誠曷有不有寔理以總攝之何以有此心非敬曷存不有此敬以檢束之何以存此心孰放孰求或放或求在我而已更由誰哉孰亡孰有或亡或有在我而已更由誰哉屈伸在臂譬之一屈伸惟臂之所為反覆惟手譬之一反覆惟手之所使防㣲謹獨茍能即此敬以防其㣲持此誠以謹其獨兹守之常守此務以為常切問近思又切于問而近以思之曰惟以相謂惟以此二者交相用尊徳性齋銘此篇論人當尊敬上天所賦之性不可為物慾所汨維皇上帝於皇上天降此下民降此生于下民何以予之将何物賦予之曰義曰仁言有仁與義而已雖義與仁敬此而又順彼猶懼弗克尚恐不能孰昏且狂誰人昏塞狂妄茍賤汚卑茍賤而不自貴重汚卑而不及髙明滛視傾聽視不正為滛聼不正為傾惰其四肢隳惰四體䙝天之明䙝狎上帝之明命䙝音屑慢人之紀慢侮在人之倫紀甘此下流甘心居于下流衆惡之委衆流穢惡皆歸于此我其監此吾當察此祗栗厥心祗敬荘栗以持此心有幽其室雖處幽暗之室有赫其臨亦如上帝赫然在前執玊奉盈譬之執玉惟恐其墜奉盈惟恐其溢須㬰顛沛須㬰不可離顛沛必於是任重道悠負荷者重而道又逺其敢或怠安敢或生怠惰之念詩詩者志之所之在心為志發言為詩五言短句月到梧桐上吟此篇借物形容聖人清温之徳康節先生月到梧桐上月影方照梧桐樹上風來楊栁邊温風方來楊栁梢邊院深人復静庭院之際人聲之寂此景共誰言這般時景果與誰言盖月到梧桐天光瑩也風來楊栁天氣温也必聖人徳性昭融方足語此故末復云此景共誰言厥有㫖哉清夜吟此篇借物形容聖人本體清明人欲浄盡月到天心處月照天之中風來水面時風來水之上一般清意味這般意味極清料得少人知竊想少得人知此盖月到天心則雲翳盡掃風來水面則波濤不興此正人欲浄盡天理流行時也安分吟此篇論安分知幾乃是出人之事安分身無辱能安本分則身自無辱知幾心自閒幾者動之㣲能識先覺則心自能閒雖居人世上我雖居人世之上却是出人間却是能自㧞于衆人之中尭夫自詠也天聽吟此篇論上天之道只是人心之理天聽寂無音天聽之髙寂然無音蒼蒼何處尋蒼蒼高逺何處可尋非髙亦非逺然亦非髙非逺都只在人心近而求之只在此心盖心函太極所以參賛造化者也何待求之髙逺乎感事吟此篇論善根難培思習難克芝蘭種不榮芝蘭雖好種之不茂荆棘剪不去荆棘雖惡剪之不去二者無奈何種剪皆無奈何徘徊嵗将暮遷延歲月之將盡此言善根難培惡習難克因循荏苒老將至矣尭夫詠此以警後學也五言長句復卦詩此論隂剥于坤陽萌于復坤復中間為無極天之心尚未變動冬至子之半十一月為建子月冬至節正得子之中氣故曰子之半一陽生于此是即復之初爻也天心無改移于此見天地生物之心生生不息未嘗有所改變而移易一陽方動處是時一陽方始萌動萬物未生時而萬物猶未便生𤣥酒味方淡正猶明水之酒其味甚薄言陽穉也大音聲正希咸英之樂其聲甚希此言如不信此語如不信更請問庖犠更請問庖犠氏先天學也因河圗而畫八卦重之為六十四闢為方貟圗以貟函方貟于外者乾盡午中坤盡子中離盡夘中坎盡酉中陽生于子中極于午中隂生于午中極于子中其陽在南其隂在北方于中者乾始于西北坤盡于東南其陽在北其隂在南詳見先天圗説訪高僉判所居此篇論隐居之地景物瀟洒之状勉齋先生逺樹分髙下逺地之木或髙或下平洲半有無平洲之間半有半無短亭低宻竹短亭比于宻竹則尤低小艇隐寒蘆小艇撑入寒蘆而深隐轉浪漁深入急浪翻中漁更深入斜陽鵶亂呼日斜墜之時鵶集争噪自慚貴公子我自愧貴公子如髙僉判者未老賦歸歟年未老而已上掛冠之請林居此篇論隐居之地意態清髙之状西山先生富貴良非願富與貴皆非我願林泉畢此身于林泉之下以終此身酒因隨量飲酒隨量而飲不至勉強詩或偶然成詩偶然而就不費思索秋水和煙釣秋水則和煙而釣春田帶雨耕春田則带雨而耕頽然無縫塔林中所居之屋頽然如禪塔而無縫且不費經營自然而然非有所經營宿方廣寺此篇状禅林清幽之態南軒先生俗塵元逈隔俗間埃塵本與相隔景物自天成眼前景物渾然天成山近四圍碧山近四圍而色青泉鳴永夜清泉流撤夜而聲清月華侵戸冷月光侵門而冷秋氣與雲横秋氣凌雲而横曉起尋歸路曉來毎尋歸路題詩寄此情題此詩以述其情觀物詩此篇論隂陽動静之理康節先生地以静而方地主静而體方天以動而圎天主動而體貟既正方圎體一方一貟其體各正還明動静權貟者動而方者静而明其動静之變權變也静久必成潤地隂而静久必成潤動極遂成然天陽而動極必成然潤則水體具潤則為水而水之體以見然則火用全然則為火而火之用以全水體以器受水體必湏以器而受火用以薪𫝊火用必湏以薪而𫝊體在天地後體質雖見于天地之後用起天地先用則起于天地之先此用字妙用之用如所謂冲漠無眹萬象森然已具也感興一首此篇論天地隂陽寒暑運行之氣有理融貫其間以為之主文公先生昆崙大無外昆崙天形貟也大而無所外旁礴下深廣旁礴地勢方也下而深且濶礴音薄隂陽無停機隂陽二氣流行于天地之間其機軸不暫停止寒暑互來往故寒而暑暑而寒更迭往來皇羲古聖神古者伏羲神聖異禀妙契一俯仰仰觀天文俯察地理有以見天地對待之體隂陽交錯之象無物不然黙契其妙不待窺馬圗雖不待窺見神馬所負之圗人文已宣朗而剛柔之畫竒耦之數尊卑之等貴賤之位所謂人文者已燦然昭布于天下矣渾然一理貫然非天自天地自地隂陽自隂陽寒暑自寒暑必有一理融貫其間所謂太極也昭晰非象罔故冲漠無眹之中而天地隂陽寒暑之理已具此理燦然昭晰初非䝉昧無可見之寔象㒺䝉昧也晰音析珍重無極翁我朝周子推而廣之又有無極之説盖易所謂易有太極是言隂陽變易之中而有至定極之理周子所謂無極而太極是言無定極之中而有至定極之理無極二字周子發之故以無極翁言珍重貴重也為我重指掌于羲皇畫卦之後又得周子作太極圗以闢其義如重指諸掌而甚明感興二首此篇論隂陽一太極吾觀隂陽化吾觀陰陽二氣變化升降八紘中上騰下降八極之中紘音宏前瞻既無始謂其有所始則由前而觀太極動而生陽若以陽動為始則陽之動寔根于陰動之前未始無静未見其有所始後際那有終謂其有所終則由後而觀動極而静静而生隂若以陰静為終則静極復動一動一静互為其根未見其有所終至理諒斯存無始無終運行不息所以然者信有太極之理黙存其間萬世與今同雖歴萬世之久與今一同誰言混沌死彼荘周且言太極獨立于天地之先及天地既判而混沌死不知氣依理而行天下安有理已死而氣獨行哉幻語驚盲聾此特荒誕之語但可驚世之無耳目者少有聰明豈惑于彼之説哉感興三首此篇論人心出入之機人心妙不測人心之靈神妙不可測度出入乗氣機機動處也或出或入隨氣而動凝氷亦焦火心有所懼則寒于凝氷心有所愧則熱于焦火淵淪復天飛思而深奥或淵而淪思而外馳或天而飛凝氷淵淪以入言也焦火天飛以出言也至人秉元化至徳之人秉執造化之理而為吾身之主動静體無違一動一静之間皆體此理而無違戾焉珠藏澤自媚方此心之静也寂然不動如珠藏在淵而澤自生媚玊韞山含輝如玊韞在石而山自含輝神光燭九垓及此心之動也感而遂通神光散照乎九天之上𤣥思徹萬微幽思妙通乎萬理之㣲塵編今寥落自聖人不作心學無𫝊著在舊編散亂寥落亦鮮有能知之者嘆息将安歸徒有咨嗟嘆息而已其将歸之誰乎感興四首此篇論人心陷溺之禍静觀靈臺妙靈臺心也静而觀之一心之靈神妙不測萬化從此出經綸萬事皆從此出云胡自蕪穢如何不自把捉而為物欲汚穢反受衆形役一心莫識為主而役役于耳目口鼻之私欲厚味分朶頥厚味方嗜甘于朶順而不恥朶垂皃頥口旁也言欲食妍姿坐傾國妍姿可好坐覆其國而不悔妍姿美色也崩奔不自悟崩摧奔放于人欲横流之中而不悟其非馳騖靡終畢終身顛倒馳騖而無終畢之時也君看穆天子汝看周之穆王萬里窮轍迹造八駿之乗車轍馬迹殆遍天下失為主之道不有祈招詩不有祭公謀父作祈招之詩以諌止之招音韶徐方御宸極則諸侯離心徐偃伯于徐土玉帛而朝者不但三十六國殆将出御君位而文武之業隳矣豈不甚可畏哉按所舉穆天子之事特借此以喻人心之馳騖流蕩若不知止則心失主宰而物欲反據而為之主矣此六義之比也感興五首此篇論周室君臣之失涇舟膠楚澤此言周室哀替之由盖自昭王無道南㳺于楚濟漢船人惡之即涇水之舟膠合以進至中流而膠液遂沉没于楚江焉周綱已陵夷周室紀綱廢墜不振况復王風降况又幽王為犬戎所弑王風大壊不同列國故宫黍離離平王東遷西周故宫鞠為禾黍離離之憂𤣥聖作春秋孔子作為春秋一經哀傷實在兹始于魯隐而當平王東周之始王哀傷之意寔在于此祥麟一以踣麟出必有聖人在位今明王不興麟出非時其困踣一至于此踣音匐反袂空漣洏夫子觀之反袂拭涕重嗟吾道之窮春秋遂作于此而亦絶筆于此漂淪又百年自是汨沒又餘百年僣侯荷爵珪魏斯趙籍韓䖍三家分晉僣竊侯位周衰不能正其辜反錫命之彼遂得以荷諸侯之珪爵王章久已䘮章猶法也王者之法久已䘮失何復嗟嘆為亂名分乖典常何用嗟嘆馬公述孔業司馬温公作通鑑欲繼述夫子春秋之業託始有餘悲乃託始于初命晉大夫韓趙魏為諸侯而致其有餘不盡之悲然此豈周室陵夷之始耶拳拳信忠厚寓意拳拳切至信為忠厚不薄無乃迷先幾當是是諸侯盛大夫強視王室如贅疣耳雖無王命其能使之不自立乎司馬公乃欲托始于此可謂迷惑不知事幾之所先矣感興六首此篇論漢室君臣之失秉史筆者不能黜魏而尊蜀東京失其御漢自桓帝靈帝浸失御下之道刑臣弄天綱宦官專恣竊弄威福天綱即威福西園植姦穢開西園賣爵置八校尉蹇碩袁紹鮑鴻曹操趙融馮芳夏辛淳于瓊以崇植姦惡五族沉忠良用單超具瑗左琯徐擴唐衡五族沉滅陳蕃李膺忠良之士黨錮禍也青青千里草千里草董卓䜟語也乗時起陸梁乗時而起陸梁之甚卓初為中郎将其後廢立焼宫室發諸陵自為相國強梁于一時當塗轉兇悖魏闕當塗髙曹魏䜟語也操挾天子以令諸侯卒成簒奪之計其兇悖尤甚于董卓炎精遂無光漢之炎運銷滅于此桓桓左将軍于此之時有武威左将軍劉備亦漢子孫也獻帝建安三年為左将軍桓桓威武皃仗鉞西南疆仗義起兵于西南之疆以誅操復漢為名鉞斧鉞也伏龍一奮躍伏龍諸葛亮也一奮躍而起鳯雛亦飛翔鳯雛龎士元也亦飛翔而來伏龍鳯雛即司馬徽謂此中有伏龍鳯雛也祀漢配彼天羽翼劉備迓續漢祀以配彼天出師驚四方出師北伐曹操天下震動天意竟莫囬然天意不可得而挽回先主既殞孔明亦殂王圗不偏昌卒使王業不偏盛于西蜀此漢祚所以不能復振晉史自帝魏夫陳夀作三國志自尊大曹魏為正統固無責爾後賢盍更張司馬温公一代之大儒通鑑之作盍改而正之乃復因襲其繆世無魯連子求如魯連子之不肯帝秦者世亦不復有斯人矣千載徒悲傷千載之下豈不徒悲傷也感興七首此篇論唐室君臣之失秉史筆者不能黜武后而尊唐晉陽啟唐祚唐髙祖為隋晉陽宫監太宗與裴寂隂謀以晉陽宫人侍髙祖因脅以起兵是曰晉陽啟唐家運祚王明紹巢封王明王子明也太宗子也巢封元吉封為巢刺王太宗弟也太宗手刃元吉而奪其妻生子明立為齊王紹巢之後垂統已如此垂統之主其瀆亂天倫如此繼體宜昏風繼體之君耳濡目染昏亂之風宜有甚焉麀聚瀆天倫武后本是太宗宫人後出為尼髙宗見而説之使潜入宫立以為后父子聚麀其亂倫也如此麀牝鹿音憂牝晨司禍凶然且使之參預國政擅權自恣猶人家之牝雞司晨顛倒錯落其凶禍可知乾綱一以墜既廢其子中宗于房陵唐之紀綱已自堕也天樞復崇崇復立周之宗廟鑄銅為柱名曰天樞髙極于天紀周功徳改唐為周禍莫慘焉淫毒穢宸極淫毒秦詐宦者以比張易之張昌宗二人易之昌宗恣效淫毒狎比武后穢惡帝居毒音藹虐焰燔蒼穹來俊臣周興扇為酷虐焰焰如火燔炙蒼天向非狄張徒向非狄仁傑張東之輩誰辦取日功忠憤激切挽回天日則中宗終廢于房陵誰人能辦此大功取日謂挽回天日云何歐陽子如何歐陽修撰唐史乗筆迷至公秉史直筆乃迷至公之道徇己私之意唐經亂周紀武氏以母后簒竊神器中宗尚在房陵無恙正如季氏強逼公室而昭公出居乾侯春秋每嵗必書公之所在魯未嘗無君也豈以季氏專魯而遂與之歐陽子反紀周之年號以亂唐之厯統可勝嘆哉凡例孰此容夫以歐公之作唐史一凡一例皆擬春秋誰謂凡例而可容此乎侃侃范太史惟有侃侃范太史侃侃温和淳厚貌范太史范祖禹受說伊川翁受學于程伊川遂以伊川之説改而正之春秋二三䇿范撰唐鑑黜武后之僣每嵗必書曰帝在房陵如春秋書公在乾侯之例二三䇿即二三言也萬古開羣䝉使天下後世知有君臣之大義真足以開萬古之䝉蔽也感興八首此篇論姤乃隂之始復乃陽之始朱光遍炎宇赫赫日光遍滿炎宇陽之盛也炎宇夏天也微隂眇重淵然外雖盛而重淵之底其冷如氷是一隂之細已驀然生于下以卦言之姤是也重平聲寒威閉九野凛凛寒威閉藏九野隂之極也九野八方與中央陽徳昭窮泉然外雖盛寒而窮泉之底其温如春是一陽之徳已顯然萌動于下以卦言之復是也文明昧謹獨其在人也陽明勝而徳性用茍有文明之徳而昧謹獨之戒昏迷有開先隂獨勝而物欲行雖曰昏暗之極而有開先之理幾㣲諒難忽惟其昧謹獨故幾㣲之際惡所萌也信有所不容忽善端本綿綿惟其有開先故善端之充綿綿無窮本有所不可禦掩身事齋戒君子于夏至之時必掩身正色屏絶嗜欲及此防未然及此而防其隂之未然求以固夫陽也閉闗息商旅先王于冬至之時閉闗息旅安静休養絶彼柔道牽去彼柔道之牽繫求以絶夫隂也感興九首此篇論天之北極則人心之太極㣲月墜西嶺新月既墜于西嶺爛然衆星光衆星爛然而光明明河斜未落河漢斜界而未落斗柄低復昻斗柄低指而復昻感此南北極於斯之時仰觀天象獨見此南北極固有所感樞軸遥相當二極相去雖逺而樞軸之運正直相當太一有常居南極在下規之中入地三十六度常隐不見北極在上規之中出地三十六度常見不隐故星日河漢運轉不常惟有北極太一辰星常居其所而不動仰瞻獨煌煌視之獨煌煌然有光中天照萬國在天之中臨照萬國三辰環侍旁日月星三辰皆環其旁而拱之人心要如此正如人心居身之中寂感無邊方寂然不動無所偏倚随感随應無邊無方而耳目口鼻之形無不聽命于我正猶太一居天之中而日月星皆環列其旁然則心為吾身之北極歟感興十首此篇言堯舜禹湯文武周公傳心之法在乎敬放勲始欽明放勲大功也或以為堯號自帝堯始盡此欽敬光明之徳南面亦恭已至舜繼堯端拱南面亦惟知恭敬于已大哉精一傳乃舜命禹曰人心惟危道心惟㣲惟精惟一允執厥中盖人心危殆而難安道心㣲妙而難見必精以察于二者之間一以守其本心之正信可操執此中精一非敬不可大哉斯言真聖人傳授之心法也萬世立人紀萬世綱常可以藉此有立猗歟嘆日躋成湯聖敬日躋詩既嘆而美之猗美貌日躋如日之升也穆穆歌敬止文王緝熈敬止詩復歌而詠之穆穆深逺貌止語助辭也戒獒光武烈與夫武王戒謹于旅獒之訓而武烈有光待旦起周禮周公思得于待旦之頃而制作周禮皆所以持此敬也恭惟千載心恭惟堯舜禹湯文武周公之六七君子相去雖有千餘載而𫝊心之法不外乎敬秋月照寒水吾想其心淵乎其清湛乎其明有如秋月下照寒水魯叟何常師是數聖人傳心之法不播于書則詠于詩又不則布于周禮仲尼無所不學初無常師祖述尭舜憲章文武無間夏禹夢寐周公亦何常之有哉删述存聖軌晚年惟删定詩書修制禮樂是數聖人心法之敬盡見于詩書禮樂之間庻幾帝王軌範猶存而來者有考耳感興十一首此篇論易首乾坤伏羲畫此以示後世君子當體乾坤以進徳吾聞庖羲氏我聞在昔伏羲爰初闢乾坤于此始分闢乾坤布之内外畫為方貟圗以貟函方貟者象天方者法地故下句以行布渾方為言乾行配天徳易曰乾天下之至健又曰天行健盖天者乾之形體乾者天之性情故畫乾以配合天徳坤布協地文說卦曰坤為布主敷布施生萬物散殊小大呈露粲然有文故畫坤以協合于地文仰觀𤣥渾周仰而觀之天貟而動𤣥渾幽而貟也周運動也一息萬里奔一息之間奔行萬里俯察方儀静俯而察之地方而静易曰坤至静而徳方儀象也頽然千古存頽然其順千古常存悟彼立象意君子悟伏羲畫卦所以立乾坤二象之意契此入徳門黙有以契合在我入徳之門戸勤行當不息乾道奮發有為法乾之健勤而不息則徳日新而可久敬守思彌敦坤道静重有守法坤之順敬守愈篤則業不失而可大性理羣書句解卷三
