body:
  text: 性理羣書句解卷四宋熊節撰熊剛大注詩感興十二首此論六經散失已久千載之下惟有程伊川能繼孔子六經之絶學文公先生大易圖象隱河圖卦象易之本也淫於術數之末學則易之圖象隱晦不明詩書簡編訛風賦比興詩之義也牽於小序之臆說則詩之章㫖訛謬而無當書者政事之紀僅存於口授壁藏之餘而虞夏商周之文訓誥誓命之作錯亂無考禮樂矧交喪禮樂中和之教僅得於二戴氏之所記而三千三百之儀六律八音之節喪失無傳喪去聲春秋魚魯多與夫春秋辨名分之書不惟文字錯漏以魚為魯以巳亥為三豕如郭亡則書郭公夏五不書其月之類更多瑶琴空寶匣猶瑶琴空藏於寶匣絃絶將如何而其絃斷絶不復堪彈興言理餘韻千載之下慨言有能振此絶響龍門有遺歌惟有伊川先生得聖賢微意於殘編斷簡中而遺聲地所播正如琴絃既斷今復接續也龍門伊川所居之感興十三首此篇論顔曽思孟𫝊孔子之道亦惟能潛其心又重嘆後人之不能顔生躬四勿顔淵問仁夫子告之以非禮勿視聽言動顔淵躬行此四者曽子日三省曽子一日常以此三者省察其身為人謀不忠與朋友交不信𫝊不習中庸首謹獨子思作中庸首明謹獨之戒謹獨者成謹於暗室屋漏獨處之時衣錦思尚絅如衣錦衣而思以緇衣加其上謹之至也絅緇衣也絅火迥切偉哉鄒孟氏大哉鄒國孟軻氏雄辨極馳騁肆口大辨極其馳騁於文字間操存一言要其論心學引夫子操則存一語至簡且要操平聲為爾挈裘領為爾後學挈持綱領言得其要如挈裘領也丹青著明訓夫四子之言炳如丹青著在聖經可為明法今古垂煥炳逺垂今古昭然可見何事千載餘胡為千載之下無人踐斯境無人踐履到此地感興十四首此篇論是道之本原元亨播羣品元亨利貞乾坤之四德元者生理之始屬於春物於此而萌蘖亨者生理之通屬於夏物於此而敷榮故曰播羣品利貞固靈根利者生理之遂屬於秋物於此而成實貞者生理之成屬於冬物於此而歸根故曰固靈根非誠諒無有誠實理也故元亨為誠之通利貞為誠之復茍非此誠則四者皆無有矣五性實斯存在人則五常之性實於此而存蓋人得天之元則為吾性之仁得天之亨則為吾性之禮得天之利則為吾性之義得天之貞則為吾性之智五常不言信正以貫乎四端是實有此理猶誠之貫乎元亨利貞也世人逞私見世人不知本然實有之理順而存之顧乃逞其私見鑿智道彌昏矜其小智恣為穿鑿自以為有見於道不知智愈鑿而道愈昏未若林居子豈若隱居山林之士幽探萬化原探索幽隱而有以見萬化之原哉萬化原即上文所謂誠也此章言異端詞章之學害道妨教故先發此以明吾道之本原也感興十五首此篇論仙學之失飄飄學仙侣飄飄然學仙之流遺世在雲間遺棄人世居雲山之間盜啓𤣥命祕既盜造化生生之權於祕密中竊當生死關氣合則生氣散則死復竊隂陽合散之機以為長生不死之計關機也金鼎蟠龍虎用水火二鼎烹煉神州龍虎之氣交相蟠結龍虎鉛汞也煉丹藥物也三年養神丹然煉丹之法非一日可成初年聚集材料次年燒煉而溫養至三年而後可服刀圭一入口刀圭之藥才入於口刀圭小刀頭尖處白日生羽翰則白日飛升如生羽翼翰平聲我欲往從之朱子自言我欲往從學仙之侣於雲山間脫屣諒非難脫屣塵世想非難事屣履也屣音徙但恐逆天理但恐違逆天理偷生詎能安縱得長生心亦不安蓋有生有死天理之常吾儒之道生順死安夭夀不二修身以俟何必苦欲偷生於天地間耶感興十六首此篇論佛學之非西方論緣業佛在西方其始也論人之受業皆有因緣卑卑喻羣愚言極卑下化誘衆生愚民流傳世代久流傳既逺世代既久梯接凌空虛漸入𤣥妙如梯之接陵駕於空虛髙逺中顧瞻指心性一瞻顧之間謂即心是佛見性成佛妄指其心性之妙名言超有無一言語之際謂不淪於無不著於有不住中間與內外欲超於有無之外捷徑一以開便捷之徑一開徑曲路也靡然世爭趨舉世靡然爭趨慕之靡猶風靡草也號空不踐實相與談論於空虛寂滅之境不復腳踏實地以由夫日用當然之實理躓彼荆榛塗冝其應接酬酢觸事面牆正猶顛躓困踣於荆棘叢中而不知所往也誰哉繼三聖誰能為孟子正人心息邪說上繼禹周公孔子之三聖為我焚其書為我燒其書以絶佛氏夷狄之教乎感興十七首此篇論大學之教聖人司教化聖人任君師之道司教化之責黌序育羣材開闡學舍養育人才黌音橫因心有眀訓因人心之自然而為之節文以修道立教於天下善端得深培使人自以涵養其德性而培養其善端善端仁義禮智也天序既昭陳天序天叙之典既以昭陳其五倫之典天叙以其出於天而有定叙也人文亦褰開人文人事之當然者亦秩其五禮之文人文以其行於人而有節文也褰開褰舉而開示之也褰音牽云何百代下如何百世之下學絶教養乖學既絶而教養之道又乖戾羣居競葩藻羣聚學舍不過爭為竒葩麗藻之文追逐時好爭先冠倫魁攙先爭奪躐取髙弟倫魁狀元也淳風久淪喪教日失俗日薄淳厚之風喪失無有擾擾胡為哉吾不知如是擾擾果何為哉蓋道者文之本文者道之末古人當於本者加意故設學教育惟以天理人倫為重文藝之間特餘力游意云耳後世於末者用工故設學教育惟以文詞葩藻為尚天理人倫曾不講明此朱子所以深嘆也感興十八首此篇論小學之教童䝉貴養正童稚之初貴養正性遜弟乃其方養正方法在於遜弟遜是順父母弟是事兄長雞鳴咸盥櫛雞初鳴時咸起而盥手櫛髮盥音管櫛側匿反問訊謹暄涼適父母所敬謹問訊寒暖奉水勤播灑出而奉水勤於灑地擁篲周室堂擁抱篲帚環掃室堂篲音遂進趨極䖍恭進而趨父母之前極其恭謹退息常端莊退而有休息之時常加嚴肅劬書劇嗜炙讀書必勤劬甚於嗜炙之有味炙肉也炙音這見惡逾探湯見惡必逺避甚於探湯之可畏探平聲庸言戒粗誕庸常言語既以粗暴虛誕為戒時行必安詳平時舉動必以安穩詳謹為上聖途雖云逺聖人途轍雖是更逺發軔且勿忙發軔之初且勿忙迫言不可躐等軔車輪木發軔猶言行之始也軔音刃十五志于學及其十有五嵗志于大學之道念念在此為之不厭及時起髙翔涵養既久則及是時也奮迅而起又孰能禦之哉蓋自十五志學至七十不踰矩有許多等級豈容躐等驟造耶感興十九首此篇借牛山之木形容仁義之心所當保養哀哉牛山木可傷牛山之木非不美也牛山齊東南山斧斤日相尋而斧斤日尋繹於上戕伐之豈無萌蘖生亦非無萌芽之生牛羊復來侵牛羊復從而踐踏豈得以遂其性哉恭惟皇上帝惟此皇天降此仁義心降衷於民莫不有此仁義之良心物欲互攻奪物欲之私交互攻奪孤根孰能任仁義之心僅存孤根孰能保養以全其生乎蓋仁義之在人猶木之在山也善端之間發猶萌蘖之復生也私欲外邪斧斤牛羊也任保也反躬艮其背是必反躬自省而艮其背馬蓋人之一身四肢百體莫不與物相感惟背非聲色臭味之所能動搖反躬艮背所以止於內艮止也肅容正冠襟肅其容貌正其衣冠所以防於外內外交養保養方自此但保養之功方自此始何年秀穹林不知孤根生長何時擢秀髙出於林端乎感興二十首此篇論天道不言聖人無言後世多言之弊𤣥天幽且默天道不言幽深而默仲尼欲無言聖人亦欲無言動植各生遂然天不言而萬物動植之微各遂其性德容自清溫聖人無言而容貌舉履之間盛德著形清和可即無非至教彼哉夸毗子彼有為大言以夸誕於世設言以阿附於人者彼外之辭也呫囁徒啾喧禦人以口給如百鳥之聲徒爾喧啾呫囁多言貌囁日涉反但騁言詞好但騁其外面言辭之美好豈知神鑒昏要其胸中實無真見其於義理至道之歸全不知也神鑒昏昧莫甚於此神鑒心也曰豫昧前訓朱子自謂豫亦昧前者幽默無言之訓坐此枝葉繁而坐此言語枝葉之繁多發憤永刋落自今發憤永永刋落刋落剗除也竒功收一原無事多言而收本原一貫之功不墮夸毗子呫囁啾喧之失也酬南軒此篇論太極之理萬化自出文公先生昔我抱冰炭我文公自謂也昔我懷抱猶冰與炭冰白炭黑言其雜也從君識乾坤君指南軒從南軒講論乾坤之理始知太極藴初知太極之藴奧要眇難名論要妙難於名狀謂有寧有跡謂其有又無迹可指謂無復何存謂其無又不知何所存在惟應酬酢處惟於應酬萬事之間應平聲特達見本根無非是理之寓乃同見其本根也萬化自此流故天地萬化自此流出千聖同兹源千聖授受同此淵源茲此皆指太極曠然逺莫禦雖其散處曠然逺大不可禦遏惕若初不煩然其斂處則惕然整肅亦不煩雜曠以散於事而言惕以斂于心而言惕音敕云何學力微如何學力之弱未勝物欲昏不能勝物欲之昏蔽涓涓始欲達猶一線之水方欲流達言善端之發也已被黃流吞已為濁浪所吞併言人欲之勝也豈知一寸膠豈知於此有一寸之膠救此千丈渾能止此千丈之渾水喻敬之一字能去人欲而存天理吳興沈氏曰河東郡絳縣濟水伏流地中經過東阿取其井水煮膠謂之阿膠用以攪渾濁之水則清勉哉共無斁勉力共學不可厭斁此語期相敦此言更期相與崇篤也送元晦此篇述朋友相得之情元晦朱文公字也南軒與文公相友時文公過訪南軒宿留兩月於其歸也送之以詩如此南軒先生君侯起南服君侯指文公公以南康守被召南康軍乃南方藩服豪氣蓋九州豪邁之氣充塞九州頃登文石陛近者登文石之陛文石陛即御墀之石飾以采色忠言動宸旒忠直之言上動旒冕坐令聲利場坐使馳逐聲名利欲之場者縮頸仍包羞莫不縮頸包藏愧心却來卧衡門既又不合而歸却來隱臥衡門無愧自日休俯仰無愧心休休然盡收湖海氣盡收江湖豪邁之氣仰希洙泗游仰慕洙泗游泳之樂不逺關山阻不以關山阻隔為逺來過訪也為我再月留且為我兩月之留遺經得紬繹聖賢遺經既得相與敷繹心事兩綢繆二人心事乎合無間超然㑹太極太極之理超然默㑹眼底無全牛眼底義理剖判如全牛無不解剝惟茲斷金友言其同心堅如金可斷出處寧殊謀或出或處寧有異謀南山對牀語南山之下對牀同語匪為林壑幽非為貪林壑幽靜之趣白雲政在望望白雲飛遙想親念動歸興也歸袂風颼颼風吹歸袖颼颼然朝來出别語朝來方出語相别已抱離索憂已使我抱離羣索居之憂妙質貴强矯氣質雖美用强勉矯揉精微更窮搜理之精妙更貴極心力而搜求毫釐有弗察毫毛之間不能致察體用豈周流求體或遺其用言用不及其體二者豈周遍流行乎驅車萬里道譬如出車萬里之程中途可停輈既適中道豈可停其車而不往輈張流切勉哉共無斁相勉用功共宜無所厭斁邈矣追前修則可往追前古之聖賢此日不再得示學者此篇論為學當在少年能擇向方龜山楊先生此日不再得此日不可復得頽波注扶桑觀之海水倒流注入扶桑勢不容禦言光隂之易過也扶桑日出之地蹮蹮黃小羣唐食貨志云人始生為黃四嵗為小方為黃小之羣戲舞蹮蹮毛髮忽已蒼今頭髮忽已蒼矣願言媚學子願言耽於學之人共惜此日光同惜此日景之光術業貴及時習學術勵德業貴及其時勉之在青陽勉力須在青春之年行矣慎所之發軔之初當謹所往戒哉畏迷方戒哉畏慎不可昧其方所舜跖善利間為善則帝舜為利則盜跖介於善利之間所差亦毫芒所差只毫毛耳富貴如浮雲不義而富且貴吾觀之如浮雲之輕茍得非所臧茍而取之不足為臧善貧賤豈吾羞貧賤不足為吾之恥逐物乃自戕而奔逐物欲且自戕賊天理胼胝奏艱食昔伯禹勞苦手足播奏粒食胼胝皮堅厚也胼音駢胝音提一瓢甘糟糠顔回一瓢自樂甘味糟糠瓢勺類所逢義適然所逢之時義適然爾未殊行與藏道行則為禹不行則為顔所異者時不異者理斯人已云沒二人今已逝矣簡編有遺芳簡籍具載猶有餘芳晞顔亦顔徒晞慕顔子即顔子之徒要在用心剛大要只在用心剛決耳譬猶千里馬譬如駿馬能行千里駕言勿倣徨整駕云往豈能便至但勿倣徨急迫驅馬日云逺驅馳鞭䇿則馬行日逺一日誰謂阻且長誰說道路阻隔修長不可至乎末流學多岐末流之學多分岐路言多端也倚門誦韓莊倚門誦習惟韓愈莊周之文出入方寸間入耳出口出入於方寸中雕鐫事辭章雕琢文章以為事學成欲何用縱使其學有成何所用奔趨利名場不過奔逐利名之場挾䇿博簺遊故挾簡䇿以讀書志在圖名之人與博奕為事以圖利之人簺音賽博也異趣均亡羊其志趣雖不同均為失其所守言臧穀二人牧羊臧貪書穀貪博俱亡其羊莊子我懶心意衰我懶而心意已衰撫事多遺忘臨事多忘念子方妙齡念爾方是少年壯圖宜自强欲圗大事盍盡自强之志至寶在髙深至貴之寶在山之髙水之深處不憚勤梯航髙處則不憚其髙而勤於用梯深處則不憚其深而勤於用航喻天理髙深須强力以求之也茫茫定何求否則茫然其逺又何所求所得安能常縱或有得亦不可常萬物備吾身天賦萬善備在吾身求得舍即亡求則得舍則亡舍上聲雞犬猶知尋雞犬放而人尚知求之自棄良可傷此心之放乃甘自棄而不復求誠可傷悲欲為君子儒欲為君子之儒勿謂豫言狂勿謂吾前所言之狂七言短句題大顛堂壁此篇責韓愈闢佛又與大顛交結之深濓溪先生退之自謂如夫子韓文公自言其如孔夫子原道深排釋老非原道一篇深斥老佛之失不識大顛何似者不知大顛和尚何所肖似數書珍重更留衣數書往復珍重其言及袁州更留衣服以為别偶成此篇借物形容陽勝隂消生意春融明道先生雲淡風輕近午天雲淡風輕日影近晝此正陽眀勝隂濁消之時也傍花隨栁過前川依花隨栁閒過前溪取其生意春融與已一也傍去聲旁人不識豫心樂邊旁之人又不知吾心之樂處將謂偷閒學少年未必不言偷片時閒學後生為花栁游也謝王佺寄丹此篇言丹藥之丹不如吾道之丹能夀一世伊川先生至誠通聖藥通靈至誠一念可通乎聖故丹藥亦能通靈逺寄衰翁濟病身逺逺寄與年衰之老以濟其病身我亦有丹君信否吾亦有丹汝能信否蓋指儒道言也用時還解夀斯民如有用我者則推吾之道濟斯民仁夀可也解去聲莫春吟此篇形狀隱居清閒之氣象康節先生林下居常睡起遲山林下閒居睡起常遲那堪車馬近來稀况日來車馬相過者甚少春深晝永簾垂地春老畫長簾垂於地此可見其靜定氣象庭院無風花自飛庭院無風花自飛舞此可見其天理流行從容灑落氣象芭蕉此篇借物形容人心生生之理無窮橫渠先生芭蕉心盡展新枝芭蕉之心已展開新枝猶人之為學已有新益矣新卷新心暗已隨裏面又新卷藏方新之心已隨其後猶人心之義理無窮方其得新益之時又有新益存於其間也願學新心養新德願學芭蕉所卷之新心以養我德性所存之新益旋隨新葉起新知又隨其所生之新葉于以起學問之新知細玩此四句上兩句是狀物下兩句是體物新心養新德尊德性工夫也新葉起新知道問學工夫也橫渠先生觀物性之生生不窮以明義理之源源無盡學者當深味之毋徒以詩句觀也旋去聲土牀此篇形狀隱居不求溫飽清閒瀟散之狀橫渠先生土牀烟足紬衾暖纍土為牀地炊中烟火常足又有紬為被可以暖體紬音疇瓦釜泉甘豆粥新瓦器為鼎及香甘之泉和豆煮粥可以充腹萬事不求溫飽外萬事不須求過分紬衾可自溫豆粥可自飽既溫且飽外此何求漫然清世一閒人橫渠自言我於清明之世不過一幽閒無事人耳四子言志此篇形容孔門諸子皆為功名所纍惟曽㸃所樂者天理藍田吕先生函丈從容問且酬孔門函丈雍容且問且答函丈席間可闊一丈地容學者立足也展才無不志諸侯各欲展布才能以伸其事諸侯之志可憐曾㸃惟鳴瑟可惜曾㸃取瑟而鳴獨對春風笑未休獨向春風歌詠不已可見此心上達天德不為富貴利達所動也送劉户曹此篇言學者為文為學所纍却不如顔子心齊無事藍田吕先生學如元凱方成癖學如杜預元凱之注左傳方成癖好言嗜學之深也文似相如殆類俳文似司馬相如殆類俳優言為文之麗也獨立孔門無一事獨立孔門之中了無一事只輸顔子得心齊都輸却顔子此心齊莊忘情於世禮儀此篇論禮無先無後只當行者便行藍田吕先生禮儀三百復三千記曰禮儀三百威儀三千言經禮曲禮之多也酬酢天機理必然應酬萬事無非天機之動理之必然而不可闕者寒即加衣饑即食如寒之即當加衣饑之即當進食孰為末節孰為先皆事也皆理也孰為末節孰為先務言精粗本末莫非至理不可先𫝊而後倦也勉謝自眀此篇論人之為學當在少年光隂能得幾度龜山楊先生少年力學志須强少年勉力為學其立志須當自强得失由來一夢長其間或得或失都來如一夢長耳試問邯鄲欹枕客試問邯鄲側枕而睡之人邯鄲地名邯音韓鄲音單人間幾度熟黃粱不知人生世間禁得幾度熟黃粱之久乎此事乃鍾離化吕洞賓為仙洞賓睡去夢中遍歷清要把麾持節及覺鍾離炊飯方熟故龜山援此以勉謝使之志於道義毋徒志於功名也顔樂齊此篇言隱居清閒雖無賓客然顔瓢滋味甚長豫章羅先生山染嵐光帶日黃山染青藍之色又帶日光蕭然茅屋枕池塘蕭條茅舍枕住池塘枕去聲自知寡與真堪笑自知與人寡合真自可笑賴有顔瓢一味長恃有顔氏瓢飲味長月臺此篇形容隱居之狀矮作牆垣小作臺矮築牆堵小立一臺矮隘上聲時邀明月寫襟懷時約明月吟詠胸懷夜深獨有長庚伴及夜深獨有長庚星與月相伴長庚西方星也不許庸人取次來不許庸凡之徒容易到此蓋清幽之興須有好胸懷者方識得也觀書此篇形容本體清明之象文公先生半畝方塘一鏡開半畝方塘如一鏡之開所以狀吾心之體也天光雲影共徘徊天光雲影皆徘徊其間所以言萬理之涵具也問渠那得清如許問他安得清明如此所以喻吾心之靜定昭明也為有源頭活水來蓋由源頭常有活水來耳程子有云涵養須用敬人之一心能敬以養之則天理流行亦猶是也為去聲觀書此篇形容讀書窮理始疑終悟之意昨夜江邊春水生昨宵江之邊春水新長喻其讀書窮理忽有所得蒙衝巨艦一毛輕蒙衝大船也如一毫毛輕喻其積年所闕之疑一旦釋然而悟艦音闞向來枉費推移力向日枉費推挽撑移之力喻其向時未悟此理枉費心力推䆒推通回切今日中流自在行今日中流帖然而行不勞餘力謂此理既悟徹上徹下略無窒礙亦猶舟行中流而自在也論啓䝉此篇言復陽方動萬物皆春參此詩當與邵堯夫復卦五言詩相看忽然半夜一聲雷忽然於冬至夜交子之中氣一陽來復如一聲雷震於地下復卦坤上震下象曰雷在地中復雷陽也言一陽生於下耳非真謂冬至夜有雷鳴也萬户千門次第開陽主闢一陽萌動則八卦三十六宫次第而開渾然春意萬户千門言三十六宫詳見前堯夫觀物詩注若識無中含有象當此時一陽雖動萬物未生沖漠無眹之中而萬象森然已具此所謂無中含有象也若能識得此意許君親見伏羲來便許汝親見伏羲氏來蓋伏羲先天之圖載乾坤姤復處極妙已解見前寄籍溪此篇言出仕者固尊顯隱處者亦清髙先生去上藝香閣祕書省謂之藝閣者蓋植藝草其中香可辟蠧籍溪當有此召而上藝香閣閣老新峩豸角冠臺官冠豸角冠以其能觸撞邪物猶其彈劾羣官劉恭父以閣職而戴豸角之冠留取幽人卧空谷只留得我清幽之人髙卧空山一川風月要人看一川風月清白正要人看這些子也寄籍溪此篇謂富貴如浮雲吾終不為之動亦猶雲自舒卷而山色長青也甕牖前頭翠作屛甕牖言窗之小其開明處只如甕大前面青山擁翠如屛晚來相對靜儀刑然山之體靜吾之性亦靜晚來相對肅然儀刑浮雲一任閒舒卷雲氣生於山一任自舒自卷卷上聲萬古青山只麼青青山萬古只恁地青豈以浮雲而增損哉此詩寄籍溪胡先生蓋是時秦檜當國籍溪為正字籍溪趨朝文公以其出非所當出故作詩譏之意謂富貴如浮雲吾終不為之動亦猶雲自舒卷而山色長青也水口行舟此篇形容人欲之波自在泛溢天理常常昭著昨夜扁舟雨一蓑昨夜扁舟遇兩沾浥蓑衣滿江風浪夜如何滿溪之中無非風浪此夜將謂何如今朝試揭孤篷看今朝早頭試揭開孤篷看依舊青山緑樹多青山緑樹不改舊觀蓋一夜之雨滿江風浪正猶人欲之波漲溢而青山緑樹不改舊觀明人欲淨盡而天理著明學者詳味自有深長之意詠開窗此篇詠塞者既去明者自來昨日土牆當面立昨日土牆當面而立今朝竹牖向陽開今朝竹窗向日而開謂向南而開亦得此心若道無通塞此心若云無通無塞明暗如何有去來如何昨日牆立則塞而暗今朝牖開則通而明乎暗之去明之來是即明暗有去來也七言長句秋日此篇形容心體髙明超乎天地萬物之上外物不足為纍明道先生閒來無事不從容此心清閒則事事惟見其優游不迫睡覺東窗日已紅睡醒則東窗日色已紅覺音教萬物靜觀皆自得萬物散在天地間靜而觀之無非自得四時佳興與人同四時佳興春暖秋涼與自家意思一般道通天地有形外道通天地有形之外致廣大也思入風雲變態中思入風雲變態之中盡精微也思去聲富貴不淫貧賤樂處富貴不淫處貧賤而能樂男兒到此是豪雄男兒到此地位豈不真豪傑也哉和堯夫打乖吟此篇形容堯夫居貧樂道雖混處塵俗而至德之容自使人畏打乖非是要安身打乖非是要安其身打乖堯夫自號道大方能混世塵道極其大方能混世塵而不汚陋巷一生顔氏樂顔居陋巷一生自樂清風千古伯夷貧伯夷清風千古一貧客求墨妙多攜卷客來求字多攜卷紙天為詩豪剩借春天見詩興豪邁剩借春光即所謂壺中日月長多少剩占風光十二年之意儘把笑談親俗子或笑或言儘將此親近世俗之人即上文所謂混世塵也德言猶足畏鄉人至德之容自能使鄉里之人皆知敬畏龍門道中此篇言觀物達理泰然自處是非榮辱不足為吾纍康節先生物理人情自可明物理人情顯然可見何嘗戚戚向平生一生之間未嘗憂戚卷舒在我有成算卷舒以道在我先有定畫卷上聲用捨隨時無定名用舍在人隨時而應初無定名滿目雲山俱是樂雲山蒼翠滿目無非可樂一毫榮辱不須驚虛花榮辱雖毫毛不足驚異侯門見說深如海諸侯之門深雖似海三十年前掉臂行向來已曽揚臂而行不屑見之此所謂榮辱不須驚也掉徒弔反名利此篇言求名求利皆非樂事不如循理清樂自是無憂名利到頭非樂事虛名虛利到底皆非可樂之事風波終久少安流如在風濤中終久不能安穩稍鄰美譽無多取人當省悟稍近美名處便勿貪取才近清歡與賸求才有清樂處分外求之膡音甚美譽既多須有患美名之多必有禍患即上文非樂事也清歡雖賸且無憂清樂之多且是無憂滔滔天下曽知否天下滔滔於名利波濤中還知之否覆轍相尋未肯休前車覆后車又不復戒其相繼尋未肯休止此所謂風波少安流也閒行此篇言悟易道消息之數則能安分自處一㸃閒氣不入胸中長憶當年掃弊廬長記當年掃開弊廬未嘗三徑草荒蕪三徑之中未嘗有草荒穢其中欲為天下屠龍手欲為天下施屠龍之手屠宰也言其任大也肯讀人間非聖書肯誦讀世間非聖人所作之書否泰悟來知進退故以易卦觀否則悟君子道消之機而知退觀泰則悟君子道長之機而知進乾坤悟了識親踈此以先天圖言也乾居南在上較踈坤居北在下較親自從㑹得環中意環中即先天圓圖也自從㑹得此環中之意閒氣胸中一㸃無消息進退皆有一定之理不由人造作亦惟順而安之而已此所以胸中無一㸃閒氣也天意此篇言天道自然人當絶利欲之心以求造聖人之極致天意無他只自然天意無他只一自然之理自然之外更無天自然之外更無所謂天意不欺誰怕居暗室此心茍能誠實不欺何患居暗室中而不能謹獨絶利須求在一源絶其功利之心專一從義理上尋求路徑未喫力時猶有說未曾著力時尚有假於論說之詳此乃博學詳說底意到收功處更何言及其功深力到初何俟乎言語之及此乃無聲無臭底意聖人能事人難繼天何言哉四時行百物生莫非自然聖人能事亦猶是也雖常人難為繼及無價明珠止在淵然又未有不可及者猶無價之至寶止在深淵之間惟盡心力以求之而已極論此篇言人生天地間只有百年必須反己以求至貴而為出人之事下有黃泉上有天下有地上有天人人許住百來年天髙地下人居其間皆許住百年言百年舉成數也還知虛過死萬遍不能學聖人學為君子儒過一生則雖死萬遍却似不曽生一般却似不曽生此身則一般要識明珠須巨海故要見光明之珠須於大海之中如求良玉必名山如尋至良之玉必須有名之山言欲求衆理當求之此心先能了盡世間事先能全盡世間日用常行之道即三綱五常四端萬善也然後方言出世間然後方可言超出一世之表而有髙見也觀易此篇言天以一為太極人以心為太極大人之理則一當充而廣之一物原來有一身人物生來各有一身一身還有一乾坤禀氣於天賦形於地一身之中各具一乾坤之理能知萬物備於我茍知萬物之理皆㑹於我肯把三才别立根肯將天地人之三者别立根本天向一中分造化故天於太極中以分造化一即太極人於心上起經綸人具太極之理於心萬事由此經綸一與心即上文所謂立根也天人焉有兩般義曰天曰人皆不外乎太極又烏有兩樣義理道不虛行只在人是道不能自行要在人充廣之耳觀物此篇言姤復隂陽及八卦之數耳目聰眀男子身此詩言陽貴隂賤人受形天地得為男子又耳聰目眀洪鈞賦豫不為貧且其禀賦良厚萬物皆備於我可見天造之賦豫不為貧薄矣茍不識造化之理寧不枉做男人乎豫上聲須探月窟方知物此又以先天圖言姤卦一隂生於下月隂也窟指一隂生處言也姤卦處圖之上故言探非真以手探也須探姤之月窟方知隂而賤者為物未躡天根豈識人復卦一陽生於下天陽也根指一陽生處言也復卦處圗之下故言躡非真以足躡也未履復之天根豈識陽而貴者為人乾遇巽時為月窟乾與巽遇其卦為姤此時是為月窟地逢雷處見天根坤與震逢其卦為復此處可以見天根天根月窟閒來往陽來隂往如循環然故堯夫又曰弄環餘暇時往時來即此意也三十六宫都是春一陽之來則融貫於三十六宫無非春意三十六宫乾一兑二則三宫也離三震四合三與四則為七則以三乘七十宫也巽五坎六合五與六為十一以十乘十一則二十一宫也艮七坤八合七與八則十五以二十一乘十五則三十六宫也三十六宫此就先天八卦圖看以八卦圓圖言之乾三畫坤六畫則數九也震坎艮各五畫則數十五也㢲離兑各四畫此數十二也合之為三十六首尾吟此篇借物形容本體清明纎毫人欲不能感堯夫非是愛吟詩堯夫不是好吟詠詩句詩是堯夫可愛時詩是堯夫自述其有可貴重之理寶鑑造形難隱髮如寶鑑之照則形之造馬雖毫髮不能隱喻其見善明也造去聲鸞刀迎刃豈容絲如鸞刀之利則刃而迎焉雖絲不容留喻其用心剛也風埃若不來侵路譬之風埃若不來侵近道路塵土何由上得衣則塵土無因上身喻人若不為知誘物化則私欲亦不得以蔽其本心欲論誠明是難事欲言與理無不盡而本心無不照如聖人者真是難事誠實明照堯夫非是愛吟詩重言堯夫不是好呤詠詩句只是欲詠其可愛之理耳首尾吟此篇言天理生生於中雖貧亦樂屈己下人雖貴何用堯夫非是愛吟詩堯夫不是好吟詠詩句詩是堯夫先見時詩是堯夫自述其先見之明耳直在胸中貧亦樂直道在胸中雖處貧亦樂屈於人下貴奚為若屈於人下則雖貴亦何用為誰何藥可醫無病誰人有藥可醫無疾蓋言有先見之明則不待病而後求醫藥也多少金能買不疑有多少金錢不買不疑言有先見之明則物來能名事至能應自無所惑遲老更逢春未老今衰遲晚暮又逢春事未老則新功猶未已堯夫非是愛吟詩重言堯夫不是好吟詠詩句只是欲詠其先見之明耳首尾吟此篇言一心寬平皆好田地可以自適不必貪慕世間官爵堯夫非是愛吟詩堯夫不是好吟詠詩句詩是堯夫恣縱時詩是堯夫自述其放曠樂天之意在世上官雖不做世上好官雖是不做出人間事却能知出人間事却能先知待天春暖秋涼日直待天時春暖秋涼之日正我東遊西泛時正我東邊遊玩西邊泛舟時節東遊以東方屬春也西泛以西方屬秋也多少寬平好田地無限寬濶平坦好田地可以自樂世間人自擾擾不能識得堯夫非是愛吟詩重言堯夫不是愛吟詠詩句只是欲詠其樂天之意耳首尾吟此篇言世人用詐則天下盡生疑心堯舜傳祚湯武革命皆非用詐天下信之而不疑堯夫非是愛吟詩堯夫不是愛吟詠詩句詩是堯夫愛物時詩是堯夫自述其與物無競之意只被人間多用詐只為世人多用詐譎遂令天下盡生疑遂使天下之人莫不生疑心唐虞揖遜三杯酒胡不觀唐堯虞舜遜讓天下猶飲三杯酒湯武交爭一局棊商湯周武爭取天下如看一局棊是二者初無事乎詐而天下亦無疑之者小大不同而已矣雖世人處事與此有小大不同而其不當用詐以召疑則一也堯夫非是愛吟詩重言詩句是嗟歎之深也首尾吟此篇言凡事不可强為當知所止况吾身自有寬平田地天下亦有平坦路岐正不消如此堯夫非是愛吟詩堯夫不是愛吟詠詩句詩是堯夫不强時詩自堯夫自述其不牽强作為之意事到强為須涉迹事到勉强作為終涉形迹人能知止是先機人能知所止是為識照於幾先面前自有好田地眼面前自有寬平好田地心下無事是也天下豈無平路岐天下亦豈無平坦道路樂循理是也省力事多人不做不費力之事極多人却不為是可惜也堯夫非是愛吟詩重言堯夫不是愛吟詠詩句只是詠其不牽强之意耳首尾吟此篇言其平生修身窮理所見髙所處泰不為物欲昏撓堯夫非是愛吟詩堯夫非是愛吟詠詩句詩是堯夫喜老時詩是堯夫自述其喜處老景之明明著衣冠為士子分明著衣冠而為士子謂之明者服無竒衰無嶢﨑也著與著同髙談仁義作男兒縱談論仁義而謂之男兒大丈夫謂之髙者口無繹言無卑論也敢於世上眀開眼敢在世上洞開兩目辨是與非此言所見之髙也肯向人間浪皺眉肯向人間妄皺雙眉戚憂顰蹙乎此言所處之泰也六十七年無事客六十七年之內此身客處天地間了無一事堯夫夀止於此堯夫非是愛吟詩重言堯夫不是好吟詠詩句所以詠其平生心體昭明不為物欲昏撓讀此數詩使人諷誦不已又有見康節是甚麼樣人後學當知之西齊此篇狀其隱居安貧不為利名所撓西山蔡先生數間茒屋環流水茅屋數間流水環繞茒與茅同布被藜羮飽暖餘布素之被以暖體藜藿之羮以飽腹不向利中生計較不向財利中妄生計較肯於名上著工夫又不於名聲上過妄用工夫窗前野馬閒來往野馬塵埃也窗前任其閒來閒往天際浮雲自卷舒天際浮雲聽其自卷自舒借此以喻本心既定事物不能為之纍窮達始知皆有命或窮或達我知皆有一定之命不妨隨分老樵漁不妨隨吾之分樵於山漁於水以終我老性理羣書句解卷四
