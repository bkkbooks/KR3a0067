body:
  text: 性理羣書句解卷九宋熊節撰熊剛大注圖圖者圖寫其像天一地二天數一地數二天三地四天數三地數四天五地六天數五地數六天七地八天數七地數八天九地十天數九地數十天數五謂一三五七九也地數五謂二四六八十也五位相得天地之數各有五位皆自相得而各有合又各有相合處天數二十有五以一三五七九合而算之則二十五數也地數三十以二四六八十合而算之則三十數也凡天地之數合天數地數五十有五以二十五合三十則五十有五此所以成變化而行鬼神也是能成天地之變化而行其妙用也此以上係夫子繫易之辭文公引之自此以下乃文公解說此一節此一段夫子所以發明河圖之數也孔子發河圖之祕而言之天地之間天髙地下之中一氣而已只是一流行之氣分而為二散而二則為隂陽則為一隂一陽而五行造化金木水火土之造作變化萬物終始萬物之有終有始無不管於是焉莫不皆管攝於是故河圖之位河圖數法之位序一與六共宗而居乎北一數與六數共類位乎北二與七同朋而居乎南二數與七數同侣位乎南三與八同道而居乎東三數與八數同其道位乎東四與九為友而居乎西四數與九數為儔位乎西五與十相守而居乎中五數與十數虛而不用相守位乎中蓋其所以為數者蓋合計其所謂數者不過一隂一陽不越乎各一隂陽一竒一耦一竒數一耦數以兩其五行而已有在天五行之象有在地五行之形則是兩其五行也所謂天者所言天者陽之輕清而居乎上者也以陽氣輕清而位乎上所謂地者所言地者陰之重濁而位乎下者也以陰氣重濁而居乎下陽數竒凡陽之數皆單竒一三五七九天一天三天五天七天九皆屬乎天莫不屬乎天之陽所謂天數五也是謂天數五也陰數耦凡陰之數皆雙耦故二四六八十地二地四地六地八地十皆屬乎地莫不屬乎地之陰所謂地數五也是謂地數五也天數地數天之數地之數各以其類而相求各各以類相求所謂五位之相得者然也是言天數五地數五各自相得者如此天以一生水天之數以一生水而地以六成之地以六數與天一之數合而成之地以二生火地之數以二生火而天以七成之天以七數與地二之數合而成之天以三生木天之數以三生木而地以八成之地之數八與三並居於左以成之地以四生金地之數以四生金而天以九成之天之數九與四並居于右以成之天以五生土天之數以五生土而地以十成之地之數十與五並居於中以成之此又所謂各有合焉者也此又是天地之數各自相合者如此積五竒之數積一三五十九之數而為二十五合之則二十五積五耦而為三十積二四六八十之數合之則三十合是二者又合二十五及三十數而為五十有五共成五十五數此河圖之全數此河圖所謂全數如此皆夫子之意莫非孔子之意而諸儒之說也亦諸儒之議論也以上係専說河圖自此以下互說圖書至於洛書及至洛書之文則雖夫子所未言雖是孔子未說劉歆所謂相經緯表裏者可知矣漢劉歆云河圖洛書相之經緯相表裏以此說觀亦可知矣或曰或人謂河圖洛書之位與數不同何也河圖之位與數與洛書之位與數不同如何曰朱子曰河圖以五生數河圖以一生水二生火三生木四生金五生土五者皆生數也統五成數統六七八九十之成數而同處一方生數成數共在一方蓋揭其全以示人揭是數之大全以示乎人而道其常數之體也而言常數之本體洛書以五竒數以中央四方之五竒數統四耦數統四隅之四耦數而各居其所各居一位蓋主於陽以統陰蓋主於竒數之陽以統夫耦數之陰而肇其變數之用也而開其變數之大用曰或人謂其皆以五居中者何也問圖書並以五居中如何曰朱子言凡數之始凡數之初一隂一陽而已矣皆本於一陰一陽陽之象圓陽主於動則其象圓圓者徑一而圍三圓物徑量一度環而圍之則有三度陰之象方陰主於靜則其象方方者徑一而圍四方物徑量一度圍而量之則有四度圍三者以一為一圍三者陽也以一畫為一故參其一陽而為三三其一畫而為三圍四者以二為一圍四者陰也以二畫為一故兩其一陰而為二兩其一畫而為二是所謂參天兩地者也三其陽之一畫故曰參天兩其陰之一畫故曰兩地三二之合三天數與地二數相合則為五矣則共成五數此河圖洛書之數此圖書之數所以皆以五居中也並以五位乎中然河圖以生數為主河圖以一生水二生火三生木四生金五生土五者皆生數也河圖以此為主故其中之所以為五者中央虛五之數不用者亦具五生數之象不特合中央四方而論見其生數只論中央亦自有五生數其下一㸃下面一㸃天一之象也即天一生水之象其上一㸃上面一㸃地二之象也即地二生火之象其左一㸃左邊一㸃天三之象也即天三生木之象其右一㸃右邊一㸃地四之象也即地四生金之象其中一㸃中央一㸃天五之象也即天五生土之象洛書以竒數為主洛書中央四方之五竒數為主故其中之所以五者故其中虛五之數不用者亦自具五竒數詳味下面亦字可見其下一㸃下面一㸃亦天一之象也即天一之象蓋洛書之一數居下其左一㸃左邊一㸃亦天三之象即天三之象蓋書之三數居左其中一㸃中央一㸃亦天五之象也即天五之象蓋書之五數居中其右一㸃右邊一㸃則天七之象也即天七之象蓋書之七數居右其上一㸃上面一㸃則天九之象也即天九之象蓋書之九數在上其數與位河圖洛書之數與其位序皆三同而二異天一天三天五三位與數皆同只有上一㸃圖為地二書則天九右一㸃圖為地四書則天七此二位與數俱異蓋陽不可易一三五乃陽數也圖書俱不易其序位而陰可易二四乃陰也河圖位序如此而洛書易之成數雖陽生數本為陽成數本為陰以成數對生數而論成數雖有屬陽者固亦生之陰也亦不過為生數中之陰而已曰或人謂中央之五中央五數既為五數之象矣既自有五數之象然則轉語辭其為數也奈何其所以為數是如何曰朱子言以數言之即其數言則通乎一圖則通一圖之內外由內及外自內而外固各有積實可紀之數矣各各有所積之實數可計算也然河圖之一二三四河圖一數二數三數四數各居其五象本方之外五居於中一二三四環列各居一方在五數之外而六七八九十者而六數七數八數九數十數者又各因五以得數無非因此五而得數故一得五則為六而居于下二得五則為七而居于上三得五則為八居于左四得五則為九居于右十得五則為十五居于中以附于其生數之外處于一生水二生火三生木四生金五生土生數之外而為六七八九十之成數洛書之一三七九洛書之一數三數七數九數亦各居其五象本方之外五居中一三七九環列各居一方在五數之外而二四六八者而二數四數六數八數又各因其類各各因其類以附于竒數之側以處于一三七九竒數之側蓋中者為主虛中五數為主而外者為客外列五數之旁則為客正者為君居中得正有君之象而側者為臣側處四旁有臣之象亦各有條而不紊也各有條理不容紊亂曰或人言其多寡之不同何也河圖五十五數洛書四十五數多少不一何如曰朱子云河圖主全河圖之數主於全故極于十十為數之全故河圖之數極于十而止而竒耦之位均自中而及四旁每位各各一竒一耦而均一矣論其積實論其所積之實則耦贏而竒乏也偶數滿而竒數不足蓋陽數二十五隂數三十也贏音盈洛書主變洛書之數主乎變故極于九九為陽究陽究者必變故洛書之數終于九而其位與實而其位序與其積實皆竒贏而耦乏也竒數滿而耦數不足蓋陽數二十五隂數三十也必皆虛其中也必各各虛其中河圖虛五洛書虛五然後隂陽之數而後隂與陽數均於二十而無偏爾則隂數二十陽數亦二十均平而無所偏曰或人曰其序之不同何也其位序之不同是如何曰朱子云河圖以生出之次言之河圖即生出次第而言則始下初則生下次上第二則生上次左第三生左次右第四生右以復于中再歸于中而又始于下也又自下始以運行之次言之即運行次第而言則始東初自東屬木次南第二則至南木生火也次中第三則至中火生土也次西第四則至西土生金也次北第五則至北金生水也左旋一周左運一轉而又始於東也又自東始是水生木也其生數之在內者其相生之數在中者則陽居下左一居下三居左皆陽數也而隂居上右也一居上四居右皆隂數也其成數之在外者其相成之數在外者則隂居下左六居下八居左皆隂數也而陽居上右也七居上九居右皆陽數也洛書之次洛書之次第其陽數則首北一陽數之始居北次東三陽次居東次中五陽數居中次西七陽數居西次南九陽數居南其隂數則首西南二隂數之始居西南次東南四隂數居東南次西北六隂數居西北次東北也八隂數居東北合而言之又合而言則首北一居北故始北次西南二居西南故次西南次東三居東故次東次東南四居東南故次東南次中五居中故次中次西北六居西北故次西北次東北七居東北故次東北而究於南九居南故終於南其運行其運行之序則水克火由北而南北屬水南屬火是水克火火克金由南而西西屬金是火克金金克木由西而東東屬木是金克木木克土由東而中中屬土是木克土右旋一周右運一轉而土復克水也則由中而北又是土克水是亦各有說矣各各皆有意義曰或人言其七八九六之數不同何也河圖洛書七八九六之數不同如何曰朱子云河圖六七八九河圖六七八九之數既附于生數之外矣既處於在內一二三四五生數之外此隂陽老少進退饒乏之正也八少隂六老隂七少陽九老陽自一而五為進自六而八為退陽數五為饒隂數四為乏其九者九數河圖生數一三五之積也合生數一三五積而計之其數居九故自北而東自北之一數至東之五數自東而西又得中之五而位於西而為九以成於四之外在右邊四數數之外而為成其六者河圖六數生數二四之積也合生數二四積而計之其數凡六故自南而西自南之二數至西之四數自西而北合為六數而位乎北以成於一之外處於下方一數之外而為成數而七則九之自西而南者也七為少陽位於南自西而南乃老陽之變而少者八則六之自北而東者也八為少隂位於東自北而東乃老隂之變而少者此又隂陽老少此又老隂少隂老陽少陽互藏其宅之變也交互藏其所居之變洛書之縱橫十五洛書直數橫數各十有五而七八九六七八九六之數迭為消長互消互長虛五分十虛中間五數下用縱橫各分為十數一含九下一上九二含八西南一東北八三含七左三右七四含六東南四西北六參伍錯綜縱相參伍橫相錯綜無適而不遇其合焉無所往不合十數此變化無窮之所以為妙也此變化無窮盡所以至妙曰或人言聖人之則之也奈何伏羲則河圖畫易禹則洛書以著範是如何曰朱子言則河圖者虛其中法河圖則當明其虛數則洛書者揔其實也法洛書則皆揔其實用河圖之虛五與十者河圖虛其中五與十之數太極也是為太極竒數二十除虛五之外合一三七九而計之數之竒者二十耦數二十者除虛十之外合二四六八而計之數之耦者二十兩儀也竒為陽耦為隂是即太極生兩儀也以一二三四以在內一二三四之生數為六七八九者合在外六七八九之成數四象也即兩儀生四象析四方之合分四方之相合以為乾坤離坎乾居南坤居北離居東坎居西補四隅之空補四方之角隅空處以為兊震巽艮者兊居東南震居東北巽居西南艮居西北八卦也即四象生八卦洛書之實洛書實用其一為五行一數則為次一五行其二為五事二數則為次二五事其三為八政三數則為次三八政其四為五紀四數則為次四五紀其五為皇極五數則為次五皇極其六為三德六數則為次六三德其七為稽疑七數則為次七稽疑其八為庶徴八數則為念用庶徴其九為福極九數則為五福六極其位與數其位次與數尤曉然也愈見分曉曰或人言洛書而虛其中五洛書虛其中與五數則亦太極也亦是太極竒耦各居二十竒數凡四耦數凡四除虛中數外竒則一三七九其數二十耦則二四六八其數二十則亦兩儀也亦是兩儀一二三四一二三四之數含九八七六含九八七六之數縱橫十五直數橫數皆十五數而互為七八九六七則少陽八則少隂九則老陽六則老隂亦四象也亦是兩儀生四象四方之正四方相對之正以為乾坤坎離乾南坤北離東坎西四隅之偏四方之角空處以為兊震巽艮兊東南震東北巽西南艮西北則亦八卦也亦是四象生八卦河圖之一六為水天一生水地六成之也故曰一六為水二七為火地二生火天七成之故言二七為火三八為木天三生木地八成之故言三八為木四九為金地四生金天九成之故言四九為金五十為土天五生土地十成之故言五十為土則因洪範之五行河圖水火木金土生成之數是即洪範之五行而五十五者河圖五十五之數又九疇之子目也即九疇初一次二次三次四次五次六次七次八次九之目是則洛書固可以為易則洛書亦可為易而河圖亦可以為範矣而河圖亦可為範又安知圖之不為書又何以知圖不為書書之不為圖也耶書不為圖耶曰朱子言是其時雖有後先河圖出於羲洛書出於禹其時有后先不同數雖有多寡河圖五十五數洛書四十五數雖若多少不一然其為理但於道理則一而已亦只一般但易乃伏羲之所先得乎圖然易之書是伏羲先得此圖而成而初無待乎書初不必待夫洛書範則大禹之所獨得乎書洪範之篇是大禹獨得洛書而著此疇而未必追考乎圖耳又未必追考河圖且以河圖而虛十若即河圖五十五數而虛其十則洛書四十五之數也便是洛書四十五數虛五若只就河圖五十五數而虛其五則大衍五十之數也則又是大衍五十之數積五與十積五數與十數則洛書縱橫十五之數也又是洛書直數橫數十五之數以五乘十以五數乘十數以十乘五以十數乘五數則又皆大衍之數也又是大衍五十之數洛書之五洛書五數又自含五又自含得天一地二天三地四天五之數則得十合之為十而通為大衍之數矣又可通作大衍五十之數積五與十即五與十則得十五合為十五數而通為河圖之數矣又可通作河圖五十有五之數苟明乎此苟能察是則橫斜曲直或橫或斜或曲或直無所不通彼此無所不通河圖洛書圖之與書又豈有先後彼此之間哉何嘗有先后之殊彼此之異哉性理羣書句解卷九
