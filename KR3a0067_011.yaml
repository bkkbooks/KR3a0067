body:
  text: 性理羣書句解卷十一宋熊節撰熊剛大注圖太極圖此圖明太極生隂陽隂陽生五行五行化生男女萬物聖人則為民物之主焉濓溪先生朱子曰文公云太極此所謂無極而太極也是所言無定極之中而有至定極之理所以動而陽靜而隂之本體也所以為動而生陽靜而生隂本然之體也然非有以離乎隂陽也然又不能出乎隂陽之外即隂陽而指其本體就隂陽中推出本然之體不離乎隂陽而為言耳不外隂陽而為言也隂動陽靜此太極之動而陽靜而隂也此即太極之動而生陽靜而生隂也中太極者其本體也中樣小圈是即太極之本陽體動者陽之動也陽動即所謂動而陽太極之用所以行也動者為用故為隂太極之用行靜者隂之靜也隂靜即所謂靜而隂太極之體所以立也靜者為體故為隂中太極之體立之陽者陽動之根也乃陽動之所陽中由以生也之隂者隂靜之根也乃隂靜之所由以生也水火土金五木行此陽變隂合是隂陽動靜變合而生水火木金土也而生水火木金土之五行陽變者陽之變也陽變者陽之變動也隂合者隂之合也隂合者隂之凝合也水隂盛故居右左陽右隂水乃隂之盛故居於右之上火陽盛故居左火乃陽之盛故居於左之上木陽稚故次火木陽之少故次於火金隂稚故次水金隂之少故次於水土沖氣故居中土為中氣故居中央而水火之根隂根陽交系於上而水火之交相系屬於左右之上隂根陽陽根隂也水為隂根于陽動火為陽根于隂靜水而木由水而木木而火由木而火火而土由火而土土而金由土而金金而復水由金而又水如環無端如環之轉初無端倪五氣布是五行之氣順布四時行也木主春火主夏金主秋水主冬四時以行太極隂靜陽動水火土金五木行五行一隂陽是五行之運只一隂陽之理五殊二實其名則有金木水火土五者之殊其本則不外乎隂陽二氣之實無餘欠也既無有餘又無不足隂陽一太極隂陽之運又只是太極之理精粗本末太極為精隂陽為粗太極為木五行為末無彼此也同是一理無彼此之間太極本無極太極之理本無形狀上天之載即上天之道無聲臭也無聲可聞無臭可接五行之生五行既生各一其性其性各一如火燥水溼金柔木剛土實之類氣殊質異其氣既殊其質亦異各一其極各其一太極無假借也自然而然非有所相假借真精妙合此無極二五此無極之理二氣五行之精所以妙合而無間也所以妙於凝合無間斷也乾道成男坤道成女乾男坤女乾屬陽父道也故成男坤屬隂母道也故成女以氣化者言也以氣之變化不可見者言各一其性乾健坤順故男剛女柔各具一性而男女一太極也是為男女各一太極萬物化生萬物化生天下萬物化化生生以形化者言也亦有是氣則有是形以形之變化可見者言各一其性飛潛動植性各一性而萬物一太極也是萬物各一太極此以上引説解判圖體此以下據圖推盡説意惟人也只有生而為人得其秀而最靈稟二氣五行之秀而其心為最靈則所謂人極者則凡所言人之極於是乎在矣於此乎在蓋人心是即太極然形但人之形質隂之為也凝合一定者隂之所為神人之精神陽之發也運用不息者陽之發達五性五常之性曰仁曰水義曰禮曰智曰信火土金五木行之德也是即稟五行之理以為性木神則仁金神則義水神則智火神則禮土神則信五者之德蓋無不善善惡天地之道陽貴隂賤善惡猶言貴賤也男女之分也陽而貴者為男隂而賤者為女男女之所由分也萬事事有萬變萬物之象也是萬物形著之象此天下之動此凡天下之動所以紛綸交錯所以紛擾錯雜而吉凶悔吝吉者動之善凶者吉之反悔者吉之未成吝者凶之未成所由以生也自此而生惟聖人者於此聖人有又得夫秀之精一又有得二氣五行之秀至精而不雜至一而不二而有以全乎太極之體用者也自有以全乎是極之全體大用是以一動一靜所以或動或靜各臻其極各詣至理之極而天下之故天下之事常感通於寂然不動之中常感而通之於此心凝寂不動之中蓋中也仁也中為禮曰禮曰仁感也禮屬夏仁屬春造化流行發育之象乃感之事所謂陽也是謂陽也太極之用所以行也動者為用即太極之用行正也義也正為智曰智曰義寂也正屬冬義屬秋造化揫斂收藏之時乃寂之事所謂隂也是謂隂也太極之體所以立也靜者為體即太隂之體立中正仁義禮智仁義渾然全體乃渾淪全具之本體而靜者常為主焉靜者常為主於中則人極於是乎立則人之道自此而立而太極隂陽水火土金木天地日月天地之大日月之明四時鬼神四時之運行鬼神之變化有所不能違矣自不能違乎此君子之戒謹恐懼君子於事常戒謹心常恐懼所以修此而吉也所以修此道而吉吉以得福言也小人之放僻邪侈小人放縱非僻淫邪驕侈所以悖此而凶也所以違悖此道而凶凶以取禍言也天地人之道三才之道各一極也各一太極陽也剛也仁也隂陽以氣言剛柔以質言仁義以理言陽之氣剛之質仁之理所謂陽也是所言陽也物之始也萬物之所資以始者隂也柔也義也隂之氣柔之質義之理所謂隂也是所言隂也物之終也萬物之所資以成者此所謂易也是所謂易而三極之道立焉而天地人三才之道賴此以立實則一太極也其分雖有三者之殊實則同一太極故曰故言易有太極變易之中有至極之理隂陽之謂也隂陽之中指出本體而言者也無極而太極無定極之中而有至定極之理太極動而生陽太極之有動靜即天命之流行故方其動也則為陽故曰生陽動極而靜動之極而復靜靜而生隂及其靜也則為隂故曰生隂靜極復動靜之極又復動一動一靜曰動曰靜互為其根靜極則為動之根動極則為靜之根交互為根運行不息分隂分陽靜則隂之體立而隂以分動則陽之用行而陽以分兩儀立焉於是乎兩儀體立定分不可移矣兩儀此一一是也陽變隂合逮夫陽變動而交於隂隂凝合而交於陽而生水火木金土陽變交隂則生水金水隂也金亦隂也隂合於陽則生火木火陽也木亦陽也土則居中而旺於四者五氣順布自是五行之氣順序而布四時行焉木行於春萬物以生火行於夏萬物以齊金行於秋萬物以遂水行於冬萬物以藏土則交旺於四時而四時行矣五行一隂陽也然推而上之五行異質四時異氣皆不外乎隂陽隂陽一太極也隂陽異分動靜異時皆不能離乎太極太極本無極也至於所以為太極者又無聲臭之可言不離乎性之本體五行之生也天下無性外之物故金木水火土五者之生各一其性質具於地氣行於天隨其所稟燥溼剛柔不同故各一其性則渾然太極之全體無不各具於一物之中而性之無所不在又可見矣無極之真性無不在故無極之理真而無妄二五之精隂陽五行之氣精而不二妙合而凝有是理方有是氣有是氣則載是理故理與氣混融無間是所謂妙合而凝者乾道成男然又各以其類陽而健者成男則乾父之道坤道成女隂而順者成女則坤母之道也是人物之始以氣定而生者也二氣交感隂陽二氣凝聚成形形交氣感化生萬物遂以形化而生人若物萬物生生人物生生而變化無窮焉而變化之道始無窮盡矣惟人也得其秀而最靈故隂陽五行氣質交運而人之所稟獨得其秀而其心為最靈所謂天地之性也形既生矣及形體已具神發知矣神氣之發心知之啓五性感動而善惡分五常之性感物而動陽善隂惡各矣以類分是又有生之後氣質之性萬事出矣故五性之殊散為萬事皆出於此聖人定之以中正仁義中禮也禮者天理之節文節則無太過文則無不及便是中智屬正先儒皆以正訓之性正則知得是是非非確然不易蓋人稟隂陽五行之秀氣以生而聖人之生又得其秀之秀者是以行之也中處之也正發之也仁裁之也義莫不有以全夫太極動靜之德而無所虧凡天下之欲動情勝利害相攻者於此乎定矣周子此言中正仁義通書又言仁義中正中正居先者聖人以此而定人即禮先樂後之意自明而誠者事也仁義居先者聖人與太極合德渾然本性之妙自誠而明者事也而主靜然聖人全動靜之德而常主於靜靜即太極之本體主乎是則能無欲推之酬酢事物之變而能一天下之動矣立人極焉人之道豈不賴此有立乎故聖人與天地合其德天地日月四時鬼神皆不能外乎太極隂陽五行之理聖人一身兼具此理者也與天地合德是其德性純全即太極之渾融中庸所謂如天地之無不持載無不覆幬是也與日月合其明與日月合明是其智晳昭融即隂陽之昭著中庸所謂如日月之代明是也與四時合其序與四時合序是其誠通誠復即五行之順布中庸所謂如四時之錯行是也與鬼神合其吉凶與鬼神合吉凶是其存神過化即四時變化而行鬼神中庸所謂禍福先至必先知之故至誠如神是也聖人太極之全體一動一靜無適而非中正仁義之極則闡此以定夫人豈非斯民所賴以宗主於我耶君子修之吉君子而未至於聖人地位惟修此道所以為善小人悖之凶小人不知而或悖此道所以為凶修之悖之亦在敬肆之間耳故曰故言立天之道天道之所以立曰隂與陽曰隂曰陽以氣言也蓋行於天者二氣迭運故以隂陽言立地之道地道之所以立曰柔與剛曰柔曰剛以質言也蓋具於地者體質可見故以柔剛言立人之道人道之所以立曰仁與義曰仁曰義以理言也蓋具於心者實理全備故以仁義言陽也剛也仁也物之始也隂也柔也義也物之終也又曰又言原始反終推原其始復反其終故知死生之説原始則知生之説反終則知死之説可以觀變化不窮之妙矣大哉易也易之為書廣大悉備斯其至矣語其至極則此圖盡之其指豈不深哉性理羣書句解卷十一
